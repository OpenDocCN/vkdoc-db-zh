  MongoDB 基础\n\n### 1. MongoDB 简介\n\n摘要\n\n想象这样一个世界：使用数据库如此简单，以至于你很快会忘记自己正在使用它。想象这样一个世界：速度和可扩展性自然而然地实现，无需复杂的配置或设置。想象能够只专注于手头的任务，完成工作，然后——只是为了换个花样——准时下班。这听起来可能有点异想天开，但\
  \ MongoDB 承诺帮助你实现所有这些（甚至更多）。\n\n想象这样一个世界：使用数据库如此简单，以至于你很快会忘记自己正在使用它。想象这样一个世界：速度和可扩展性自然而然地实现，无需复杂的配置或设置。想象能够只专注于手头的任务，完成工作，然后——只是为了换个花样——准时下班。这听起来可能有点异想天开，但\
  \ MongoDB 承诺帮助你实现所有这些（甚至更多）。\n\nMongoDB（源自单词\"humongous\"，意为\"巨大的\"）是一种相对较新的数据库类型，它没有表、模式、`SQL`或行的概念。它没有事务、`ACID`合规性、连接、外键，以及许多其他往往会在凌晨时分让人头疼的特性。简而言之，`MongoDB`是一种与你可能习惯的数据库非常不同的数据库，特别是如果你过去使用过关系数据库管理系统（`RDBMS`）。事实上，你甚至可能会因为缺乏所谓的\"\
  标准\"特性而惊奇地摇头。\n\n别担心！在接下来的页面中，你将了解`MongoDB`的背景和指导原则，以及为什么`MongoDB`团队做出了其特定的设计决策。我们还将快速浏览`MongoDB`的功能列表，提供足够的细节以确保你在本书的剩余部分完全被这个主题所吸引。\n\
  \n我们将从探讨`MongoDB`背后的理念和思想开始，以及一些有趣且有些争议的设计决策。我们将探索面向文档数据库的概念，它们如何组合在一起，以及它们的优势和劣势。我们还将探讨`JSON`并审视它如何应用于`MongoDB`。最后，我们将逐步介绍`MongoDB`的一些显著特性。\n\
  \n#### 回顾 MongoDB 的理念\n\n像所有项目一样，`MongoDB`有一套指导其发展的设计哲学。在本节中，我们将回顾该数据库的一些基本原则。\n\
  \n##### 让合适的工具做合适的工作\n\n支撑`MongoDB`的最重要的哲学理念是\"一种尺寸不能适应所有情况\"的概念。多年来，传统的关联式（`SQL`）数据库（`MongoDB`是一种面向文档的数据库）一直被用于存储各种类型的内容。无论数据是否适合关系模型（所有`RDBMS`数据库如`MySQL`、`PostgresSQL`、`SQLite`、`Oracle`、`MS\
  \ SQL Server`等都使用该模型）；数据都会被硬塞进去。部分原因在于，一般来说，读写数据库比写入文件系统要容易（也更安全）得多。如果你拿起任何教授`PHP`的书籍，比如\
  \ Jason Lengstorf 的《PHP for Absolute Beginners》（Apress, 2009），你可能会发现几乎从一开始数据库就被用来存储信息，而不是文件系统。这样做事情就简单多了。虽然将数据库用作存储箱有效，但开发者总是不得不逆流而上。当我们没有按照数据库的预期方式使用它时，通常很明显；任何曾经尝试存储具有稍微复杂数据的信息，不得不建立五个表，然后试图将所有内容整合在一起的人都知道我们在说什么！\n\
  \n`MongoDB`团队决定不创建另一个试图为所有人做所有事情的数据库。相反，团队希望创建一个与文档而非行一起工作的数据库，并且它要快得惊人、可大规模扩展且易于使用。为此，团队不得不放弃一些特性，这意味着`MongoDB`并非某些情况下的理想选择。例如，它缺乏事务支持，意味着你不会想用`MongoDB`来编写会计应用。话虽如此，`MongoDB`对于前述应用的某些部分（例如存储复杂数据）可能是完美的。不过，这并不是问题，因为没有理由不能将传统的`RDBMS`用于会计组件，而将`MongoDB`用于文档存储。这种混合解决方案非常常见，你可以在生产应用中看到它们，比如`New\
  \ York Times`网站。\n\n一旦你接受了`MongoDB`可能无法解决你所有问题的想法，你会发现有些问题`MongoDB`是解决的完美选择，例如分析（想象为你的网站提供实时谷歌分析）和复杂数据结构（例如，博客文章和评论）。如果你仍然不相信`MongoDB`是一个严肃的数据库工具，请随时跳到\"\
  回顾功能列表\"部分，在那里你会发现`MongoDB`令人印象深刻的功能列表。\n\n注意\n\n缺乏事务和其他传统数据库特性并不意味着`MongoDB`不稳定或不能用于管理重要数据。\n\
  \n`MongoDB`设计背后的另一个关键概念是，数据库应该始终有多个副本。如果单个数据库发生故障，它可以简单地从其他服务器恢复。因为`MongoDB`旨在尽可能快，它采取了一些捷径，这使得从崩溃中恢复变得更加困难。开发人员认为，大多数严重的崩溃无论如何都可能使整台计算机停止服务；这意味着即使数据库被完美恢复，它仍然无法使用。记住：`MongoDB`并不试图成为适合所有人的万能工具。但对于许多目的（例如构建\
  \ Web 应用），`MongoDB`可以是实现你解决方案的一个极好工具。\n\n\n\n## MongoDB 概览\n\n那么现在你已经了解了 MongoDB\
  \ 的由来。它并非追求在所有方面都做到最好，也坦然承认自己并不适合所有人。然而，对于那些选择使用它的人来说，MongoDB 提供了一个功能丰富的、面向文档的数据库，并针对速度和可扩展性进行了优化。它几乎可以在你想要运行的任何地方运行。MongoDB\
  \ 网站提供了适用于 Linux、Mac OS、Windows 和 Solaris 的下载版本。\n\nMongoDB 在所有这些目标上都取得了成功，这就是为什么使用\
  \ MongoDB（至少对我们而言）感觉有些如梦似幻。你不必担心将数据硬塞进表里——只需把数据组合起来，然后交给 MongoDB 处理即可。考虑这个现实中的例子。最近，本书的合著者\
  \ Peter Membrey 参与开发的一个应用需要存储一组 eBay 的搜索结果。结果数量不定（最多可达 100 条），他需要一种简单的方法将这些结果与他数据库中的用户关联起来。\n\
  \n如果 Peter 使用的是 MySQL，他就必须设计一张表来存储数据，编写存储结果的代码，然后再编写更多代码将所有内容重新拼凑起来。这是一个相当常见的场景，也是大多数开发人员经常面对的。通常，我们只是接受并处理它；然而，对于这个项目，他使用的是\
  \ MongoDB，因此情况就有所不同。\n\n具体来说，他添加了这一行代码：\n\n```\nrequest['ebay_results'] = ebay_results_array\n\
  collection.save(request)\n```\n\n在这个例子中，`request` 是 Peter 的文档，`ebay_results` 是键，`ebay_results_array`\
  \ 包含来自 eBay 的结果。第二行代码保存了更改。当他以后访问这个文档时，他会看到与之前格式完全相同的 eBay 结果。他不需要任何 SQL；不需要执行任何转换；也不需要创建任何新表或编写任何特殊代码——MongoDB\
  \ 直接就搞定了。它简化了流程，让他提前完成了工作，并能准时回家。\n\n### 缺乏对事务的原生支持\n\n这是 MongoDB 开发者的另一个重要设计决策：数据库不包含事务语义（提供数据一致性和存储保证的要素）。这是基于\
  \ MongoDB 追求简单、快速和可扩展性目标的一个合理权衡。一旦你摒弃了这些重量级功能，水平扩展就会变得容易得多。\n\n通常情况下，使用传统的 RDBMS，你需要购买更大、更强大的机器来提升性能。这是垂直扩展，但这种方法有其极限。而水平扩展，并非使用一台大型机器，而是使用许多性能稍弱的小型机器。从历史上看，像这样的服务器集群非常适合用于负载均衡网站，但由于内部设计限制，数据库一直是个问题。\n\
  \n你可能认为缺少这种支持是一个致命缺陷；然而，许多人忘记了 MySQL 中最受欢迎的表类型之一（`MYISAM`——恰好也是默认类型）同样不支持事务。这一事实并未阻止\
  \ MySQL 成为并保持其十多年来的主导开源数据库地位。与开发解决方案时的大多数选择一样，使用 MongoDB 将取决于个人偏好以及这些权衡是否适合你的项目。\n\
  \n注意：当至少与两台服务器（这是生产环境部署推荐的最低配置）配合使用时，MongoDB 可以提供持久性保证。可以设置主服务器在副本确认收到数据之后，再由主服务器自身确认数据已被接受。\n\
  \n尽管单服务器的持久性无法保证，但这种情况在未来可能会改变，并且目前是一个备受关注的领域。\n\n### JSON 与 MongoDB\n\nJSON（JavaScript\
  \ 对象表示法）不仅仅是一种出色的数据交换方式；它也是一种很好的数据存储方式。RDBMS 是高度结构化的，具有多个存储数据片段的文件（表）。而 MongoDB\
  \ 则将所有内容存储在一个单一的文档中。在这方面，MongoDB 类似于 JSON，这种模型提供了一种丰富且富有表现力的数据存储方式。此外，JSON 有效地描述了给定文档中的所有内容，因此无需预先指定文档的结构。JSON\
  \ 实际上是无模式的（即，它不需要模式），因为文档可以单独更新或独立于其他文档进行更改。作为一个额外的好处，JSON 还通过将所有相关数据保存在一处而提供了出色的性能。\n\
  \nMongoDB 实际上并不使用 JSON 来存储数据；而是使用 MongoDB 团队开发的一种开放数据格式，称为 BSON（发音为 Bee-Son），即二进制\
  \ JSON 的缩写。在大多数情况下，使用 BSON 而不是 JSON 不会改变你处理数据的方式。BSON 通过让计算机更容易处理和搜索文档，使 MongoDB\
  \ 变得更快。BSON 还添加了标准 JSON 中不具备的几个功能，包括处理二进制数据的能力。我们将在本章后面的“使用面向文档的存储（BSON）”一节中更深入地探讨\
  \ BSON。\n\nJSON 的原始规范可以在 RFC 4627 中找到，由 Douglas Crockford 编写。JSON 允许以简单的、人类可读的文本来表示复杂的数据结构，这种格式通常被认为比\
  \ XML 更容易阅读和理解。与 XML 类似，JSON 最初被设想为一种在 Web 客户端（如浏览器）和 Web 应用程序之间交换数据的方式。结合其描述对象的丰富方式，它的简洁性使其成为大多数开发者的首选交换格式。\n\
  \n你可能想知道这里所说的“复杂数据结构”是什么意思。历史上，数据是使用逗号分隔值（CSV）格式进行交换的（实际上，这种方法在今天仍然非常普遍）。CSV 是一种简单的文本格式，用换行符分隔行，用逗号分隔字段。例如，一个\
  \ CSV 文件可能如下所示：\n\n```\nMembrey, Peter, +852 1234 5678\nThielen, Wouter, +81 1234\
  \ 5678\n```\n\n人类可以查看此信息，并相当快速地看出所传达的信息。或者也许不能——第三列中的那个数字是电话号码还是传真号码？它甚至可能是寻呼机的号码。为了避免这种歧义，CSV\
  \ 文件通常包含一个标题字段，其中第一行定义了文件中的内容。以下片段在前一个例子的基础上更进一步：\n\n```\nLastname, Firstname, Phone\
  \ Number\nMembrey, Peter, +852 1234 5678\nThielen, Wouter, +81 1234 5678\n```\n\n\
  好吧，这样好一点了。但现在假设 CSV 文件中的一些人拥有不止一个电话号码。你可以为办公室电话号码再添加一个字段，但如果你想要多个办公室电话号码，就会面临一系列新的问题。如果你还想合并多个电子邮件地址，又会面临另一系列问题。大多数人拥有不止一个电子邮件地址，而这些地址通常无法整齐地定义为家庭或工作地址。突然间，CSV\
  \ 开始暴露出它的局限性。CSV 文件仅适用于存储扁平且没有重复值的数据。同样，提供多个 CSV 文件的情况并不少见，每个文件包含不同的信息片段。然后这些文件被组合起来（通常在\
  \ RDBMS 中）以形成完整的视图。例如，一家大型零售公司可能会在每天结束时，从其每家商店接收以 CSV 文件形式提供的销售数据。公司必须先合并这些文件，才能查看其在特定日期的表现。这个过程并非完全直接，并且随着所需文件数量的增加，出错的机会肯定也会增加。\n\
  \n\n## XML 与 JSON：数据交换格式的演进\n\nXML 在很大程度上解决了这个问题，但对于大多数事物使用 XML，有点像用大锤砸坚果：它有效，但感觉像是大材小用。原因是\
  \ XML 高度可扩展。它不定义特定的数据格式，而是定义你如何定义数据格式。当你需要交换复杂且高度结构化的数据时，这很有用；然而，对于简单的数据交换，这往往导致过多的工作量。确实，这种场景正是“**XML\
  \ 地狱**”这一说法的由来。\n\nJSON 提供了一个令人满意的折中方案。与 CSV 不同，它可以存储结构化内容；但与 XML 不同，JSON 使内容易于理解和使用。让我们重新审视前面的例子；不过这次，你将使用\
  \ JSON 而不是 CSV：\n\n```json\n{\n    \"firstname\": \"Peter\",\n    \"lastname\":\
  \ \"Membrey\",\n    \"phone_numbers\": [\n        \"+852 1234 5678\",\n        \"\
  +44 1234 565 555\"\n    ]\n}\n```\n\n在这个版本的示例中，每个 JSON 对象（或文档）都包含理解它所需的所有信息。如果你看`phone_numbers`，可以看到它包含一个不同号码的列表。这个列表可以任意大。你还可以更具体地说明所记录号码的类型，就像这个例子：\n\
  \n```json\n{\n    \"firstname\": \"Peter\",\n    \"lastname\": \"Membrey\",\n  \
  \  \"numbers\": [\n        {\n            \"phone\": \"+852 1234 5678\"\n      \
  \  },\n        {\n            \"fax\": \"+44 1234 565 555\"\n        }\n    ]\n\
  }\n```\n\n这个版本的示例又改进了一些。现在你可以清楚地看到每个号码的用途。JSON 极具表现力，虽然手写 JSON 相当容易，但在软件中它通常是自动生成的。例如，Python\
  \ 包含一个（有点可预测地）名为`json`的模块，它可以获取现有的 Python 对象并自动将它们转换为 JSON。由于 JSON 在众多平台上得到支持和使用，它是交换数据的理想选择。\n\
  \n当你添加诸如电话号码列表之类的项目时，你实际上是在创建所谓的**嵌入式文档**。每当你添加复杂内容，例如列表（或使用 JSON 中青睐的术语——数组）时，就会发生这种情况。一般来说，也存在逻辑上的区分。例如，一个`Person`文档内部可能嵌入了几个`Address`文档。同样，一个`Invoice`文档内部可能嵌入了众多`LineItem`文档。当然，嵌入的`Address`文档也可能拥有自己的嵌入式文档，例如包含电话号码。\n\
  \n是否选择嵌入特定文档，是在你决定如何存储信息时确定的。这通常被称为`模式设计`。在 MongoDB 被认为是`无模式`数据库时，提到`模式设计`可能显得奇怪。然而，虽然\
  \ MongoDB 不强制你创建模式或强制执行你创建的模式，但你仍然需要考虑你的数据如何组合在一起。我们将在第 3 章中更深入地探讨这一点。\n\n### 采用非关系型方法\n\
  \n使用关系数据库提高性能通常是直接了当的：购买更大、更快的服务器。这非常有效，直到你达到无法再购买更大服务器的地步。那时，唯一的选项是扩展到两台服务器。这听起来可能很容易，但对大多数数据库来说却是一个障碍。例如，`MySQL`和`PostgresSQL`都无法在两台服务器上运行单个数据库，并且让两台服务器都能读写数据（通常称为`主动/主动集群`）。虽然`Oracle`可以通过其令人印象深刻的`真正应用集群\
  \ (RAC)`架构做到这一点，但如果你想使用该解决方案，你可能需要申请抵押贷款——实施基于`RAC`的解决方案需要多台服务器、共享存储和多个软件许可证。\n\n\
  你可能想知道为什么在两个数据库上拥有`主动/主动集群`如此困难。当你查询数据库时，数据库必须找到所有相关数据并将它们全部链接在一起。`RDBMS`解决方案具有许多提高性能的巧妙方法，但它们都依赖于拥有完整的数据视图。而这正是你碰壁的地方：当一半的数据在另一台服务器上时，这种方法根本行不通。\n\
  \n当然，你可能有一个很小的数据库但请求量很大，因此你只需要分担负载。不幸的是，这里你又遇到了另一堵墙。你需要确保写入第一台服务器的数据对第二台服务器可用。如果更新同时在两个独立的主服务器上进行，你将面临额外的问题。例如，你需要确定哪个更新是正确的。你可能遇到的另一个问题是：有人可能向第二台服务器查询刚刚写入第一台服务器的信息，但该信息尚未在第二台服务器上更新。当你考虑到所有这些问题时，就很容易理解为什么`Oracle`解决方案如此昂贵——这些问题极难解决。\n\
  \nMongoDB 以一种非常巧妙的方式解决了`主动/主动集群`问题——它完全避开了它们。回想一下，MongoDB 将数据存储在`BSON`文档中，因此数据是自包含的。也就是说，虽然相似的文档存储在一起，但单个文档并非由关系构成。这意味着你需要的所有内容都在一个地方。因为\
  \ MongoDB 中的查询是在文档中查找特定的键和值，所以这些信息可以轻松地分布在尽可能多的服务器上。每台服务器检查它拥有的内容并返回结果。这有效地实现了几乎线性的可扩展性和性能。额外的好处是，你甚至不需要申请新的抵押贷款来支付此功能。\n\
  \n诚然，MongoDB 不提供`主/主复制`，即两个独立的服务器都可以接受写请求。但是，它确实提供了`分片`，这允许数据跨多台机器分割，每台机器负责更新数据集的不同部分。这种设计的好处是，虽然一些解决方案允许两个主数据库，但\
  \ MongoDB 可以像在两台机器上运行一样轻松地扩展到数百台机器。\n\n\n### 在性能与功能之间做出选择\n\n性能固然重要，但 MongoDB 也提供了丰富的功能集。我们已经讨论过一些\
  \ MongoDB 未实现的功能，你可能会对 \"MongoDB 通过明智地裁剪某些其他数据库常见的功能，部分实现了其卓越性能\" 这一说法持保留态度。然而，也存在一些功能极为有限但速度极快的类似数据库系统，例如那些实现了\
  \ `键/值存储` 的系统。\n\n`memcached` 就是一个完美的例子。该应用程序旨在提供高速数据缓存，其速度快得令人麻木。当用于缓存网站内容时，它可以将应用程序的速度提升许多倍。这个应用程序被诸如\
  \ Facebook 和 LiveJournal 等超大型网站使用。\n\n问题在于该应用程序有两个显著的缺点。首先，它是一个纯内存数据库。如果断电，所有数据都会丢失。其次，你实际上无法使用\
  \ `memcached` 搜索数据；你只能请求特定的键。\n\n这些听起来像是严重的限制；然而，你必须记住 `memcached` 设计要解决的问题。`memcached`\
  \ 首先是一个数据缓存。也就是说，它不应该是一个永久数据存储，而只是为你的现有数据库提供一个缓存层。当你构建一个动态网页时，通常请求的是非常具体的数据（例如当前排名前十的文章）。这意味着你可以直接向\
  \ `memcached` 请求该数据——无需执行搜索。如果缓存已过期或为空，你会像往常一样查询数据库，构建数据，然后将其存储在 `memcached` 中以备将来使用。\n\
  \n一旦你接受了这些限制，你就能看出 `memcached` 如何通过实现非常有限的功能集来提供卓越的性能。顺便说一句，这种性能是传统数据库无法比拟的。也就是说，`memcached`\
  \ 当然不能替代 `RDBMS`。重要的是要记住，它本就不该替代。\n\n与 `memcached` 相比，MongoDB 本身功能丰富。为了实用，MongoDB\
  \ 必须提供一套强大的功能，例如搜索特定文档的能力。它还必须能够将这些文档存储在磁盘上，以便在重启后数据依然存在。幸运的是，MongoDB 提供了足够的功能，使其成为大多数\
  \ Web 应用程序以及许多其他类型应用程序的有力竞争者。\n\n像 `memcached` 一样，MongoDB 并非适用于所有场景的数据库。正如计算领域通常的情况那样，为了实现应用程序的预期目标，必须做出权衡取舍。\n\
  \n### 在任何地方运行数据库\n\nMongoDB 使用 `C++` 编写，这使得它相对容易移植和/或几乎在任何地方运行。目前，可以从 MongoDB 网站下载适用于\
  \ Linux、Mac OS、Windows 和 Solaris 的二进制文件。对于 Fedora 和 CentOS 等平台，也有各种官方版本可用。你甚至可以下载源代码并构建自己的\
  \ MongoDB，但建议尽可能使用提供的二进制文件。所有二进制文件均提供 32 位和 64 位版本。\n\n警告\n\n32 位版本的 MongoDB 限制数据库大小为\
  \ 2GB 或更小。这是因为 MongoDB 在内部使用内存映射文件来实现高性能。在 32 位系统上，任何超过 2GB 的数据都需要一些复杂的技巧，这不会很快，还会使应用程序的代码复杂化。官方对此限制的立场是，64\
  \ 位环境很容易获得；因此，增加代码复杂性并非一个好的权衡。64 位版本实际上没有这种限制。\n\nMongoDB 要求不高，可以在高性能服务器或虚拟机上运行，甚至可以为基于云的应用程序提供支持。通过保持简洁并专注于速度和效率，MongoDB\
  \ 无论部署在何处都能提供稳定的性能。\n\n### 整合所有内容\n\n在了解 MongoDB 的功能列表之前，我们需要回顾一些基本术语。MongoDB 开始使用不需要太多专业知识，许多\
  \ MongoDB 特有的术语可以大致翻译为你可能已经熟悉的 `RDBMS` 等价术语。不过别担心；我们会完整解释每个术语。即使你不熟悉标准的数据库术语，你也能轻松跟上。\n\
  \n### 生成或创建键\n\n文档代表了 MongoDB 中的存储单元。在 `RDBMS` 中，这被称为行。然而，文档远不止是行，因为它们可以存储复杂的信息，如列表、字典，甚至是字典列表。与传统数据库中行是固定的相比，MongoDB\
  \ 中的文档可以由任意数量的键和值组成（你将在下一节中了解更多）。最终，键不过是一个标签；它大致相当于你在 `RDBMS` 中给列起的名字。你使用键来引用文档内部的数据片段。\n\
  \n在关系数据库中，应该始终有某种方式来唯一标识给定记录；否则就无法引用特定的行。为此，你需要包含一个持有唯一值的字段（称为主键）或一组可以唯一标识给定行的字段（称为复合主键）。\n\
  \nMongoDB 要求每个文档都有一个唯一标识符，原因大体相同；在 MongoDB 中，这个标识符被称为 `_id`。除非你为该字段指定一个值，否则 MongoDB\
  \ 会为你生成一个唯一的值。即使在成熟的 `RDBMS` 数据库领域，对于是应该使用数据库提供的唯一键，还是自己生成唯一键，意见也不统一。最近，让数据库为你创建键变得更为流行。\n\
  \n原因在于，人类创建的唯一编号（如汽车登记号码）有一个讨厌的习惯，就是会改变。例如，2001 年，英国实施了一套全新的车牌系统，与之前的系统完全不同。MongoDB\
  \ 可以很好地处理这种变化；然而，如果你使用车牌号作为主键，你可能需要仔细考虑一番。当 `ISBN`（国际标准书号）方案从 10 位升级到 13 位时，可能也发生了类似的情况。\n\
  \n以前，大多数使用 MongoDB 的开发者似乎更喜欢自己创建唯一键，自己负责确保数字的唯一性。然而今天，普遍共识似乎指向使用 MongoDB 为你创建的默认\
  \ `ID` 值。但是，与使用 `RDBMS` 数据库时一样，你选择的方法主要取决于个人偏好。我们更喜欢使用数据库提供的值，因为这意味着我们可以确保键是唯一的，并且独立于其他任何东西。如前所述，其他人则更喜欢提供自己的键。\n\
  \n最终，你必须决定什么最适合你。如果你确信你的键是唯一的（并且很可能保持不变），那么你应该可以自由地使用它。如果你不确定键的唯一性，或者不想为此担心，那么你可以直接使用\
  \ MongoDB 提供的默认键。\n\n\n\n### 使用键与值\n\n文档由键和值构成。让我们再看一下本章前面讨论过的例子：\n\n```json\n{\n\
  \    \"firstname\": \"Peter\",\n    \"lastname\": \"Membrey\",\n    \"phone_numbers\"\
  : [\n        \"+852 1234 5678\",\n        \"+44 1234 565 555\"\n    ]\n}\n```\n\n\
  键和值总是成对出现。与关系型数据库管理系统（RDBMS）不同，在后者中，每个字段都必须有一个值，即使它是 ``NULL``（有点矛盾的是，这意味着未知），而 MongoDB\
  \ 并不要求文档必须包含某个特定的值。例如，如果你不知道列表中某个人的电话号码，你直接省略它即可。一个常用的类比是商务名片。如果你有传真号码，你通常会把它印在名片上；但如果你没有，你不会写上“传真号码：无”。相反，你直接省略该信息。如果一个键值对没有包含在\
  \ MongoDB 文档中，则假定它不存在。\n\n### 实现集合\n\n集合在某种程度上类似于表，但它们远没有那么严格。集合很像一个贴了标签的盒子。你家里可能有一个标着“DVD”的盒子，你把你的\
  \ DVD 放进去。这很合理，但没有什么能阻止你把 CD 甚至磁带放进这个盒子，如果你想这么做的话。在 RDBMS 中，表是严格定义的，你只能把指定的项目放入表中。在\
  \ MongoDB 中，集合就是如此：相似项目的集合。这些项目不必完全相似（MongoDB 本质上是灵活的）；然而，一旦我们开始研究索引和更高级的查询，你很快就会看到将相似项目放在一个集合中的好处。\n\
  \n虽然你可以将各种项目混合放在一个集合里，但几乎没有这样做的必要。如果这个集合被称为 ``media``，那么所有的 DVD、CD 和磁带都会放在那里。毕竟，这些项目都有共同之处，比如艺术家姓名、发行日期和内容。换句话说，某些文档是否应存储在同一集合中，实际上取决于你的应用程序。从性能角度来看，拥有多个集合并不比只有一个集合慢。记住：MongoDB\
  \ 旨在让你的生活更轻松，所以你应该做任何你觉得对的事情。\n\n最后但同样重要的是，集合实际上是按需创建的。具体来说，当你第一次尝试保存引用该集合的文档时，才会创建该集合。这意味着你可以按需创建集合（尽管不一定非要这样做）。因为\
  \ MongoDB 还允许你动态创建索引和执行其他数据库级命令，你可以利用这个行为来构建一些非常动态的应用程序。\n\n### 理解数据库\n\n在 MongoDB\
  \ 中思考数据库最简单的方式，或许就是将其视为集合的集合。和集合一样，数据库也可以按需创建。这意味着为每个客户创建一个数据库很容易——你的应用程序代码甚至可以为你完成这件事。你也可以用\
  \ MongoDB 以外的数据库这样做；然而，在 MongoDB 中以这种方式创建数据库是一个非常自然的过程。话虽如此，仅仅因为你可以以这种方式创建数据库，并不意味着你必须这样做，甚至不应该这样做。尽管如此，如果你想运用这种能力，你确实拥有它。\n\
  \n## 回顾特性列表\n\n既然你已经了解了 MongoDB 是什么以及它提供了什么，是时候浏览一下它的特性列表了。你可以在数据库的官方网站 [`www.mongodb.org/`](http://www.mongodb.org/)\
  \ 上找到 MongoDB 特性的完整列表；请务必访问该网站以获取最新的列表。本章的特性列表涵盖了许多幕后进行的工作，但要使用 MongoDB 本身，你并不需要熟悉列出的每一个特性。换句话说，如果你在浏览这个列表时感觉眼皮开始打架，请随时跳到本节末尾！\n\
  \n### 使用面向文档的存储（BSON）\n\n我们已经讨论了 MongoDB 面向文档的设计。我们还简要提到了 BSON。如你所知，JSON 使得以其真实形式存储和检索文档变得容易得多，有效地消除了对任何映射器或特殊转换代码的需求。这个特性还使得\
  \ MongoDB 更容易扩展，这无疑是锦上添花。\n\nBSON 是一个开放标准；你可以在 [`http://bsonspec.org/`](http://bsonspec.org/)\
  \ 找到其规范。当人们听说 BSON 是 JSON 的二进制形式时，他们会期望它比基于文本的 JSON 占用少得多的空间。然而，情况并非总是如此；实际上，在许多情况下，BSON\
  \ 版本比其等效的 JSON 版本占用更多空间。\n\n你可能想知道为什么要使用 BSON。毕竟，CouchDB（另一个强大的面向文档的数据库）使用纯 JSON，值得思考的是，在\
  \ BSON 和 JSON 之间来回转换文档是否值得这个麻烦。\n\n首先，我们必须记住，MongoDB 的设计目标是速度快，而不是空间高效。这并不意味着 MongoDB\
  \ 浪费空间（它没有）；然而，存储文档时的一点额外开销是完全可以接受的，如果这使得数据处理速度更快的话（而它确实做到了）。简而言之，BSON 遍历（即查看）和建立索引要快得多。虽然\
  \ BSON 比 JSON 需要稍微多一点的磁盘空间，但这个额外的空间不太可能成为问题，因为磁盘很便宜，而且 MongoDB 可以跨机器扩展。这种情况下权衡是相当合理的：你用一点额外的磁盘空间换取了更好的查询和索引性能。\n\
  \n使用 BSON 的第二个关键好处是，将 BSON 转换为编程语言的本机数据格式既简单又快捷。如果数据以纯 JSON 存储，则需要进行相对高层次的转换。有适用于多种编程语言（如\
  \ Python、Ruby、PHP、C、C++和 C#）的 MongoDB 驱动程序，每个驱动程序的工作方式略有不同。使用简单的二进制格式，可以为每种语言快速构建本机数据结构，而无需你先处理\
  \ JSON。这使得代码更简单、更快捷，这两者都符合 MongoDB 既定的目标。\n\nBSON 还对 JSON 提供了一些扩展。例如，它允许你存储二进制数据并包含特定的数据类型。因此，虽然\
  \ BSON 可以存储任何 JSON 文档，但一个有效的 BSON 文档可能不是有效的 JSON。这没关系，因为每种语言都有自己的驱动程序，可以在不需要使用 JSON\
  \ 作为中间语言的情况下，将数据与 BSON 相互转换。\n\n归根结底，BSON 不太可能成为你如何使用 MongoDB 的重要因素。像所有伟大的工具一样，MongoDB\
  \ 会静静地待在后台，做它需要做的事情。除了可能使用图形工具查看数据外，你通常会使用本机语言工作，并让驱动程序负责向 MongoDB 持久化。\n\n\n\n\
  ### 支持动态查询\n\nMongoDB 支持**动态查询**，这意味着你无需预先规划即可运行查询。这类似于能够对关系型数据库管理系统执行 SQL 查询。你可能会疑惑，为什么这也能算作一项特性；难道不是所有数据库都支持吗？\n\
  \n其实不然。例如，CouchDB（通常被认为是 MongoDB 最大的“竞争对手”）就不支持动态查询。这是因为 CouchDB 提出了一种全新的（并且不可否认是令人兴奋的）数据思考方式。传统的关系型数据库管理系统是静态数据与动态查询。这意味着数据的结构是预先固定的——必须定义表，并且每一行都必须符合该结构。因为数据库预先知道数据的结构，所以它可以做出某些假设和优化，从而实现快速的动态查询。\n\
  \nCouchDB 则彻底颠覆了这一模式。作为一种面向文档的数据库，CouchDB 是无模式的，因此数据是动态的。然而，这里的新理念是查询是静态的。也就是说，你必须在使用查询之前预先定义好它们。\n\
  \n这并不像听起来那么糟糕，因为许多查询可以轻松地预先定义。例如，一个让你搜索书籍的系统很可能会让你按 ISBN 搜索。在 CouchDB 中，你会创建一个索引，该索引会为所有文档构建所有\
  \ ISBN 的列表。当你输入一个 ISBN 时，查询会非常快，因为它实际上不需要搜索任何数据。每当系统有新数据添加时，CouchDB 会自动更新其索引。\n\n\
  从技术上讲，你可以在不生成索引的情况下对 CouchDB 运行查询；但在那种情况下，CouchDB 必须先自行创建索引，然后才能处理你的查询。如果你只有 hundred\
  \ 本书，这不会是个问题；然而，如果你要归档成千上万本书，这将导致性能低下，因为每次查询都会重新（并且反复）生成索引。因此，CouchDB 团队不建议在生产环境中使用动态查询——即那些未经预先定义的查询。\n\
  \nCouchDB 还允许你将查询编写为 `map` 和 `reduce` 函数。如果这听起来很费力，那么有同样感觉的人不止你一个；CouchDB 的学习曲线有点陡峭。公平地说，有经验的程序员可能很快就能掌握它；但对大多数人来说，学习曲线可能过于陡峭，以至于他们不会去使用这个工具。\n\
  \n幸运的是，对于我们这些普通用户来说，MongoDB 要容易使用得多。我们将在本书中更详细地介绍如何使用 MongoDB，但这里有个简短版本：在 MongoDB\
  \ 中，你只需提供你想要匹配的文档部分，剩下的交给 MongoDB。然而，MongoDB 能做的远不止于此。例如，如果你想使用 `map` 或 `reduce`\
  \ 函数，你也不会觉得 MongoDB 缺乏相应功能。同时，你可以循序渐进地使用 MongoDB；你不必一开始就了解该工具的所有高级功能。\n\n### 为你的文档建立索引\n\
  \nMongoDB 为文档索引提供了广泛支持，当你处理数万份文档时，这一特性确实非常方便。如果没有索引，MongoDB 就不得不逐个查看每个文档，以确定它是否是你想看到的内容。这就像向图书管理员询问某本书，并看着他在图书馆里一本一本地翻找。有了索引系统（图书馆通常使用杜威十进分类法），他可以快速找到你所找书籍所在的区域，并很快确定它是否存在。\n\
  \n与图书馆的书籍不同，MongoDB 中的所有文档都会自动在 `_id` 键上建立索引。这个键被视为一个特例，因为你不能删除它；索引确保了每个值都是唯一的。这个键的好处之一是，你可以确保每个文档都是唯一可识别的，而这一点关系型数据库管理系统并不能保证。\n\
  \n当你创建自己的索引时，你可以决定是否要强制实施唯一性。如果你决定创建唯一索引，可以告诉 MongoDB 删除所有重复项。这可能是也可能不是你想要的结果，因此在使用此选项前应仔细考虑，因为你可能会意外删除一半的数据。默认情况下，如果你尝试在一个具有重复值的键上创建唯一索引，将会返回错误。\n\
  \n在很多情况下，你会希望创建一个允许重复的索引。例如，如果你的应用程序按姓氏搜索，那么在姓氏键上构建索引是有意义的。当然，你无法保证每个姓氏都是唯一的；而且在任何合理大小的数据库中，重复几乎是必然存在的。\n\
  \n然而，MongoDB 的索引能力不止于此。MongoDB 还能为嵌入式文档创建索引。例如，如果你在地址键中存储了多个地址，你可以为邮政编码创建索引。这意味着你可以轻松地根据任何邮政编码检索文档——而且速度非常快。\n\
  \nMongoDB 更进一步，支持复合索引。在复合索引中，使用两个或更多键来构建给定的索引。例如，你可以构建一个结合了 `lastname`（姓氏）和 `firstname`（名字）标签的索引。对全名的搜索将非常快，因为\
  \ MongoDB 可以快速定位到姓氏，然后同样快速地定位到名字。\n\n我们将在第 10 章中更深入地探讨索引，但可以这么说，在索引方面，MongoDB 能满足你的需求。\n\
  \n### 利用地理空间索引\n\n值得特别提及的一种索引形式是地理空间索引。这种新的、专门的索引技术是在 MongoDB 1.4 中引入的。你可以使用此功能为基于位置的数据建立索引，从而能够回答诸如“某个坐标集一定距离内有多少个项目”这样的查询。\n\
  \n随着越来越多的 Web 应用程序开始利用基于位置的数据，这一功能将在日常开发中扮演越来越重要的角色。不过就目前而言，地理空间索引仍然算是一种小众功能；然而，如果你发现自己需要它时，你会非常高兴它就在那里。\n\
  \n### 分析查询\n\n一个内置的分析工具让你可以看到 MongoDB 如何确定返回哪些文档。这很有用，因为在许多情况下，只需添加一个索引就可以轻松改进查询。如果你有一个复杂的查询，并且不太确定它为什么运行得这么慢，那么查询分析器可以为你提供极其有价值的信息。同样，你将在第\
  \ 10 章中了解更多关于 MongoDB 分析器的内容。\n\n\n\n### 就地更新信息\n\n当数据库更新一行（或者在 MongoDB 的情况下，一个文档）时，它有几种选择。许多数据库选择多版本并发控制（`MVCC`）方法，该方法允许多个用户查看数据的不同版本。这种方法很有用，因为它能确保在给定的事务期间，数据不会被其他程序中途更改。\n\
  \n这种方法的缺点是数据库需要跟踪数据的多个副本。例如，`CouchDB` 提供了非常强的版本控制，但这代价是需要完整地写出数据。虽然这确保了数据以稳健的方式存储，但也增加了复杂性并降低了性能。\n\
  \n而 `MongoDB` 则采用就地更新信息的方式。这意味着（与 `CouchDB` 相反）`MongoDB` 可以在数据所在的任何位置进行更新。这通常意味着不需要分配额外的空间，并且索引可以保持不变。\n\
  \n这种方法的另一个好处是 `MongoDB` 执行延迟写入。内存的读写速度非常快，但写入磁盘的速度要慢数千倍。这意味着你希望尽可能限制对磁盘的读写。这在 `CouchDB`\
  \ 中是不可能的，因为该程序确保每个文档都被快速写入磁盘。虽然这种方法保证了数据安全地写入磁盘，但它也显著影响了性能。\n\n`MongoDB` 只在必要时才写入磁盘，通常大约每秒一次。这意味着，如果一个值在一秒钟内被更新多次——如果你使用一个值作为页面计数器或用于实时统计，这种情况并不少见——那么该值只会被写入一次，而不是像\
  \ `CouchDB` 那样需要写入数千次。\n\n这种方法使得 `MongoDB` 速度快得多，但同样，它需要权衡取舍。`CouchDB` 可能较慢，但它确实保证了数据安全地存储在磁盘上。`MongoDB`\
  \ 不做这样的保证，这就是为什么对于管理关键数据（如计费或应收账款），传统的 `RDBMS` 可能是更好的解决方案。\n\n### 存储二进制数据\n\n`GridFS`\
  \ 是 `MongoDB` 在数据库中存储二进制数据的解决方案。`BSON` 支持在文档中保存最多 4MB 的二进制数据，这很可能满足你的需求。例如，如果你想存储个人资料图片或声音片段，那么\
  \ 4MB 可能比你所需的还要多。另一方面，如果你想存储电影片段、高质量音频片段，甚至是数百兆字节大小的文件，那么 `MongoDB` 也能满足你的需求。\n\n\
  `GridFS` 的工作原理是将文件的信息（称为元数据）存储在 `files` 集合中。数据本身被分解成称为块（chunks）的片段，存储在 `chunks`\
  \ 集合中。这种方法使得存储数据既简单又可扩展；它也使范围操作（例如检索文件的特定部分）更容易使用。\n\n一般来说，你会通过编程语言的 `MongoDB` 驱动程序来使用\
  \ `GridFS`，因此你不太可能需要在如此低的层面上亲自动手。与 `MongoDB` 中的其他功能一样，`GridFS` 旨在兼顾速度和可扩展性。这意味着你可以确信，如果你想处理大型数据文件，`MongoDB`\
  \ 将能够胜任这项任务。\n\n### 复制数据\n\n当我们讨论 `MongoDB` 背后的指导原则时，我们提到 `RDBMS` 数据库提供了某些数据存储保证，而这些保证在\
  \ `MongoDB` 中并不存在。这些功能未被实现有几方面原因。首先，这些功能会降低数据库的速度。其次，它们会大大增加程序的复杂性。第三，人们认为服务器上最常见的故障是硬件故障，即使数据被安全地保存到磁盘，数据无论如何也会变得无法使用。\n\
  \n当然，这并不意味着数据安全不重要。如果你不能指望在需要时能够访问数据，那么 `MongoDB` 的用处就不大了。最初，`MongoDB` 通过一个称为主从复制的功能提供安全保障，其中在任何给定时间只有一个数据库处于写入活动状态，这种方法在\
  \ `RDBMS` 世界中也相当常见。此功能后来被副本集取代，基本的主从复制已被弃用，不应再使用。\n\n副本集有一个主服务器（类似于主服务器），它处理来自客户端的所有写入请求。因为在给定的集合中只有一个主服务器，它可以保证所有写入都得到正确处理。当发生写入时，它会被记录在主服务器的\
  \ `oplog` 中。\n\n`oplog` 会被从服务器（可以有多个）复制，并用于使自身与主服务器保持同步。如果主服务器在某个时间点发生故障，其中一个从服务器将成为主服务器，并接管处理客户端写入请求的责任。\n\
  \n### 实现分片\n\n对于参与大规模部署的人来说，自动分片可能会被证明是 `MongoDB` 最重要和最常用的功能之一。\n\n在自动分片场景中，`MongoDB`\
  \ 会为你处理所有的数据分割和重组。它确保数据被发送到正确的服务器，并以最有效的方式运行和合并查询。事实上，从开发者的角度来看，与拥有上百个分片的 `MongoDB`\
  \ 数据库交互，和与单个 `MongoDB` 服务器交互，没有任何区别。此功能尚未准备好用于生产环境；然而，当它准备就绪时，它将把 `MongoDB` 的可扩展性推向顶峰。\n\
  \n与此同时，如果你刚刚起步或者正在构建你的第一个基于 `MongoDB` 的网站，那么你可能会发现单个 `MongoDB` 实例就足以满足你的需求。但如果你最终构建了下一个\
  \ Facebook 或亚马逊，你会很高兴你建立在一个可以无限扩展的技术上的网站。分片是本书第 12 章的主题。\n\n### 使用 Map 和 Reduce\
  \ 函数\n\n对许多人来说，听到 `MapReduce` 这个术语会让他们脊背发凉。另一个极端是，许多 `RDBMS` 倡导者嘲笑 `map` 和 `reduce`\
  \ 函数的复杂性。对某些人来说这很可怕，因为这些函数需要一种完全不同的方式来思考查找和排序数据的方法，许多专业程序员也很难理解支撑 `map` 和 `reduce`\
  \ 函数的概念。尽管如此，这些函数提供了一种极其强大的数据查询方式。事实上，`CouchDB` 只支持这种方法，这也是它学习曲线如此陡峭的原因之一。\n\n`MongoDB`\
  \ 并不要求你使用 `map` 和 `reduce` 函数。事实上，`MongoDB` 依赖于一种简单的查询语法，更类似于你在 `MySQL` 中看到的。然而，`MongoDB`\
  \ 确实为有需要的人提供了这些功能。`map` 和 `reduce` 函数是用 `JavaScript` 编写的，并在服务器上运行。`map` 函数的任务是找到所有符合特定条件的文档。然后这些结果被传递给\
  \ `reduce` 函数，由它来处理数据。`reduce` 函数通常不返回文档集合；相反，它返回一个新的文档，其中包含推导出的信息。一般来说，如果你通常在 `SQL`\
  \ 中使用 `GROUP BY`，那么在 `MongoDB` 中，`map` 和 `reduce` 函数可能就是适合这项工作的工具。\n\n注意\n\n你不应该将\
  \ `MongoDB` 的 `map` 和 `reduce` 函数视为对 `CouchDB` 所采用方法的拙劣模仿。如果你愿意，你可以使用 `MongoDB`\
  \ 的 `map` 和 `reduce` 函数来完成所有事情，以替代 `MongoDB` 原生的查询支持。\n\n\n\n### 全新的聚合框架\n\n`MapReduce`\
  \ 是一个非常强大的工具，但它有一个主要缺点；它并非那么容易使用。许多数据库系统被用于报表，而 `SQL` 数据库在这方面尤为便捷。如果你想对结果进行分组或查找最大值、平均值，那么表达这个想法并获得所需结果是非常简单的。不幸的是，在\
  \ `MapReduce` 中做同样的事情就没那么简单了，你基本上得自己把所有的连接部分都搭建好。这往往意味着，一个原本简单的任务会变得不必要地具有挑战性。\n\
  \n为此，`MongoDB` 公司（前身为 `10gen`）推出了 `聚合框架`。它是基于管道的，允许你提取查询的各个部分，并将它们串联起来以获得你想要的结果。这既保持了\
  \ `MongoDB` 面向文档设计的优势，同时仍能提供高性能。\n\n因此，如果你需要 `MapReduce` 的全部能力，你仍然可以随时调用它。如果你只是想做一些基础统计和数据运算，你会爱上这个新的\
  \ `聚合框架`。你将在第 4 章和第 6 章学到更多关于 `聚合框架` 及其命令的知识。\n\n## 获取帮助\n\n`MongoDB` 拥有一个很棒的社区，核心开发者非常活跃且平易近人，他们通常会不遗余力地帮助社区的其他成员。`MongoDB`\
  \ 易于使用，并配有出色的文档；然而，知道你并非孤军奋战，并且在需要时可以获得帮助，这总是件好事。\n\n### 访问网站\n\n寻找更新信息或帮助的首选之地是\
  \ `MongoDB` 网站 (`www://mongodb.org`)。该网站会定期更新，并包含所有最新的 `MongoDB` 精华内容。在这个网站上，你可以找到驱动程序、教程、示例、常见问题解答等等。\n\
  \n### 与 MongoDB 开发者聊天\n\n`MongoDB` 的开发者们在互联网中继聊天 (`IRC`) 的 Freenode 网络的 `#MongoDB`\
  \ 频道（ [`www.freenode.net`](http://www.freenode.net/) ）上活动。`MongoDB` 的开发者们常驻纽约，但你经常可以发现他们在该频道里聊到深夜。当然，开发者们也需要在某个时间点睡觉（咖啡因的效果也只能维持这么久！）；幸运的是，来自世界各地的许多知识渊博的\
  \ `MongoDB` 用户也随时准备提供帮助。访问 `#MongoDB` 频道的人很多并非专家；然而，那里的整体氛围非常友好，所以他们依然会留在那里。请随时加入\
  \ `#MongoDB` 频道并与那里的人们聊天——你可能会发现一些很棒的提示和技巧。如果你真的卡住了，你很可能能很快地重回正轨。\n\n### 剪切和粘贴 MongoDB\
  \ 代码\n\n`Pastie` ( [`http://pastie.org`](http://pastie.org/) ) 严格来说并不是一个 `MongoDB`\
  \ 网站；然而，如果你在 `#MongoDB` 频道待上一段时间，你就会接触到它。`Pastie` 网站基本上让你可以剪切和粘贴（因此得名）一些输出或程序代码，然后将其放到网上供他人查看。在\
  \ `IRC` 中，粘贴多行文本可能会显得杂乱或难以阅读。如果你需要发布相当多的文本（例如三行或更多），那么你应该访问 [`http://pastie.org`](http://pastie.org/)\
  \ ，将你的内容粘贴进去，然后将你新页面的链接粘贴到频道中。\n\n### 在 Google Groups 上寻找解决方案\n\n`MongoDB` 还有一个名为\
  \ `mongodb-user` ( [`http://groups.google.com/group/mongodb-user`](http://groups.google.com/group/mongodb-user)\
  \ ) 的 `Google` 网上论坛。这个论坛是提问或搜索答案的好地方。你也可以通过电子邮件与论坛互动。与非常短暂的 `IRC` 不同，`Google` 网上论坛是一个很好的长期资源。如果你真的想参与\
  \ `MongoDB` 社区，加入这个小组是一个很好的开始。\n\n### 利用 JIRA 跟踪系统\n\n`MongoDB` 使用 `JIRA` 问题跟踪系统。你可以在\
  \ [`http://jira.mongodb.org/`](http://jira.mongodb.org/) 查看该跟踪站点，并且我们积极鼓励你将发现的任何错误或问题报告到该站点。社区将报告此类问题视为一件真正有益的事情。当然，你也可以搜索以前的问题，甚至可以查看下一个版本的路线图和计划更新。\n\
  \n如果你之前没有在 `JIRA` 上发布过问题，你可能想先访问 `IRC` 聊天室。你会很快发现你找到的东西是否是新问题，如果是的话，会有人告诉你如何报告它。\n\
  \n#### 总结\n\n本章对 `MongoDB` 带来的优势进行了一个快速的概览。我们探讨了 `MongoDB` 创建和发展背后的理念与指导原则，以及 `MongoDB`\
  \ 开发者在实现这些理想时所做的权衡。我们还看了一些与 `MongoDB` 结合使用的关键术语，它们如何协同工作，以及它们大致对应的 `SQL` 等价概念。\n\
  \n接下来，我们了解了 `MongoDB` 提供的一些功能，包括你可能想要使用它们的方式和场景。最后，我们以社区概览以及在需要时可以去哪里寻求帮助作为本章的结尾。\n\
  \n### 2. 安装 MongoDB\n\n摘要\n\n在第 1 章中，你初步了解了 `MongoDB` 能为你做什么。在本章中，你将学习如何安装和扩展 `MongoDB`\
  \ 以实现更多功能，使你能够将其与你最喜欢的编程语言结合使用。\n\n在第 1 章中，你初步了解了 `MongoDB` 能为你做什么。在本章中，你将学习如何安装和扩展\
  \ `MongoDB` 以实现更多功能，使你能够将其与你最喜欢的编程语言结合使用。\n\n`MongoDB` 是一个跨平台的数据库，你可以从 `MongoDB`\
  \ 网站 ( [`www.mongodb.org`](http://www.mongodb.org/) ) 找到大量可供下载的软件包。如此丰富的可用版本可能让你难以决定哪个版本最适合你。正确的选择可能取决于你服务器使用的操作系统、服务器中的处理器类型，以及你是喜欢稳定版还是想尝试仍处于开发中但提供了激动人心新功能的版本。也许你想同时安装一个稳定版和一个前瞻性的数据库版本。也有可能你还不太确定应该选择哪个版本。无论如何，请继续阅读！\n\
  \n\n\n#### 选择你的版本\n\n当你查看 MongoDB 网站上的下载部分时，你会看到一个相当直观的可用安装包概览。你首先需要注意的是你打算运行 MongoDB\
  \ 软件的操作系统。目前，已有针对 Windows、各种 Linux 操作系统版本、Mac OS 和 Solaris 的预编译安装包。\n\n**注意**\n\n\
  这里需要记住的一个重要事项是产品的 32 位版本和 64 位版本之间的区别。目前，数据库的 32 位和 64 位版本功能相同，但有一个例外：32 位版本限制每台服务器的总数据集大小约为\
  \ 2GB。而 64 位版本则没有此限制，因此在生产环境中通常首选 64 位版本而非 32 位版本。此外，这些版本之间的区别可能会有变动。\n\n你还需要注意\
  \ MongoDB 软件本身的版本：有生产版本、先前版本和开发版本。生产版本表示它是目前最新的稳定版本。当一个更新且通常经过改进或增强的版本发布时，之前最新的稳定版本将作为先前版本提供。此名称表示该版本稳定可靠，但通常其包含的功能较少。最后是开发版本。此版本通常被称为不稳定版本。它仍在开发中，将包含许多更改，包括重要的新功能。尽管它尚未完全开发和测试，但\
  \ MongoDB 的开发人员已将其提供给公众进行测试或试用。\n\n##### 理解版本号\n\nMongoDB 采用“奇数版本号用于开发版本”的策略。换句话说，通过查看版本号（也称为发布号）的第二部分，你可以判断一个版本是开发版本还是稳定版本。如果第二个数字是偶数，则它是稳定版本。如果第二个数字是奇数，则它是非稳定版本或开发版本。\n\
  \n让我们仔细看看版本号三个部分 A、B 和 C 中包含的三个数字：\n\n*   A，第一个（最左边）数字：代表主版本号，仅在有完整的版本升级时才会更改。\n\
  *   B，第二个（中间）数字：代表发布号，用于指示版本是开发版本还是稳定版本。如果数字是偶数，则该版本是稳定的；如果数字是奇数，则该版本不稳定，被认为是开发版本。\n\
  *   C，第三个（最右边）数字：代表修订号；用于修复错误和安全问题。\n\n例如，在撰写本文时，MongoDB 网站上提供了以下版本：\n\n*   2.4.3（生产版本）\n\
  *   2.2.4（先前版本）\n*   2.5.0（开发版本）\n\n#### 在你的系统上安装 MongoDB\n\n到目前为止，你已经了解了有哪些版本的\
  \ MongoDB 可用——并且希望——你能够选择一个。现在，你已准备好更仔细地了解如何在你的特定系统上安装 MongoDB。目前服务器的两个主要操作系统基于\
  \ Linux 和 Microsoft Windows，因此本章将引导你完成如何在这两种操作系统上安装 MongoDB，从 Linux 开始。\n\n#####\
  \ 在 Linux 下安装 MongoDB\n\n基于 Unix 的操作系统目前是托管服务（包括 Web 服务、邮件服务，当然还有数据库服务）的极其流行的选择。在本章中，我们将引导你了解如何在流行的\
  \ Linux 发行版 Ubuntu 上运行 MongoDB。\n\n根据你的需求，有两种在 Ubuntu 下安装 MongoDB 的方法：你可以通过所谓的存储库自动安装软件包，或者你可以手动安装。接下来的两个部分将引导你完成这两种选项。\n\
  \n###### 通过存储库安装 MongoDB\n\n存储库基本上是充满软件的在线目录。每个软件包都包含有关版本号、先决条件和可能的不兼容性的信息。当你需要安装一个需要先安装另一款软件的软件包时，这些信息很有用，因为可以同时安装这些先决条件。\n\
  \nUbuntu（以及其他基于 Debian 的发行版）中默认可用的存储库包含 MongoDB，但它们可能是过时的软件版本。因此，让我们告诉`apt-get`（你用来从存储库安装软件的软件）去查看一个自定义存储库。为此，你需要将以下一行添加到你的存储库列表（`/etc/apt/sources.list`）中：\n\
  \n`deb http://downloads-distro.mongodb.org/repo/ubuntu-upstart dist 10gen`\n\n接下来，你需要导入\
  \ 10gen 的公共 GPG 密钥，该密钥用于对软件包进行签名以确保其一致性；你可以使用`apt-key`命令完成此操作：\n\n```\n$ sudo apt-key\
  \ adv --keyserver keyserver.ubuntu.com --recv 7F0CEB10\n```\n\n完成此操作后，你需要告诉 apt-get\
  \ 它现在包含新的存储库；你可以使用 apt-get 的`update`命令来完成：\n\n```\n$ sudo apt-get update\n```\n\n\
  这一行使 aptitude 知道你手动添加的存储库。这意味着你现在可以告诉 apt-get 安装软件本身。你在 shell 中输入以下命令来完成此操作：\n\n\
  ```\n$ sudo apt-get install mongodb-10gen\n```\n\n这一行安装了当前稳定的（生产）版本 MongoDB。如果你想安装\
  \ MongoDB 的任何其他版本，则需要指定版本号。例如，要安装当前不稳定的（开发）版本 MongoDB，请改用以下命令：\n\n```\n$ sudo apt-get\
  \ install mongodb-10gen=2.5.0\n```\n\n这就是全部了。此时，MongoDB 已经安装并且（几乎）可以使用了！\n\n**注意**\n\
  \n在运行旧版本 MongoDB 的系统上运行`apt-get update`会将软件升级到最新的稳定版本。你可以通过运行以下命令来防止这种情况发生：\n\n\
  `echo \"mongodb-10gen hold\" | sudo dpkg --set-selections`\n\n\n\n##### 手动安装 MongoDB\n\
  \n接下来，我们将介绍如何手动安装 MongoDB。考虑到使用 `aptitude` 自动安装 MongoDB 如此简单，你可能会想为什么还需要手动安装。首先，并非所有\
  \ Linux 发行版都使用 `apt-get`。当然，很多发行版确实用（主要是那些基于 Debian Linux 的），但有些不用。此外，软件包的制作仍在进行中，因此可能存在某些版本尚未通过软件仓库提供。也有可能你想使用的\
  \ MongoDB 版本未包含在仓库中。手动安装软件还能让你同时运行多个版本的 MongoDB。\n\n你已经决定了要使用的 MongoDB 版本，并将其从官网\
  \ [`http://mongodb.org/downloads`](http://mongodb.org/downloads) 下载到了你的 Home 目录。接下来，你需要使用以下命令解压软件包：\n\
  \n```\n$ tar xzf mongodb-linux-x86_64-latest.tgz\n```\n\n此命令将软件包的全部内容解压到一个名为 `mongodb-linux-x86_64-xxxx-yy-zz`\
  \ 的新目录中；该目录位于你当前目录之下。此目录将包含若干子目录和文件。包含可执行文件的目录称为 `bin` 目录。我们很快将介绍各个应用程序对应什么任务。\n\
  \n然而，安装应用程序你无需再做其他任何事。实际上，手动安装 MongoDB 并不花费太多额外时间——根据你还需要安装什么，甚至可能更快。不过，手动安装 MongoDB\
  \ 确实有一些缺点。例如，你刚刚解压并位于 `bin` 目录中的可执行文件，默认情况下无法从 `bin` 目录以外的任何地方执行。因此，如果你想运行 `mongod`\
  \ 服务，你需要直接从上述的 `bin` 目录运行它。这个缺点凸显了通过软件仓库安装 MongoDB 的好处之一。\n\n##### 在 Windows 下安装\
  \ MongoDB\n\n微软的 Windows 也是服务器软件（包括基于互联网的服务）的一个流行选择。\n\nWindows 没有像 `apt-get` 这样的自带软件仓库应用，因此你需要从\
  \ MongoDB 网站下载并解压软件来运行它。是的，以上信息是正确的。你不需要经历任何安装过程；安装软件就是下载软件包、解压并运行应用程序本身的简单操作。\n\
  \n例如，假设你决定为你的 64 位 Windows 2008 服务器下载最新的稳定版 MongoDB。首先将软件包 (`mongodb-win32–x86_64-x.y.x.zip`)\
  \ 解压到你的 `C:\\` 驱动器根目录。此时，你需要做的就是打开命令提示符（开始 ➤ 运行 ➤ `cmd` ➤ 确定）并切换到你解压内容的目录：\n\n```\n\
  > cd C:\\mongodb-win32–x86_64-x.y.z\\\n> cd bin\\\n```\n\n这样做使你进入包含 MongoDB 可执行文件的目录。仅此而已：如前所述，无需安装。\n\
  \n#### 运行 MongoDB\n\n终于，你可以动手实践了。你已经了解了在哪里获取最适合你需求和硬件的 MongoDB 版本，也看到了如何安装软件。现在终于到了运行和使用\
  \ MongoDB 的时候了。\n\n##### 先决条件\n\n在启动 MongoDB 服务之前，你需要为 MongoDB 创建一个数据目录来存储其文件。默认情况下，MongoDB\
  \ 在基于 Unix 的系统（如 Linux 和 OS X）中将数据存储在 `/data/db` 目录中，在 Windows 中存储在 `C:\\data\\\
  db` 目录中。\n\n**注意**\n\nMongoDB 不会为你创建这些数据目录，因此你需要手动创建；否则，MongoDB 将无法运行并抛出错误信息。同时，请务必正确设置权限：MongoDB\
  \ 必须拥有读、写和目录创建权限才能正常运行。\n\n如果你希望使用 `/data/db` 或 `C:\\data\\db` 之外的目录，那么你可以在执行服务时使用\
  \ `--dbpath` 标志告诉 MongoDB 查看所需的目录。\n\n创建所需目录并分配适当权限后，你可以通过执行 `mongod` 应用程序来启动 MongoDB\
  \ 核心数据库服务。你可以在 Windows 的命令提示符或 Linux 的 shell 中分别完成此操作。\n\n##### 查看安装布局\n\n成功安装或解压\
  \ MongoDB 后，你将在 `bin` 目录（Linux 和 Windows 下都有）中看到表 2-1 所示的应用程序。\n\n表 2-1.\n\n包含的\
  \ MongoDB 应用程序\n\n| 应用程序 | 功能 |\n| --- | --- |\n| `bsondump` | 读取 BSON 格式的回滚文件内容。\
  \ |\n| `mongo` | 数据库 shell。 |\n| `mongod` | 核心数据库服务器。 |\n| `mongodump` | 数据库备份工具。\
  \ |\n| `mongoexport` | 导出工具 (JSON, CSV, TSV)，不适用于备份。 |\n| `mongofiles` | 操作 GridFS\
  \ 对象中的文件。 |\n| `mongoimport` | 导入工具 (JSON, CSV, TSV)，不适用于恢复。 |\n| `mongooplog` |\
  \ 从另一个 `mongod` 实例拉取 oplog 条目。 |\n| `mongoperf` | 检查磁盘 I/O 性能。 |\n| `mongorestore`\
  \ | 数据库备份恢复工具。 |\n| `mongos` | Mongodb 分片进程。 |\n| `mongosniff` | 实时嗅探/跟踪 MongoDB\
  \ 数据库活动，仅限类 Unix 系统。 |\n| `mongostat` | 返回数据库操作计数器。 |\n| `mongotop` | 跟踪/报告 MongoDB\
  \ 读/写活动。 |\n| `mongorestore` | 恢复/导入工具。 |\n\n注意：所有应用程序都在 `bin` 目录内。\n\n安装的软件包含 15\
  \ 个应用程序（在 Microsoft Windows 下为 14 个），你将结合你的 MongoDB 数据库使用它们。两个“最重要”的应用程序是 `mongo`\
  \ 和 `mongod` 应用程序。`mongo` 应用程序允许你使用数据库 shell；这个 shell 使你能够完成几乎所有你想用 MongoDB 做的事情。\n\
  \n`mongod` 应用程序启动服务，也称为守护进程。在启动 MongoDB 应用程序时，你还可以设置许多标志。例如，服务允许你指定数据库所在路径 (`--dbpath`)，显示版本信息\
  \ (`--version`)，甚至打印一些诊断系统信息（使用 `--sysinfo` 标志）！你可以通过在启动服务时包含 `--help` 标志来查看完整的选项列表。目前，你可以使用默认设置，通过在\
  \ shell 或命令提示符中输入 `mongod` 来启动服务。\n\n\n##### 使用 MongoDB Shell\n\n一旦成功创建数据库目录并启动\
  \ `mongod` 数据库应用程序，您就可以启动 Shell 来初步领略 MongoDB 的强大功能了。\n\n启动您的 Shell（Unix）或命令提示符（Windows）；操作时，请确保位于正确的目录下，以便系统能找到\
  \ `mongo` 可执行文件。您可以在命令 `提示符` 下输入 `mongo` 并按下回车键来启动 Shell。您将立即看到一个空白窗口和一个闪烁的光标（参见图\
  \ 2-1）。女士们先生们，欢迎来到 MongoDB！\n\n如果您使用默认参数启动 MongoDB 服务，并使用默认设置启动 Shell，您将连接到本地主机上运行的默认\
  \ `test` 数据库。此数据库在您连接到它的那一刻就会自动创建。这是 MongoDB 最强大的功能之一：如果您尝试连接到一个不存在的数据库，MongoDB\
  \ 会自动为您创建它。这可能是好事也可能是坏事，取决于您操作键盘的熟练程度。\n\n**提示**\n\nMongoDB 网站上提供了一个在线演示 Shell，您可以在其中尝试列出的任何命令。\n\
  \n![A978-1-4302-5822-3_2_Fig1_HTML.jpg](img/A978-1-4302-5822-3_2_Fig1_HTML.jpg)\n\
  \n图 2-1. MongoDB Shell\n\n在采取进一步步骤之前，例如安装任何能让你使用喜欢的编程语言进行工作的额外驱动程序，快速了解一下 MongoDB\
  \ Shell 中一些更有用的命令可能会很有帮助（参见表 2-2）。\n\n表 2-2. MongoDB Shell 内的基本命令\n\n| 命令 | 功能 |\n\
  | --- | --- |\n| `show dbs` | 显示可用数据库的名称。 |\n| `show collections` | 显示当前数据库中的集合。\
  \ |\n| `show users` | 显示当前数据库中的用户。 |\n| `use <db name>` | 将当前数据库设置为 `<db name>`。\
  \ |\n\n**提示**\n\n您可以通过在 MongoDB Shell 中输入 `help` 命令来获取完整的命令列表。\n\n#### 安装额外的驱动程序\n\
  \n您可能认为，既然已经设置好 MongoDB 并知道如何使用其 Shell，您就可以大展身手了。这在一定程度上是对的；然而，您可能更希望在查询或以其他方式操作\
  \ MongoDB 数据库时使用您首选的编程语言，而不是 Shell。10gen 提供了多个官方驱动程序，社区也提供了更多驱动程序，让您可以精确地做到这一点。例如，在\
  \ MongoDB 网站上可以找到以下编程语言的驱动程序：\n\n*   C\n*   C++\n*   C#\n*   Erlang\n*   Java\n\
  *   JavaScript\n*   Node.js\n*   Perl\n*   PHP\n*   Python\n*   Ruby\n*   Scala\n\
  \n在本节中，您将学习如何为当今使用的两种更流行的编程语言实现 MongoDB 支持：PHP 和 Python。\n\n**提示**\n\n有许多社区驱动的 MongoDB\
  \ 驱动程序可用。可以在 MongoDB 网站 [`www.mongodb.org`](http://www.mongodb.org/) 上找到一个很长的列表。\n\
  \n##### 安装 PHP 驱动程序\n\nPHP 是当今存在的最流行的编程语言之一。该语言特别针对 Web 开发，并且可以轻松地嵌入到 HTML 中。这一特点使其成为设计\
  \ Web 应用程序（如博客、留言板甚至名片数据库）的完美候选者。接下来的几节将介绍安装和使用 MongoDB PHP 驱动程序的选项。\n\n###### 获取\
  \ PHP 的 MongoDB\n\n与 MongoDB 一样，PHP 是一个跨平台的开发工具，在 PHP 中设置 MongoDB 所需的步骤根据目标平台的不同而变化。之前，本章向您展示了如何在\
  \ Ubuntu 和 Windows 上安装 MongoDB；我们将在这里采用相同的方法，演示如何在 Ubuntu 和 Windows 上为 PHP 安装驱动程序。\n\
  \n首先，为您的操作系统下载 PHP 驱动程序。启动浏览器并导航到 [`www.mongodb.org`](http://www.mongodb.org/) 来完成此操作。在撰写本文时，该网站包含一个名为“Drivers”的单独菜单选项。单击此选项会显示当前可用的语言驱动程序列表（参见图\
  \ 2-2）。\n\n接下来，从语言列表中选择 PHP，并按照链接下载最新（稳定）版本的驱动程序。不同的操作系统将需要不同的方法来自动为 PHP 安装 MongoDB\
  \ 扩展。没错；就像您能够在 Ubuntu 上自动安装 MongoDB 一样，您也可以为 PHP 驱动程序执行相同的操作。而且就像在 Ubuntu 下安装 MongoDB\
  \ 时一样，您也可以选择手动安装 PHP 语言驱动程序。让我们看看您可用的两个选项。\n\n![A978-1-4302-5822-3_2_Fig2_HTML.jpg](img/A978-1-4302-5822-3_2_Fig2_HTML.jpg)\n\
  \n图 2-2. MongoDB 当前可用的语言驱动程序简短列表\n\n###### 在基于 Unix 的平台上自动安装 PHP 驱动程序\n\nPHP 的开发人员提出了一个很好的解决方案，允许您使用其他流行的扩展来扩展您的\
  \ PHP 安装：PECL。PECL 是一个专门为 PHP 设计的存储库；它提供了一个所有已知扩展的目录，您可以使用它来下载、安装甚至开发 PHP 扩展。如果您已经熟悉名为\
  \ `aptitude` 的包管理系统（您之前使用它来安装 MongoDB），那么您会对 PECL 的界面与 `aptitude` 的界面如此相似而感到高兴。\n\
  \n假设您的系统上安装了 PECL，打开一个控制台并键入以下命令来安装 MongoDB 扩展：\n\n`$ sudo pecl install mongo`\n\
  \n输入此命令会使 PECL 自动下载并安装适用于 PHP 的 MongoDB 扩展。换句话说，PECL 将为您的 PHP 版本下载扩展并将其放入 PHP 扩展目录中。但有一个问题：PECL\
  \ 不会自动将该扩展添加到已加载扩展列表中；您需要手动完成这一步骤。为此，打开一个文本编辑器（`vim`、`nano` 或您喜欢的任何文本编辑器），并修改名为\
  \ `php.ini` 的文件，这是 PHP 用来控制其行为（包括应加载的扩展）的主要配置文件。\n\n接下来，打开 `php.ini` 文件，向下滚动到扩展部分，并添加以下行以告诉\
  \ PHP 加载 MongoDB 驱动程序：\n\n`extension=mongo.so`\n\n**注意**\n\n前面的步骤是必需的；如果您不这样做，PHP\
  \ 中的 MongoDB 命令将无法工作。要查找系统上的 `php.ini` 文件，您可以在 Shell 中使用 `grep` 命令：`php –i | grep\
  \ Configuration`。\n\n本章后面的“确认您的 PHP 安装正常工作”一节将介绍如何确认扩展已成功加载。\n\n就这样，朋友们！您刚刚为您的 PHP\
  \ 安装安装了 MongoDB 扩展，现在可以开始使用它了。接下来，您将学习如何手动安装驱动程序。\n\n\n###### 在基于 Unix 的平台上手动安装\
  \ PHP 驱动程序\n\n如果您希望自己编译驱动程序，或者由于某些原因无法使用先前描述的 PECL 应用程序（例如，您的托管服务提供商可能不支持此选项），那么您也可以选择下载驱动程序源代码并手动编译。\n\
  \n要下载驱动程序，请访问 github 网站 (`http://github.com/`)。该网站提供了 PHP 驱动程序的最新源代码包。下载后，您需要解压该软件包，并通过运行以下一组命令来制作驱动程序：\n\
  \n```\n$ tar zxvf mongodb-mongdb-php-driver-<commit_id>.tar.gz\n$ cd mongodb-mongodb-php-driver-<commit_id>\n\
  $ phpize\n$ ./configure\n$ sudo make install\n```\n\n此过程可能需要**一段时间**，具体取决于您的系统速度。过程完成后，您的\
  \ MongoDB PHP 驱动程序即安装完毕，可以使用了！执行命令后，系统会显示驱动程序的安装位置；通常，输出内容类似如下：\n\n```\nInstalling\
  \ '/ usr/lib/php/extensions/no-debug-zts-20060613/mongo.so'\n```\n\n您需要确认此目录与 PHP\
  \ 默认存储其扩展的目录相同。您可以使用以下命令确认 PHP 存储扩展的目录：\n\n```\n$ php -i | grep extension_dir\n\
  ```\n\n此行输出所有 PHP 扩展应放置的目录。如果此目录与`mongo.so`驱动程序放置的目录不匹配，则您必须将`mongo.so`驱动程序移至正确的目录，以便\
  \ PHP 知道在哪里找到它。\n\n与之前一样，您需要告知 PHP，新创建的扩展已放置在其扩展目录中，并且应该加载此扩展。您可以通过修改`php.ini`文件的\
  \ extensions 部分来指定；在该部分添加以下行：\n\n```\nextension=mongo.so\n```\n\n最后，需要重新启动您的 Web\
  \ 服务。当使用 Apache HTTPd 服务时，您可以使用以下服务命令完成此操作：\n\n```\nsudo /etc/init.d/apache2 restart\n\
  ```\n\n就是这样！此过程比使用 PECL 的自动化方法稍显冗长；但是，如果您无法使用 PECL，或者您是驱动程序开发人员并对错误修复感兴趣，那么您会希望改用手动方法。\n\
  \n###### 在 Windows 上安装 PHP 驱动程序\n\n您之前已经了解了如何在 Windows 操作系统上安装 MongoDB。现在让我们看看如何在\
  \ Windows 上为 PHP 实现 MongoDB 驱动程序。\n\n对于 Windows，每个版本的 MongoDB PHP 驱动程序都有预编译二进制文件可用。您可以从前面提到的\
  \ github 网站 (`http://github.com/`) 获取这些二进制文件。在这种情况下，最大的挑战是为您版本的 PHP 选择正确的软件包进行安装（有各种各样的软件包可供选择）。如果您不确定需要哪个软件包版本，可以在\
  \ PHP 页面中使用 `<? phpinfo(); ?>` 命令来确切了解哪个版本适合您的特定环境。我们将在下一节更详细地介绍 `phpinfo()` 命令。\n\
  \n下载正确的软件包并解压缩其内容后，您只需将驱动程序文件（名为 `php_mongo.dll`）复制到您 PHP 的扩展目录中即可；这使得 PHP 能够加载它。\n\
  \n根据您的 PHP 版本，扩展目录可能称为 `Ext` 或 `Extensions`。如果您不确定应该是哪个目录，可以查阅随您系统上安装的 PHP 版本附带的\
  \ PHP 文档。\n\n一旦将驱动程序 DLL 放入 PHP 扩展目录，您仍然需要告知 PHP 加载该驱动程序。通过修改 `php.ini` 文件并在 extensions\
  \ 部分添加以下行来完成此操作：\n\n```\nextension=php_mongo.dll\n```\n\n完成后，重新启动系统上的 HTTP 服务，您现在就可以在\
  \ PHP 中使用 MongoDB 驱动程序了。然而，在开始利用 MongoDB 与 PHP 结合的强大功能之前，您需要确认扩展是否已正确加载。\n\n#####\
  \ 确认您的 PHP 安装有效\n\n到目前为止，您已经成功安装了 MongoDB 以及 PHP 中的 MongoDB 驱动程序。现在是时候进行快速检查，以确认驱动程序是否被\
  \ PHP 正确加载。PHP 为您提供了一种简单直接的方法来完成此操作：`phpinfo()` 命令。此命令向您显示所有已加载模块的扩展概述，包括版本号、编译选项、服务器信息、操作系统信息等。\n\
  \n要使用 `phpinfo()` 命令，请打开一个文本或 HTML 编辑器并键入以下内容：\n\n```\n<? phpinfo(); ?>\n```\n\n\
  接下来，将文档保存在 Web 服务器的 `www` 目录中，并随意命名。例如，您可以将其命名为 `test.php` 或 `phpinfo.php`。现在打开您的浏览器，访问您的本地主机或外部服务器（即访问您正在使用的任何服务器），并查看您刚刚创建的页面。您将看到所有\
  \ PHP 组件以及各种其他相关信息的良好概览。您在这里需要关注的重点是显示您 MongoDB 信息的部分。此部分将列出版本号、端口号、主机名等（参见图 2-3）。\n\
  \n一旦您确认安装成功且驱动程序加载成功，您就可以开始编写一些 PHP 代码，并学习一个利用 PHP 的 MongoDB 示例。\n\n![A978-1-4302-5822-3_2_Fig3_HTML.jpg](img/A978-1-4302-5822-3_2_Fig3_HTML.jpg)\n\
  \n*图 2-3. 在 PHP 中显示您的 MongoDB 信息*\n\n\n\n###### 连接与断开 PHP 驱动\n\n你已经确认 MongoDB PHP\
  \ 驱动已正确加载，是时候开始编写一些 PHP 代码了！让我们来看看使用 MongoDB 的两个简单但基本的操作：在 MongoDB 和 PHP 之间启动连接，然后断开该连接。\n\
  \n你使用 `Mongo` 类来启动 MongoDB 和 PHP 之间的连接；同一个类也允许你使用数据库服务器命令。一个简单但典型的连接命令如下所示：\n\n\
  `$connection = new Mongo();`\n\n如果你在不提供任何参数的情况下使用此命令，它将连接到你本机默认 MongoDB 端口（27017）上的\
  \ MongoDB 服务。如果你的 MongoDB 服务运行在其他地方，那么你只需指定你想要连接的远程主机名：\n\n`$connection = new Mongo(\"\
  example.com\");`\n\n这行代码为在服务器上运行并监听 `example.com` 域名的 MongoDB 服务实例化一个新的连接（注意，它仍然会连接到默认端口：27017）。但是，如果你想连接到不同的端口号（例如，如果你不想使用默认端口，或者你已经在该端口上运行了另一个\
  \ MongoDB 服务会话），你可以通过指定端口号和主机名来实现：\n\n`$connection = new Mongo(\"example.com:12345\"\
  );`\n\n这个示例创建了到数据库服务的连接。接下来，你将学习如何从服务断开连接。假设你使用了刚才描述的方法连接到你的数据库，你可以再次调用 `$connection`\
  \ 来传递 `close()` 命令以终止连接，如本例所示：\n\n`$connection->close();`\n\n在正常情况下，不需要调用 `close()`。原因是当\
  \ `Mongo` 对象超出作用域时，PHP 驱动会自动关闭与数据库的连接。尽管如此，还是建议你在 PHP 代码末尾调用 `close()`；这有助于避免旧连接一直挂起直到最终超时。它还有助于确保任何现有连接都被关闭，从而允许建立新连接，如下例所示：\n\
  \n```\n$connection = new Mongo();\n$connection->close();\n$connection->connect();\n\
  ```\n\n以下代码片段展示了这在 PHP 中的样子：\n\n```php\n<?php\n// 建立数据库连接\n$connection = new Mongo();\n\
  // 关闭数据库连接\n$connection->close();\n?>\n```\n\n##### 安装 Python 驱动\n\nPython 是一种通用且易于阅读的编程语言。\n\
  \n这些特质使 Python 成为编程和脚本编写新手入门的绝佳语言。如果你已经熟悉编程，并且正在寻找一种允许多种编程风格（面向对象编程、结构化编程等）的多范式编程语言，它也是一个很好的选择。在接下来的章节中，你将学习如何安装\
  \ Python 并为该语言启用 MongoDB 支持。\n\n###### 在 Linux 下安装 PyMongo\n\nPython 为 MongoDB 支持提供了一个特定的包，称为\
  \ PyMongo。这个包允许你与 MongoDB 数据库交互，但你需要先安装并运行这个驱动，才能使用这个强大的组合。与安装 PHP 驱动一样，你可以使用两种方法来安装\
  \ PyMongo：一种是依赖 `setuptools` 的自动化方法，另一种是下载项目源代码的手动方法。以下部分将向你展示如何使用这两种方法安装 PyMongo。\n\
  \n####### 自动安装 PyMongo\n\n随 `python-pip` 包捆绑提供的 `pip` 应用程序可以让你自动下载、构建、安装和管理 Python\
  \ 包。这非常方便，它能为你完成所有工作，从而扩展你的 Python 模块安装。\n\n注意\n在使用 `pip` 应用程序之前，你必须安装 `setuptools`。这将在安装\
  \ `python-pip` 包时自动完成。\n\n要安装 `pip`，你只需要告诉 `apt-get` 下载并安装它，像这样：\n\n```\n$ sudo\
  \ apt-get install python-pip\n```\n\n当这行命令执行时，`pip` 会检测当前运行的 Python 版本并在系统上安装它。就是这么简单。现在你可以准备使用\
  \ `pip` 命令来下载、编译和安装 MongoDB 模块了，如本例所示：\n\n```\n$ sudo pip install pymongo\n```\n\
  \n同样，就是这么简单！PyMongo 现在已经安装好并可以使用了。\n\n提示\n你还可以使用 `pip install pymongo=x.y.z` 命令来安装\
  \ PyMongo 模块的旧版本。这里，`x.y.z` 表示模块的版本号。\n\n####### 手动安装 PyMongo\n\n你也可以选择手动安装 PyMongo。首先访问托管\
  \ PyMongo 插件的网站的下载区（[`http://pypi.python.org/pypi/pymongo`](http://pypi.python.org/pypi/pymongo)）。接下来，下载压缩包并解压。在你的控制台中，典型的下载和解压过程可能如下所示：\n\
  \n```\n$ wget http://pypi.python.org/packages/source/p/pymongo/pymongo-2.5.1.tar.gz\n\
  $ tar xzf pymongo-2.5.1.tar.gz\n```\n\n一旦你成功下载并解压此文件，进入解压后的内容目录，并通过 Python 运行 `install.py`\
  \ 命令来调用 PyMongo 的安装：\n\n```\n$ cd pymongo-2.5.1\n$ sudo python setup.py install\n\
  ```\n\n前面的代码片段输出了 PyMongo 模块的整个创建和安装过程。最终，这个过程会把你带回到命令提示符，此时你就可以开始使用 PyMongo 了。\n\
  \n###### 在 Windows 下安装 PyMongo\n\n在 Windows 下安装 PyMongo 是一个直接的过程。与在 Linux 下安装 PyMongo\
  \ 一样，Easy Install 也可以简化在 Windows 下的安装。如果你尚未安装 `setuptools`（此包包含 `easy_install` 命令），请访问\
  \ Python 包索引网站（[`http://pypi.python.org`](http://pypi.python.org/)）来定位 `setuptools`\
  \ 安装程序。\n\n注意\n你下载的 `setuptools` 版本必须与你系统上安装的 Python 版本相匹配。\n\n例如，假设你的系统上安装了 Python\
  \ 2.7.5 版本。你将需要下载适用于 v2.7.x 的 `setuptools` 包。好消息是你不需要编译任何东西；你只需下载相应的包并双击可执行文件，即可在你的系统上安装\
  \ `setuptools`！就这么简单。\n\n注意\n如果你之前安装了旧版本的 `setuptools`，那么你需要先使用系统的“添加/删除程序”功能卸载该版本，然后再安装新版本。\n\
  \n安装完成后，你会在 Python 的 `Scripts` 子目录中找到 `easy_install.exe` 文件。此时，你已经准备好在 Windows 上安装\
  \ PyMongo 了。\n\n一旦你成功安装了 `setuptools`，你就可以打开命令提示符，并使用 `cd` 命令进入 Python 的 `Scripts`\
  \ 目录。默认情况下，该目录设置为 `C:\\Pythonxy\\Scripts\\`，其中 `xy` 代表你的版本号。导航到此位置后，你可以使用与之前安装 Unix\
  \ 变体相同的语法：\n\n```\nC:\\Python27\\Scripts> easy_install PyMongo\n```\n\n与在 Linux\
  \ 机器上安装此程序时得到的输出不同，这里的输出相当简短，仅指示扩展已被下载并安装（见图 2-4）。也就是说，这些信息对于你当前的目的来说已经足够了。\n\n\
  ![A978-1-4302-5822-3_2_Fig4_HTML.jpg](img/A978-1-4302-5822-3_2_Fig4_HTML.jpg)\n\
  *图 2-4. 在 Windows 下安装 PyMongo*\n\n\n\n##### 确认您的 PyMongo 安装是否正常工作\n\n要确认 PyMongo\
  \ 是否已成功安装，您可以打开 Python 命令行界面。在 Linux 系统中，您可以通过打开终端并输入 `python` 来实现。在 Windows 系统中，您可以通过点击\
  \ “开始” ➤ “所有程序” ➤ “Python xy” ➤ “Python (commandline)” 来实现。此时，您将被欢迎进入 Python 的世界（参见图\
  \ 2-5）。\n\n![A978-1-4302-5822-3_2_Fig5_HTML.jpg](img/A978-1-4302-5822-3_2_Fig5_HTML.jpg)\n\
  图 2-5. Python 命令行界面\n\n您可以使用 `import` 命令让 Python 开始使用新安装的扩展：\n```python\n>>> import\
  \ pymongo\n>>>\n```\n\n> 注意\n> 每次您想使用 PyMongo 时，都必须执行 `import pymongo` 命令。\n\n如果一切顺利，您不会看到任何错误信息，然后就可以开始输入一些花哨的\
  \ MongoDB 命令了。但是，如果您收到了错误消息，说明某个环节出了问题，您可能需要复查刚刚执行的步骤，以找出错误发生的位置。\n\n#### 总结\n\n\
  在本章中，我们探讨了如何获取 MongoDB 软件，包括如何根据您的环境选择正确的版本。我们还讨论了版本号、如何安装和运行 MongoDB，以及如何安装和运行其先决条件。接下来，我们介绍了如何通过结合使用\
  \ shell、PHP 和 Python 来建立与数据库的连接。\n\n我们还探索了如何扩展 MongoDB 以使其与您喜欢的编程语言协同工作，以及如何确认特定语言的驱动程序是否已正确安装。\n\
  \n在下一章中，我们将探讨如何正确地设计和构建 MongoDB 数据库及数据结构。在此过程中，您将学习如何对信息进行索引以加速查询，如何引用数据，以及如何利用一项名为地理空间索引的新特性。\n\
  \n### 3. 数据模型\n\n#### 摘要\n\n在上一章中，您学习了如何在两个常用平台（Windows 和 Linux）上安装 MongoDB，以及如何使用一些额外的驱动程序扩展数据库。在本章中，您将把注意力从操作系统转移到\
  \ MongoDB 数据库的整体设计上来。具体来说，您将学习什么是集合，文档是什么样子，索引如何工作及其作用，最后，何时何地应该引用数据而不是嵌入数据。我们在第\
  \ 1 章中简要提及了其中一些概念，但在本章中，我们将更详细地探讨它们。在本章中，您将看到一些代码示例，旨在帮助您更好地理解所讨论的概念。不过，请不要太担心您将看到的命令，因为它们将在第\
  \ 4 章中进行广泛讨论。\n\n#### 数据库设计\n\n正如您在前两章中学到的，MongoDB 数据库是非关系型且无模式的。这意味着 MongoDB 数据库不像关系型数据库（例如\
  \ MySQL）那样绑定到任何预定义的列或数据类型。这种实现方式的最大好处是处理数据极其灵活，因为您的文档不需要预定义的结构。\n\n更简单地说：您完全可以拥有一个包含数百甚至数千个文档的集合，这些文档都具有不同的结构——而不会违反任何\
  \ MongoDB 数据库规则。\n\n这种灵活的无模式设计的好处之一是，当您使用 Python 或 PHP 等动态类型语言编程时，不会受到限制。确实，如果由于数据库的内在限制，您那极其灵活且功能强大的编程语言无法充分发挥其潜力，那将是一个严重的限制。\n\
  \n让我们再看一眼 MongoDB 中文档的数据设计是什么样的，特别注意与关系型数据库相比，MongoDB 中数据的灵活性。在 MongoDB 中，文档是包含实际数据的项，类似于\
  \ SQL 中的一行。在下面的例子中，您将看到两种完全不同的文档类型如何共存于一个名为 `Media` 的集合中（请注意，集合大致相当于 SQL 世界中的表）：\n\
  ```json\n{\n    \"Type\": \"CD\",\n    \"Artist\": \"Nirvana\",\n    \"Title\":\
  \ \"Nevermind\",\n    \"Genre\": \"Grunge\",\n    \"Releasedate\": \"1991.09.24\"\
  ,\n    \"Tracklist\": [\n        {\n        \"Track\" : \"1\",\n        \"Title\"\
  \ : \"Smells Like Teen Spirit\",\n        \"Length\" : \"5:02\"\n        },\n  \
  \      {\n        \"Track\" : \"2\",\n        \"Title\" : \"In Bloom\",\n      \
  \  \"Length\" : \"4:15\"\n        }\n    ]\n}\n{\n    \"type\": \"Book\",\n    \"\
  Title\": \"Definitive Guide to MongoDB: A complete guide to dealing with Big Data\
  \ using MongoDB 2nd, The\",\n    \"ISBN\": \"987-1-4302-5821-6\",\n    \"Publisher\"\
  : \"Apress\",\n    \"Author\": [\n        \"Hows, David\"\n        \"Plugge, Eelco\"\
  ,\n        \"Membrey, Peter\",\n        \"Hawkins, Tim]\n}\n```\n\n正如您在查看这对文档时可能注意到的，大多数字段彼此之间并没有紧密的联系。是的，它们都有名为\
  \ `Title` 和 `Type` 的字段；但除了这个相似之处，这两个文档完全不同。尽管如此，这两个文档都包含在同一个名为 `Media` 的集合中。\n\n\
  MongoDB 被称为无模式数据库，但这并不意味着 MongoDB 的数据结构完全缺乏模式。例如，您确实在 MongoDB 中定义了集合和索引（您将在本章后面了解更多相关信息）。然而，与使用\
  \ MySQL 等数据库的情况不同，您不需要为您将要添加的任何文档预定义结构。\n\n简单地说，MongoDB 是一个异常动态的数据库；前面的例子在关系型数据库中永远行不通，除非您将每个可能的字段都添加到您的表中。这样做既浪费空间和性能，又非常混乱。\n\
  \n\n\n##### 深入探讨集合\n\n如前所述，**集合**是 MongoDB 中的常用术语。你可以将集合视为存储文档（即你的数据）的容器，如图 3-1\
  \ 所示。\n\n![A978-1-4302-5822-3_3_Fig1_HTML.jpg](img/A978-1-4302-5822-3_3_Fig1_HTML.jpg)\n\
  \n图 3-1. MongoDB 数据库模型\n\n现在将 MongoDB 数据库模型与典型的关系数据库模型（见图 3-2）进行比较。\n\n![A978-1-4302-5822-3_3_Fig2_HTML.jpg](img/A978-1-4302-5822-3_3_Fig2_HTML.jpg)\n\
  \n图 3-2. 典型的关系数据库模型\n\n如你所见，两种数据库的总体结构是相同的；然而，你使用它们的方式却**截然不同**。MongoDB 中有几种集合类型。默认的集合类型大小是可扩展的：你向其中添加的数据越多，它就变得越大。也可以定义**固定大小**的集合。这些固定集合只能包含一定量的数据，超过限制后，最旧的文档会被较新的文档替换（你将在第\
  \ 4 章中了解更多关于这些集合的信息）。\n\nMongoDB 中的每个集合都有一个唯一的名称。使用 `createCollection` 函数创建时，名称应以字母开头，或者可选地以下划线\
  \ (`_`) 开头。名称可以包含数字和字母；但是，`$` 符号由 MongoDB 保留。同样，不允许使用空字符串（“ ”）；名称中不能使用空字符，且不能以字符串\
  \ \"`system`\" 开头。通常，建议保持集合名称简单简短（大约 9 个字符左右）；但是，集合名称允许的最大字符数是 128。显然，创建如此长的名称并没有太多实际意义。\n\
  \n单个数据库默认有 24,000 个命名空间的限制。每个集合至少占用两个命名空间：一个用于集合本身，另一个用于在该集合中创建的第一个索引。但是，如果你为每个集合添加更多索引，则会使用另一个命名空间。理论上，这意味着每个数据库默认最多可以有\
  \ 12,000 个集合，假设每个集合只带一个索引。但是，可以通过在执行 MongoDB 服务应用程序 (`mongod`) 时提供 `nssize` 参数来增加此命名空间数量的限制。\n\
  \n##### 使用文档\n\n回想一下，文档由键值对组成。例如，`\"type\" : \"Book\"` 这对值包含一个名为 `type` 的键及其值 `Book`。键被写为字符串，但其中的值可以变化极大。值可以是丰富数据类型中的任何一种，例如数组甚至二进制数据。记住：MongoDB\
  \ 以 BSON 格式存储其数据（有关此主题的更多信息，请参见第 1 章）。\n\n接下来，让我们看看你可以添加到文档中的所有可能的数据类型，以及它们的用途：\n\
  \n*   **字符串**：这种常用的数据类型包含一串文本（或任何其他类型的字符）。此数据类型主要用于存储文本值（例如，`\"Country\" : \"Japan\"\
  `）。\n*   **整数（32 位和 64 位）**：此类型用于存储数值（例如，`{ \"Rank\" : 1 }`）。请注意，整数前后没有引号。\n*  \
  \ **布尔值**：此数据类型可设置为 `TRUE` 或 `FALSE`。\n*   **双精度浮点数**：此数据类型用于存储浮点值。\n*   **最小/最大键**：此数据类型用于将值分别与最低和最高的\
  \ BSON 元素进行比较。\n*   **数组**：此数据类型用于存储数组（例如，`[ \"Membrey, Peter\",\"Plugge, Eelco\"\
  ,\"Hows, David\"]`）。\n*   **时间戳**：此数据类型用于存储时间戳。这对于记录文档何时被修改或添加非常方便。\n*   **对象**：此数据类型用于嵌入式文档。\n\
  *   **空值**：此数据类型用于 `Null` 值。\n*   **符号**：此数据类型的使用与字符串完全相同；但是，它通常保留给使用特定符号类型的语言。\n\
  *   **日期**：此数据类型用于以 Unix 时间格式（POSIX 时间）存储当前日期或时间。\n*   **对象 ID**：此数据类型用于存储文档的 ID。\n\
  *   **二进制数据**：此数据类型用于存储二进制数据。\n*   **正则表达式**：此数据类型用于正则表达式。所有选项都由按字母顺序提供的特定字符表示。你将在第\
  \ 4 章中了解更多关于正则表达式的信息。\n*   **JavaScript 代码**：此数据类型用于 JavaScript 代码。\n\n带星号（*）的注释意味着最后五种数据类型（日期、对象\
  \ ID、二进制数据、正则表达式和 JavaScript 代码）是非 JSON 类型；具体来说，它们是 BSON 允许你使用的特殊数据类型。在第 4 章中，你将学习如何使用\
  \ `$type` 操作符来识别你的数据类型。\n\n理论上，这一切听起来都很直接。然而，你可能想知道如何实际设计文档，包括要放入哪些信息。因为一个文档可以包含任何类型的数据，你可能认为没有必要引用另一个文档内部的信息。在下一节中，我们将探讨将信息嵌入文档与从另一个文档引用该信息的优缺点。\n\
  \n\n\n###### 在文档中嵌入与引用信息\n\n你可以选择将信息**嵌入**到文档中，或者从另一个文档**引用**该信息。嵌入信息意味着你将某种类型的数据（例如，一个包含更多数据的数组）直接放置到文档本身中。引用信息则意味着你创建一个指向包含特定数据的另一个文档的引用。通常，在使用关系型数据库时，你会采用引用的方式。例如，假设你想使用一个关系型数据库来跟踪你的\
  \ CD、DVD 和书籍。在这个数据库中，你可能有一个表用于存放你的 CD 收藏，另一个表用于存储这些 CD 的曲目列表。因此，你可能需要查询多个表才能获取特定\
  \ CD 的曲目列表。\n\n然而，使用 MongoDB（以及其他非关系型数据库），采用**嵌入**此类信息的方式会容易得多。毕竟，文档本身天生就支持这样做。采用这种方法能使你的数据库保持整洁，确保所有相关信息都保存在一个单独的文档中，而且由于数据在磁盘上是共置的，其运行速度也会快得多。\n\
  \n现在，让我们通过一个现实世界的场景——在数据库中存储 CD 数据——来看看嵌入和引用信息的区别。\n\n在关系型方法中，你的数据结构可能如下所示：\n\n\
  `|_media`\n\n    `|_cds`\n\n        `|_id, artist, title, genre, releasedate`\n\n\
      `|_ cd_tracklists`\n\n        `|_cd_id, songtitle, length`\n\n在非关系型方法中，你的数据结构可能如下所示：\n\
  \n`|_media`\n\n    `|_items`\n\n        `|_<document>`\n\n在非关系型方法中，文档可能类似于以下内容：\n\
  \n```json\n{\n    \"Type\": \"CD\",\n    \"Artist\": \"Nirvana\",\n    \"Title\"\
  : \"Nevermind\",\n    \"Genre\": \"Grunge\",\n    \"Releasedate\": \"1991.09.24\"\
  ,\n    \"Tracklist\": [\n        {\n            \"Track\" : \"1\",\n           \
  \ \"Title\" : \"Smells Like Teen Spirit\",\n            \"Length\" : \"5:02\"\n\
  \        },\n        {\n            \"Track\" : \"2\",\n            \"Title\" :\
  \ \"In Bloom\",\n            \"Length\" : \"4:15\"\n        }\n    ]\n}\n```\n\n\
  在这个例子中，曲目列表信息被**嵌入**到了文档本身。这种方法既极其高效又组织良好。你希望存储的关于这张 CD 的所有信息都被添加到了一个单独的文档中。在 CD\
  \ 数据库的关系型版本中，这至少需要两个表；而在非关系型数据库中，只需要一个集合和一个文档。\n\n当检索给定 CD 的信息时，该信息只需要从一个文档加载到 RAM\
  \ 中，而不需要从多个文档加载。请记住，每一个引用都会在数据库中触发另一次查询。\n\n提示\n\n使用 MongoDB 的经验法则是：**尽可能嵌入数据**。这种方法效率高得多，并且几乎总是可行的。\n\
  \n此时，你可能想知道在应用程序有多个用户的场景下该如何处理。一般来说，上述 CD 应用程序的关系型数据库版本会要求你有一个包含所有用户的表，以及两个用于存放添加项的表。对于非关系型数据库，良好的做法是为用户和添加的项分别使用单独的集合。对于这类问题，MongoDB\
  \ 允许你以两种方式创建引用：手动或自动。在后一种情况下，你可以使用`DBRef`规范，它在集合因文档而异的情况下提供了更大的灵活性。你将在第 4 章中了解更多关于这两种方法的信息。\n\
  \n##### 创建 `_id` 字段\n\nMongoDB 数据库中的每个对象都包含一个唯一标识符，以将其与其他所有对象区分开来。这个标识符称为 `_id`\
  \ 键，它会在你创建集合中的每个文档时自动添加。\n\n`_id` 键是你创建的每个新文档中添加的第一个属性。即使你没有告诉 MongoDB 创建这个键，这一点也依然成立。例如，前面示例中的代码都没有使用\
  \ `_id` 键。尽管如此，MongoDB 还是为每个文档自动创建了一个 `_id` 键。它这样做是因为 `_id` 键是集合中每个文档的强制性元素。\n\n\
  如果你没有手动指定 `_id` 值，其类型将被设置为一种特殊的 BSON 数据类型，该类型由一个 12 字节的二进制值组成。得益于其设计，这个值具有相当高的唯一性概率。这\
  \ 12 字节的值由一个 4 字节的时间戳（自纪元以来的秒数，即 1970 年 1 月 1 日）、一个 3 字节的机器 ID、一个 2 字节的进程 ID 和一个\
  \ 3 字节的计数器组成。需要了解的是，`计数器` 和 `时间戳` 字段是以 `大端序` 格式存储的。这是因为 MongoDB 希望确保这些值按递增顺序排列，而\
  \ `大端序` 方法最适合这一要求。\n\n注意\n\n`大端序` 和 `小端序` 这两个术语指的是内存中较长数据字内单个字节/位的存储方式。`大端序` 意味着最高位值最先保存。同样，`小端序`\
  \ 意味着最低位值最先保存。\n\n图 3-3 展示了 `_id` 键的值是如何构成的以及这些值的来源。\n\n![A978-1-4302-5822-3_3_Fig3_HTML.jpg](img/A978-1-4302-5822-3_3_Fig3_HTML.jpg)\n\
  *图 3-3. 在 MongoDB 中创建 `_id` 键*\n\n你加载的每一个用于与 MongoDB 协同工作的附加驱动程序（例如 PHP 驱动程序或 Python\
  \ 驱动程序）都支持这种特殊的 BSON 数据类型，并在创建新数据时使用它。你也可以从 MongoDB shell 中调用 `ObjectId()` 来为 `_id`\
  \ 键创建一个值。或者，你可以使用 `ObjectId(string)` 来指定你自己的值，其中 `string` 代表指定的十六进制字符串。\n\n####\
  \ 构建索引\n\n正如第 1 章所提到的，索引不过是一种数据结构，它收集了集合中文档的指定字段值的信息。MongoDB 的查询优化器使用这种数据结构来快速筛选和排序集合中的文档。\n\
  \n请记住，索引能确保对文档中数据的快速查找。基本上，你应该将索引视为一个预定义的、已执行并存储了结果的查询。正如你所想，这极大地提高了查询性能。MongoDB\
  \ 中的一般经验法则是，你应该在那些你也会想在 MySQL 中创建索引的同类场景中创建索引。\n\n创建自己的索引最大的好处是，查询常用信息的速度会非常快，因为你的查询无需遍历整个数据库来收集这些信息。\n\
  \n创建（或删除）一个索引相对简单——至少在你掌握之后是这样。你将在第 4 章学习如何操作，该章涵盖了数据处理。你还将在第 10 章中学习一些利用索引的高级技术，该章涵盖了如何最大化性能。\n\
  \n\n\n##### 通过索引影响性能\n\n你可能会疑惑，为什么需要删除索引、重建索引，甚至删除集合中的所有索引。简单的答案是，这样做可以清理一些异常情况。例如，有时数据库大小会无缘无故地大幅增长。在其他时候，索引所占用的空间可能让你觉得过多。\n\
  \n另外需要记住的一点是：每个集合最多可以有 40 个索引。一般来说，这远远超过你实际所需，但你将来某一天可能会达到这个上限。\n\n> **注意**\n> 添加索引可以提高查询速度，但会降低插入或删除速度。最好只考虑为读取次数多于写入次数的集合添加索引。当写入多于读取时，索引甚至可能适得其反。\n\
  \n最后，所有索引信息都存储在数据库的 `system.indexes` 集合中。例如，你可以运行 `db.indexes.find()` 命令来快速查看当前已存储的索引。要查看为特定集合创建的索引，可以使用\
  \ `getIndexes` 命令：`db.collection.getIndexes()`。\n\n#### 实现地理空间索引\n\n如第 1 章简要提及的，MongoDB\
  \ 自 1.4 版本起就实现了地理空间索引。这意味着，除了普通索引，MongoDB 还支持专为优化基于位置的查询而设计的地理空间索引。例如，你可以使用此功能来查找距离用户当前位置最近的一系列已知项目。或者，你可以进一步细化搜索，查询指定数量的当前位置附近的餐厅。如果你正在设计一个需要根据给定客户的邮政编码找到最近可用分支机构的应用程序，这类查询会特别有用。\n\
  \n要添加地理空间信息的文档，必须包含一个子对象或数组，其中第一个元素指定对象类型，然后是项目的经度和纬度，如下例所示：\n```\n> db.restaurants.insert({name:\
  \ \"Kimono\", loc: { type: \"Point\", coordinates: [ 52.370451, 5.217497]}})\n```\n\
  请注意，`type` 参数可用于指定文档的对象类型，可以是 `Point`、`LineString` 或 `Polygon`。顾名思义，`Point` 类型用于指定项目（本例中是一家餐厅）恰好位于给定的地点，因此需要且仅需要两个值：经度和纬度。`LineString`\
  \ 类型可用于指定项目沿特定线路（例如一条街道）延伸，因此需要起点和终点，如下例所示：\n```\n> db.streets.insert( {name: \"\
  Westblaak\", loc: { type: \"LineString\", coordinates: [ [52.36881,4.890286],[52.368762,4.890021]\
  \ ] } })\n```\n`Polygon` 类型可用于指定一个（非默认）形状（例如一个购物区）。使用此类型时，你需要确保起点和终点相同，以形成闭合回路。此外，点坐标需要以数组内嵌套数组的形式提供，如下例所示：\n\
  ```\n> db.stores.insert( {name: \"SuperMall\", loc: { type: \"Polygon\", coordinates:\
  \ [ [ [52.146917,5.374337], [52.146966,5.375471], [52.146722,5.375085], [52.146744,5.37437],\
  \ [52.146917,5.374337] ] ] } } )\n```\n在大多数情况下，`Point` 类型是合适的。\n\n一旦将此地理空间信息添加到文档中，你就可以创建索引（当然，也可以事先创建索引），并向\
  \ `ensureIndex()` 函数传递 `2dsphere` 参数：\n```\n> db.restaurants.ensureIndex( { loc:\
  \ \"2dsphere\" } )\n```\n> **注意**\n> `ensureIndex()` 函数用于添加自定义索引。暂时不必担心这个函数的语法——你将在下一章深入学习如何使用\
  \ `ensureIndex()`。\n\n`2dsphere` 参数告诉 `ensureIndex()`，它正在一个类地球体上索引坐标或其他形式的二维信息。默认情况下，`ensureindex()`\
  \ 假设给定的是纬度/经度键，并使用 `-180` 到 `180` 的范围。但是，你可以使用 `min` 和 `max` 参数覆盖这些值：\n```\n> db.restaurants.ensureIndex(\
  \ { loc: \"2dsphere\" }, { min : -500 , max : 500 } )\n```\n你还可以通过使用辅助键值（也称为复合键）来扩展你的地理空间索引。当你打算基于多个值进行查询时（例如位置（地理空间信息）和类别（升序排序）），这种结构会很有用：\n\
  ```\n> db.restaurants.ensureIndex( { loc: \"2dsphere\", category: 1 } )\n```\n>\
  \ **注意**\n> 目前，地理空间的实现基于世界是一个完美球体的假设。因此，每一度纬度和经度的长度恰好是 111 公里（69 英里）。然而，这只在赤道上精确成立；离赤道越远，每一度经度的长度就越小，在两极趋近于零。\n\
  \n\n\n##### 查询地理空间信息\n\n在本章中，我们主要关注两件事：如何建模数据，以及数据库如何在应用程序后台工作。尽管如此，在各种各样的应用程序中，操作地理空间信息变得越来越重要，因此我们将花点时间解释如何在\
  \ MongoDB 数据库中利用地理空间信息。\n\n在开始之前，有一个温和的提醒。如果您是 MongoDB 的新手，并且过去没有机会使用（地理空间）索引数据，本节一开始可能会显得有点让人不知所措。不过不用担心；您可以暂时安全地跳过它，如果需要，之后再回来查看。给出的示例旨在向您展示一个实际示例，说明如何（以及为何）使用地理空间索引，使其更易于理解。解决了这个问题后，如果您感觉准备好了，请继续阅读。\n\
  \n一旦您将数据添加到集合并创建了索引，就可以进行地理空间查询。例如，让我们看几行简单而强大的代码，演示如何使用地理空间索引。\n\n首先启动您的 MongoDB\
  \ shell，并使用 `use` 函数选择一个数据库。在本例中，数据库名为 `restaurants`：\n\n```\n> use restaurants\n\
  ```\n\n选择数据库后，您可以定义几个包含地理空间信息的文档，然后将它们插入到 `places` 集合中（请记住：您不需要事先创建集合）：\n\n```\n\
  > db.restaurants.insert( { name: \"Kimono\", loc: { type: \"Point\", coordinates:\
  \ [ 52.370451, 5.217497] } } )\n> db.restaurants.insert( {name: \"Shabu Shabu\"\
  , loc: { type: \"Point\", coordinates: [51.915288,4.472786] } } )\n> db.restaurants.insert(\
  \ {name: \"Tokyo Cafe\", loc: { type: \"Point\", coordinates: [52.368736, 4.890530]\
  \ } } )\n```\n\n添加数据后，您需要告诉 MongoDB shell 基于在 `loc` 键中指定的位置信息创建索引，如下例所示：\n\n```\n\
  > db.restaurants.ensureIndex ( { loc: \"2dsphere\" } )\n```\n\n创建索引后，您就可以开始搜索文档了。首先搜索一个精确值（到目前为止这是一个“普通”查询；此时它与地理空间信息无关）：\n\
  \n```\n> db.restaurants.find( { loc : [52,5] } )\n>\n```\n\n前面的搜索没有返回结果。这是因为查询过于具体。在这种情况下，更好的方法是搜索包含给定值附近信息的文档。您可以使用\
  \ `$near` 操作符来实现这一点。请注意，这需要指定 `type` 操作符，如下例所示：\n\n```\n> db.restaurants.find( {\
  \ loc : { $geoNear : { $geometry : { type : \"Point\", coordinates: [52.338433,5.513629]\
  \ } } } } )\n```\n\n这将产生以下输出：\n\n```\n{\n\"_id\" : ObjectId(\"51ace0f380523d89efd199ac\"\
  ),\n\"name\" : \"Kimono\",\n\"loc\" : {\n\"type\" : \"Point\",\n\"coordinates\"\
  \ : [ 52.370451, 5.217497 ]\n}\n}\n{\n\"_id\" : ObjectId(\"51ace13380523d89efd199ae\"\
  ),\n\"name\" : \"Tokyo Cafe\",\n\"loc\" : {\n\"type\" : \"Point\",\n\"coordinates\"\
  \ : [ 52.368736, 4.89053 ]\n}\n}\n{\n\"_id\" : ObjectId(\"51ace11b80523d89efd199ad\"\
  ),\n\"name\" : \"Shabu Shabu\",\n\"loc\" : {\n\"type\" : \"Point\",\n\"coordinates\"\
  \ : [ 51.915288, 4.472786 ]\n}\n}\n```\n\n尽管这组结果看起来确实好多了，但仍然存在一个问题：所有的文档都被返回了！当不带任何附加操作符使用时，`$near`\
  \ 会返回前 100 个条目，并根据它们与给定坐标的距离进行排序。虽然我们可以选择使用 `limit` 函数将结果限制为，例如，前两项（或者如果我们想要的话，两百项），但更好的做法是将结果限制在给定范围内。\n\
  \n这可以通过附加 `$maxDistance` 操作符来实现。使用此操作符，您可以告诉 MongoDB 仅返回那些与给定点距离（以米为单位测量）在最大距离范围内的结果，如下例及其输出所示：\n\
  \n\n\n`> db.retaurants.find( { loc : { $geoNear : { $geometry : { type : \"Point\"\
  , coordinates: [52.338433,5.513629] }, $maxDistance : 40000 } } } )`\n\n```json\n\
  {\n    \"_id\" : ObjectId(\"51ace0f380523d89efd199ac\"),\n    \"name\" : \"Kimono\"\
  ,\n    \"loc\" : {\n        \"type\" : \"Point\",\n        \"coordinates\" : [ 52.370451,\
  \ 5.217497 ]\n    }\n}\n```\n\n如你所见，这次查询只返回了一条结果：一家位于起点 40 公里（约合 25 英里）范围内的餐厅。\n\
  \n**注意**\n返回结果的数量与查询执行所需的时间之间存在直接关联。\n\n除了 `$geoNear` 操作符，MongoDB 还提供了 `$geoWithin`\
  \ 操作符。你使用此操作符来查找位于特定形状内的项目。目前，你可以查找位于 `$box`（矩形）、`$polygon`（自定义多边形）、`$center`（圆形）和\
  \ `$centerSphere`（球体上的圆形）形状内的项目。让我们看几个额外的例子，来说明如何使用这些形状。\n\n**注意**\n从 MongoDB 2.4\
  \ 版本开始，`$within` 操作符被弃用，并由 `$geoWithin` 取代。此操作符不严格要求地理空间索引。此外，与 `$near` 操作符不同，`$geoWithin`\
  \ 不会对返回的结果进行排序，从而提升了性能。\n\n要使用 `$box` 形状，你需要先指定盒子的左下角坐标，然后是右上角坐标，如下例所示：\n\n`> db.restaurants.find(\
  \ { loc: { $geoWithin : { $box : [ [52.368549,4.890238], [52.368849,4.89094] ] }\
  \ } } )`\n\n类似地，要查找位于特定多边形内的项目，你需要将你的点坐标指定为一组嵌套数组。再次注意，第一个和最后一个坐标必须相同，以正确闭合形状，如下例所示：\n\
  \n`> db.restaurants.find( { loc :`\n`{ $geoWithin :`\n`{ $geometry :`\n`{ type :\
  \ \"Polygon\",`\n`coordinates : [ [`\n`[52.368739,4.890203], [52.368872,4.890477],\
  \ [52.368726,4.890793],`\n`[52.368608,4.89049], [52.368739,4.890203]`\n`] ]`\n`}`\n\
  `}`\n`)} )`\n\n查找基本 `$circle` 形状内项目的代码相当简单。在这种情况下，你需要在执行 `find()` 函数之前，指定圆的中心点及其半径（以坐标系统所使用的单位度量）：\n\
  \n`> db.restaurants.find( { loc: { $geoWithin : { $center : [ [52.370524, 5.217682],\
  \ 10] } } } )`\n\n请注意，自 MongoDB 2.2.3 版本起，即使没有地理空间索引，也可以使用 `$center` 操作符。但是，建议创建一个索引以提高性能。\n\
  \n最后，要查找位于球体（比如我们的星球）上圆形区域内的项目，你可以使用 `$centerSphere` 操作符。此操作符与 `$center` 类似，如下所示：\n\
  \n`> db.restaurants.find( { loc: { $geoWithin : { $centerSphere : [ [52.370524,\
  \ 5.217682], 10] } } } )`\n\n默认情况下，`find()` 函数非常适合运行查询。然而，MongoDB 还提供了 `geoNear()`\
  \ 函数，其工作方式与 `find()` 函数类似，但还会为结果中的每个项目显示其与指定点的距离。`geoNear()` 函数还包含一些额外的诊断信息。下面的例子使用\
  \ `geoNear()` 函数查找距离指定位置最近的两个结果：\n\n`> db.runCommand( { geoNear : \"restaurants\"\
  , near : { type : \"Point\", coordinates: [52.338433,5.513629] }, spherical : true})`\n\
  \n它返回以下结果：\n\n```json\n{\n    \"ns\" : \"stores.restaurants\",\n    \"results\"\
  \ : [\n        {\n            \"dis\" : 33155.517810497055,\n            \"obj\"\
  \ : {\n                \"_id\" : ObjectId(\"51ace0f380523d89efd199ac\"),\n     \
  \           \"name\" : \"Kimono\",\n                \"loc\" : {\n              \
  \      \"type\" : \"Point\",\n                    \"coordinates\" : [\n        \
  \                52.370451,\n                        5.217497\n                \
  \    ]\n                }\n            }\n        },\n        {\n            \"\
  dis\" : 69443.96264213261,\n            \"obj\" : {\n                \"_id\" : ObjectId(\"\
  51ace13380523d89efd199ae\"),\n                \"name\" : \"Tokyo Cafe\",\n     \
  \           \"loc\" : {\n                    \"type\" : \"Point\",\n           \
  \         \"coordinates\" : [\n                        52.368736,\n            \
  \            4.89053\n                    ]\n                }\n            }\n\
  \        },\n        {\n            \"dis\" : 125006.87383713324,\n            \"\
  obj\" : {\n                \"_id\" : ObjectId(\"51ace11b80523d89efd199ad\"),\n \
  \               \"name\" : \"Shabu Shabu\",\n                \"loc\" : {\n     \
  \               \"type\" : \"Point\",\n                    \"coordinates\" : [\n\
  \                        51.915288,\n                        4.472786\n        \
  \            ]\n                }\n            }\n        }\n    ],\n    \"stats\"\
  \ : {\n        \"time\" : 6,\n        \"nscanned\" : 3,\n        \"avgDistance\"\
  \ : 75868.7847632543,\n        \"maxDistance\" : 125006.87383713324\n    },\n  \
  \  \"ok\" : 1\n}\n```\n\n至此，我们对地理空间信息的介绍就告一段落了；不过，在本书后续章节中，你还会看到一些展示如何利用地理空间函数的更多例子。\n\
  \n#### 在现实世界中使用 MongoDB\n现在你已经安装了 MongoDB 及其相关插件，并且理解了数据模型，是时候开始工作了。在本书接下来的五章中，你将学习如何构建、查询以及以其他方式操作各种示例\
  \ MongoDB 数据库（关于即将涵盖主题的快速浏览，请参见表 3-1）。每章将主要使用一个独立的、仅属于该章的数据库；我们采取这种方法是为了让你能以模块化的方式更轻松地阅读本书。\n\
  \n表 3-1. 本书涵盖的 MongoDB 示例数据库\n\n| 章节 | 数据库名称 | 主题 |\n| --- | --- | --- |\n| 4 |\
  \ `Library` | 处理数据和索引 |\n| 5 | `Test` | GridFS |\n| 6 | `Contacts` | PHP 和 MongoDB\
  \ |\n| 7 | `Inventory` | Python 和 MongoDB |\n| 8 | `Test` | 高级查询 |\n\n#### 总结\n\
  在本章中，我们探讨了数据库后台发生的事情。我们还更深入地研究了集合和文档的主要概念；涵盖了 MongoDB 支持的数据类型，以及如何嵌入和引用数据。\n\n接下来，我们考察了索引的作用，包括何时以及为何应该使用（或不使用）它们。\n\
  \n我们还触及了地理空间索引的概念。例如，我们介绍了地理空间数据的存储方式；我们也解释了如何使用常规的 `find()` 函数或更专注于地理空间的 `geoNear`\
  \ 数据库命令来搜索此类数据。\n\n在下一章中，我们将更详细地了解 MongoDB shell 的工作原理，包括可以使用哪些函数来插入、查找、更新或删除数据。我们还将探索条件操作符如何能帮助你完成所有这些操作。\n\
  \n### 4. 处理数据\n**摘要**\n在上一章中，你学习了数据库在后端如何工作，什么是索引，如何使用数据库快速找到所需数据，以及文档的结构是什么样的。你还看到了一个简短的例子，演示了如何使用\
  \ MongoDB shell 添加数据并再次查找它。在本章中，我们将更专注于从你的 shell 处理数据。\n\n在上一章中，你学习了数据库在后端如何工作，什么是索引，如何使用数据库快速找到所需数据，以及文档的结构是什么样的。你还看到了一个简短的例子，演示了如何使用\
  \ MongoDB shell 添加数据并再次查找它。在本章中，我们将更专注于从你的 shell 处理数据。\n\n在本章中，我们将使用一个名为 `library`\
  \ 的数据库，并执行诸如添加数据、搜索数据、修改数据、删除数据和创建索引等操作。我们还将了解如何使用各种命令在数据库中导航，以及 `DBRef` 是什么、它的作用是什么。如果你已经按照前面章节的说明设置了\
  \ MongoDB 软件，可以跟随本章的示例来熟悉界面。在这个过程中，你还将牢固理解哪些命令可用于何种操作。\n\n\n\n#### 浏览你的数据库\n\n你需要知道的第一件事是如何浏览你的数据库和集合。对于传统的\
  \ SQL 数据库，你需要做的第一件事是创建一个实际的数据库；然而，正如你可能从前面的章节中记得的那样，使用 MongoDB 时不需要这样做，因为程序会在你向其中存储数据的瞬间自动为你创建数据库和底层的集合。\n\
  \n要切换到现有数据库或创建新数据库，你可以在 shell 中使用 `use` 函数，后面跟上你想要使用的数据库名称，无论它是否存在。这段代码展示了如何使用 `library`\
  \ 数据库：\n\n`> use library`\n`Switched to db library`\n\n仅仅是调用 `use` 函数并跟上数据库名称这一操作，就会将你的\
  \ `db`（数据库）全局变量设置为 `library`。这样做意味着，你传递给 shell 的所有命令都将自动假定需要在 `library` 数据库上执行，直到你将此变量重置为另一个数据库。\n\
  \n##### 查看可用的数据库和集合\n\nMongoDB 会自动假定，一旦你向一个数据库保存数据，就需要创建它。它也是区分大小写的。由于这些原因，要确保你在正确的数据库中工作可能相当棘手。因此，最好在切换到某个数据库之前，查看一下当前\
  \ MongoDB 中所有可用的数据库列表，以防你忘记了数据库名称或其确切的拼写。你可以使用 `show dbs` 函数来做到这一点：\n\n`> show dbs`\n\
  `admin`\n`local`\n\n请注意，此函数只会显示已经存在的数据库。在这个阶段，数据库不包含任何数据，因此不会列出其他内容。如果你想查看当前数据库的所有可用集合，可以使用\
  \ `show collections` 函数：\n\n`> show collections`\n`system.indexes`\n\n请注意，`system.indexes`\
  \ 集合是在保存数据时自动创建的。此集合包含一个基于刚插入文档的 `_id` 键值的索引；它还包括你定义的任何自定义创建的索引。\n\n**小贴士**\n要查看你当前正在使用的数据库，只需在\
  \ MongoDB shell 中输入 `db`。\n\n#### 向集合中插入数据\n\n你将要了解的最常用功能之一是如何向你的集合中插入数据。所有数据都以\
  \ BSON 格式存储（这种格式既紧凑又便于快速扫描），因此你也需要以 BSON 格式插入数据。你可以通过几种方式做到这一点。例如，你可以先定义它，然后使用 `insert`\
  \ 函数将其保存到集合中，或者你可以在使用 `insert` 函数时即时输入文档：\n\n`> document = ( { \"Type\" : \"Book\"\
  , \"Title\" : \"Definitive Guide to MongoDB 2nd ed.\", \"The\", \"ISBN\" : \"978-1-4302-5821-6\"\
  , \"Publisher\" : \"Apress\", \"Author\": [\"Hows, David\", \"Plugge, Eelco\", \"\
  Membrey, Peter\", \"Hawkins, Tim\" ] } )`\n\n**注意**\n当你在 shell 中定义一个变量时（例如，`document\
  \ = ( { ... } )`），该变量的内容会立即被打印出来。\n\n`> db.media.insert(document)`\n\n在 shell 中输入时也可以使用换行符。如果你要编写一个相当长的文档，这可能很方便，如下例所示：\n\
  \n```\n> document = ( { \"Type\" : \"Book\",\n...\"Title\" : \"Definitive Guide\
  \ to MongoDB 2nd ed., The\",\n...\"ISBN\" : \"978-1-4302-5821-6\",\n...\"Publisher\"\
  \ : \"Apress\",\n...\"Author\" : [\"Hows, David\", \"Plugge, Eelco\", \"Membrey,\
  \ Peter\", \"Hawkins, Tim\"]\n...} )\n> db.media.insert(document)\n```\n\n如前所述，另一种选择是直接通过\
  \ shell 插入数据，而无需先定义文档。你可以通过立即调用 `insert` 函数，后跟文档内容来实现：\n\n`> db.media.insert( {\
  \ \"Type\" : \"CD\", \"Artist\" : \"Nirvana\", \"Title\" : \"Nevermind\" })`\n\n\
  或者，你也可以像之前一样，在使用换行符的同时插入数据。例如，你可以通过向其添加一个曲目数组来扩展前面的例子。请仔细注意下面例子中逗号和括号的用法：\n\n```\n\
  > db.media.insert( { \"Type\" : \"CD\",\n...\"Artist\" : \"Nirvana\",\n...\"Title\"\
  \ : \"Nevermind\",\n... \"Tracklist\" : [\n... {\n... \"Track\" : \"1\",\n... \"\
  Title\" : \"Smells Like Teen Spirit\",\n... \"Length\" : \"5:02\"\n... },\n... {\n\
  ... \"Track\" : \"2\",\n... \"Title\" : \"In Bloom\",\n... \"Length\" : \"4:15\"\
  \n... }\n... ]\n...}\n... )\n```\n\n正如你所见，通过 Mongo shell 插入数据是直接了当的。\n\n插入数据的过程非常灵活，但在这样做时你必须遵守一些规则。例如，在插入文档时，键的名称有以下限制：\n\
  \n*   `$` 字符不能是键名的第一个字符。例如：`$tags`\n*   句点 `.` 字符不能出现在键名的任何位置。例如：`ta.gs`\n*   名称\
  \ `_id` 被保留用作主键 ID；虽然不推荐，但它可以存储任何唯一的值，例如字符串或整数。\n\n同样，在创建集合时也有一些限制。例如，集合的名称必须遵守以下规则：\n\
  \n*   集合的名称不能超过 128 个字符。\n*   空字符串 (`“ ”`) 不能用作集合名称。\n*   集合的名称必须以字母或下划线开头。\n* \
  \  集合名称 `system` 是为 MongoDB 保留的，不能使用。\n*   集合的名称不能包含 `“\\0”` 空字符。\n\n\n#### 数据查询\n\
  \n你已经了解了如何切换到数据库以及如何插入数据；接下来，你将学习如何查询集合中的数据。让我们在前面例子的基础上，看看所有可能的方法，以便清晰地查看给定集合中的数据。\n\
  \n> **注意**\n>\n> 在查询数据时，你有非常多的选项、操作符、表达式、过滤器等可用。我们将在接下来的几节中回顾这些选项。\n\n`find()` 函数提供了从你的一个集合中多个文档检索数据的最简单方法。这个函数你将会经常使用。\n\
  \n假设你已将前面的两个示例插入到了名为 `library` 的数据库中的 `media` 集合里。如果你在这个集合上使用一个简单的 `find()` 函数，你将看到迄今为止添加的所有文档都被打印出来：\n\
  \n```javascript\n> db.media.find()\n{\n    \"_id\" : ObjectId(\"4c1a8a56c603000000007ecb\"\
  ),\n    \"Type\" : \"Book\",\n    \"Title\" : \"Definitive Guide to MongoDB 2nd\
  \ ed., The\",\n    \"ISBN\" : \"978-1-4302-5821-6\",\n    \"Publisher\" : \"Apress\"\
  ,\n    \"Author\" : [\"Hows, David \", \"Plugge, Eelco\", \"Membrey, Peter\", \"\
  Hawkins, Tim\"]\n}\n{\n    \"_id\" : ObjectId(\"4c1a86bb2955000000004076\"),\n \
  \   \"Type\" : \"CD\",\n    \"Artist\" : \"Nirvana\",\n    \"Title\" : \"Nevermind\"\
  ,\n    \"Tracklist\" : [\n        {\n            \"Track\" : \"1\",\n          \
  \  \"Title\" : \"Smells Like Teen Spirit\",\n            \"Length\" : \"5:02\"\n\
  \        },\n        {\n            \"Track\" : \"2\",\n            \"Title\" :\
  \ \"In Bloom\",\n            \"Length\" : \"4:15\"\n        }\n    ]\n}\n```\n\n\
  这很简单，但通常你可能不想从集合中的所有文档中检索所有信息。相反，你可能希望检索某种特定类型的文档。例如，你可能想要返回所有 Nirvana 的 CD。如果是这样，你可以指定只请求并返回所需的信息：\n\
  \n```javascript\n> db.media.find ( { Artist : \"Nirvana\" } )\n{\n    \"_id\" :\
  \ ObjectId(\"4c1a86bb2955000000004076\"),\n    \"Type\" : \"CD\",\n    \"Artist\"\
  \ : \"Nirvana\",\n    \"Title\" : \"Nevermind\",\n    \"Tracklist\" : [\n      \
  \  {\n            \"Track\" : \"1\",\n            \"Title\" : \"Smells Like Teen\
  \ Spirit\",\n            \"Length\" : \"5:02\"\n        },\n        {\n        \
  \    \"Track\" : \"2\",\n            \"Title\" : \"In Bloom\",\n            \"Length\"\
  \ : \"4:15\"\n        }\n    ]\n}\n```\n\n好了，这样看起来好多了！你不必看到已添加到集合中的所有其他项目的所有信息，只看到你感兴趣的信息。但是，如果你对返回的结果仍然不满意怎么办？例如，假设你想要一个只显示你拥有的\
  \ Nirvana 的 CD 标题的列表，忽略任何其他信息，比如曲目列表。你可以通过向查询中插入一个额外的参数来实现，该参数指定你想要返回的键的名称，后面跟一个\
  \ `1`：\n\n```javascript\n> db.media.find ( {Artist : \"Nirvana\"}, {Title: 1} )\n\
  { \"_id\" : ObjectId(\"4c1a86bb2955000000004076\"), \"Title\" : \"Nevermind\" }\n\
  ```\n\n插入 `{ Title : 1 }` 信息指定了只应返回来自 `title` 字段的信息。结果会按升序排序并呈现给你。\n\n> **注意**\n\
  >\n> 升序顺序基于文档的插入顺序。\n\n你也可以实现相反的效果：插入 `{ Type : 0 }` 会检索你存储的所有来自 Nirvana 的项目列表，显示除\
  \ `Type` 字段外的所有信息。\n\n> **注意**\n>\n> `_id` 字段默认将保持可见，除非你明确要求它不显示。\n\n花点时间运行带有 `{\
  \ Title : 1 }` 插入的修订查询；完全没有返回不必要的信息。这节省了你的时间，因为你只看到想要的信息。它也节省了数据库返回不必要信息所需的时间。\n\
  \n##### 使用点表示法\n\n当你开始处理更复杂的文档结构（例如包含数组或嵌入对象的文档）时，你也可以开始使用其他方法来查询这些对象中的信息。例如，假设你想查找包含特定你喜欢歌曲的所有\
  \ CD。以下代码执行了一个更详细的查询：\n\n```javascript\n> db.media.find( { \"Tracklist.Title\" :\
  \ \"In Bloom\" } )\n{\n    \"_id\" : ObjectId(\"4c1a86bb2955000000004076\"),\n \
  \   \"Type\" : \"CD\",\n    \"Artist\" : \"Nirvana\",\n    \"Title\" : \"Nevermind\"\
  ,\n    \"Tracklist\" : [\n        {\n            \"Track\" : \"1\",\n          \
  \  \"Title\" : \"Smells Like Teen Spirit\",\n            \"Length\" : \"5:02\"\n\
  \        },\n        {\n            \"Track\" : \"2\",\n            \"Title\" :\
  \ \"In Bloom\",\n            \"Length\" : \"4:15\"\n        }\n    ]\n}\n```\n\n\
  在键名后使用句点（`.`）告诉你的 `find` 函数在文档中查找嵌入的信息。在处理数组时，事情会简单一些。例如，如果你想查找由 Peter Membrey 编写的所有书籍列表，可以执行以下查询：\n\
  \n```javascript\n> db.media.find( { \"Author\" : \"Membrey, Peter\" } )\n{\n   \
  \ \"_id\" : ObjectId(\"4c1a8a56c603000000007ecb\"),\n    \"Type\" : \"Book\",\n\
  \    \"Title\" : \"Definitive Guide to MongoDB 2nd ed., The\",\n    \"ISBN\" : \"\
  978-1-4302-5821-6\",\n    \"Publisher\" : \"Apress\",\n    \"Author\" : [\"Hows,\
  \ David \", \"Plugge, Eelco\", \"Membrey, Peter\", \"Hawkins, Tim\"]\n}\n```\n\n\
  然而，以下命令将不会匹配任何文档，即使它看起来与之前的曲目列表查询相同：\n\n```javascript\n> db.media.find ( { \"Tracklist\"\
  \ : {\"Track\" : \"1\" }} )\n```\n\n子对象必须完全匹配；因此，前面的查询只会匹配一个不包含其他信息的文档，比如只有 `Track.Title`：\n\
  \n```javascript\n{\n    \"Type\" : \"CD\",\n    \"Artist\" : \"Nirvana\",\n    \"\
  Title\" : \"Nevermind\",\n    \"Tracklist\" : [\n        {\n            \"Track\"\
  \ : \"1\"\n        },\n        {\n            \"Track\" : \"2\",\n            \"\
  Title\" : \"In Bloom\",\n            \"Length\" : \"4:15\"\n        }\n    ]\n}\n\
  ```\n\n\n##### 使用排序、限制与跳过功能\n\nMongoDB 包含多个函数，可用于对查询进行更精确的控制。本节将介绍如何使用 `sort`、`limit`\
  \ 和 `skip` 函数。\n\n你可以使用 `sort` 函数对查询返回的结果进行排序。你可以使用 `1` 或 `-1` 分别按升序或降序对结果进行排序。该函数在功能上类似于\
  \ SQL 中的 `ORDER BY` 语句，并使用键的名称和排序方式作为准则，如下例所示：\n\n```bash\ndb.media.find().sort(\
  \ { Title: 1 })\n```\n\n此示例根据 `Title` 键的值按升序对结果进行排序。当未指定参数时，这是默认的排序顺序。你需要添加 `-1`\
  \ 标志以按降序排序。\n\n注意\n\n如果你指定了一个不存在的键进行排序，则值将按其插入的升序顺序返回。\n\n你可以使用 `limit()` 函数来指定返回结果的最大数量。此函数只需要一个参数：希望返回的结果数量。当你指定\
  \ `0` 时，将返回所有结果。以下示例仅返回你的媒体集合中的前十个条目：\n\n```bash\ndb.media.find().limit( 10 )\n\
  ```\n\n另一个你可能需要的操作是跳过集合中的前 n 个文档。以下示例跳过你的媒体集合中的前二十个文档：\n\n```bash\ndb.media.find().skip(\
  \ 20 )\n```\n\n正如你可能推测的那样，此命令返回集合中的所有文档，除了它找到的前二十个。请记住：它是按文档被插入的顺序来查找的。\n\n如果 MongoDB\
  \ 不能组合这些命令，它就不会如此强大。实际上，几乎任何函数都可以与其他任何函数组合使用。以下示例通过先跳过几个文档来限制结果，然后按降序对结果进行排序：\n\n\
  ```bash\ndb.media.find().sort ( { Title : -1 } ).limit ( 10 ).skip ( 20 )\n```\n\
  \n如果你想在你的应用程序中实现分页功能，可能会用到这个示例。正如你可能猜到的，这个命令不会返回目前创建的媒体集合中的任何结果，因为该集合包含的文档数量少于此示例中跳过的数量。\n\
  \n注意\n\n你可以在 `find()` 函数中使用以下快捷方式来跳过和限制结果：`find ( {}, {}, 10, 20 )`。在这里，你将结果限制为\
  \ 10 条，并跳过前 20 个文档。\n\n##### 处理固定集合、自然顺序与 $natural\n\n在使用 MongoDB 对查询进行排序时，还有一些额外的概念和特性需要你了解，包括固定集合、自然顺序和\
  \ `$natural`。本节将解释所有这些术语的含义以及如何在你的排序中利用它们。\n\n自然顺序是数据库对（普通）集合内对象的原生排序方式。因此，当你查询集合中的项目时，默认情况下项目会按正向自然顺序返回。这通常与项目被插入的顺序相同；然而，这并不保证如此，因为数据在被修改后，如果不再适合其旧位置，可能会发生移动。\n\
  \n固定集合是你的数据库中一种特殊的集合，其自然顺序被保证为文档被插入的顺序。保证自然顺序始终与插入顺序匹配，在你查询数据并需要绝对确定返回的结果已经按其插入顺序排序时，可能特别有用。\n\
  \n固定集合还有另一个巨大的好处：它们具有固定的大小。一旦一个固定集合已满，最旧的数据将被清除，新的数据将被添加到末尾，确保自然顺序遵循记录被插入的顺序。这种类型的集合可用于日志记录和自动归档数据。\n\
  \n与标准集合不同，固定集合必须使用 `createCollection` 函数显式创建。你还必须提供参数来指定你想要添加的集合的大小（以字节为单位）。例如，假设你想创建一个名为\
  \ `audit`、最大大小为 20480 字节的固定集合：\n\n```bash\ndb.createCollection(\"audit\", {capped:true,\
  \ size:20480})\n```\n\n输出将是：\n```json\n{ \"ok\" : 1 }\n```\n\n鉴于固定集合理论上保证自然顺序与插入顺序匹配，在查询数据时，你也不需要包含任何特殊的参数或任何其他特殊的命令或函数，当然，除非你想反转默认结果。这时\
  \ `$natural` 参数就派上用场了。例如，假设你想从记录登录失败尝试的固定集合中查找最近的十条记录。你可以使用 `$natural` 参数来查找此信息：\n\
  \n```bash\ndb.audit.find().sort( { $natural: -1 } ).limit ( 10 )\n```\n\n注意\n\n\
  已添加到固定集合中的文档可以被更新，但它们的大小不得增长。如果大小增长，更新将失败。也无法从固定集合中删除文档；相反，如果你想删除文档，必须删除整个集合并重新创建。你将在本章后面学到更多关于删除集合的内容。\n\
  \n你也可以在创建集合时使用 `max:` 参数来限制可以添加到固定集合中的项目数量。但是，你必须注意确保集合中有足够的空间来容纳你想要添加的项目数量。如果集合在达到项目数量限制之前就已满，则集合中最旧的项目将被移除。MongoDB\
  \ shell 包含一个实用程序，可以让你查看现有集合使用的空间量，无论它是否是固定集合。你可以使用 `validate()` 函数调用此实用程序。如果你想估算一个集合可能会变得多大，这可能特别有用。\n\
  \n如前所述，你可以使用 `max:` 参数来限制可以插入到集合中的项目数量，如下例所示：\n\n```bash\ndb.createCollection(\"\
  audit100\", { capped:true, size:20480, max: 100})\n```\n\n输出将是：\n```json\n{ \"ok\"\
  \ : 1 }\n```\n\n接下来，使用 `validate()` 函数检查集合的大小：\n\n```bash\ndb.audit100.validate()\n\
  ```\n\n生成的输出显示该表（名为 `audit100`）是一个固定集合，最多可添加 100 个项目，目前包含零个项目。\n\n##### 检索单个文档\n\
  \n到目前为止，我们只看了如何检索单个文档的示例。然而，如果你只想接收一个结果，那么查询所有文档（这通常是执行 `find()` 函数时所做的）将是 CPU 时间和内存的浪费。对于这种情况，你可以使用\
  \ `findOne()` 函数从集合中检索单个项目。总的来说，其结果与附加 `limit(1)` 函数时发生的情况相同，但何必给自己找麻烦呢？\n\n`findOne()`\
  \ 函数的语法与 `find()` 函数的语法相同：\n\n```bash\ndb.media.findOne()\n```\n\n通常建议在你期望只有一个结果时使用\
  \ `findOne()` 函数。\n\n\n\n##### 使用聚合命令\n\nMongoDB 提供了一套非常好用的聚合命令。起初你可能看不出它们的重要性，但一旦掌握，你就会发现聚合命令构成了一组极其强大的工具。例如，你可以用它们来获取数据库的一些基本统计概况。在本节中，我们将仔细看看如何使用可用聚合命令中的三个函数：`count`、`distinct`\
  \ 和 `group`。\n\n除了这三个基础聚合命令，MongoDB 还包含一个聚合框架。这个强大的功能让你无需使用（通常过于复杂的）map/reduce 框架即可计算聚合值。聚合框架将在第\
  \ 5 章中讨论。\n\n###### 使用 `count()` 返回文档数量\n\n`count()` 函数返回指定集合中的文档数量。到目前为止，我们已经在\
  \ `media` 集合中添加了一些文档。`count()` 函数可以精确地告诉你数量：\n\n```\n> db.media.count()\n```\n\n\
  你还可以通过将 `count()` 与条件运算符结合来进行额外的过滤，如下所示：\n\n```\n> db.media.find( { Publisher :\
  \ \"Apress\", Type: \"Book\" } ).count()\n1\n```\n\n此示例仅返回集合中由 Apress 出版、类型为 \"\
  Book\" 的文档数量。请注意，`count()` 函数默认情况下会忽略 `skip()` 或 `limit()` 参数。为确保你的查询不会跳过这些参数，并且计数结果与\
  \ `limit` 和/或 `skip` 参数匹配，请使用 `count(true)`：\n\n```\n> db.media.find( { Publisher:\
  \ \"Apress\", Type: \"Book\" }).skip ( 2 ) .count (true)\n0\n```\n\n###### 使用 `distinct()`\
  \ 检索唯一值\n\n前面的例子展示了从特定出版商处检索文档总数的好方法。然而，这种方法肯定不精确。毕竟，如果你拥有多本相同标题的书（例如，精装书和电子书），那么从技术上讲你只有一本书。这时\
  \ `distinct()` 就能帮上忙：它只返回唯一值。\n\n为了完整起见，你可以向集合中添加一个额外的项目。这个项目标题相同，但 ISBN 号不同：\n\n\
  ```\n> document = ( { \"Type\" : \"Book\",\"Title\" : \"Definitive Guide to MongoDB\
  \ 2nd ed., The\", ISBN: \"978-1-4302-5821-6\", \"Publisher\" : \"Apress\", \"Author\"\
  \ : [\"Hows, David\",\"Membrey, Peter\",\"Plugge, Eelco\",\"Hawkins, Tim\"] } )\n\
  > db.media.insert (document)\n```\n\n此时，数据库中应该有两本标题相同的书。当对这个集合中的标题使用 `distinct()`\
  \ 函数时，你将得到两个唯一项。然而，两本书的标题是唯一的，所以它们会被归为一个项。另一个结果是专辑 “Nevermind” 的标题：\n\n```\n> db.media.distinct(\
  \ \"Title\")\n[ \"Definitive Guide to MongoDB, The\", \"Nevermind\" ]\n```\n\n类似地，如果你查询唯一的\
  \ ISBN 号列表，会得到两个结果：\n\n```\n> db.media.distinct (\"ISBN\")\n[ \"1-4302-3051-7\"\
  , \"987-4302-3051-9\" ]\n```\n\n`distinct()` 函数在查询时也接受嵌套键；例如，这个命令会给你一个 CD 唯一标题的列表：\n\
  \n```\n> db.media.distinct (\"Tracklist.Title\")\n[ \"In Bloom\", \"Smells Like\
  \ Teen Spirit\" ]\n```\n\n###### 对结果进行分组\n\n最后但同样重要的是，你可以对结果进行分组。MongoDB 的 `group()`\
  \ 函数类似于 SQL 的 `GROUP BY` 函数，尽管语法略有不同。该命令的目的是返回一个分组项的数组。`group()` 函数接受三个参数：`key`、`initial`\
  \ 和 `reduce`。\n\n`key` 参数指定你想要按哪个字段进行分组。例如，假设你想按 `Title` 对结果进行分组。`initial` 参数让你为每个分组结果提供一个基础值（即起始的基础项数）。默认情况下，如果你想要返回精确的数字，你会希望将此参数设为零。`reduce`\
  \ 参数将所有相似项分组在一起。Reduce 接受两个参数：当前正在迭代的文档和聚合计数器对象。在下面的例子中，这些参数被称为 `items` 和 `prev`。本质上，`reduce`\
  \ 参数会给它遇到的每个与已找到标题匹配的项的总和加 `1`。\n\n当你需要类似 `标签云` 的功能时，`group()` 函数是理想的选择。例如，假设你想获取集合中任何类型项的所有唯一标题的列表。此外，假设如果基于标题发现重复项，你希望将它们分组在一起：\n\
  \n```\n> db.media.group (\n{\n    key: {Title : true},\n    initial: {Total : 0},\n\
  \    reduce : function (items,prev)\n    {\n        prev.Total += 13\n    }\n}\n\
  )\n[\n    {\n        \"Title\" : \"Nevermind\",\n        \"Total\" : 1\n    },\n\
  \    {\n        \"Title\" : \"Definitive Guide to MongoDB, The\",\n        \"Total\"\
  \ : 2\n    }\n]\n```\n\n除了 `key`、`initial` 和 `reduce` 参数外，你还可以指定三个可选参数：\n\n*   `keyf`：如果你不希望根据文档中的现有键对结果进行分组，可以使用此参数替代\
  \ `key` 参数。相反，你将使用你设计的另一个函数来指定如何进行分组。\n*   `cond`：你可以使用此参数来指定一个必须为真的附加语句，然后文档才会被分组。你可以像使用\
  \ `find()` 查询在集合中搜索文档一样使用它。如果未设置此参数（默认值），则将检查集合中的所有文档。\n*   `finalize`：你可以使用此参数来指定一个函数，该函数在返回最终结果之前执行。例如，你可以计算平均值或执行计数，并将此信息包含在结果中。\n\
  \n注意\n\n`group()` 函数目前在分片环境中不起作用。对于这些情况，你应该使用 `mapreduce()` 函数。此外，使用 `group()` 函数时，输出结果中总共不能包含超过\
  \ 10,000 个键，否则将引发异常。这也可以通过使用 `mapreduce()` 来规避。\n\n##### 使用条件运算符\n\nMongoDB 支持大量条件运算符，以便更好地过滤你的结果。以下部分概述了这些运算符，包括一些展示如何使用它们的基本示例。然而，在学习这些示例之前，你应该向数据库中再添加几个项目；这样做可以让你更清楚地看到这些运算符的效果：\n\
  \n```\ndvd = ( { \"Type\" : \"DVD\", \"Title\" : \"Matrix, The\", \"Released\" :\
  \ 1999,\n    \"Cast\" : [\"Keanu Reeves\",\"Carrie-Anne Moss\",\"Laurence Fishburne\"\
  ,\"Hugo Weaving\",\"Gloria Foster\",\"Joe Pantoliano\"] } )\n{\n        \"Type\"\
  \ : \"DVD\",\n        \"Title\" : \"Matrix, The\",\n        \"Released\" : 1999,\n\
  \        \"Cast\" : [\n                \"Keanu Reeves\",\n                \"Carrie-Anne\
  \ Moss\",\n                \"Laurence Fishburne\",\n                \"Hugo Weaving\"\
  ,\n                \"Gloria Foster\",\n                \"Joe Pantoliano\"\n    \
  \    ]\n}\n> db.media.insert(dvd)\n> dvd = ( { \"Type\" : \"DVD\", Title : \"Blade\
  \ Runner\", Released : 1982 } )\n{ \"Type\" : \"DVD\", \"Title\" : \"Blade Runner\"\
  , \"Released\" : 1982 }\n> db.media.insert(dvd)\n> dvd = ( { \"Type\" : \"DVD\"\
  , Title : \"Toy Story 3\", Released : 2010 } )\n{ \"Type\" : \"DVD\", \"Title\"\
  \ : \"Toy Story 3\", \"Released\" : 2010 }\n> db.media.insert(dvd)\n```\n\n\n\n\
  #### MongoDB 查询操作符：比较、范围与逻辑匹配\n\n##### 执行大于与小于比较\n\n您可以在查询中使用以下特殊参数执行大于和小于比较：`$gt`、`$lt`、`$gte`\
  \ 和 `$lte`。在本节中，我们将介绍如何使用这些参数。\n\n首先介绍的是 `$gt`（大于）参数。您可以使用它来指定某个整数必须大于特定值才能被返回：\n\
  \n```javascript\ndb.media.find ( { Released : {$gt : 2000} }, { \"Cast\" : 0 } )\n\
  ```\n\n```json\n{ \"_id\" : ObjectId(\"4c4369a3c603000000007ed3\"), \"Type\" : \"\
  DVD\", \"Title\" :\n\"Toy Story 3\", \"Released\" : 2010 }\n```\n\n请注意，前面的查询中不包含\
  \ 2000 年本身。为此，您可以使用 `$gte`（大于或等于）参数：\n\n```javascript\ndb.media.find ( { Released\
  \ : {$gte : 1999 } }, { \"Cast\" : 0 } )\n```\n\n```json\n{ \"_id\" : ObjectId(\"\
  4c43694bc603000000007ed1\"), \"Type\" : \"DVD\", \"Title\" :\n\"Matrix, The\", \"\
  Released\" : 1999 }\n{ \"_id\" : ObjectId(\"4c4369a3c603000000007ed3\"), \"Type\"\
  \ : \"DVD\", \"Title\" :\n\"Toy Story 3\", \"Released\" : 2010 }\n```\n\n同样，您可以使用\
  \ `$lt`（小于）参数来查找集合中早于 1999 年的项目：\n\n```javascript\ndb.media.find ( { Released :\
  \ {$lt : 1999 } }, { \"Cast\" : 0 } )\n```\n\n```json\n{ \"_id\" : ObjectId(\"4c436969c603000000007ed2\"\
  ), \"Type\" : \"DVD\", \"Title\" : \"Blade Runner\", \"Released\" : 1982 }\n```\n\
  \n您也可以使用 `$lte`（小于或等于）参数获取早于或等于 1999 年的项目列表：\n\n```javascript\ndb.media.find( {Released\
  \ : {$lte: 1999}}, { \"Cast\" : 0 })\n```\n\n```json\n{ \"_id\" : ObjectId(\"4c43694bc603000000007ed1\"\
  ), \"Type\" : \"DVD\", \"Title\" :\n\"Matrix, The\", \"Released\" : 1999 }\n{ \"\
  _id\" : ObjectId(\"4c436969c603000000007ed2\"), \"Type\" : \"DVD\", \"Title\" :\n\
  \"Blade Runner\", \"Released\" : 1982 }\n```\n\n您还可以组合这些参数来指定一个范围：\n\n```javascript\n\
  db.media.find( {Released : {$gte: 1990, $lt : 2010}}, { \"Cast\" : 0 })\n```\n\n\
  ```json\n{ \"_id\" : ObjectId(\"4c43694bc603000000007ed1\"), \"Type\" : \"DVD\"\
  , \"Title\" :\n\"Matrix, The\", \"Released\" : 1999 }\n```\n\n这些参数可能看起来相对简单；但是，在查询特定数据范围时，您会经常使用它们。\n\
  \n##### 检索除特定条件外的所有文档\n\n您可以使用 `$ne`（不等于）参数来检索集合中除符合特定条件之外的所有文档。例如，您可以使用此代码片段获取作者不是\
  \ Eelco Plugge 的所有书籍列表：\n\n```javascript\ndb.media.find( { Type : \"Book\", Author:\
  \ {$ne : \"Plugge, Eelco\"}})\n```\n\n##### 指定一个匹配值数组\n\n您可以使用 `$in` 操作符指定一个可能匹配的数组。其\
  \ SQL 等价物是 `IN` 操作符。\n\n您可以使用以下代码片段，通过 `$in` 操作符从媒体集合中检索数据：\n\n```javascript\ndb.media.find(\
  \ {Released : {$in : [1999,2008,2009] } }, { \"Cast\" : 0 } )\n```\n\n```json\n\
  { \"_id\" : ObjectId(\"4c43694bc603000000007ed1\"), \"Type\" : \"DVD\", \"Title\"\
  \ : \"Matrix, The\", \"Released\" : 1999 }\n```\n\n此示例仅返回一个项目，因为只有一个项目匹配发行年份 1999，并且没有匹配\
  \ 2008 年和 2009 年的项目。\n\n##### 查找值不在数组中的文档\n\n`$nin` 操作符的功能与 `$in` 操作符类似，但它搜索指定字段值不在指定数组中的对象：\n\
  \n```javascript\ndb.media.find( {Released : {$nin : [1999,2008,2009] },Type : \"\
  DVD\" } ,\n{ \"Cast\" : 0 } )\n```\n\n```json\n{ \"_id\" : ObjectId(\"4c436969c603000000007ed2\"\
  ), \"Type\" : \"DVD\", \"Title\" :\n\"Blade Runner\", \"Released\" : 1982 }\n{ \"\
  _id\" : ObjectId(\"4c4369a3c603000000007ed3\"), \"Type\" : \"DVD\", \"Title\" :\n\
  \"Toy Story 3\", \"Released\" : 2010 }\n```\n\n##### 匹配文档中的所有属性\n\n`$all` 操作符的功能也与\
  \ `$in` 操作符类似。然而，`$all` 要求文档中的所有属性都匹配，而 `$in` 操作符只需一个属性匹配即可。让我们看一个说明这些差异的例子。首先，这是一个使用\
  \ `$in` 的例子：\n\n```javascript\ndb.media.find ( { Released : {$in : [\"2010\",\"\
  2009\"] } }, { \"Cast\" : 0 } )\n```\n\n```json\n{ \"_id\" : ObjectId(\"4c4369a3c603000000007ed3\"\
  ), \"Type\" : \"DVD\", \"Title\" :\n\"Toy Story 3\", \"Released\" : 2010 }\n```\n\
  \n对于 `$in` 操作符，返回了一个文档，因为存在 2010 年的匹配项，但没有 2009 年的匹配项。然而，`$all` 参数不返回任何结果，因为没有匹配的文档同时包含\
  \ 2009 年的值：\n\n```javascript\ndb.media.find ( { Released : {$all : [\"2010\",\"\
  2009\"] } }, { \"Cast\" : 0 } )\n```\n\n##### 在文档中搜索多个表达式\n\n您可以使用 `$or` 操作符在单个查询中搜索多个表达式，其中只需一个条件匹配即可返回给定文档。与\
  \ `$in` 操作符不同，`$or` 允许您同时指定键和值，而不仅仅是值：\n\n```javascript\ndb.media.find({ $or : [\
  \ { \"Title\" : \"Toy Story 3\" }, { \"ISBN\" :\n\"987-1-4302-3051-9\" } ] } )\n\
  ```\n\n```json\n{ \"_id\" : ObjectId(\"4c5fc7d8db290000000067c5\"), \"Type\" : \"\
  Book\", \"Title\" :\n\"Definitive Guide to MongoDB, The\", \"ISBN\" : \"987-1-4302-3051-9\"\
  \ ,\n\"Publisher\" : \"Apress\", \"Author\" : [\"Hows, David\", \"Membrey, Peter\"\
  , \"Plugge, Eelco\" ,\n\"Hawkins, Tim\" ] }\n{ \"_id\" : ObjectId(\"4c5fc943db290000000067ca\"\
  ), \"Type\" : \"DVD\", \"Title\" :\n\"Toy Story 3\", \"Released\" : 2010 }\n```\n\
  \n也可以将 `$or` 操作符与另一个查询参数结合使用。这将把返回的文档限制为那些匹配第一个查询（必需的）以及 `$or` 操作符上指定的两个键/值对中任意一个的文档，如下例所示：\n\
  \n```javascript\ndb.media.find({ \"Type\" : \"DVD\", $or : [ { \"Title\" : \"Toy\
  \ Story 3\" }, {\n\"ISBN\" : \"987-1-4302-3051-9\" } ] })\n```\n\n```json\n{ \"\
  _id\" : ObjectId(\"4c5fc943db290000000067ca\"), \"Type\" : \"DVD\", \"Title\" :\n\
  \"Toy Story 3\", \"Released\" : 2010 }\n```\n\n可以说，`$or` 操作符允许您同时执行两个查询，将两个原本不相关的查询结果组合在一起。\n\
  \n\n\n##### 使用 $slice 检索文档\n\n你可以使用 `$slice` 操作符来检索文档，该操作符可以从文档中的数组中返回一个特定范围的元素。如果你想限制返回的项目数量以节省带宽，这会特别有用。该操作符还可以让你按每页\
  \ n 个项目检索结果，此功能通常被称为分页。\n\n理论上，`$slice` 操作符结合了 `limit()` 和 `skip()` 函数的功能；然而，`limit()`\
  \ 和 `skip()` 不能对数组操作，而 `$slice` 可以。该操作符接受两个参数；第一个指示要返回的项目总数。第二个参数是可选的；如果使用，它确保第一个参数定义偏移量，而第二个定义限制量。限制参数也可以表示负数条件。\n\
  \n以下示例将 `Cast` 列表中的项目限制为前三项：\n\n```javascript\n> db.media.find({\"Title\" : \"Matrix,\
  \ The\"}, {\"Cast\" : {$slice: 3}})\n{ \"_id\" : ObjectId(\"4c5fcd3edb290000000067cb\"\
  ), \"Type\" : \"DVD\", \"Title\" : \"Matrix, The\", \"Released\" : 1999, \"Cast\"\
  \ : [ \"Keanu Reeves\", \"Carrie-Anne Moss\", \"Laurence Fishburne\" ] }\n```\n\n\
  通过将整数设为负数，你也可以只获取最后三项：\n\n```javascript\n> db.media.find({\"Title\" : \"Matrix,\
  \ The\"}, {\"Cast\" : {$slice: -3}})\n{ \"_id\" : ObjectId(\"4c5fcd3edb290000000067cb\"\
  ), \"Type\" : \"DVD\", \"Title\" : \"Matrix, The\", \"Released\" : 1999, \"Cast\"\
  \ : [ \"Hugo Weaving\", \"Gloria Foster\", \"Joe Pantoliano\" ] }\n```\n\n或者，你可以跳过前两项，并从那个特定点开始将结果限制为三项（请特别注意括号）：\n\
  \n```javascript\n> db.media.find({\"Title\" : \"Matrix, The\"}, {\"Cast\" : {$slice:\
  \ [2,3] }})\n{ \"_id\" : ObjectId(\"4c5fcd3edb290000000067cb\"), \"Type\" : \"DVD\"\
  , \"Title\" : \"Matrix, The\", \"Released\" : 1999, \"Cast\" : [ \"Laurence Fishburne\"\
  , \"Hugo Weaving\", \"Gloria Foster\" ] }\n```\n\n最后，当指定一个负整数时，你可以跳到最后五个项目，并将结果限制为四个，如下例所示：\n\
  \n```javascript\n> db.media.find({\"Title\" : \"Matrix, The\"}, {\"Cast\" : {$slice:\
  \ [-5,4] }})\n{ \"_id\" : ObjectId(\"4c5fcd3edb290000000067cb\"), \"Type\" : \"\
  DVD\", \"Title\" : \"Matrix, The\", \"Released\" : 1999, \"Cast\" : [ \"Carrie-Anne\
  \ Moss\",\"Laurence Fishburne\",\"Hugo Weaving\",\"Gloria Foster\"] }\n```\n\n**注意**\n\
  从 2.4 版本开始，MongoDB 也为 `$push` 操作引入了 `$slice` 操作符，允许你在向数组追加值时限制数组元素的数量。本章后面会讨论这个操作符。但是，请不要混淆两者。\n\
  \n##### 搜索奇数/偶数整数\n\n`$mod` 操作符允许你搜索由偶数或奇数组成的特定数据。这是因为该操作符对 `2` 取模并检查余数是否为 `0`，从而只提供偶数结果。\n\
  \n例如，以下代码返回集合中任何 `Released` 字段设置为偶数整数的项目：\n\n```javascript\n> db.media.find ( {\
  \ Released : { $mod: [2,0] } }, {\"Cast\" : 0 } )\n{ \"_id\" : ObjectId(\"4c45b5c18e0f0000000062aa\"\
  ), \"Type\" : \"DVD\", \"Title\" : \"Blade Runner\", \"Released\" : 1982 }\n{ \"\
  _id\" : ObjectId(\"4c45b5df8e0f0000000062ab\"), \"Type\" : \"DVD\", \"Title\" :\
  \ \"Toy Story 3\", \"Released\" : 2010 }\n```\n\n同样地，你可以通过更改 `$mod` 中的参数来查找 `Released`\
  \ 字段中包含奇数值的任何文档，如下所示：\n\n```javascript\n> db.media.find ( { Released : { $mod: [2,1]\
  \ } }, { \"Cast\" : 0 } )\n{ \"_id\" : ObjectId(\"4c45b5b38e0f0000000062a9\"), \"\
  Type\" : \"DVD\", \"Title\" : \"Matrix, The\", \"Released\" : 1999 }\n```\n\n**注意**\n\
  `$mod` 操作符仅适用于整数值，不适用于包含数字值的字符串。例如，你不能在 `{ Released : \"2010\" }` 上使用该操作符，因为它在引号中，因此是字符串。\n\
  \n##### 使用 $size 过滤结果\n\n`$size` 操作符允许你筛选结果以匹配具有指定元素数量的数组。例如，你可以使用此操作符搜索那些正好有两首歌的\
  \ CD：\n\n```javascript\n> db.media.find ( { Tracklist : {$size : 2} } )\n{ \"_id\"\
  \ : ObjectId(\"4c1a86bb2955000000004076\"), \"Type\" : \"CD\", \"Artist\" : \"Nirvana\"\
  , \"Title\" : \"Nevermind\", \"Tracklist\" : [\n        {\n                \"Track\"\
  \ : \"1\",\n                \"Title\" : \"Smells Like Teen Spirit\",\n         \
  \       \"Lenght\" : \"5:02\"\n        },\n        {\n                \"Track\"\
  \ : \"2\",\n                \"Title\" : \"In Bloom\",\n                \"Length\"\
  \ : \"4:15\"\n        }\n] }\n```\n\n**注意**\n你不能使用 `$size` 操作符来查找一定范围的大小。例如，你不能用它来查找包含一个以上元素的数组。\n\
  \n##### 返回特定字段对象\n\n`$exists` 操作符允许你根据指定字段是否存在来返回特定对象。以下示例返回集合中所有具有名为 `Author` 的键的项目：\n\
  \n```javascript\n> db.media.find ( { Author : {$exists : true } } )\n```\n\n类似地，如果你使用值\
  \ `false` 调用此操作符，那么将返回所有没有名为 `Author` 的键的文档：\n\n```javascript\n> db.media.find (\
  \ { Author : {$exists : false } } )\n```\n\n**警告**\n目前，`$exists` 操作符无法使用索引；因此，使用它需要进行全表扫描。\n\
  \n##### 基于 BSON 类型匹配结果\n\n`$type` 操作符允许你根据 BSON 类型匹配结果。例如，以下代码片段让你查找所有具有类型为 `内嵌对象`（即包含信息列表）的曲目列表的项目：\n\
  \n```javascript\n> db.media.find ( { Tracklist: { $type : 3 } } )\n{ \"_id\" : ObjectId(\"\
  4c1a86bb2955000000004076\"), \"Type\" : \"CD\", \"Artist\" : \"Nirvana\", \"Title\"\
  \ : \"Nevermind\", \"Tracklist\" : [\n        {\n                \"Track\" : \"\
  1\",\n                \"Title\" : \"Smells Like Teen Spirit\",\n               \
  \ \"Lenght\" : \"5:02\"\n        },\n        {\n                \"Track\" : \"2\"\
  ,\n                \"Title\" : \"In Bloom\",\n                \"Length\" : \"4:15\"\
  \n        }\n] }\n```\n\n已知的数据类型定义在表 4-1 中。\n\n**表 4-1. 已知的 BSON 类型及代码**\n\n| 代码\
  \ | 数据类型 |\n| --- | --- |\n| –1 | MiniKey |\n| 1 | 双精度浮点数 |\n| 2 | 字符串 (UTF8) |\n\
  | 3 | 内嵌对象 |\n| 4 | 内嵌数组 |\n| 5 | 二进制数据 |\n| 7 | 对象 ID |\n| 8 | 布尔类型 |\n| 9 | 日期类型\
  \ |\n| 10 | 空类型 |\n| 11 | 正则表达式 |\n| 13 | JavaScript 代码 |\n| 14 | 符号 |\n| 15 | 带作用域的\
  \ JavaScript 代码 |\n| 16 | 32 位整数 |\n| 17 | 时间戳 |\n| 18 | 64 位整数 |\n| 127 | MaxKey\
  \ |\n| 255 | MinKey |\n\n\n\n###### 匹配整个数组\n\n如果你想在文档中匹配整个数组，可以使用 `$elemMatch` 操作符。这在你的集合中包含多个文档、且其中一些文档拥有部分相同信息时尤为有用。这可能导致默认查询无法准确找到你想要的那个文档。这是因为标准查询语法不会将自己限制在数组内的单个文档中。\n\
  \n让我们看一个说明此原理的例子。为了让它生效，我们需要向集合中添加另一个文档，该文档包含一个相同的项目，但在其他方面有所不同。具体来说，我们将添加另一张 Nirvana\
  \ 的 CD，它恰好包含与前述 CD 相同的曲目（“Smells Like Teen Spirit”）。然而，在这个版本的 CD 中，这首歌是第 5 首，而不是第\
  \ 1 首：\n\n```json\n{\n        \"Type\" : \"CD\",\n        \"Artist\" : \"Nirvana\"\
  ,\n        \"Title\" : \"Nirvana\",\n        \"Tracklist\" : [\n               \
  \ {\n                        \"Track\" : \"1\",\n                        \"Title\"\
  \ : \"You know you're right\",\n                        \"Length\" : \"3:38\"\n\
  \                },\n                {\n                       \"Track\" : \"5\"\
  ,\n                       \"Title\" : \"Smells like teen spirit\",\n           \
  \            \"Length\" : \"5:02\"\n                }\n        ]\n}\n```\n\n```javascript\n\
  nirvana = ( { \"Type\" : \"CD\", \"Artist\" : \"Nirvana\", \"Title\" : \"Nirvana\"\
  ,\n\"Tracklist\" : [ { \"Track\" : \"1\", \"Title\" : \"You Know You're Right\"\
  , \"Length\"\n: \"3:38\"}, {\"Track\" : \"5\", \"Title\" : \"Smells Like Teen Spirit\"\
  , \"Length\" :\n\"5:02\" } ] } )\ndb.media.insert(nirvana)\n```\n\n如果你想搜索一张 Nirvana\
  \ 的专辑，其歌曲“Smells Like Teen Spirit”是 CD 上的第一首曲目，你可能会认为以下查询可以完成这项工作：\n\n```javascript\n\
  db.media.find ( { \"Tracklist.Title\" : \"Smells Like Teen Spirit\",\n\"Tracklist.Track\"\
  \ : \"1\" } )\n```\n\n不幸的是，前面的查询将返回两个文档。原因是两个文档都有一首标题为“Smells Like Teen Spirit”的曲目，并且都有一首曲目编号为\
  \ 1。如果你想匹配数组内的整个文档，可以使用 `$elemMatch`，如下例所示：\n\n```javascript\ndb.media.find ( {\
  \ Tracklist: { \"$elemMatch\" : { Title:\n\"Smells like teen spirit\", Track : \"\
  1\" } } } )\n```\n\n查询结果：\n```json\n{ \"_id\" : ObjectId(\"4c1a86bb2955000000004076\"\
  ), \"Type\" : \"CD\", \"Artist\" :\n\"Nirvana\", \"Title\" : \"Nevermind\", \"Tracklist\"\
  \ : [\n        {\n                \"Track\" : \"1\",\n                \"Title\"\
  \ : \"Smells Like Teen Spirit\",\n                \"Lenght\" : \"5:02\"\n      \
  \  },\n        {\n                \"Track\" : \"2\",\n                \"Title\"\
  \ : \"In Bloom\",\n                \"Length\" : \"4:15\"\n        }\n] }\n```\n\n\
  此查询得到了预期的结果，只返回了第一个文档。\n\n###### $not（元操作符）\n\n你可以使用 `$not` 元操作符来对任何由标准操作符执行的检查进行否定。以下示例返回集合中除在\
  \ `$elemMatch` 示例中看到的那个文档之外的所有文档：\n\n```javascript\ndb.media.find ( { Tracklist\
  \ : { $not : { \"$elemMatch\" : { Title:\n\"Smells Like Teen Spirit\", \"Track\"\
  \ : \"1\" } } } } )\n```\n\n###### 指定额外的查询表达式\n\n除了你迄今为止看到的结构化查询语法之外，你还可以在 JavaScript\
  \ 中指定额外的查询表达式。这样做的最大优势是 JavaScript 极其灵活，允许你做大量额外的事情。使用 JavaScript 的缺点是，它比 MongoDB\
  \ 内置的原生操作符稍慢一些。\n\n例如，假设你想在集合中搜索一张 1995 年以前发行的 DVD。以下所有代码示例都将返回此信息：\n\n```javascript\n\
  db.media.find ( { \"Type\" : \"DVD\", \"Released\" : { $lt : 1995 } } )\n\ndb.media.find\
  \ ( { \"Type\" : \"DVD\", $where: \"this.Released < 1995\" } )\n\ndb.media.find\
  \ (\"this.Released < 1995\")\n\nf = function() { return this.Released < 1995 }\n\
  \ndb.media.find(f)\n```\n\n这就是 MongoDB 的灵活性所在！使用这些操作符应该能让你在所有集合中找到几乎任何东西。\n\n#####\
  \ 利用正则表达式\n\n正则表达式是你可以用来查询信息的另一个强大工具。正则表达式（简称 regex）是特殊的文本字符串，可用于描述你的搜索模式。它们的工作原理很像通配符，但功能更强大且更灵活。\n\
  \nMongoDB 允许你在搜索集合中的数据时使用这些正则表达式；然而，对于简单的前缀查询，它会尽可能尝试使用索引。\n\n以下示例在查询中使用正则表达式来查找媒体集合中所有以单词“Matrix”开头的项目：\n\
  \n```javascript\ndb.media.find ( { Title : /Matrix*/i } )\n```\n\n使用 MongoDB 的正则表达式可以让你的工作简单得多，因此我们建议你在时间允许或情况允许的情况下，更详细地探索此功能。\n\
  \n### 更新数据\n\n到目前为止，你已经学习了如何在数据库中插入和查询数据。接下来，你将学习如何更新这些数据。MongoDB 支持相当多的更新操作符，你将在以下部分学习如何使用它们。\n\
  \n##### 使用 update() 更新\n\nMongoDB 提供了 `update()` 函数来执行数据更新。`update()` 函数接受三个主要参数：`criteria`、`objNew`\
  \ 和 `options`。\n\n`criteria` 参数让你指定选择要更新记录的查询。你使用 `objNew` 参数来指定更新后的信息；或者你可以使用一个操作符来为你完成此操作。`options`\
  \ 参数让你在更新文档时指定选项，有两个可能的值：`upsert` 和 `multi`。`upsert` 选项让你指定更新是否应为 upsert——也就是说，它告诉\
  \ MongoDB 如果记录存在则更新它，如果不存在则创建它。最后，`multi` 选项让你指定是否应更新所有匹配的文档，还是只更新第一个（默认操作）。\n\n\
  以下简单示例使用 `update()` 函数，没有使用任何花哨的操作符：\n\n```javascript\ndb.media.update( { \"Title\"\
  \ : \"Matrix, The\"}, {\"Type\" : \"DVD\", \"Title\" :\n\"Matrix, The\", \"Released\"\
  \ : 1999, \"Genre\" : \"Action\"}, { upsert: true} )\n```\n\n此示例覆盖了集合中的文档，并使用指定的新值保存。请注意，你省略的任何字段都会被删除（文档基本上是被重写了）。因为\
  \ `upsert` 参数被指定为 `true`，所以任何尚不存在的字段将被添加（本例中是 `Genre` 键/值对）。\n\n万一碰巧有多个文档匹配条件，并且你希望全部\
  \ upsert，可以在使用 `$set` 修改操作符时添加 `upsert` 和 `multi` 选项，如下所示：\n\n```javascript\ndb.media.update(\
  \ { \"Title\" : \"Matrix, The\"}, {$set: {\"Type\" : \"DVD\", \"Title\" :\n\"Matrix,\
  \ The\", \"Released\" : 1999, \"Genre\" : \"Action\"} }, {upsert: true, multi: true}\
  \ )\n```\n\n> 注意：`upsert` 告诉数据库“如果文档存在则更新记录，如果不存在则插入记录”。\n\n\n\n#### 使用 `save()`\
  \ 命令实现更新插入\n\n你也可以使用 `save()` 命令执行更新插入操作。为此，你需要指定 `_id` 值；你可以让系统自动添加此值，也可以自己手动指定。如果你不指定\
  \ `_id` 值，`save()` 命令会将其视为插入操作，并直接将文档添加到你的集合中。\n\n使用 `save()` 命令的主要好处是，你不需要像结合使用\
  \ `update()` 命令那样，去指定必须使用 `upsert` 方法。因此，`save()` 命令为你提供了一种更快速的方式来更新插入数据。实际上，`save()`\
  \ 和 `update()` 命令看起来很相似：\n\n```\n> db.media.update( { \"Title\" : \"Matrix, The\"\
  }, {\"Type\" : \"DVD\", \"Title\" :\n\"Matrix, The\", \"Released\" : \"1999\", \"\
  Genre\" : \"Action\"}, { upsert: true} )\n```\n\n```\n> db.media.save( { \"Title\"\
  \ : \"Matrix, The\"}, {\"Type\" : \"DVD\", \"Title\" :\n\"Matrix, The\", \"Released\"\
  \ : \"1999\", \"Genre\" : \"Action\"})\n```\n\n显然，这个例子假设 `Title` 值充当了 `id` 字段的角色。\n\
  \n#### 自动更新信息\n\n你可以使用修改器操作来快速、简便地更新文档中的信息，而无需手动输入所有内容。例如，你可以使用这些操作来增加一个数字或从数组中移除一个元素。\n\
  \n接下来我们将探索这些操作符，提供实际示例来展示如何使用它们。\n\n##### 使用 `$inc` 递增值\n\n`$inc` 操作符让你对一个键执行（原子）更新，按给定的增量增加其值，前提是该字段存在。如果字段不存在，它将被创建。为了演示其效果，首先向集合中添加另一个文档：\n\
  \n```\n> manga = ( { \"Type\" : \"Manga\", \"Title\" : \"One Piece\", \"Volumes\"\
  \ : 612,\n\"Read\" : 520 } )\n{\n        \"Type\" : \"Manga\",\n        \"Title\"\
  \ : \"One Piece\",\n        \"Volumes\" : \"612\",\n        \"Read\" : \"520\"\n\
  }\n> db.media.insert(manga)\n```\n\n现在你已准备好更新文档。例如，假设你又阅读了四卷《海贼王》漫画，并希望在文档中增加 `Read`\
  \ 卷数。以下示例展示了如何操作：\n\n```\n> db.media.update ( { \"Title\" : \"One Piece\"}, {$inc:\
  \ {\"Read\" : 4} } )\n> db.media.find ( { \"Title\" : \"One Piece\" } )\n{\n   \
  \     \"Type\" : \"Manga\",\n        \"Title\" : \"One Piece \",\n        \"Volumes\"\
  \ : \"612\",\n        \"Read\" : \"524\"\n}\n```\n\n##### 设置字段的值\n\n你可以使用 `$set`\
  \ 操作符将一个字段的值设置为你指定的值。这适用于任何数据类型，如下例所示：\n\n```\n> db.media.update ( { \"Title\" :\
  \ \"Matrix, The\" }, {$set : { Genre :\n\"Sci-Fi\" } } )\n```\n\n这段代码会更新之前创建的文档中的流派（Genre），将其设置为\
  \ `Sci-Fi`。\n\n##### 删除指定字段\n\n`$unset` 操作符让你删除给定的字段，如本例所示：\n\n```\n> db.media.update\
  \ ( {\"Title\": \"Matrix, The\"}, {$unset : { \"Genre\" : 1 } } )\n```\n\n这段代码会从文档中删除\
  \ `Genre` 键及其对应的值。\n\n##### 向指定字段追加值\n\n`$push` 操作符允许你向指定字段追加一个值。如果该字段是一个现有的数组，则该值将被添加进去。如果该字段尚不存在，则该字段将被设置为数组值。如果该字段已存在但不是数组，则会引发错误。\n\
  \n首先，向你的集合条目中添加另一位作者：\n\n```\n> db.media.update ( {\"ISBN\" : \"978-1-4302-5821-6\"\
  }, {$push: { Author : \"Griffin,\nStewie\"} } )\n```\n\n下一段代码会引发错误消息，因为 `Title`\
  \ 字段不是数组：\n\n```\n> db.media.update ( {\"ISBN\" : \"978-1-4302-5821-6\"}, {$push:\
  \ { Title :\n\"This isn't an array\"} } )\nCannot apply $push/$pushAll modifier\
  \ to non-array\n```\n\n以下示例显示了此时文档的样子：\n\n```\n> db.media.find ( { \"ISBN\" : \"\
  978-1-4302-5821-6\" } )\n{\n    \"Author\" :\n    [\n        \"Hows, David\",\n\
  \        \"Membrey, Peter\",\n        \"Plugge, Eelco\",\n        \"Griffin, Stewie\"\
  ,\n    ],\n    \"ISBN\" : \"978-1-4302-5821-6\",\n    \"Publisher\" : \"Apress\"\
  ,\n    \"Title\" : \"Definitive Guide to MongoDB 2nd ed., The\",\n    \"Type\" :\
  \ \"Book\",\n    \"_id\" : ObjectId(\"4c436231c603000000007ed0\")\n}\n```\n\n#####\
  \ 在数组中指定多个值\n\n使用数组时，`$push` 操作符会将指定的值追加到给定数组中，扩展该元素内存储的数据。如果你希望向给定数组添加多个单独的值，可以使用可选的\
  \ `$each` 修饰符，如本例所示：\n\n```\n> db.media.update( { \"ISBN\" : \"978-1-4302-5821-6\"\
  \ }, { $push: { Author : { $each: [\"Griffin, Peter\", \"Griffin, Brian\"] } } }\
  \ )\n{\n    \"Author\" :\n    [\n        \"Hows, David\",\n        \"Membrey, Peter\"\
  ,\n        \"Plugge, Eelco\",\n        \"Hawkins, Tim\",\n        \"Griffin, Stewie\"\
  ,\n        \"Griffin, Peter\",\n        \"Griffin, Brian\"\n    ],\n    \"ISBN\"\
  \ : \"978-1-4302-5821-6\",\n    \"Publisher\" : \"Apress\",\n    \"Title\" : \"\
  Definitive Guide to MongoDB 2nd ed., The\",\n    \"Type\" : \"Book\",\n    \"_id\"\
  \ : ObjectId(\"4c436231c603000000007ed0\")\n}\n```\n\n你也可以选择在使用 `$each` 时使用 `$slice`\
  \ 操作符。这允许你在 `$push` 操作期间限制数组中的元素数量。`$slice` 接受一个负数或零。使用负数可确保数组中只保留最后 n 个元素，而使用零则会清空数组。请注意，`$slice`\
  \ 操作符必须是 `$push` 操作符的第一个修饰符才能发挥作用：\n\n```\n> db.media.update( { \"ISBN\" : \"978-1-4302-5821-6\"\
  \ }, { $push: { Author : { $each: [\"Griffin, Meg\", \"Griffin, Louis\"], $slice:\
  \ -2 } } } )\n{\n    \"Author\" :\n    [\n        \"Griffin, Meg\",\n        \"\
  Griffin, Louis\"\n],\n    \"ISBN\" : \"978-1-4302-5821-6\",\n    \"Publisher\" :\
  \ \"Apress\",\n    \"Title\" : \"Definitive Guide to MongoDB 2nd ed., The\",\n \
  \   \"Type\" : \"Book\",\n    \"_id\" : ObjectId(\"4c436231c603000000007ed0\")\n\
  }\n```\n\n如你所见，`$slice` 操作符确保不仅推入了两个新值，数组中保留的数据也被限制在指定的值（两个）。当使用固定大小的数组时，`$slice`\
  \ 操作符可能是一个宝贵的工具。\n\n##### 使用 `$addToSet` 向数组添加数据\n\n`$addToSet` 是另一个可以让你向数组添加数据的命令。但是，此操作符仅在数据尚不存在时才将其添加到数组中。因此，`$addToSet`\
  \ 不同于 `$push`。默认情况下，`$addToSet` 操作符接受一个参数。但是，你可以在使用 `$addToSet` 时使用 `$each` 操作符来指定额外的参数。以下代码段将作者\
  \ `Griffin, Brian` 添加到作者数组中，因为它之前不存在：\n\n```\n> db.media.update( { \"ISBN\" : \"\
  1-4302-3051-7\" }, {$addToSet : { Author :\n\"Griffin, Brian\" } } )\n```\n\n再次执行该代码段不会有任何变化，因为该作者已在数组中。\n\
  \n但是，要添加多个值，你应该采取不同的方法，同样使用 `$each` 操作符：\n\n```\n> db.media.update( { \"ISBN\" :\
  \ \"1-4302-3051-7\" }, {$addToSet : { Author :\n{ $each : [\"Griffin, Brian\",\"\
  Griffin, Meg\"] } } } )\n```\n\n此时，我们那个曾经看起来整洁可靠的文档，已被转换成类似这样：\n\n```\n{\n    \"\
  Author\" :\n    [\n        \"Hows, David\",\n        \"Membrey, Peter\",\n     \
  \   \"Plugge, Eelco\",\n        \"Hawkins, Tim\",\n        \"Griffin, Stewie\",\n\
  \        \"Griffin, Peter\",\n        \"Griffin, Brian\",\n        \"Griffin, Louis\"\
  ,\n        \"Griffin, Meg\"\n    ],\n    \"ISBN\" : \"1-4302-3051-7\",\n    \"Publisher\"\
  \ : \"Apress\",\n    \"Title\" : \"Definitive Guide to MongoDB, The\",\n    \"Type\"\
  \ : \"Book\",\n    \"_id\" : ObjectId(\"4c436231c603000000007ed0\")\n}\n```\n\n\n\
  #### 从数组中移除元素\n\nMongoDB 还包含几种用于从数组中移除元素的方法，包括 `$pop`、`$pull` 和 `$pullAll`。在接下来的章节中，你将学习如何使用这些方法从数组中移除元素。\n\
  \n`$pop` 操作符允许你从数组中移除单个元素。根据你传递给它的参数，该操作符可以移除数组的第一个或最后一个值。例如，以下代码段移除了数组的最后一个元素：\n\
  \n```\n> db.media.update( { \"ISBN\" : \"1-4302-3051-7\" }, {$pop : {Author : 1\
  \ } } )\n```\n\n在这种情况下，`$pop` 操作符会从作者列表中弹出 Meg 的名字。传递一个负数会移除数组的第一个元素。以下示例从作者列表中移除了\
  \ Peter Membrey 的名字：\n\n```\n> db.media.update( { \"ISBN\" : \"1-4302-3051-7\" },\
  \ {$pop : {Author : -1 } } )\n```\n\n注意\n\n指定一个值如 `-2` 或 `1000` 不会改变移除哪个元素。任何负数都会移除第一个元素，而任何正数都会移除最后一个元素。使用数字\
  \ `0` 会移除数组的最后一个元素。\n\n##### 移除指定值的每次出现\n\n`$pull` 操作符允许你从数组中移除指定值的每次出现。如果你的数组中有多个值相同的元素，这可能特别有用。让我们首先使用\
  \ `$push` 操作符将 Stewie 添加回作者列表来开始这个示例：\n\n```\n> db.media.update ( {\"ISBN\" : \"\
  1-4302-3051-7\"}, {$push: { Author :\"Griffin, Stewie\"} } )\n```\n\n在我们逐步讲解本书示例的过程中，Stewie\
  \ 会在数据库中进出几次。你可以使用以下代码从文档中移除该作者的所有出现：\n\n```\n> db.media.update ( {\"ISBN\" : \"\
  1-4302-3051-7\"}, {$pull : { Author : \"Griffin, Stewie\" } } )\n```\n\n##### 从数组中移除多个元素\n\
  \n你还可以从数组中移除多个不同值的元素。`$pullAll` 操作符使你能够实现这一点。`$pullAll` 操作符接受一个包含你想要移除的所有元素的数组，如下例所示：\n\
  \n```\n> db.media.update( { \"ISBN\" : \"1-4302-3051-7\"}, {$pullAll : { Author\
  \ : [\"Griffin, Louis\",\"Griffin, Peter\",\"Griffin, Brian\"] } } )\n```\n\n你从中移除元素的字段（在前面的示例中是\
  \ `Author`）需要是一个数组。如果不是，你将收到一条错误消息。\n\n#### 指定匹配数组的位置\n\n你可以在查询中使用 `$` 操作符来指定查询中匹配数组项的位置。你可以在找到数组成员后使用此操作符进行数据操作。例如，假设你向曲目列表添加了另一条曲目，但输入曲目号时不小心出现了拼写错误：\n\
  \n```\n> db.media.update( { \"Title\" : \"Nirvana\" }, {$addToSet : { Tracklist\
  \ : {\"Track\" : 2,\"Title\": \"Been a Son\", \"Length\":\"2:23\"} } } )\n```\n\n\
  ```\n{\n    \"Artist\" : \"Nirvana\",\n    \"Title\" : \"Nirvana\",\n    \"Tracklist\"\
  \ : [\n        {\n                \"Track\" : \"1\",\n                \"Title\"\
  \ : \"You Know You're Right\",\n                \"Length\" : \"3:38\"\n        },\n\
  \        {\n                \"Track\" : \"5\",\n                \"Title\" : \"Smells\
  \ Like Teen Spirit\",\n                \"Length\" : \"5:02\"\n        },\n     \
  \   {\n                \"Track\" : 2,\n                \"Title\" : \"Been a Son\"\
  ,\n                \"Length\" : \"2:23\"\n        }\n    ],\n    \"Type\" : \"CD\"\
  ,\n    \"_id\" : ObjectId(\"4c443ad6c603000000007ed5\")\n}\n```\n\n碰巧你知道最新项目的曲目号应该是\
  \ `3` 而不是 `2`。你可以结合使用 `$inc` 方法和 `$` 操作符将值从 `2` 增加到 `3`，如下例所示：\n\n```\n> db.media.update(\
  \ { \"Tracklist.Title\" : \"Been a son\"},{$inc:{\"Tracklist.$.Track\" : 1} } )\n\
  ```\n\n请注意，只有它匹配到的第一个项目会被更新。因此，如果注释数组中有两个相同的元素，则只有第一个元素会被增加。\n\n#### 原子操作\n\nMongoDB\
  \ 支持针对单个文档执行的原子操作。原子操作是一组可以组合在一起的操作，使得这组操作对系统其余部分而言看起来仅仅是一个单一操作。这组操作作为最终结果要么具有积极的结果，要么具有消极的结果。\n\
  \n如果一组操作满足以下两个条件，你可以称其为原子操作：\n\n在整组操作完成之前，没有其他进程知道正在进行的更改。如果其中一个操作失败，整组操作（整个原子操作）将失败，导致完全回滚，其中数据恢复到运行原子操作之前的状态。\n\
  \n执行原子操作时的标准行为是数据将被锁定，因此其他查询无法访问。然而，MongoDB 出于多种原因不支持锁或复杂事务：\n\n*   在分片环境中（有关此类环境的更多信息，请参见第\
  \ 12 章），分布式锁可能既昂贵又缓慢。MongoDB 的目标是轻量且快速，因此昂贵和缓慢违背了这一原则。\n*   MongoDB 开发人员不喜欢死锁的想法。在他们看来，系统最好保持简单和可预测。\n\
  *   MongoDB 设计用于很好地处理实时问题。当执行锁定大量数据的操作时，它也会在较长一段时间内停止一些较小的轻量级查询。同样，这违背了 MongoDB\
  \ 追求速度的目标。\n\nMongoDB 包含多个更新操作符（如前所述），所有这些操作符都可以原子地更新一个元素：\n\n*   `$set`：设置特定值。\n\
  *   `$unset`：移除特定值。\n*   `$inc`：将特定值增加一定数量。\n*   `$push`：将值追加到数组。\n*   `$pull`：从现有数组中移除一个或多个值。\n\
  *   `$pullAll`：从现有数组中移除多个值。\n\n\n#### 使用当前值更新法\n\n原子更新采用的另一种策略是当前值更新法。该方法包含以下三个步骤：从文档中获取对象；在本地修改对象（使用前述任意操作或组合操作）；发送更新请求将对象更新为新值，前提是当前值仍与获取的旧值匹配。\n\
  \n你可以使用 `getlasterror` 方法检查操作是否全部顺利完成。注意所有这些步骤都是自动执行的。让我们重新查看之前展示过的一个示例：\n\n```\n\
  > db.media.update( { \"Tracklist.Title\" : \"Been a son\"},\n    {$inc:{\"Tracklist.$.Track\"\
  \ : 1} } )\n```\n\n现在你可以使用 `getlasterror` 命令来检查更新是否顺利进行：\n\n```\n> db.$cmd.findOne({getlasterror:1})\n\
  ```\n\n如果原子更新执行成功，你将获得如下结果：\n\n```\n{ \"err\" : null, \"updatedExisting\" : true,\
  \ \"n\" : 1, \"ok\" : 1 }\n```\n\n在这个例子中，你使用曲目列表标题作为标识符，对 `Tracklist.Track` 执行了递增操作。但现在考虑一种情况：如果在\
  \ MongoDB 修改你的数据期间，另一个用户使用相同方法更改了曲目列表数据。由于 `Tracklist.Title` 保持不变，你可能会错误地认为（不正确地）自己正在更新原始数据，而实际上你正在覆盖他人的更改。\n\
  \n这种情况被称为 ABA 问题（ABA problem）。虽然这种情形看似不太可能发生，但在多用户环境中，当多个应用程序同时操作数据时，这可能成为一个显著的问题。\n\
  \n为了避免此问题，你可以采取以下措施之一：\n*   在更新的查询表达式中使用整个对象，而不仅仅是 `_id` 和 `comments.by` 字段。\n*\
  \   使用 `$set` 来设置你关心的字段。即使其他字段发生变化，它们也不会因此受到影响。\n*   在对象中添加一个版本变量，并在每次更新时递增它。\n\
  *   在可能的情况下，使用 `$` 操作符，而不是一系列当前值更新操作。\n\n注意：MongoDB 不支持在单个操作中以原子方式更新多个文档。作为替代，你可以使用嵌套对象，这实际上使它们成为一个文档，从而实现原子性目的。\n\
  \n##### 原子性地修改并返回文档\n\n`findAndModify` 命令也允许你对文档执行原子更新。该命令会修改文档并将其返回。该命令接受三个主要操作符：`<query>`，用于指定你要针对其执行操作的文档；`<sort>`，用于在多个文档匹配时对匹配文档进行排序；`<operations>`，用于指定需要执行的操作。\n\
  \n现在让我们看几个说明如何使用此命令的示例。第一个示例查找你要搜索的文档，并在找到后立即将其移除：\n\n```\n> db.media.findAndModify(\
  \ { \"Title\" : \"One Piece\",sort:{\"Title\": -1}, remove:true} )\n{\n    \"_id\"\
  \ : ObjectId(\"4c445218c603000000007ede\"),\n    \"Type\" : \"Manga\",\n    \"Title\"\
  \ : \"One Piece\",\n    \"Volumes\" : 612,\n    \"Read\" : 524\n}\n```\n\n这段代码返回了它找到的、符合匹配条件的文档。在此情况下，它找到并移除了第一个标题为\
  \ \"One Piece\" 的条目。如果你现在执行 `find()` 函数，会看到该文档已不在集合中。\n\n下一个示例是修改文档而非移除它：\n\n```\n\
  > db.media.findAndModify( { query: { \"ISBN\" : \"987-1-4302-3051-9\" }, sort:{\"\
  Title\":-1}, update: {$set: {\"Title\" : \" Different Title\"} } } )\n```\n\n前面的示例将标题从\
  \ \"Definitive Guide to MongoDB\" 更新为 \"Different Title\" —— 并将旧文档（更新前的状态）返回到你的\
  \ shell。如果你更希望看到更新后的文档结果，可以在查询后添加 `new` 操作符：\n\n```\n> db.media.findAndModify( {\
  \ query: { \"ISBN\" : \"987-1-4302-3051-9\" }, sort:{\"Title\":-1}, update: {$set:\
  \ {\"Title\" : \" Different Title\"} }, new:true } )\n```\n\n请注意，你可以对此命令使用任何修饰符操作，而不仅仅是\
  \ `$set`。\n\n#### 重命名集合\n\n你可能会发现给集合命名错误，但已经向其中插入了一些数据。这可能导致需要删除并重新读取数据，非常麻烦。\n\n\
  作为替代，你可以使用 `renameCollection()` 函数来重命名现有集合。以下示例展示了如何使用这个简单直接的命令：\n\n```\n> db.media.renameCollection(\"\
  newname\")\n{ \"ok\" : 1 }\n```\n\n如果命令执行成功，将返回一个 `OK`。然而，如果失败（例如，集合不存在），则会返回以下消息：\n\
  \n```\n{ \"errmsg\" : \"assertion: source namespace does not exist\", \"ok\" : 0\
  \ }\n```\n\n`renameCollection` 命令不像你目前见过的某些命令那样需要很多参数；然而，在适当的情况下，它可能非常有用。\n\n####\
  \ 删除数据\n\n到目前为止，我们已经探讨了如何添加、搜索和修改数据。接下来，我们将研究如何删除文档、整个集合以及数据库本身。\n\n之前，你已经学习了如何从特定文档中删除数据（例如，使用\
  \ `$pop` 命令）。在本节中，你将学习如何删除完整的文档和集合。正如 `insert()` 函数用于插入，`update()` 用于修改文档一样，`remove()`\
  \ 用于删除文档。\n\n要从集合中删除单个文档，你需要指定用于查找该文档的条件。一个好的做法是先执行 `find()`；这确保了所使用的条件是针对你的文档的。一旦你确定了条件，就可以调用\
  \ `remove()` 函数，并将该条件作为参数：\n\n```\n> db.newname.remove( { \"Title\" : \"Different\
  \ Title\" } )\n```\n\n此语句会删除之前添加的书籍或集合中任何其他具有相同标题的项目。此语句会删除所有具有该标题的书籍，这也是为什么最好指定项目的\
  \ `_id` 值的原因——它始终是唯一的。\n\n或者，你可以使用以下代码片段从 `newname` 库中删除所有文档（记住，我们之前将 `media` 集合重命名为了这个）：\n\
  \n```\n> db.newname.remove({})\n```\n\n警告：删除文档时，你需要记住，对该文档的任何引用将保留在数据库中。因此，请务必手动删除或更新这些引用；否则，在求值时这些引用将返回\
  \ null。引用将在下一节中讨论。\n\n如果你想删除整个集合，可以使用 `drop()` 函数。以下代码片段删除了整个 `newname` 集合，包括其所有文档：\n\
  \n```\n> db.newname.drop()\ntrue\n```\n\n`drop()` 函数根据操作是否成功完成返回 `true` 或 `false`。同样地，如果你想从\
  \ MongoDB 中删除整个数据库，可以使用 `dropDatabase()` 函数，如下例所示：\n\n```\n> db.dropDatabase()\n\
  { \"dropped\" : \"library\", \"ok\" : 1 }\n```\n\n请注意，此代码片段将删除你当前正在使用的数据库（再次强调，请务必检查\
  \ `db` 以确认哪个是你的当前数据库）。\n\n\n\n#### 引用数据库\n\n至此，你又有了一个空数据库。你也已经熟悉了向集合中插入各种数据。现在，你已准备好更进一步，学习数据库引用。正如你已看到的，在许多情况下，将数据嵌入文档就足以满足你的应用程序需求（例如书籍条目中的曲目列表或作者列表）。然而，有时你确实需要引用另一个文档中的信息。接下来的章节将解释如何实现这一点。\n\
  \n正如在 SQL 中一样，MongoDB 中文档之间的引用是通过在服务器上执行额外的查询来解析的。MongoDB 为你提供了两种实现方式：手动引用它们，或使用\
  \ `DBRef` 标准（许多驱动程序也支持此标准）。\n\n##### 手动引用数据\n\n引用数据最简单直接的方式是手动操作。手动引用数据时，你通过完整 ID\
  \ 或更简洁的通用术语，将另一个文档的 `_id` 值存储在你的文档中。在继续示例之前，让我们添加一个新文档并在其中指定出版商信息（请特别注意 `_id` 字段）：\n\
  \n```\n> apress = ( { \"_id\" : \"Apress\", \"Type\" : \"Technical Publisher\",\
  \ \"Category\" :\n[\"IT\", \"Software\",\"Programming\"] } )\n{\n        \"_id\"\
  \ : \"Apress\",\n        \"Type\" : \"Technical Publisher\",\n        \"Category\"\
  \ : [\n                \"IT\",\n                \"Software\",\n                \"\
  Programming\"\n        ]\n}\n> db.publisherscollection.insert(apress)\n```\n\n一旦添加了出版商信息，你就可以将实际的文档（例如一本书的信息）添加到\
  \ `media` 集合中。以下示例添加了一个文档，指定 `Apress` 为出版商名称：\n\n```\n> book = ( { \"Type\" : \"\
  Book\", \"Title\" : \"Definitive Guide to MongoDB 2nd ed., The\",\n\"ISBN\" : \"\
  987-1-4302-5821-6\", \"Publisher\" : \"Apress\",\"Author\" : [\"Hows, David\",\"\
  \"Plugge, Eelco\",\"Membrey,Peter\",Hawkins, Tim\"] } )\n{\n        \"Type\" : \"\
  Book\",\n        \"Title\" : \"Definitive Guide to MongoDB 2nd ed., The\",\n   \
  \     \"ISBN\" : \"987-1-4302-5821-6\",\n        \"Publisher\": \"Apress\",\n  \
  \      \"Author\" : [\n                \"Hows, David\"\n                \"Membrey,\
  \ Peter\",\n                \"Plugge, Eelco\",\n                \"Hawkins, Tim\"\
  \n        ]\n}\n> db.media.insert(book)\n```\n\n所有你需要的信息已分别插入到 `publisherscollection`\
  \ 和 `media` 集合中。现在你可以开始使用数据库引用了。首先，将包含出版商信息的文档指定给一个变量：\n\n```\n> book = db.media.findOne()\n\
  {\n        \"_id\" : ObjectId(\"4c458e848e0f00000000628e\"),\n        \"Type\" :\
  \ \"Book\",\n        \"Title\" : \"Definitive Guide to MongoDB, The\",\n       \
  \ \"ISBN\" : \"987-1-4302-3051-9\",\n        \"Publisher\" : \"Apress\",\n     \
  \   \"Author\" : [\n                \"Hows, David\"\n                \"Membrey,\
  \ Peter\",\n                \"Plugge, Eelco\",\n                \"Hawkins, Tim\"\
  \n        ]\n}\n```\n\n要获取信息本身，你需要将 `findOne` 函数与一些点表示法结合起来：\n\n```\n> db.publisherscollection.findOne(\
  \ { _id : book.Publisher } )\n{\n        \"_id\" : \"Apress\",\n        \"Type\"\
  \ : \"Technical Publisher\",\n        \"Category\" : [\n                \"IT\",\n\
  \                \"Software\",\n                \"Programming\"\n        ]\n}\n\
  ```\n\n正如这个例子所示，手动引用数据是直截了当的，不需要太多脑力。这里，放在 `users` 集合中的文档的 `_id` 是手动设置的，并非由 MongoDB\
  \ 生成（否则，`_id` 会是一个对象 ID）。\n\n##### 使用 DBRef 引用数据\n\n`DBRef` 标准为文档间引用数据提供了更正式的规范。与手动引用相比，使用\
  \ `DBRef` 的主要原因是集合可以因文档而异。因此，如果你引用的集合始终是同一个，那么手动引用数据（如上所述）是可以的。\n\n使用 `DBRef` 时，数据库引用以一个标准的嵌入式（JSON/BSON）对象存储。拥有表示引用的标准方式意味着驱动程序和数据框架可以添加以标准方式操作引用的辅助方法。\n\
  \n添加 `DBRef` 引用值的语法如下所示：\n\n```\n{ $ref : <collectionname> , $id : <id value> [\
  \ , $db : <database name> ] }\n```\n\n这里，`<collectionname>` 代表所引用集合的名称（例如 `publisherscollection`）；`<id\
  \ value>` 代表你引用对象的 `_id` 字段值；可选的 `$db` 允许你引用放置在其他数据库中的文档。\n\n让我们从头看另一个使用 `DBRef`\
  \ 的例子。首先清空你的两个集合并添加一个新文档：\n\n```\n> db.publisherscollection.drop()\ntrue\n> db.media.drop()\n\
  true\n> apress = ( { \"Type\" : \"Technical Publisher\", \"Category\" :\n[\"IT\"\
  ,\"Software\",\"Programming\"] } )\n{\n        \"Type\" : \"Technical Publisher\"\
  ,\n        \"Category\" : [\n                \"IT\",\n                \"Software\"\
  ,\n                \"Programming\"\n        ]\n}\n> db.publisherscollection.save(apress)\n\
  ```\n\n到目前为止，你已经定义了变量 `apress` 并使用 `save()` 函数保存了它。接下来，通过输入其名称来显示变量的更新后内容：\n\n```\n\
  > apress\n{\n\"Type\" : \"Technical Publisher\",\n\"Category\" : [\n     \"IT\"\
  ,\n     \"Software\",\n     \"Programming\"\n],\n\"_id\" : ObjectId(\"4c4597e98e0f000000006290\"\
  )\n}\n```\n\n到目前为止，你已经定义了出版商并将其保存到 `publisherscollection` 集合中。现在你已准备好向媒体集合添加一个引用该数据的项目：\n\
  \n```\n> book = { \"Type\" : \"Book\", \"Title\" : \"Definitive Guide to MongoDB\
  \ 2nd ed., The\",\n\"ISBN\" : \"978-1-4302-5821-6\", \"Author\": [\"Hows, David\"\
  ,\"Membrey, Peter\",\"Plugge\",\n\"Eelco\",\"Hawkins, Tim\"], Publisher : [ new\
  \ DBRef ('publisherscollection',\napress._id) ] }\n{\n        \"Type\" : \"Book\"\
  ,\n        \"Title\" : \"Definitive Guide to MongoDB 2nd ed., The\",\n        \"\
  ISBN\" : \"987-1-4302-5821-6\",\n        \"Author\" : [\n                \"Hows,\
  \ David\"\n                \"Membrey, Peter\",\n                \"Plugge, Eelco\"\
  ,\n                \"Hawkins, Tim\"\n        ],\n        \"Publisher\" : [\n   \
  \             DBRef(\"publishercollection\", \"Apress\")\n        ]\n}\n> db.media.save(book)\n\
  ```\n\n就是这样！诚然，这个例子看起来比手动引用数据的方法稍微复杂一点；然而，对于集合可能因文档而异的情况，这是一个很好的替代方案。\n\n\n\n##\
  \ 实现索引相关功能\n\n在前一章中，你初步了解了索引能为数据库做些什么。现在，让我们简要学习如何创建和使用索引。索引的更详细讨论将在第 10 章展开，但目前我们先看看基础知识。MongoDB\
  \ 提供了相当多用于维护索引的函数；我们将从使用 `ensureIndex()` 函数创建一个索引开始。\n\n`ensureIndex()` 函数至少需要一个参数，即你将用来构建索引的某个文档中的一个键的名称。在上一个例子中，你向\
  \ `media` 集合添加了一个使用 `Title` 键的文档。在这个键上创建索引对该集合会很有帮助。\n\n> 提示\n>\n> 在 MongoDB 中，经验法则是在你想要在\
  \ MySQL 中创建索引的同类场景下创建索引。\n\n你可以通过调用以下命令为此集合创建索引：\n\n```\n> db.media.ensureIndex(\
  \ { Title : 1 } )\n```\n\n此命令确保将为 `media` 集合中所有文档的所有 `Title` 值创建索引。行末的 `:1` 指定了索引的方向：`1`\
  \ 表示按升序存储项，而 `-1` 表示按降序存储。\n\n```\n// 确保升序索引\ndb.media.ensureIndex( { Title :1 }\
  \ )\n\n// 确保降序索引\ndb.media.ensureIndex( { Title :-1 } )\n```\n\n> 提示\n>\n> 搜索已索引的信息速度很快。搜索未索引的信息则很慢，因为需要检查每个文档是否匹配。\n\
  \nBSON 允许你在文档中存储完整的数组；然而，能够对嵌入的键创建索引也会很有益。幸运的是，MongoDB 的开发者们也考虑到了这一点，并添加了对这一功能的支持。让我们基于本章前面的一个例子，向数据库添加另一个包含嵌入信息的文档：\n\
  \n```\n> db.media.insert( { \"Type\" : \"CD\", \"Artist\" : \"Nirvana\",\"Title\"\
  \ :\n\"Nevermind\", \"Tracklist\" : [ { \"Track\" : \"1\", \"Title\" : \"Smells\
  \ Like Teen\nSpirit\", \"Length\" : \"5:02\" }, {\"Track\" : \"2\",\"Title\" : \"\
  In Bloom\", \"Length\" :\n\"4:15\" } ] } )\n{ \"_id\" : ObjectId(\"4c45aa2f8e0f000000006293\"\
  ), \"Type\" : \"CD\", \"Artist\" :\n\"Nirvana\", \"Title\" : \"Nevermind\", \"Tracklist\"\
  \ : [\n{\n\"Track\" : \"1\",\n\"Title\" : \"Smells Like Teen Spirit\",\n\"Length\"\
  \ : \"5:02\"\n},\n{\n\"Track\" : \"2\",\n\"Title\" : \"In Bloom\",\n\"Length\" :\
  \ \"4:15\"\n}\n] }\n```\n\n接下来，你可以为曲目列表中所有条目的 `Title` 键创建索引：\n\n```\n> db.media.ensureIndex(\
  \ { \"Tracklist.Title\" : 1 } )\n```\n\n下次你在集合中搜索任何曲目标题时——假设它们嵌套在 `Tracklist` 下——标题会立即显示出来。接下来，你可以将这个概念更进一步，使用整个（子）文档作为键，如下例所示：\n\
  \n```\n> db.media.ensureIndex( { \"Tracklist\" : 1 } )\n```\n\n这条语句索引了数组的每个元素，这意味着你现在可以搜索数组中的任何对象。这类键也被称为多键。你还可以基于一组文档中的多个键创建索引。这个过程称为复合索引。你用来创建复合索引的方法大致相同；区别在于你需要指定多个键而不是一个，如下例所示：\n\
  \n```\n> db.media.ensureIndex({\"Tracklist.Title\": 1, \"Tracklist.Length\": -1})\n\
  ```\n\n这种方法的好处在于你可以基于多个键创建索引（如前一个例子中，你索引了整个子文档）。然而，与子文档方法不同的是，复合索引允许你指定是否希望两个字段中的一个按降序索引。如果使用子文档方法执行索引，则仅限于升序或降序。关于复合索引的更多信息请参见第\
  \ 10 章。\n\n#### 审视索引相关命令\n\n到目前为止，你已经快速浏览了索引相关命令之一——`ensureIndex()`。毫无疑问，这将是你创建索引的主要命令。但是，你可能还会发现另外两个函数很有用：`hint()`\
  \ 和 `min()/max()`。这些函数用于查询数据。我们之前没有涉及它们，是因为没有自定义索引它们无法工作。但现在让我们看看它们能为你做什么。\n\n####\
  \ 强制使用指定索引查询数据\n\n你可以使用 `hint()` 函数在查询数据时强制使用指定的索引。使用此命令的预期好处是提高查询性能。要查看这个原理的实际效果，尝试在不定义索引的情况下使用\
  \ `hint()` 函数执行 `find` 操作：\n\n```\n> db.media.find( { ISBN: \" 978-1-4302-5821-6\"\
  } ) . hint ( { ISBN: -1 } )\nerror: { \"$err\" : \"bad hint\", \"code\" : 10113\
  \ }\n```\n\n如果你在 ISBN 号上创建了索引，这个技巧会更成功。注意第一个命令的 `background` 参数确保在后台执行索引创建：\n\n\
  ```\n> db.media.ensureIndex({ISBN: 1}, {background: true});\n> db.media.find( {\
  \ ISBN: \" 978-1-4302-5821-6\"} ) . hint ( { ISBN: 1 } )\n{ \"_id\" : ObjectId(\"\
  4c45a5418e0f000000006291\"), \"Type\" : \"Book\", \"Title\" : \"Definitive Guide\
  \ to MongoDB, The\", \"ISBN\" : \" 978-1-4302-5821-6\", \"Author\" : [\"Hows, David\"\
  ,\"Membrey, Peter\", \"Plugge, Eelco\",\"Hawkins,Tim\"], \"Publisher\" : [\n   \
  \    {\n                \"$ref\" : \"publisherscollection\",\n                \"\
  $id\" : ObjectId(\"4c4597e98e0f000000006290\")\n        }\n] }\n```\n\n为了确认正在使用给定的索引，你可以选择添加\
  \ `explain()` 函数，返回关于所选查询计划的信息。这里的 `indexBounds` 值告诉你所使用的索引：\n\n```\n> db.media.find(\
  \ { ISBN: \" 978-1-4302-5821-6\"} ) . hint ( { ISBN: 1 } ).explain()\n{\n     \"\
  cursor\" : \"BtreeCursor ISBN_1\",\n     \"isMultiKey\" : false,\n     \"n\" : 1,\n\
  \     \"nscannedObjects\" : 1,\n     \"nscanned\" : 1,\n     \"nscannedObjectsAllPlans\"\
  \ : 1,\n     \"nscannedAllPlans\" : 1,\n     \"scanAndOrder\" : false,\n     \"\
  indexOnly\" : false,\n     \"nYields\" : 0,\n     \"nChunkSkips\" : 0,\n     \"\
  millis\" : 0,\n     \"indexBounds\" : {\n          \"ISBN\" : [\n              \
  \    [\n                          {\n                                  \"$minElement\"\
  \ : 1\n                          },\n                          {\n             \
  \                     \"$maxElement\" : 1\n                          }\n       \
  \           ]\n          ]\n     },\n     \"server\" : \"localhost:27017\"\n}\n\
  ```\n\n\n\n### 5. GridFS\n\n#### 约束查询匹配\n\n`min()` 和 `max()` 函数使您能够将查询匹配约束为仅包含索引键在指定的最小值和最大值之间的文档。因此，您需要为要指定的键创建索引。此外，您可以组合使用这两个函数，也可以单独使用它们。首先，让我们添加一些文档以便利用这些函数。首先，在\
  \ `Released` 字段上创建索引：\n\n```\n> db.media.insert( { \"Type\" : \"DVD\", \"Title\"\
  \ : \"Matrix, The\", \"Released\" : 1999} )\n> db.media.insert( { \"Type\" : \"\
  DVD\", \"Title\" : \"Blade Runner\", \"Released\" : 1982 } )\n> db.media.insert(\
  \ { \"Type\" : \"DVD\", \"Title\" : \"Toy Story 3\", \"Released\" : 2010} )\n> db.media.ensureIndex(\
  \ { \"Released\": 1 } )\n```\n\n现在可以使用 `max()` 和 `min()` 命令，如下例所示：\n\n```\n> db.media.find().min(\
  \ { Released: 1995 } ).max( { Released : 2005 } )\n{ \"_id\" : ObjectId(\"4c45b5b38e0f0000000062a9\"\
  ), \"Type\" : \"DVD\", \"Title\" : \"Matrix, The\", \"Released\" : 1999 }\n```\n\
  \n如果没有创建索引，则将返回错误消息，指出未找到指定键模式的索引。显然，您需要使用 `hint()` 函数来定义必须使用哪个索引：\n\n```\n> db.media.find().min(\
  \ { Released: 1995 } ).max( { Released : 2005 } ).hint( { Released : 1 } )\n{ \"\
  _id\" : ObjectId(\"4c45b5b38e0f0000000062a9\"), \"Type\" : \"DVD\", \"Title\" :\
  \ \"Matrix, The\", \"Released\" : 1999 }\n```\n\n> **注意**\n> `min()` 值将包含在结果中，而\
  \ `max()` 值将从结果中排除。\n\n一般来说，建议使用 `$gt` 和 `$lt`（分别表示大于和小于），而不是 `min()` 和 `max()`，因为\
  \ `$gt` 和 `$lt` 不需要索引。`min()` 和 `max()` 函数主要用于复合键。\n\n#### 总结\n\n在本章中，我们介绍了使用 MongoDB\
  \ shell 操作数据时最常用的命令和选项。我们还探讨了如何搜索、添加、修改和删除数据，以及如何修改集合和数据库。接下来，我们快速了解了原子操作、如何使用聚合以及何时使用\
  \ `$elemMatch` 等操作符。最后，我们探索了如何创建索引以及何时使用它们。我们研究了索引的用途、如何删除索引、如何使用创建的索引搜索数据以及如何检查正在运行的索引操作。\n\
  \n在下一章中，我们将深入探讨 GridFS 的基础知识，包括它是什么、有什么作用以及如何利用它为您带来益处。\n\n#### 摘要\n\n我们生活在一个高清视频、1200\
  \ 万像素相机和可以在一张 CD-ROM 大小的光盘上存储 50GB 数据的存储介质的世界中。在此背景下，MongoDB 文档最大 16MB 的限制似乎可笑地不足。事实上，您可能会想知道为什么\
  \ MongoDB，这个为当今高科技时代设计的数据库，会有这样一个看似奇怪的限制。简短的答案是性能。\n\n如果数据存储在文档本身中，它显然会变得非常大，这反过来又会使数据更难处理。例如，取回整个文档也将需要加载文档中的文件。您可以解决这个问题，但即使您只想要其中一小部分，在访问时仍然需要取回整个文件。您无法要求获取文档中间的一块数据——这是一个全有或全无的命题。幸运的是，MongoDB\
  \ 提供了一个独特且有些优雅的解决方案来解决这个问题。MongoDB 使您可以非常轻松地存储大文件，同时也允许您在不检索整个文件的情况下访问文件的一部分——同时保持高性能。它通过利用一个名为\
  \ GridFS 的规范来实现这一点。\n\n> **注意**\n> 关于 GridFS 的一个有趣之处在于它实际上并不是一个软件特性。例如，MongoDB 中没有管理\
  \ GridFS 的特殊服务器端代码。相反，GridFS 是一个简单的规范，由 MongoDB 上所有支持的驱动程序共同使用。这种规范的一个关键好处是，一个驱动程序存储的文件可以被任何遵循相同约定的其他驱动程序访问。\n\
  \n这种方法严格遵循了 MongoDB 保持事物简单的原则。因为 GridFS 使用标准的 MongoDB 特性，从驱动程序的角度来看，实现和使用该规范很容易。这也意味着，如果您真的愿意，可以手动探索，因为在\
  \ GridFS 规范中，MongoDB 文件只是包含文档的普通集合。\n\n\n\n#### 补充一些背景知识\n\n第 1 章曾提到，多年来我们一直被教导即使是最简单的存储也要使用数据库。例如，我们其中一位作者在超过\
  \ 15 年前购买了一本旨在提高其 PHP 技能的书，该书在第 3 章就介绍了 MySQL。考虑到现实世界（更不用说理论中）SQL 和数据库的复杂性，你可能想知道为什么一本面向初学者的书会几乎从\
  \ SQL 开始讲起。毕竟，这是一本 PHP 书，而不是 MySQL 书。\n\n有一件事，大多数人在亲自尝试之前是不会意识到的：直接读写磁盘数据是困难的。有些人不同意我们的这个观点——毕竟，在\
  \ Python 中打开和读取文件似乎很简单。确实如此：在更简单的场景中，当使用 PHP 时，处理文件是相当轻松的。如果你只想读取几行并进行处理，你不太可能遇到任何麻烦。\n\
  \n另一方面，如果你想搜索文件或存储复杂或结构化的数据，事情就变得困难多了。即使你能想办法做到并创建一个解决方案，你的方案也不太可能比依赖数据库更快或更高效。当今的应用程序依赖于快速查找和存储数据——对于那些不能或不想自己编写这样一个系统的我们来说，数据库使之成为可能。\n\
  \n许多书籍一笔带过的一个领域是文件的存储。大多数教你使用数据库存储数据的书，也教你在需要存储文件时改为读写文件系统。在某些方面，这通常不是问题，因为读写简单文件比处理文件内容要容易得多。然而，也存在一些问题。首先，开发者必须首先拥有写入这些文件的权限，而这需要赋予\
  \ Web 服务器写入本地文件系统的权限。这看起来似乎不太可能构成问题，但它会让系统管理员夜不能寐——将文件放到服务器上是能够攻破它的第一步。\n\n数据库可以存储二进制文件；通常，这样做只是不够优雅。MySQL\
  \ 有一种特殊的列类型叫做 `BLOB`。PostgreSQL 需要遵循特殊程序来存储此类文件——而且数据并不存储在表本身中。换句话说，这很混乱。这些解决方案显然是临时附加的。因此，人们选择将数据写入磁盘也就不足为奇了。但这种方法也有问题。除了安全问题之外，它还增加了另一个需要备份的目录，并且你必须确保这些信息被复制到所有相关的服务器上。有些文件系统提供了写入磁盘并完全复制该内容的能力（包括\
  \ GFS）；但这些解决方案很复杂且增加了开销；此外，这些功能通常会让你的解决方案更难维护。\n\n另一方面，MongoDB 强制文档大小上限为 16MB。这对于存储丰富的文档来说绰绰有余，并且在几年前对于存储许多其他类型的文件可能也足够了。然而，这个限制在当今的环境下是完全不够的。\n\
  \n#### 使用 GridFS\n\n接下来，我们将简要了解一下 GridFS 是如何实现的。正如 MongoDB 网站指出的那样，你不需要理解或了解 GridFS\
  \ 的底层实现就能使用它。事实上，你可以直接让驱动程序为你处理繁重的工作。在大多数情况下，支持 GridFS 的驱动程序以特定语言的方式实现文件处理。例如，你马上会看到，Python\
  \ 的 MongoDB 驱动程序的工作方式与 Python 完全一致。如果 GridFS 的细节你并不感兴趣，那么直接跳到下一节即可。我们保证你不会错过任何能让你有效使用\
  \ MongoDB 的内容！\n\nGridFS 由两部分组成。更具体地说，它由两个集合组成。一个集合保存文件名及相关信息，如大小（称为元数据），而另一个集合保存文件数据本身，通常以\
  \ 256KB 的块（chunk）形式存储。规范要求将它们分别命名为 `files` 和 `chunks`。默认情况下，`files` 和 `chunks` 集合在\
  \ `fs` 命名空间下创建，但这个可以更改。更改默认命名空间的能力在你想要存储不同类型的文件时很有用。例如，你可能希望将图片和视频文件分开存放。\n\n####\
  \ 开始使用命令行工具\n\n现在我们已经介绍了一些背景知识，让我们看看如何通过探索可用的命令行工具来开始使用 GridFS。首先，我们需要一个文件来操作。为简单起见，我们使用字典文件。在\
  \ Ubuntu 上，你可以在 `/usr/share/dict/words` 找到它。然而，这里有不同层级的符号链接，所以你可能需要先运行这个命令：\n\n\
  ```\nroot@core2:/usr/share/dict# cat words > /tmp/dictionary\n```\n\n注意\n\n在 Ubuntu\
  \ 中，你可能需要使用 `apt-get install wbritish` 来安装字典文件。\n\n这个命令将文件的所有内容复制到一个你易于使用的、简单明了的路径下。当然，对于这个示例，你可以使用任何你想要的文件；它不需要是任何特定的大小或类型。\n\
  \n与其描述 `mongofiles` 所有的选项，不如我们直接开始尝试这个工具的一些功能。本书假设你是在与 MongoDB 相同的机器上运行 `mongofiles`。如果你不是，那么你需要使用\
  \ `-h` 选项来指定 MongoDB 运行的主机。在你实际使用 `mongofiles` 命令后，你会了解到其他可用的选项。\n\n首先，让我们列出数据库中的所有文件。我们目前不期望有任何文件在里面，但让我们确认一下。`list`\
  \ 命令列出迄今为止数据库中的文件：\n\n```\n$ mongofiles list\nconnected to: 127.0.0.1\n$\n```\n\n\
  好的，这可能不太令人兴奋。请记住 `mongofiles` 是一个概念验证工具；它可能不是你会在自己应用程序中经常使用的工具。然而，`mongofiles` 对于学习和测试非常有用。一旦你创建了一个文件，你就可以使用该工具来探索创建的文件和数据块。\n\
  \n让我们提高一点难度，使用 `put` 命令添加之前创建的字典文件（记住：对于这个示例，你可以使用任何你喜欢的文件）：\n\n```\n$ mongofiles\
  \ put /tmp/dictionary\nconnected to: 127.0.0.1\nadded file: { _id: ObjectId('51cb61b26487b3d8ce7af440'),\
  \ filename: \"/tmp/dictionary\", chunkSize: 262144, uploadDate: new Date(1372283314621),\
  \ md5: \"40c0825855792bd20e8a2d515fe9c3e3\", length: 4953699 }}}\ndone!\n$\n```\n\
  \n这个例子返回了一些有用的信息；然而，让我们通过确认文件确实存在来再次检查它显示的信息。重新运行 `list` 命令来做到这一点：\n\n```\n$ mongofiles\
  \ list\nconnected to: 127.0.0.1\n/tmp/dictionary 4953699\n$\n```\n\n这个例子显示了字典文件及其大小。信息显然来自\
  \ `files` 集合，但我们有点超前了。让我们稍等一下，回顾并检查一下这个例子中 `put` 命令返回的输出。\n\n##### 使用 `_id` 键\n\n\
  如你所知，MongoDB 中的每个文档都包含一个存储在 `_id` 键中的唯一标识符。类似于 MySQL 的 `auto_increment` 字段，`_id`\
  \ 键除了让你能挑出特定文件之外，并没有太多直接的用处。\n\n\n##### 处理文件名\n\n`put` 命令的输出还会显示一个 `Filename` 键，这本身需要稍作解释。通常情况下，你会希望保持此字段的唯一性，以避免造成重大混淆；但这并非绝对必要。事实上，如果你再次运行\
  \ `put` 命令，最终会得到两份看起来完全相同的文档。在这种情况下，文件和元数据是相同的，除了 `_id` 键。你可能会对此感到惊讶，并疑惑为什么 MongoDB\
  \ 不更新已存在的文件，而是创建一个新文件。原因在于，在许多情况下，你可能会有文件名相同的文件。例如，如果你构建一个存储学生作业的系统，那么很可能至少有一部分文件名是相同的。MongoDB\
  \ 不能假设相同的文件名（即使是大小也相同的文件）实际上就是同一个文件。因此，在许多情况下，让 MongoDB 更新文件会是一个错误。当然，你可以使用 `_id`\
  \ 键来更新特定的文件；在接下来的基于 Python 的实验中，你将了解更多关于这个主题的内容。\n\n##### 确定文件长度\n\n`put` 命令还会返回文件的长度，这既是有用的信息，也是\
  \ GridFS 工作方式的关键。虽然了解文件大小作为参考信息很好，但文件大小在你编写自己的应用程序时也扮演着重要角色。例如，在通过网络（例如，通过 HTTP）发送文件时，你需要指定文件有多大。并非所有服务器都会这样做；例如，当你从某些网站下载文件时，你可能注意到你的浏览器可以告诉你下载速度，但无法告诉你完成下载需要多长时间。这是因为服务器没有提供大小信息。\n\
  \n在另一个方面，了解文件大小也很重要。之前我们提到过，文件被分割成块（chunk）——也就是说，文件被拆分成更小的片段。默认情况下，块大小为 256K，但如果你愿意，可以更改为其他值。要计算一个文件占据了多少块，你需要知道两件事。首先，你必须知道每个块有多大；其次，你必须知道文件大小，这样才能知道总共有多少块。\n\
  \n你可能认为这不应该很重要。毕竟，如果你有一个 1MB 的文件，块大小是 256K，那么你就知道，如果想从 800K 标记处开始访问数据，你必须从第四块开始。然而，你仍然需要知道整个文件的大小，原因如下：如果你不知道大小，就无法计算出有多少个有效的块。在上面的例子中，没有什么能阻止你请求从\
  \ 1.26MB（即第六块）开始的数据。在这种情况下，那个块并不存在，但如果不参考文件大小，就无法知道这一点。当然，驱动程序会为你处理所有这些，所以无需过于担心；然而，了解\
  \ GridFS “幕后”的工作方式，在调试应用程序时肯定会有所帮助。\n\n##### 处理分块大小\n\n`put` 命令也会返回块大小，因为尽管有一个默认的块大小，但这个默认值可以逐个文件地进行更改。这提供了灵活的大小调整。如果你的网站提供视频流，你可能希望有很多块，这样你可以轻松地跳转到任何视频的任意部分。如果你有一个大文件，你将不得不返回整个文件，然后在其中找到指定部分的起始点。使用\
  \ GridFS，你可以在块级别拉回数据。如果你使用默认大小，那么你可以从任何 256K 的块开始检索数据。当然，你也可以指定你实际想要的数据部分（例如，你可能只想要六十分钟电影中间的五分钟）。这是一个非常高效的系统，256K\
  \ 对于大多数用途来说是一个相当不错的块大小。如果你决定更改它，应该有一个充分的理由。一如既往，不要忘记对自定义块大小的性能进行基准测试和测试；理论上更好的系统未能达到预期的情况并不少见。\n\
  \n> **注意**\n>\n> MongoDB 对文档大小有 16MB 的限制。因为 GridFS 只是在标准 MongoDB 框架中存储文件的一种不同方式，所以这个限制在\
  \ GridFS 中同样存在。也就是说，你不能创建大于 16MB 的块。这不应该构成问题，因为 GridFS 的要点正是减轻对巨大文档大小的需求。如果你担心正在存储巨大的文件，这会导致产生过多的块文档，那么你无需担心——生产环境中的\
  \ MongoDB 系统拥有远超过十亿个文档的情况并不少见！\n\n##### 跟踪上传日期\n\n`uploadDate` 键的作用正如其名：它存储文件在 MongoDB\
  \ 中创建的日期。现在是一个好时机来提及，`files` 集合只是一个普通的 MongoDB 集合，包含普通的文档。这意味着你可以根据需要添加任何额外的键值对，就像处理任何其他集合一样。\n\
  \n例如，考虑一个真实世界的应用程序需要存储你从各种文件中提取的文本内容的情况。你可能需要这样做，以便执行一些额外的索引和搜索。为了实现这一点，你可以添加一个\
  \ `file_text` 键，并将文本存储在那里。GridFS 系统的优雅之处在于，你可以对此系统执行任何能对其他 MongoDB 文档执行的操作。优雅和强大是在\
  \ MongoDB 中工作的两个标志性特征。\n\n##### 对文件进行哈希处理\n\nMongoDB 自带 `MD5` 哈希算法。你以前在从互联网下载软件时可能遇到过这个算法。`MD5`\
  \ 背后的理论是，每个文件都有一个唯一的签名。改变该文件中任何位置的单个比特都会剧烈（且明显地）改变这个签名。这个签名有两个用途：安全性和完整性。对于安全性，如果你知道\
  \ `MD5` 哈希应该是什么，并且你信任来源（也许是朋友给你的），那么如果哈希（通常称为校验和）是正确的，你就可以确信文件没有被篡改。这也确保了文件完整性得以保持，并且没有数据丢失或损坏。特定文件的\
  \ `MD5` 哈希就像文件的指纹。该哈希也可用于识别文件名不同但内容相同的文件。\n\n> **警告**\n>\n> `MD5` 算法不再被认为是安全的，并且已经证明可以创建两个不同的文件，它们具有相同的\
  \ `MD5` 校验和，即使它们的内容不同。在密码学术语中，这被称为碰撞（collision）。这种碰撞是危险的，因为这意味着攻击者可能以无法检测的方式篡改文件。这个警告在某种程度上仍然是理论性的，因为有意创建这样的碰撞需要大量的努力和时间；即使成功了，这些文件也可能差异巨大到明显不是同一个文件。因此，`MD5`\
  \ 仍然是确定文件完整性的首选方法，因为它被广泛支持。然而，如果你想利用哈希的安全优势，最好使用 `SHA` 家族的规范之一——理想情况下是 `SHA-256`\
  \ 或 `SHA-512`。即使这些哈希家族也存在一些理论上的漏洞；然而，至今尚未有人展示出为 `SHA` 家族哈希有意创建碰撞的实际案例。MongoDB 使用\
  \ `MD5` 来确保文件完整性，这对于大多数目的来说是可以的。但是，如果你想对重要数据（如用户密码）进行哈希处理，你可能应该考虑改用 `SHA` 家族的哈希算法。\n\
  \n\n#### 深入探究 MongoDB 的内部机制\n\n至此，你的数据已存入 MongoDB 数据库。现在，让我们更仔细地审视这些数据的底层结构。为此，你将再次使用一些命令行工具连接到数据库并进行查询。例如，尝试对之前创建的文件运行\
  \ `find()` 命令：\n\n```\n$ mongo test\nMongoDB shell version: 2.5.1-pre\nconnecting\
  \ to: test\n> db.fs.files.find()\n{ \"_id\" : ObjectId(\"51cb61b26487b3d8ce7af440\"\
  ), \"filename\" : \"/tmp/dictionary\", \"chunkSize\" : 262144, \"uploadDate\" :\
  \ ISODate(\"2013-06-26T21:48:34.621Z\"), \"md5\" : \"40c0825855792bd20e8a2d515fe9c3e3\"\
  , \"length\" : 4953699 }\n>\n```\n\n输出结果看起来应该很熟悉——毕竟，它与你在本章前面看到的数据是相同的。现在你可以看到，`mongofiles`\
  \ 打印的信息正是取自文件在 `fs.files` 集合中的条目。\n\n接下来，让我们看看 `chunks` 集合（我们需要添加一个过滤器；否则，它也会显示出所有的原始二进制数据）：\n\
  \n```\n$ mongo test\nMongoDB shell version: 2.5.1-pre\nconnecting to: test\n> db.fs.chunks.find({},{\"\
  data\":0});\n{ \"_id\" : ObjectId(\"51cb61b29b2daad9857ca205\"), \"files_id\" :\
  \ ObjectId(\"51cb61b26487b3d8ce7af440\"), \"n\" : 4 }\n{ \"_id\" : ObjectId(\"51cb61b29b2daad9857ca206\"\
  ), \"files_id\" : ObjectId(\"51cb61b26487b3d8ce7af440\"), \"n\" : 5 }\n{ \"_id\"\
  \ : ObjectId(\"51cb61b29b2daad9857ca207\"), \"files_id\" : ObjectId(\"51cb61b26487b3d8ce7af440\"\
  ), \"n\" : 6 }\n{ \"_id\" : ObjectId(\"51cb61b29b2daad9857ca208\"), \"files_id\"\
  \ : ObjectId(\"51cb61b26487b3d8ce7af440\"), \"n\" : 7 }\n{ \"_id\" : ObjectId(\"\
  51cb61b29b2daad9857ca209\"), \"files_id\" : ObjectId(\"51cb61b26487b3d8ce7af440\"\
  ), \"n\" : 8 }\n{ \"_id\" : ObjectId(\"51cb61b29b2daad9857ca20a\"), \"files_id\"\
  \ : ObjectId(\"51cb61b26487b3d8ce7af440\"), \"n\" : 9 }\n{ \"_id\" : ObjectId(\"\
  51cb61b29b2daad9857ca20b\"), \"files_id\" : ObjectId(\"51cb61b26487b3d8ce7af440\"\
  ), \"n\" : 10 }\n{ \"_id\" : ObjectId(\"51cb61b29b2daad9857ca20c\"), \"files_id\"\
  \ : ObjectId(\"51cb61b26487b3d8ce7af440\"), \"n\" : 11 }\n{ \"_id\" : ObjectId(\"\
  51cb61b29b2daad9857ca20d\"), \"files_id\" : ObjectId(\"51cb61b26487b3d8ce7af440\"\
  ), \"n\" : 12 }\n{ \"_id\" : ObjectId(\"51cb61b29b2daad9857ca20e\"), \"files_id\"\
  \ : ObjectId(\"51cb61b26487b3d8ce7af440\"), \"n\" : 13 }\n{ \"_id\" : ObjectId(\"\
  51cb61b29b2daad9857ca20f\"), \"files_id\" : ObjectId(\"51cb61b26487b3d8ce7af440\"\
  ), \"n\" : 14 }\n{ \"_id\" : ObjectId(\"51cb61b29b2daad9857ca210\"), \"files_id\"\
  \ : ObjectId(\"51cb61b26487b3d8ce7af440\"), \"n\" : 15 }\n{ \"_id\" : ObjectId(\"\
  51cb61b29b2daad9857ca211\"), \"files_id\" : ObjectId(\"51cb61b26487b3d8ce7af440\"\
  ), \"n\" : 16 }\n{ \"_id\" : ObjectId(\"51cb61b29b2daad9857ca212\"), \"files_id\"\
  \ : ObjectId(\"51cb61b26487b3d8ce7af440\"), \"n\" : 17 }\n{ \"_id\" : ObjectId(\"\
  51cb61b29b2daad9857ca201\"), \"files_id\" : ObjectId(\"51cb61b26487b3d8ce7af440\"\
  ), \"n\" : 0 }\n{ \"_id\" : ObjectId(\"51cb61b29b2daad9857ca202\"), \"files_id\"\
  \ : ObjectId(\"51cb61b26487b3d8ce7af440\"), \"n\" : 1 }\n{ \"_id\" : ObjectId(\"\
  51cb61b29b2daad9857ca203\"), \"files_id\" : ObjectId(\"51cb61b26487b3d8ce7af440\"\
  ), \"n\" : 2 }\n{ \"_id\" : ObjectId(\"51cb61b29b2daad9857ca204\"), \"files_id\"\
  \ : ObjectId(\"51cb61b26487b3d8ce7af440\"), \"n\" : 3 }\n{ \"_id\" : ObjectId(\"\
  51cb61b29b2daad9857ca213\"), \"files_id\" : ObjectId(\"51cb61b26487b3d8ce7af440\"\
  ), \"n\" : 18 }>\n```\n\n你可能会好奇，为什么这里的输出有这么多条目。如前所述，GridFS 只是一个规范。也就是说，它利用了 MongoDB\
  \ 已有的功能。我们在为本书测试命令时，字典文件被添加了几次。后来，当我们清空 `fs.files` 集合时，这个文件被删除了。你可以自己看看接下来发生了什么！从某个集合中移除文档这一事实，并不会影响另一个集合中发生的事情。记住：MongoDB\
  \ 并没有以任何特殊方式对待这些文档或集合。如果文件是通过驱动程序或 `mongofiles` 工具正确删除的，那么该工具也会一并清理 `chunks` 集合。\n\
  \n> **警告**\n>\n> 直接访问文档和集合是一个强大的功能，但你需要小心使用。此功能也让你更容易**同时伤到自己的双脚**。如果你决定手动编辑这些文档和集合，请确保你清楚自己在做什么，并进行大量测试。同时，请记住\
  \ MongoDB 驱动程序中的 GridFS 支持功能对你所做的任何自定义修改一无所知。\n\n##### 使用 `search` 命令\n\n接下来，让我们更仔细地看看\
  \ MongoDB 的 `search` 命令。目前数据库中只有一个文件，这极大地限制了你可能进行的搜索类型！所以让我们添加点别的内容。下面的代码片段将字典复制到另一个文件，然后导入该文件：\n\
  \n```\n$ cp /tmp/dictionary /tmp/hello_world\n$ mongofiles put /tmp/hello_world\n\
  connected to: 127.0.0.1\nadded file: { _id: ObjectId('51cb63d167961ebc919edbd5'),\
  \ filename: \"/tmp/hello_world\", chunkSize: 262144, uploadDate: new Date(1372283858021),\
  \ md5: \"40c0825855792bd20e8a2d515fe9c3e3\", length: 4953699 }done!\nroot@core2:∼#\
  \ mongofiles list\nconnected to: 127.0.0.1\n/tmp/dictionary 4953699\n/tmp/hello_world\
  \ 4953699\n$\n```\n\n第一行复制文件，第二行将其导入 MongoDB。与前面的示例一样，`put` 命令打印出 MongoDB 创建的新文档。接下来，你可能会运行\
  \ `mongofiles` 的 `list` 命令来检查文件是否已正确存储。如果这样做，你可以看到现在集合中有两个文件；不出所料，两个文件大小相同。\n\n\
  `search` 命令的工作方式正如你所期望的那样。你只需要告诉 `mongofiles` 你在寻找什么，它就会尝试为你找到它，如下例所示：\n\n```\n\
  $ mongofiles search hello\nconnected to: 127.0.0.1\n/tmp/hello_world 4953699\n$\
  \ mongofiles search dict\nconnected to: 127.0.0.1\n/tmp/dictionary 4953699\n$\n\
  ```\n\n同样，这里没有发生什么太令人兴奋的事情。然而，有一个重要的要点值得注意。MongoDB 可以根据你的需要变得简单或复杂。`mongofiles`\
  \ 工具仅供参考使用，它只包含非常基础的调试功能。好消息是：MongoDB 使得对文件进行简单搜索变得容易。更好的消息是：如果你想编写一些极其复杂的搜索，MongoDB\
  \ 也能满足你的需求。\n\n##### 删除操作\n\n`mongofiles` 的 `delete` 命令不需要太多解释，但它确实值得一个大大的警告。此命令基于文件名删除文件。因此，如果你有多个同名文件，此命令将删除所有这些文件。以下代码片段展示了如何使用\
  \ `delete` 命令：\n\n```\n$ mongofiles delete /tmp/hello_world\nconnected to: 127.0.0.1\n\
  $ mongofiles list\nconnected to: 127.0.0.1\n/tmp/dictionary 4953699\n$\n```\n\n\
  > **注意**\n>\n> 许多人就此事评论说，删除多个同名文件不是问题，因为没有应用程序会出现重复名称。这根本不是真的；而且在许多情况下，强制执行唯一名称甚至没有意义。例如，如果你的应用允许用户向其个人资料上传照片，那么你收到的文件中很可能有一半会命名为\
  \ `photo.jpg` 或 `me.png`。\n\n当然，如果你不太可能使用 `mongofiles` 来管理你的实时数据——事实上，也从未有人期望它被这样使用——那么你在删除数据时通常只需要小心即可。\n\
  \n\n##### 从 MongoDB 中检索文件\n\n到目前为止，你还没有真正从 MongoDB 中提取出任何文件。任何数据库最重要的特性就是，一旦数据存入，它就能让你找到并检索这些数据。下面的代码片段使用`mongofiles`命令的`get`子命令从\
  \ MongoDB 检索一个文件：\n\n```\n$ mongofiles get /tmp/dictionary\nconnected to: 127.0.0.1\n\
  done write to: /tmp/dictionary\n$\n```\n\n这个例子包含一个**故意的错误**。因为它指定了要检索文件的完整名称和路径（这是必需的），所以`mongofiles`会将数据写入一个具有相同名称和路径的文件中。实际上，这覆盖了原始的词典文件！这倒也不是什么重大损失，因为它被同一个文件覆盖了——而且词典文件起初也只是一个临时副本。然而，如果你不小心因此擦除了两周的工作成果，这种行为可能会让你大吃一惊。相信我们，你往往要到事件发生后一段时间才能弄明白所有的工作成果都去哪儿了！与使用`delete`命令时一样，使用`get`命令时也需要小心。\n\
  \n##### mongofiles 总结\n\n`mongofiles`实用工具是快速查看数据库中内容的一个有用工具。如果你编写了一些软件，并怀疑它可能有问题，那么你可以使用`mongofiles`来仔细检查情况。\n\
  \n这是一个非常简单的实现，因此它不需要任何可能使当前任务复杂化的复杂逻辑。你是否会在生产环境中使用`mongofiles`是一个个人喜好的问题。它并非一把真正的瑞士军刀；然而，它确实提供了一套有用的命令，如果你的应用程序开始出现异常行为，你会庆幸拥有它们。简而言之，你应该熟悉这个工具，因为有朝一日它可能正是你解决其他棘手问题所需的工具。\n\
  \n#### 利用 Python 的强大功能\n\n至此，你应该对 GridFS 的工作原理有了扎实的理解。接下来，你将学习如何从 Python 访问 GridFS。第\
  \ 2 章涵盖了如何安装 PyMongo；如果你在运行示例时遇到任何问题，请返回第 2 章并确保一切安装正确。\n\n如果你一直跟着本章前面的示例操作，那么你现在应该在\
  \ GridFS 中有一个文件。你也会记得这个文件是一个词典文件，所以它包含一个单词列表。在本节中，你将学习如何编写一个简单的 Python 脚本来打印出词典文件中的所有单词。当然，直接`cat`原始文件会更简单、更高效——但那样乐趣何在呢？\n\
  \n首先启动 Python：\n\n```\nPython 2.6.6 (r266:84292, Oct 12 2012, 14:23:48)\n[GCC 4.4.6\
  \ 20120305 (Red Hat 4.4.6-4)] on linux2\nType \"help\", \"copyright\", \"credits\"\
  \ or \"license\" for more information.>>>\n```\n\nPython 的标准驱动程序叫做 PyMongo，它是由 Mike\
  \ Dirolf 编写的。由于 PyMongo 驱动程序直接受到发布 MongoDB 的公司 MongoDB, Inc.的支持，你可以放心它会得到定期的更新和维护。那么，让我们导入这个库。你应该看到类似以下的输出：\n\
  \n```\n>>> from pymongo import Connection\n>>> import gridfs\n>>>\n```\n\n如果 PyMongo\
  \ 没有正确安装，你会得到一个类似这样的错误：\n\n```\n>>> import gridfs\nTraceback (most recent call last):\n\
  \  File \"<stdin>\", line 1, in <module>\nImportError: No module named gridfs\n\
  >>>\n```\n\n如果你看到后面这个信息，很可能是在安装过程中遗漏了某些步骤。在这种情况下，回到第 2 章并按照说明重新安装 PyMongo。\n\n#####\
  \ 连接到数据库\n\n在从数据库检索信息之前，你必须先建立连接。当你在本章前面使用`mongofiles`实用工具时，你可能注意到了对`127.0.0.1`的引用。这个值也被称为本地主机，它代表你计算机的环回地址。这个值只是告诉计算机与自己通信的一个快捷方式。`mongofiles`提到这个\
  \ IP 地址的原因是，它实际上是通过网络连接到 MongoDB 的。默认设置是连接到本地机器的默认 MongoDB 端口。因为你还没有更改默认设置，所以`mongofiles`可以轻松地找到并连接到你的数据库。\n\
  \n然而，在使用 MongoDB 和 Python 时，你需要先连接到数据库，然后再设置 GridFS。幸运的是，这很容易做到：\n\n```\n>>> db\
  \ = Connection().test\n>>> fs = gridfs.GridFS(db)\n>>>\n```\n\n第一行打开连接并选择数据库。默认情况下，`mongofiles`使用`test`数据库；因此，你会在`test`数据库中找到你的词典文件。第二行设置\
  \ GridFS 并为其使用做好准备。\n\n##### 访问单词\n\n在最初的实现中，PyMongo 驱动程序使用一个类文件接口来利用 GridFS。这与你之前在本章中看到的`mongofiles`示例有些不同，后者更类似于\
  \ FTP。在 PyMongo 的原始实现中，你可以像处理普通文件一样读写数据。\n\n这使得 PyMongo 的使用非常像 Python 本身，并且便于与现有脚本集成。然而，这种行为在驱动程序的\
  \ 1.6 版本中被更改了，此功能不再受支持。虽然非常符合 Python 风格，但这种行为存在一些问题，使得该工具的整体效率较低。\n\n一般来说，PyMongo\
  \ 驱动程序试图让 GridFS 文件看起来和感觉起来就像文件系统上的普通文件。一方面，这很好，因为它意味着没有学习曲线，并且该驱动程序可以与任何需要文件的方法一起使用。另一方面，这种方法有些局限，并不能很好地体现\
  \ GridFS 的强大功能。PyMongo 在 1.6 版本中对其工作方式进行了重要更改，特别是在`get`和`put`的操作方式上。\n\n> **注意**\n\
  >\n> 这个修订版的 PyMongo 与之前的版本并没有太大不同，许多使用过旧版 API 的人发现很容易适应修订版。话虽如此，Mike 的更改并没有得到所有人的好评。例如，有些人发现旧版\
  \ API 中基于文件的键控非常有用且易于使用。修订版的 PyMongo 支持创建文件名的功能，因此缺失的行为可以在修订版中复制；然而，这样做确实需要多一点代码。\n\
  \n\n## 第二部分\n### 使用 MongoDB 进行开发\n\n### 6. PHP 与 MongoDB\n\n**摘要**\n\n通过前五章，你已经学习了如何在\
  \ MongoDB shell 中执行各种操作。例如，你学会了如何添加、修改和删除文档。你还了解了 DBRef 和 GridFS 的工作原理，包括如何使用它们。\n\
  \n然而，到目前为止，你所学的大部分内容都发生在 MongoDB shell 中。它是一个功能强大的应用程序，但 MongoDB 软件还附带了大量额外的驱动程序（更多关于它们的信息请参见第\
  \ 2 章），这些驱动程序让你能够走出 shell，以编程方式完成许多其他类型的任务。\n\n其中一个工具是 PHP 驱动程序，它允许你扩展 PHP 安装，以便在你想要使用\
  \ PHP 而不是 shell 时连接、修改和管理 MongoDB 数据库。这在你需要设计 Web 应用程序或无法访问 MongoDB shell 时会很有帮助。正如本章将演示的，你可以用\
  \ PHP 驱动程序执行的大多数操作都与你可以在 MongoDB shell 中执行的函数非常相似；但是，PHP 驱动程序要求选项在数组中指定，而不是在两个花括号之间指定。尽管有相似之处，但在使用\
  \ PHP 驱动程序时，你需要意识到相当多的“但是”。本章将引导你了解使用 PHP 与 MongoDB 的好处，以及如何克服前面提到的“但是”。\n\n本章在许多方面带你回到起点。你将从学习在\
  \ PHP 中导航数据库和使用集合开始。接下来，你将学习如何在 PHP 中插入、修改和删除文章。你还将再次学习如何使用 GridFS 和 DBRef；不过，这次的重点将是如何在\
  \ PHP 中使用它们，而不是这些技术背后的理论。\n\n#### 将文件存入 MongoDB\n\n通过 PyMongo 将文件放入 GridFS 很简单，并且有意与使用命令行工具的方式相似。MongoDB\
  \ 的核心在于吞吐量，PyMongo 修订版中对 API 的更改反映了这一点。你不仅能获得更好的性能，这些更改还使 Python 驱动程序与其他 GridFS\
  \ 实现保持一致。\n\n让我们把字典放入 GridFS（再次）：\n\n```\n>>> with open(\"/tmp/dictionary\") as\
  \ dictionary:\n... uid = fs.put(dictionary)\n...\n>>> uid\nObjectId('51cb65be2f50332093f67b98')\
  \ >>>\n```\n\n在这个例子中，你使用 `put` 方法来插入文件。重要的是你要捕获此方法的返回结果，因为它包含了你的文件的文档 `_id`。PyMongo\
  \ 采用的方法与 `mongofiles` 不同，后者假设文件名实际上是键（即使你可以有重复项）。相反，PyMongo 基于文件的 `_id` 来引用文件。如果你不捕获此信息，那么你将无法可靠地再次找到该文件。实际上，这并不完全正确——你仍然可以很容易地搜索文件——但如果你想将此文件链接到特定用户账户，那么你就需要这个\
  \ `_id`。\n\n可以与 `put` 命令一起使用的两个有用参数是 `filename` 和 `content_type`。正如你可能预料的那样，这些参数让你分别设置文件的文件名和内容类型。这对于直接从磁盘加载文件很有用。然而，当你处理通过互联网接收或在内存中生成的文件时，它甚至更方便，因为在这些情况下，你可以使用类文件语义，而不必真正在磁盘上创建一个真实的文件。\n\
  \n#### 从 GridFS 检索文件\n\n终于，你现在准备取回你的数据了！此时，你拥有了你的 `unique _id`，所以查找文件很容易。`get` 方法从\
  \ GridFS 中检索单个文件：\n\n```\n>>> new_dictionary = fs.get(uid)\n```\n\n就是这样！前面的代码片段返回一个类文件对象；因此，你可以使用以下代码片段打印字典中的所有单词：\n\
  \n```\n>>> for word in new_dictionary:\n... print word\n```\n\n现在，请惊叹地看着单词列表在屏幕上快速滚动吧！好吧，这并不是什么高深的火箭科学。然而，它既不是火箭科学，也没有任何难度，这正是\
  \ GridFS 的魅力所在——它如宣传的那样工作，并且是以直观且易于理解的方式！\n\n#### 删除文件\n\n删除文件也很容易。你所要做的就是调用 `fs.delete()`\
  \ 并传递文件的 `_id`，如下例所示：\n\n```\n>>> fs.delete(uid)\n>>> new_dictionary = fs.get(uid)\n\
  Traceback (most recent call last):\n  File \"<stdin>\", line 1, in <module>\n  File\
  \ \"/usr/lib/python2.6/site-packages/pymongo-2.5.2-py2.6-linux-x86_64.egg/gridfs/__init__.py\"\
  , line 140, in get\n    return GridOut(self.__collection, file_id)\n  File \"/usr/lib/python2.6/site-packages/pymongo-2.5.2-py2.6-linux-x86_64.egg/gridfs/grid_file.py\"\
  , line 392, in __init__\n    (files, file_id))\ngridfs.errors.NoFile: no file in\
  \ gridfs collection Collection(Database(Connection('localhost', 27017), u'test'),\
  \ u'fs.files') with _id ObjectId('51cb65be2f50332093f67b98') >>>\n```\n\n这些结果看起来可能有点吓人，但它们只是\
  \ PyMongo 表示找不到文件的方式。这并不奇怪，因为你刚刚删除了它！\n\n#### 总结\n\n在本章中，你进行了一次快节奏的 GridFS 之旅。你了解了什么是\
  \ GridFS，它如何与 MongoDB 协同工作，以及如何使用其基本语法。本章并未深入探讨 GridFS，但在下一章，你将学习如何使用 PHP 将 GridFS\
  \ 与实际应用程序集成。目前，理解 GridFS 如何在存储文件和其他大型数据时为你节省时间和麻烦就足够了。\n\n在下一章，你将开始把你学到的知识付诸实践——具体来说，你将学习如何构建一个功能齐全的通讯录！\n\
  \n\n\n#### 在 MongoDB 与 PHP 中比较文档\n\n正如你先前所学的，MongoDB 集合中的文档使用一种类 JSON 格式存储，该格式由键和值组成。这与\
  \ PHP 定义**关联数组**的方式相似，因此习惯这种格式应该不太困难。\n\n例如，假设在 MongoDB shell 中，一个文档如下所示：\n\n```\n\
  contact = ({\n    \"First Name\" : \"Philip\",\n    \"Last Name\" : \"Moran\",\n\
  \    \"Address\" : [\n        {\n        \"Street\" : \"681 Hinkle Lake Road\",\n\
  \        \"Place\" : \"Newton\",\n        \"Postal Code\" : \"MA 02160\",\n    \
  \    \"Country\" : \"USA\"\n        }\n    ],\n    \"E-Mail\" : [\n        \"pm@example.com\"\
  ,\n        \"pm@office.com\",\n        \"philip@example.com\",\n        \"philip@office.com\"\
  ,\n        \"moran@example.com\",\n        \"moran@office.com\",\n        \"pmoran@example.com\"\
  ,\n        \"pmoran@office.com\"\n    ],\n    \"Phone\" : \"617-546-8428\",\n  \
  \  \"Age\" : 60\n})\n```\n\n当同一个文档在 PHP 中以数组形式呈现时，看起来会是这样：\n\n```\n$contact = array(\n\
  \    \"First Name\" => \"Philip\",\n    \"Last Name\" => \"Moran\",\n    \"Address\"\
  \ => array(\n        \"Street\" => \"681 Hinkle Lake Road\",\n        \"Place\"\
  \ => \"Newton\",\n        \"Postal Code\" => \"MA 02160\",\n        \"Country\"\
  \ => \"USA\"\n    ),\n    \"E-Mail\" => array(\n        \"pm@example.com\",\n  \
  \      \"pm@office.com\",\n        \"philip@example.com\",\n        \"philip@office.com\"\
  ,\n        \"moran@example.com\",\n        \"moran@office.com\",\n        \"pmoran@example.com\"\
  ,\n        \"pmoran@office.com\"\n    ),\n    \"Phone\" => \"617-546-8428\",\n \
  \   \"Age\" => 60\n);\n```\n\n这两个版本的文档看起来非常相似。明显的区别是，在 PHP 中，冒号 (`:`) 作为键/值分隔符被一个箭头状的符号\
  \ (`=>`) 所取代。你会相对快速地习惯这些语法差异。\n\n#### MongoDB 类\n\n用于 MongoDB 的 PHP 驱动包含四个核心类，还有几个用于处理\
  \ GridFS 的类，以及几个表示 MongoDB 数据类型的类。核心类是驱动最重要的部分。这些类共同允许你执行一套丰富的命令。可用的四个核心类如下：\n\n\
  *   `MongoClient`：初始化与数据库的连接，并提供诸如 `connect()`、`close()`、`listDBs()`、`selectDBs()`\
  \ 和 `selectCollection()` 等数据库服务器命令。\n*   `MongoDB`：与数据库交互，并提供诸如 `createCollection()`、`selectCollection()`、`createDBRef()`、`getDBRef()`、`drop()`\
  \ 和 `getGridFS()` 等命令。\n*   `MongoCollection`：与集合交互。它包括诸如 `count()`、`find()`、`findOne()`、`insert()`、`remove()`、`save()`\
  \ 和 `update()` 等命令。\n*   `MongoCursor`：与 `find()` 命令返回的结果交互，并包括诸如 `getNext()`、`count()`、`hint()`、`limit()`、`skip()`\
  \ 和 `sort()` 等命令。\n\n在本章中，我们将探讨上述所有命令；毫无疑问，这些将是你最常使用的命令。\n\n**注意**\n本章不会按类分组讨论上述命令；相反，这些命令将按尽可能符合逻辑的顺序进行介绍。\n\
  \n#### 连接与断开连接\n\n让我们从检查如何使用 MongoDB 驱动连接到并选择一个数据库和集合开始。\n\n##### 建立连接\n\n你使用 `MongoClient`\
  \ 类建立连接，该类也用于数据库服务器命令。以下示例展示了如何在 PHP 中快速连接到你的数据库：\n\n```\n// 连接到数据库\n$c = new MongoClient();\n\
  // 选择你想要连接到的数据库，例如 contacts\n$c->contacts;\n```\n\n`MongoClient` 类还包含 `selectDB()`\
  \ 函数，你可以使用它来选择一个数据库：\n\n```\n// 连接到数据库\n$c = new MongoClient();\n// 选择你想要连接到的数据库，例如\
  \ contacts\n$c->selectDB(\"contacts\");\n```\n\n##### 选择集合\n\n下一个示例展示了如何选择你想要使用的集合。规则与在\
  \ shell 中操作时相同：如果你选择一个尚不存在的集合，当你向其中保存数据时，它将被创建。\n\n选择你想要连接的集合的过程与连接数据库的过程相似；换句话说，你使用\
  \ (`->`) 语法直接指向相关的集合，如下例所示：\n\n```\n// 连接到数据库\n$c = new MongoClient();\n// 选择你想要连接到的数据库\
  \ ('contacts') 和集合 ('people')\n$c->contacts->people;\n```\n\n`selectCollection()`\
  \ 函数也让你能够选择——或切换——集合，如下例所示：\n\n```\n// 连接到数据库\n$c = new MongoClient();\n// 选择你想要连接到的数据库\
  \ ('contacts') 和集合 ('people')\n$c->selectDB(\"contacts\")->selectCollection(\"people\"\
  );\n```\n\n##### 列出数据库和集合\n\n在你选择数据库或集合之前，有时需要找到所需的数据库或集合。`MongoClient` 类包含两个额外的命令，用于列出可用的数据库以及可用的集合。\n\
  \n你可以通过调用 `listDBs()` 函数并打印输出（输出将被放入一个数组）来获取可用数据库的列表：\n\n```\n// 连接到数据库\n$c = new\
  \ MongoClient();\n// 列出可用的数据库\nprint_r($c->listDBs());\n```\n\n同样，你可以使用 `listCollections()`\
  \ 来获取数据库中可用集合的列表：\n\n```\n// 连接到数据库\n$c = new MongoClient();\n// 列出 'contacts' 数据库中可用的集合\n\
  print_r($c->contacts->listCollections());\n```\n\n**注意**\n本示例中使用的 `print_r` 命令是一个\
  \ PHP 命令，用于打印数组的内容。`listDBs()` 函数直接返回一个数组，因此该命令可以用作 `print_r` 函数的参数。\n\n##### 断开连接\n\
  \n`MongoClient` 类还包含一个 `close()` 函数，你可以使用它来断开 PHP 会话与数据库服务器的连接。然而，通常不需要使用它，除非在特殊情况下，因为当\
  \ `MongoClient` 对象超出作用域时，驱动会自动干净地关闭与数据库的连接。\n\n有时你可能并不想强制关闭连接。例如，你可能不确定连接的实际状态，或者你可能希望确保可以建立一个新的连接。在这种情况下，你可以使用\
  \ `close()` 函数，如下例所示：\n\n```\n// 连接到数据库\n$c = new MongoClient();\n// 关闭连接\n$c->close();\n\
  ```\n\n\n\n\n#### 插入数据\n\n到目前为止，你已经了解了如何建立与数据库的连接。现在，是时候学习如何将数据插入到你的集合中了。在 PHP 中执行此过程与使用\
  \ MongoDB shell 时并无不同。该过程分为两步。首先，你在变量中定义文档。其次，你使用 `insert()` 函数将其插入。\n\n定义文档并非 MongoDB\
  \ 特有——相反，你是创建一个包含键和值的数组，如下例所示：\n\n```php\n$contact = array(\n    \"First Name\"\
  \ => \"Philip\",\n    \"Last Name\" => \"Moran\",\n    \"Address\" => array(\n \
  \       \"Street\" => \"681 Hinkle Lake Road\",\n        \"Place\" => \"Newton\"\
  ,\n        \"Postal Code\" => \"MA 02160\",\n        \"Country\" => \"USA\"\n  \
  \  ),\n    \"E-Mail\" => array(\n        \"pm@example.com\",\n        \"pm@office.com\"\
  ,\n        \"philip@example.com\",\n        \"philip@office.com\",\n        \"moran@example.com\"\
  ,\n        \"moran@office.com\",\n        \"pmoran@example.com\",\n        \"pmoran@office.com\"\
  \n    ),\n    \"Phone\" => \"617-546-8428\",\n    \"Age\" => 60\n);\n```\n\n**Warning**\n\
  \n发送到数据库的字符串需要是 UTF-8 格式的，以防止发生异常。\n\n一旦你正确地将数据分配给一个变量——本例中称为 `$contact`——你就可以使用\
  \ `insert()` 函数将其插入到 `MongoCollection` 类中：\n\n```php\n// Connect to the database\n\
  $c = new MongoClient();\n// Select the collection 'people'\n$collection = $c->contacts->people;\n\
  // Insert the document '$contact' into the people collection '$collection'\n$collection->insert($contact);\n\
  ```\n\n`insert()` 函数接受五个选项，这些选项在一个数组中指定：`fsync`、`j`、`w`、`wtimeout` 和 `timeout`。`fsync`\
  \ 选项可以设置为 `TRUE` 或 `FALSE`；`FALSE` 是此选项的默认值。如果设置为 `TRUE`，`fsync` 会强制数据在表明插入成功之前写入硬盘。此选项将覆盖\
  \ `w` 选项的任何设置，将其设置为 0。`j` 选项可以设置为 `TRUE` 或 `FALSE`，其中 `FALSE` 是默认值。如果设置了 `j` 选项，它会强制数据在表明插入成功之前写入日志。如果你不熟悉日志记录，可以将其视为一个日志文件，在数据最终写入磁盘之前，跟踪对数据所做的更改。这确保了如果\
  \ `mongod` 意外停止，它将能够恢复写入日志的更改，从而防止你的数据进入不一致的状态。\n\n`w` 选项可用于确认或不确认写操作（这也使得此选项适用于\
  \ `remove()` 和 `update()` 操作）。如果 `w` 设置为 0，则写操作不会被确认；将其设置为 1，则写操作将被（主）服务器确认。在使用副本集时，`w`\
  \ 也可以设置为 `n`，确保当写操作成功复制到 `n` 个节点时，主服务器确认该操作。`w` 也可以设置为 `'majority'`——一个保留字符串——确保副本集中的大多数节点确认写入，或者设置为特定标签，确保那些带有标签的节点确认写入。对于此选项，默认设置也是\
  \ 1。`wtimeout` 选项可用于指定服务器等待接收确认的时间（以毫秒为单位）。默认情况下，此选项设置为 10000。最后，`timeout` 选项允许你指定客户端等待数据库响应的时间（以毫秒为单位）。\n\
  \n以下示例说明了如何使用 `w` 和 `wtimeout` 选项插入数据：\n\n```php\n// Define another contact\n$contact\
  \ = array(\n    \"Fir't Name\" => \"Victoria\",\n    \"Last Name\" => \"Wood\",\n\
  \    \"Address\" => array(\n        \"Street\" => \"50 Ash lane\",\n        \"Place\"\
  \ => \"Ystradgynlais\",\n        \"Postal Code\" => \"SA9 6XS\",\n        \"Country\"\
  \ => \"UK\"\n    ),\n    \"E-Mail\" => array(\n        \"vw@example.com\",\n   \
  \     \"vw@office.com\"\n    ),\n    \"Phone\" => \"078-8727-8049\",\n    \"Age\"\
  \ => 28\n);\n// Connect to the database\n$c = new MongoClient();\n// Select the\
  \ collection 'people'\n$collection = $c->contacts->people;\n// Specify the w and\
  \ wtimeout options\n$options = array(\"w\" => 1, \"wtimeout\" => 5000);\n// Insert\
  \ the document '$contact' into the people collection '$collection'\n$collection->insert($contact,$options);\n\
  ```\n\n使用 PHP 驱动程序向数据库插入数据就是这些了。在大多数情况下，你可能会专注于定义包含数据的数组，而不是将数据注入数组。\n\n#### 列出你的数据\n\
  \n通常，你会使用 `find()` 函数来查询数据。它接受一个参数，用于指定你的搜索条件；一旦指定了条件，你就可以执行 `find()` 来获取结果。默认情况下，`find()`\
  \ 函数简单地返回集合中的所有文档。这类似于第 4 章中讨论的 shell 示例。然而，大多数时候，你可能不想这样做。相反，你会希望定义特定的信息来返回结果。接下来的几节将介绍一些常用的选项和参数，你可以与\
  \ `find()` 函数一起使用来过滤你的结果。\n\n##### 返回单个文档\n\n列出单个文档很简单：只需执行没有任何参数的 `findOne()` 函数，它将抓取在集合中找到的第一个文档。`findOne`\
  \ 函数将返回的信息存储在一个数组中，并留给你再次打印它，如本例所示：\n\n```php\n// Connect to the database\n$c =\
  \ new MongoClient();\n// Select the collection 'people' from the database 'contacts'\n\
  $collection = $c->contacts->people;\n// Find the very first document within the\
  \ collection, and print it out\n// using print_r\nprint_r($collection->findOne());\n\
  ```\n\n如前所述，在集合中列出单个文档很容易：你只需要定义 `findOne()` 函数本身即可。当然，你可以将 `findOne()` 函数与额外的过滤器一起使用。例如，如果你知道你要找的人的姓氏，你可以在\
  \ `findOne()` 函数中将其指定为一个选项：\n\n```php\n// Connect to the database\n$c = new MongoClient();\n\
  // Select the collection 'people' from the database 'contacts'\n$collection = $c->contacts->people;\n\
  // Define the last name of the person in the $lastname variable\n$lastname = array(\"\
  Last Name\" => \"Moran\");\n// Find the very first person in the collection with\
  \ the last name \"Moran\"\nprint_r($collection->findOne($lastname));\n```\n\n当然，还有更多用于过滤数据的选项；你将在本章后面了解更多关于这些附加选项的信息。让我们首先看一下使用\
  \ `print_r()` 命令返回的一些示例输出（该示例添加了几个换行符以使代码更易于阅读）：\n\n```\nArray (\n    [_id] => MongoId\
  \ Object ( )\n    [First Name] => Philip\n    [Last Name] => Moran\n    [Address]\
  \ => Array (\n        [Street] => 681 Hinkle Lake Road\n        [Place] => Newton\n\
  \        [Postal Code] => MA 02160\n        [Country] => USA\n    )\n    [E-Mail]\
  \ => Array (\n        [0] => pm@example.com\n        [1] => pm@office.com\n    \
  \    [2] => philip@example.com\n        [3] => philip@office.com\n        [4] =>\
  \ moran@example.com\n        [5] => moran@office.com\n        [6] => pmoran@example.com\n\
  \        [7] => pmoran@office.com\n    )\n    [Phone] => 617-546-8428\n    [Age]\
  \ => 60\n)\n```\n\n\n##### 列出所有文档\n\n虽然你可以使用 `findOne()` 函数来列出单个文档，但几乎所有其他情况你都会使用\
  \ `find()` 函数。请别误会：你也可以通过限制结果数量，用 `find()` 函数查找单个文档；但如果你不确定会返回多少文档，或者预期会返回多个文档，那么\
  \ `find()` 函数就是你的好帮手。\n\n正如前面章节所详述的，`find()` 函数有非常非常多的选项，你可以利用它们来过滤结果，以适应你能想象到的几乎所有情况。我们将从几个简单的例子开始，然后在此基础上逐步深入。\n\
  \n首先，让我们看看如何使用 PHP 和 `find()` 函数显示某个集合中的所有文档。在打印多个文档时，唯一需要警惕的是每个文档都是以数组形式返回的，并且每个数组都需要单独打印。你可以使用\
  \ PHP 的 `while()` 函数来实现这一点。正如刚刚指出的，你需要指示该函数在继续处理下一个文档之前先打印当前文档。`getNext()` 命令从 MongoDB\
  \ 的游标中获取下一个文档；这个命令有效地返回游标中的下一个对象并推进游标。以下代码片段列出了集合中找到的所有文档：\n\n```\n// 连接到数据库\n$c\
  \ = new MongoClient();\n\n// 从 'contacts' 数据库中选择 'people' 集合\n$collection = $c->contacts->people;\n\
  \n// 执行查询并将其存储在 $cursor 变量下\n$cursor = $collection->find();\n\n// 遍历集合中找到的每个文档，打印其内容\n\
  while ($document = $cursor->getNext())\n{\n        print_r($document);\n}\n```\n\
  \n注意\n\n前面示例的语法可以通过几种不同的方式实现。例如，执行前面命令的一种更快的方式如下：`$cursor = $c->contacts->people->find()`。然而，为了清晰起见，本章中像这样的代码示例将被拆分成两行，以便留出更多空间用于注释。\n\
  \n在这个阶段，如果你只添加了本章前面描述的文档（没有其他内容），那么得到的输出仍然只会显示两个数组。如果你添加更多文档，那么每个文档都会在自己的数组中打印出来。诚然，这看起来不太美观；不过，多加一点代码就能解决这个问题。\n\
  \n##### 使用查询运算符\n\n你能在 MongoDB shell 中完成的任何操作，同样可以使用 PHP 驱动来实现。正如你在前面章节中所见，shell\
  \ 包含了数十种用于过滤结果的选项。例如，你可以使用点表示法；对结果进行排序或限制；跳过、计数或对多个项目进行分组；甚至可以使用正则表达式等等。接下来的几节将引导你了解如何使用\
  \ PHP 驱动来实现其中的大部分选项。\n\n##### 查询特定信息\n\n你可能还记得第 4 章，你可以使用点表示法来查询文档中嵌入对象的特定信息。例如，如果你知道某个联系人的部分地址详情，想要找到这个联系人，你可以使用点表示法来查找，如下例所示：\n\
  \n```\n// 连接到数据库\n$c = new MongoClient();\n\n// 从 'contacts' 数据库中选择 'people' 集合\n\
  $collection = $c->contacts->people;\n\n// 使用点表示法搜索 Address.Place 设置为 \"Newton\"\
  \ 的文档\n$address = array(\"Address.Place\" => \"Newton\");\n\n// 执行查询并将其存储在 $cursor\
  \ 变量下\n$cursor = $collection->find($address);\n\n// 遍历集合中找到的每个文档，打印其 ID 和内容\nwhile\
  \ ($document = $cursor->getNext())\n{\n    print_r($document);\n}\n```\n\n以类似的方式，你可以通过指定文档数组中的某一项（例如电子邮件地址）来搜索文档数组中的信息。因为电子邮件地址（通常是）唯一的，所以在本例中使用\
  \ `findOne()` 函数就足够了：\n\n```\n// 连接到数据库\n$c = new MongoClient();\n\n// 从 'contacts'\
  \ 数据库中选择 'people' 集合\n$collection = $c->contacts->people;\n\n// 定义要搜索的电子邮件地址，存储在\
  \ $email 变量下\n$email = array(\"E-Mail\" => \"vw@example.com\");\n\n// 查找集合中匹配该电子邮件地址的第一个人\n\
  print_r($collection->findOne($email));\n```\n\n正如预期的那样，这个例子返回了第一个匹配电子邮件地址 `vw@example.com`\
  \ 的文档——在本例中是 Victoria Wood 的地址。文档以数组的形式返回：\n\n```\nArray (\n    [_id] => MongoId\
  \ Object ( )\n    [First Name] => Victoria\n    [Last Name] => Wood\n    [Address]\
  \ => Array (\n        [Street] => 50 Ash lane\n        [Place] => Ystradgynlais\n\
  \        [Postal Code] => SA9 6XS\n        [Country] => UK\n    )\n    [E-Mail]\
  \ => Array (\n        [0] => vw@example.com\n        [1] => vw@office.com\n    )\n\
  \    [Phone] => 078-8727-8049\n    [Age] => 28\n)\n```\n\n##### 排序、限制和跳过项目\n\n`MongoCursor`\
  \ 类提供了 `sort()`、`limit()` 和 `skip()` 函数，它们分别允许你对结果进行排序、限制返回的结果总数以及跳过特定数量的结果。让我们使用\
  \ PHP 驱动来检查每个函数及其用法。\n\nPHP 的 `sort()` 函数接受一个数组作为参数。在该数组中，你可以指定用于对文档进行排序的字段。与使用\
  \ shell 时一样，使用值 `1` 表示按升序对结果排序，使用 `-1` 表示按降序对结果排序。请注意，这些函数是在现有的游标上执行的——也就是说，是对先前执行的\
  \ `find()` 命令的结果进行操作。\n\n以下示例根据年龄按升序对联系人进行排序：\n\n```\n// 连接到数据库\n$c = new MongoClient();\n\
  \n// 从 'contacts' 数据库中选择 'people' 集合\n$collection = $c->contacts->people;\n\n//\
  \ 执行查询并将其存储在 $cursor 变量下\n$cursor = $collection->find();\n\n// 使用 sort 命令基于年龄对 $cursor\
  \ 中的所有结果进行排序\n$cursor->sort(array('Age' => 1));\n\n// 打印结果\nwhile($document = $cursor->getNext())\n\
  {\n    print_r($document);\n}\n```\n\n你在实际的游标上执行 `limit()` 函数；它只接受一个参数，该参数指定你希望返回的结果数量。`limit()`\
  \ 命令返回在集合中找到的、匹配你搜索条件的前 n 个项目。以下示例只返回一个文档（当然，你本可以使用 `findOne()` 函数来实现，但 `limit()`\
  \ 同样能完成任务）：\n\n```\n// 连接到数据库\n$c = new MongoClient();\n\n// 从 'contacts' 数据库中选择\
  \ 'people' 集合\n$collection = $c->contacts->people;\n\n// 执行查询并将其存储在 $cursor 变量下\n\
  $cursor = $collection->find();\n\n// 使用 limit 函数将结果数量限制为 1\n$cursor->limit(1);\n\
  \n// 打印结果\nwhile($document = $cursor->getNext())\n{\n    print_r($document);\n}\n\
  ```\n\n最后，你可以使用 `skip()` 函数跳过前 n 个匹配你条件的结果。这个函数也在游标上工作：\n\n```\n// 连接到数据库\n$c =\
  \ new MongoClient();\n\n// 从 'contacts' 数据库中选择 'people' 集合\n$collection = $c->contacts->people;\n\
  \n// 执行查询并将其存储在 $cursor 变量下\n$cursor = $collection->find();\n\n// 使用 skip 函数跳过找到的第一个结果\n\
  $cursor->skip(1);\n\n// 打印结果\nwhile($document = $cursor->getNext())\n{\n    print_r($document);\n\
  }\n```\n\n##### 计算匹配结果的数量\n\n你可以使用 PHP 的 `count()` 函数来统计符合你条件的文档数量，并返回数组中的项目数。该函数是\
  \ `MongoCursor` 类的一部分，因此作用于游标。以下示例展示了如何获取\"contacts\"集合中居住在美国的人数统计：\n\n```php\n\
  // 连接到数据库\n$c = new MongoClient();\n\n// 从数据库 'contacts' 中选择集合 'people'\n$collection\
  \ = $c->contacts->people;\n\n// 指定搜索参数\n$country = array(\"Address.Country\" =>\
  \ \"USA\");\n\n// 执行查询并存储在 $cursor 变量中以便后续处理\n$cursor = $collection->find($country);\n\
  \n// 统计结果并返回数值\nprint_r($cursor->count());\n```\n\n这个查询返回一个结果。此类统计对于各种操作都很有用，无论是计算评论数、注册用户总数还是其他任何事情。\n\
  \n###### 使用聚合框架对数据进行分组\n\n聚合框架无疑是 MongoDB 内置的更强大的功能之一，因为它允许你在无需使用——通常过于复杂的——Map/Reduce\
  \ 功能的情况下计算聚合值。该框架包含的最有用的管道操作符之一是 `$group` 操作符，它可以粗略地与 SQL 的 `GROUP BY` 功能相比较。这个操作符允许你基于文档集合计算聚合值。例如，聚合函数\
  \ `$max` 可用于查找并返回一组中的最大值；`$min` 函数用于查找并返回最小值；`$sum` 用于计算给定值的出现总次数。\n\n假设你想要获取集合中所有联系人的列表，并按他们居住的国家分组。聚合框架可以让你轻松完成此操作。让我们看一个例子：\n\
  \n```php\n// 连接到数据库\n$c = new MongoClient();\n\n// 从数据库 'contacts' 中选择集合 'people'\n\
  $collection = $c->contacts->people;\n\n// 执行查询并将其存储在 $result 变量中\n$result = $collection->aggregate(array(\n\
  \    '$group' => array(\n        '_id' => '$Address.Country',\n        'total' =>\
  \ array('$sum' => 1)\n    )\n));\n\n// 统计结果并返回数值\nprint_r($result);\n```\n\n如你所见，`aggregate`\
  \ 函数接受一个（或多个）包含管道操作符的数组（本例中是 `$group` 操作符）。在这里，你可以指定如何返回结果输出，以及要执行的任何可选聚合函数：本例中是\
  \ `$sum` 函数。在此示例中，为找到的每个唯一国家返回一个唯一的文档，由文档的 `_id` 字段表示。接下来，使用 `$sum` 函数汇总每个国家的总计数，并通过\
  \ `total` 字段返回。请注意，`$sum` 函数由一个数组表示，并被赋值为 1，因为我们希望每个匹配项使总数增加 1。\n\n你可能想知道输出结果会是什么样子。假设有两个联系人住在英国，一个住在美国，以下是输出示例：\n\
  \n```php\nArray (\n    [result] => Array (\n        [0] => Array (\n           \
  \ [_id] => UK\n            [total] => 2\n        )\n        [1] => Array (\n   \
  \         [_id] => USA\n            [total] => 1\n        )\n    )\n    [ok] =>\
  \ 1\n)\n```\n\n这个例子只是一个简单的示例，但正如我们将在第 8 章中更深入探讨时所看到的，聚合框架确实相当强大。\n\n##### 使用 Hint\
  \ 指定索引\n\n你可以使用 PHP 的 `hint()` 函数来指定在查询数据时应使用哪个索引；这样做可以帮助你提高查询性能。例如，假设你的集合中有数千个联系人，并且你通常基于姓氏搜索某人。这种情况下，建议你在集合的\
  \ `Last Name` 键上创建一个索引。\n\n**注意：** 下面展示的 `hint()` 示例，如果未先创建索引，则不会返回任何内容。\n\n要使用\
  \ `hint()` 函数，必须将其应用于游标，如下例所示：\n\n```php\n// 连接到数据库\n$c = new MongoClient();\n\n\
  // 从数据库 'contacts' 中选择集合 'people'\n$collection = $c->contacts->people;\n\n// 执行查询并存储在\
  \ $cursor 变量中\n$cursor = $collection->find(array(\"Last Name\" => \"Moran\"));\n\
  \n// 使用 hint 函数指定要使用的索引\n$cursor->hint(array(\"Last Name\" => -1));\n\n// 打印结果\n\
  while($document = $cursor->getNext()) {\n    print_r($document);\n}\n```\n\n**注意：**\
  \ 有关如何创建索引的更多详细信息，请参见第 4 章。也可以在那里讨论的，使用 PHP 驱动程序的 `ensureIndex()` 函数来创建索引。\n\n#####\
  \ 使用条件操作符优化查询\n\n你可以使用条件操作符来优化查询。PHP 自带一组不错的默认条件操作符，例如 `<`（小于）、`>`（大于）、`<=`（小于或等于）和\
  \ `>=`（大于或等于）。现在说个坏消息：你不能在 PHP 驱动程序中使用这些操作符。相反，你需要使用 MongoDB 版本的这些操作符。幸运的是，MongoDB\
  \ 本身自带了大量的条件操作符（你可以在第 4 章中找到有关这些操作符的更多信息）。在通过 PHP 查询数据时，你可以使用所有这些操作符，通过 `find()`\
  \ 函数将它们传递进去。\n\n虽然你可以在 PHP 驱动程序中使用所有这些操作符，但必须使用特定的语法；也就是说，必须将它们放在一个数组中，并将此数组传递给\
  \ `find()` 函数。以下部分将引导你了解如何使用几个常用的操作符。\n\n\n#### 使用 `$lt`、`$gt`、`$lte` 和 `$gte` 操作符\n\
  \nMongoDB 的 `$lt`、`$gt`、`$lte` 和 `$gte` 操作符允许你执行与 `<`、`>`、`<=` 和 `>=` 操作符相同的操作。这些操作符在你希望搜索存储整数值的文档时非常有用。\n\
  \n你可以使用 `$lt`（小于）操作符来查找任何整数值小于 n 的数据，如下例所示：\n\n```php\n// Connect to the database\n\
  $c = new MongoClient();\n// Select the collection 'people' from the database 'contacts'\n\
  $collection = $c->contacts->people;\n// Specify the conditional operator\n$cond\
  \ = array('Age' => array('$lt' => 30));\n// Execute the query and store it under\
  \ the $cursor variable\n$cursor = $collection->find($cond);\n//Print the results\n\
  while($document = $cursor->getNext())\n{\n    print_r($document);\n}\n```\n\n结果显示，当前文档中只有一个结果：Victoria\
  \ Wood 的联系信息，她恰好小于 30 岁：\n\n```\nArray (\n    [_id] => MongoId Object ( )\n    [First\
  \ Name] => Victoria\n    [Last Name] => Wood\n    [Address] => Array (\n       \
  \ [Street] => 50 Ash lane\n        [Place] => Ystradgynlais\n        [Postal Code]\
  \ => SA9 6XS\n        [Country] => UK\n    )\n    [E-Mail] => Array (\n        [0]\
  \ => vw@example.com\n        [1] => vw@office.com\n    )\n    [Phone] => 078-8727-8049\n\
  \    [Age] => 28\n)\n```\n\n类似地，你可以使用 `$gt` 操作符查找任何年龄大于 30 的联系人。下面的例子通过将 `$lt` 变量改为\
  \ `$gt`（大于）来实现这一点：\n\n```php\n// Connect to the database\n$c = new MongoClient();\n\
  // Select the collection 'people' from the database 'contacts'\n$collection = $c->contacts->people;\n\
  // Specify the conditional operator\n$cond = array('Age' => array('$gt' => 30));\n\
  // Execute the query and store it under the $cursor variable\n$cursor = $collection->find($cond);\n\
  //Print the results\nwhile($document = $cursor->getNext())\n{\n    print_r($document);\n\
  }\n```\n\n这将返回 Philip Moran 的文档，因为他大于 30 岁：\n\n```\nArray (\n    [_id] => MongoId\
  \ Object ( )\n    [First Name] => Philip\n    [Last Name] => Moran\n    [Address]\
  \ => Array (\n        [Street] => 681 Hinkle Lake Road\n        [Place] => Newton\n\
  \        [Postal Code] => MA 02160\n        [Country] => USA\n    )\n    [E-Mail]\
  \ => Array (\n        [0] => pm40%example.com\n        [1] => pm40%office.com\n\
  \        [2] => philip40%example.com\n        [3] => philip40%office.com\n     \
  \   [4] => moran40%example.com\n        [5] => moran40%office.com\n        [6] =>\
  \ pmoran40%example.com\n        [7] => pmoran@office.com\n    )\n    [Phone] =>\
  \ 617-546-8428\n    [Age] => 60\n)\n```\n\n你可以使用 `$lte` 操作符来指定值必须完全匹配或低于指定值。请记住：`$lt`\
  \ 会找到任何小于 30 的人，但不会找到等于 30 的人。对于 `$gte` 操作符也是如此，它找到任何大于或等于指定整数的值。现在让我们看一对例子。\n\n\
  第一个例子将把集合中的两个项目都返回到你的屏幕上：\n\n```php\n// Connect to the database\n$c = new MongoClient();\n\
  // Select the collection 'people' from the database 'contacts'\n$collection = $c->contacts->people;\n\
  // Specify the conditional operator\n$cond = array('Age' => array('$lte' => 60));\n\
  // Execute the query and store it under the $cursor variable\n$cursor = $collection->find($cond);\n\
  //Print the results\nwhile($document = $cursor->getNext())\n{\n    print_r($document);\n\
  }\n```\n\n第二个例子将只显示一个文档，因为集合中只包含一个年龄大于或等于 60 的联系人：\n\n```php\n// Connect to the\
  \ database\n$c = new MongoClient();\n// Select the collection 'people' from the\
  \ database 'contacts'\n$collection = $c->contacts->people;\n// Specify the conditional\
  \ operator\n$cond = array('Age' => array('$gte' => 60));\n// Execute the query and\
  \ store it under the $cursor variable\n$cursor = $collection->find($cond);\n//Print\
  \ the results\nwhile($document = $cursor->getNext())\n{\n    print_r($document);\n\
  }\n```\n\n##### 查找与指定值不匹配的文档\n\n你可以使用 `$ne`（不等于）操作符来查找任何与 `$ne` 操作符中指定值不匹配的文档。这个操作符的语法很简单。下一个例子将显示任何年龄不等于\
  \ 28 的联系人：\n\n```php\n// Connect to the database\n$c = new MongoClient();\n// Select\
  \ the collection 'people' from the database 'contacts'\n$collection = $c->contacts->people;\n\
  // Specify the conditional operator\n$cond = array('Age' => array('$ne' => 28));\n\
  // Execute the query and store it under the $cursor variable\n$cursor = $collection->find($cond);\n\
  //Print the results\nwhile($document = $cursor->getNext())\n{\n    print_r($document);\n\
  }\n```\n\n##### 使用 `$in` 匹配多个值中的任意一个\n\n`$in` 操作符允许你搜索匹配数组中添加的几个可能值之一的文档，如下例所示：\n\
  \n```php\n// Connect to the database\n$c = new MongoClient();\n// Select the collection\
  \ 'people' from the database 'contacts'\n$collection = $c->contacts->people;\n//\
  \ Specify the conditional operator\n$cond = array('Address.Country' => array('$in'\
  \ => array(\"USA\",\"UK\")));\n// Execute the query and store it under the $cursor\
  \ variable\n$cursor = $collection->find($cond);\n//Print the results\nwhile($document\
  \ = $cursor->getNext())\n{\n    print_r($document);\n}\n```\n\n输出结果将显示任何你添加的人的联系信息，无论这个人居住在美国还是英国。请注意，可能性列表实际上是添加到一个数组中的；不能“直接那样”输入。\n\
  \n##### 使用 `$all` 在查询中匹配所有条件\n\n与 `$in` 操作符类似，`$all` 操作符允许你与另一个数组中的多个值进行比较。不同之处在于，`$all`\
  \ 操作符要求数组中的所有项都匹配一个文档才返回任何结果。以下示例展示了如何进行此类查询：\n\n```php\n// Connect to the database\n\
  $c = new MongoClient();\n// Select the collection 'people' from the database 'contacts'\n\
  $collection = $c->contacts->people;\n// Specify the conditional operator\n$cond\
  \ = array('E-Mail' => array('$all' => array(\"vw@example.com\",\"vw@office.com\"\
  )));\n// Execute the query and store it under the $cursor variable\n$cursor = $collection->find($cond);\n\
  //Print the results\nwhile($document = $cursor->getNext())\n{\n    print_r($document);\n\
  }\n```\n\n\n\n#### 使用 `$or` 搜索多个表达式\n\n你可以使用 `$or` 操作符来指定文档可以包含的多个表达式以返回匹配项。这两种操作符之间的区别在于，`$in`\
  \ 操作符不允许你同时指定一个键和值，而 `$or` 操作符则允许。你可以将 `$or` 操作符与任何其他键/值组合结合使用。让我们看两个例子。\n\n第一个例子搜索并返回任何包含\
  \ `Age` 键且整数值为 `28`，或者包含 `Address.Country` 键且值为 `USA` 的文档：\n\n```\n// Connect to\
  \ the database\n$c = new MongoClient();\n// Select the collection 'people' from\
  \ the database 'contacts'\n$collection = $c->contacts->people;\n// Specify the conditional\
  \ operator\n$cond = array('$or' => array(\n    array(\"Age\" => 28),\n    array(\"\
  Address.Country\" => \"USA\")\n) );\n// Execute the query and store it under the\
  \ $cursor variable\n$cursor = $collection->find($cond);\n//Print the results\nwhile($document\
  \ = $cursor->getNext())\n{\n    print_r($document);\n}\n```\n\n第二个例子搜索并返回任何 `Address.Country`\
  \ 键设置为 `USA`（必需条件），同时具有一个键/值设置为 `\"Last Name\" : \"Moran\"` 或 `\"E-Mail\" : \"vw@example.com\"\
  ` 的文档：\n\n```\n// Connect to the database\n$c = new MongoClient();\n// Select the\
  \ collection 'people' from the database 'contacts'\n$collection = $c->contacts->people;\n\
  // Specify the conditional operator\n$cond = array(\n    \"Address.Country\" =>\
  \ \"USA\",\n    '$or' => array(\n        array(\"Last Name\" => \"Moran\"),\n  \
  \      array(\"E-Mail\" => \"vw40%example.com\")\n    )\n);\n// Execute the query\
  \ and store it under the $cursor variable\n$cursor = $collection->find($cond);\n\
  //Print the results\nwhile($document = $cursor->getNext())\n{\n    print_r($document);\n\
  }\n```\n\n`$or` 操作符允许你同时进行两次搜索，然后合并结果输出，即使这两次搜索毫无共同之处。\n\n#### 使用 `$slice` 检索指定数量的项目\n\
  \n你可以使用 `$slice` 投影操作符从文档中的数组中检索指定数量的项目。此功能类似于本章前面详细介绍的 `skip()` 和 `limit()` 函数。区别在于\
  \ `skip()` 和 `limit()` 函数作用于完整的文档，而 `$slice` 操作符允许你操作数组而非单个文档。\n\n`$slice` 投影操作符是限制每页项目数量（通常称为分页）的绝佳方法。下一个示例展示了如何限制从先前指定的联系人之一（Philip\
  \ Moran）返回的电子邮件地址数量；在此情况下，只返回前三个电子邮件地址：\n\n```\n// Connect to the database\n$c =\
  \ new MongoClient();\n// Select the collection 'people' from the database 'contacts'\n\
  $collection = $c->contacts->people;\n// Specify our search operator\n$query = array(\"\
  Last Name\" => \"Moran\");\n// Create a new object from an array using the $slice\
  \ operator\n$cond = (object)array('E-Mail' => array('$slice' => 3));\n// Execute\
  \ the query and store it under the $cursor variable\n$cursor = $collection->find($query,\
  \ $cond);\n// For each document it finds within the collection, print the contents\n\
  while ($document = $cursor->getNext())\n{\n        print_r($document);\n}\n```\n\
  \n类似地，通过使整数为负数，你可以只获取列表中的最后三个电子邮件地址，如以下示例所示：\n\n```\n// Connect to the database\n\
  $c = new MongoClient();\n// Select the collection 'people' from the database 'contacts'\n\
  $collection = $c->contacts->people;\n// Specify our search operator\n$query = array(\"\
  Last Name\" => \"Moran\");\n// Specify the conditional operator\n$cond = (object)array('E-Mail'\
  \ => array('$slice' => -3));\n// Execute the query and store it under the $cursor\
  \ variable\n$cursor = $collection->find($query, $cond);\n// For each document it\
  \ finds within the collection, print the contents\nwhile ($document = $cursor->getNext())\n\
  {\n        print_r($document);\n}\n```\n\n或者，你可以跳过前两个条目并将结果限制为三个：\n\n```\n// Connect\
  \ to the database\n$c = new MongoClient();\n// Select the collection 'people' from\
  \ the database 'contacts'\n$collection = $c->contacts->people;\n// Specify our search\
  \ operator\n$query = array(\"Last Name\" => \"Moran\");\n// Specify the conditional\
  \ operator\n$cond = (object)array('E-Mail' => array('$slice' => array(2, 3)));\n\
  // Execute the query and store it under the $cursor variable\n$cursor = $collection->find($query,\
  \ $cond);\n// For each document it finds within the collection, print the contents\n\
  while ($document = $cursor->getNext())\n{\n        print_r($document);\n}\n```\n\
  \n`$slice` 操作符是限制数组中项目数量的绝佳方法；当你使用 MongoDB 驱动程序和 PHP 进行编程时，你肯定需要牢记这个操作符。\n\n####\
  \ 确定字段是否具有值\n\n你可以使用 `$exists` 操作符根据字段是否持有值来返回结果（无论该字段的值是什么）。尽管这听起来可能不合逻辑，但它实际上非常方便。例如，你可以搜索\
  \ `Age` 字段尚未设置的联系人；或者你可以搜索拥有街道名称的联系人。\n\n以下示例返回任何没有设置 `Age` 字段的联系人：\n\n```\n// Connect\
  \ to the database\n$c = new MongoClient();\n// Select the collection 'people' from\
  \ the database 'contacts'\n$collection = $c->contacts->people;\n// Specify the conditional\
  \ operator\n$cond = array('Age' => array('$exists' => false));\n// Execute the query\
  \ and store it under the $cursor variable\n$cursor = $collection->find($cond);\n\
  //Print the results\nwhile($document = $cursor->getNext())\n{\n    print_r($document);\n\
  }\n```\n\n类似地，下一个示例返回任何设置了 `Street` 字段的联系人：\n\n```\n// Connect to the database\n\
  $c = new MongoClient();\n// Select the collection 'people' from the database 'contacts'\n\
  $collection = $c->contacts->people;\n// Specify the conditional operator\n$cond\
  \ = array(\"Address.Street\" => array('$exists' => true));\n// Execute the query\
  \ and store it under the $cursor variable\n$cursor = $collection->find($cond);\n\
  //Print the results\nwhile($document = $cursor->getNext())\n{\n    print_r($document);\n\
  }\n```\n\n\n##### 正则表达式\n\n正则表达式非常实用。你几乎可以用它们做任何事情（也许除了煮咖啡之外）；在搜索数据时，它们能极大地简化你的工作。PHP\
  \ 驱动自带一个用于处理正则表达式的类：`MongoRegex` 类。你可以使用这个类创建正则表达式，然后用它们来查找数据。\n\n`MongoRegex` 类支持六种正则表达式标志，你可以用来查询数据。你可能已经熟悉其中一些：\n\
  \n*   `i`：启用大小写不敏感匹配。\n*   `m`：搜索跨多行（包含换行符）的内容。\n*   `x`：允许搜索中包含 `#` 注释。\n*   `l`：指定区域设置。\n\
  *   `s`：也称为 dotall 模式，此时 `.` 可以匹配所有字符，包括换行符。\n*   `u`：匹配 Unicode。\n\n现在让我们更仔细地看看如何在\
  \ PHP 中使用正则表达式来搜索集合中的数据。显然，用一个简单的例子来演示是最好的。\n\n例如，假设你想搜索一个你所知甚少的联系人。例如，你可能模糊地记得这个人居住的地方，并且地址中间某处包含类似\
  \ `stradgynl` 的内容。正则表达式为你提供了一种简单而优雅的方式来搜索这样的人：\n\n```\n// Connect to the database\n\
  $c = new MongoClient();\n\n// Select the collection 'people' from the database 'contacts'\n\
  $collection = $c->contacts->people;\n\n// Specify the regular expression\n$regex\
  \ = new MongoRegex(\"/stradgynl/i\");\n\n// Execute the query and store it under\
  \ the $cursor variable\n$cursor = $collection->find(array(\"Address.Place\" => $regex));\n\
  \n//Print the results\nwhile($document = $cursor->getNext())\n{\n    print_r($document);\n\
  }\n```\n\n在创建 PHP 应用程序时，你通常需要搜索特定数据。在前面的例子中，你可能会将文本（本例中是 `\"stradgynl\"`）替换为一个 `$_POST`\
  \ 变量。\n\n#### 使用 PHP 修改数据\n\n如果我们生活在一个所有数据都保持静态、人类从不打错字的世界里，我们就永远不需要更新文档。但世界比那要灵活一些，有时我们会犯错并希望纠正。\n\
  \n对于这种情况，你可以使用 MongoDB 中的一组修改器函数来更新（从而更改）你现有的数据。你可以通过几种方式实现这一点。例如，你可以使用 `update()`\
  \ 函数更新现有信息，然后使用 `save()` 函数保存你的更改。以下部分将介绍其中一些以及其他修改器操作符，并说明如何有效地使用它们。\n\n##### 通过\
  \ update() 更新\n\n如 第 4 章 所述，你使用 `update()` 函数执行大多数文档更新。与 MongoDB shell 中的 `update()`\
  \ 版本类似，PHP 驱动附带的 `update()` 函数允许你使用一系列修改器操作符来快速轻松地更新文档。PHP 版本的 `update()` 函数操作方式几乎相同；然而，成功使用\
  \ PHP 版本需要采用明显不同的方法。接下来的章节将引导你如何在 PHP 中成功使用此函数。\n\nPHP 的 `update()` 函数至少需要两个参数：第一个描述要更新的对象，第二个描述你想要用来更新匹配记录的对象。此外，你可以为一组更广泛的选项指定第三个参数。\n\
  \n`options` 参数提供了七个额外的标志，可以与 `update()` 函数一起使用；此列表解释了它们是什么以及如何使用它们：\n\n*   `upsert`：如果设置为\
  \ `true`，此布尔选项会在搜索条件未匹配时创建一个新文档。\n*   `multiple`：如果设置为 `true`，此布尔选项会导致更新所有匹配搜索条件的文档。\n\
  *   `fsync`：如果设置为 `true`，此布尔选项会在返回成功之前将数据同步到磁盘。如果此选项设置为 `true`，则意味着 `w` 被设置为 `0`，即使它被设置为其他值。默认为\
  \ false。\n*   `w`：如果设置为 0，更新操作将不会被确认。在使用副本集时，`w` 也可以设置为 n，确保主服务器在成功复制到 n 个节点后确认更新操作。也可以设置为保留字符串\
  \ `'majority'`——以确保大多数副本节点将确认更新，或设置为特定标签，以确保带有该标签的节点将确认更新。此选项默认为 1，确认更新操作。\n*  \
  \ `j`：如果设置为 `true`，此布尔选项将强制在指示更新成功之前将数据写入日志。默认为 `false`。\n*   `wtimeout`：用于指定服务器等待接收确认的时间（以毫秒为单位）。默认为\
  \ 10000。\n*   `timeout`：用于指定客户端需要等待数据库响应的时间（以毫秒为单位）。\n\n现在让我们看一个常见的例子，它在不使用任何修改器操作符（稍后讨论）的情况下，将\
  \ Victoria Wood 的名字改为 \"Vicky\"：\n\n```\n// Connect to the database\n$c = new MongoClient();\n\
  \n// Select the collection 'people' from the database 'contacts'\n$collection =\
  \ $c->contacts->people;\n\n// Specify the search criteria\n$criteria = array(\"\
  Last Name\" => \"Wood\");\n\n// Specify the information to be changed\n$update =\
  \ array(\n    \"First Name\" => \"Vicky\",\n    \"Last Name\" => \"Wood\",\n   \
  \ \"Address\" => array(\n        \"Street\" => \"50 Ash lane\",\n        \"Place\"\
  \ => \"Ystradgynlais\",\n        \"Postal Code\" => \"SA9 6XS\",\n        \"Country\"\
  \ => \"UK\"\n    ),\n    \"E-Mail\" => array(\n        \"vw40%example.com\",\n \
  \       \"vw40%office.com\"\n    ),\n    \"Phone\" => \"078-8727-8049\",\n    \"\
  Age\" => 28\n);\n\n// Options\n$options = array(\"upsert\" => true);\n\n// Perform\
  \ the update\n$collection->update($criteria,$update,$options);\n\n// Show the result\n\
  print_r($collection->findOne($criteria));\n```\n\n输出结果将如下所示：\n\n```\nArray (\n \
  \   [_id] => MongoId Object ()\n    [First Name] => Vicky\n    [Last Name] => Wood\n\
  \    [Address] => Array (\n        [Street] => 50 Ash lane\n        [Place] => Ystradgynlais\n\
  \        [Postal Code] => SA9 6XS\n        [Country] => UK\n    )\n    [E-Mail]\
  \ => Array (\n        [0] => vw40%example.com\n        [1] => vw40%office.com\n\
  \    )\n    [Phone] => 078-8727-8049\n    [Age] => 28\n)\n```\n\n仅仅为了更改一个值就要做这么多工作——这可不是你想靠它谋生的理想方式。然而，如果你不使用\
  \ PHP 的修改器操作符，这正是你必须做的。现在让我们看看如何在 PHP 中使用这些操作符让生活更轻松、更省时。\n\n**警告**\n\n如果在应用更改时未指定任何条件操作符，匹配文档中的数据将被数组中的信息替换。通常，如果你只想更改一个字段，最好使用\
  \ `$set`。\n\n\n## 使用更新操作符节省时间\n\n更新操作将为你节省大量输入时间。正如你可能同意的，前面的例子根本不可行。幸运的是，PHP 驱动程序包含了大约半打更新操作符，可以快速修改数据，而无需费力地完整写出。这里将再次简要概述每个操作符的用途，尽管你可能已经对其中大多数很熟悉了（你可以在第\
  \ 4 章找到本节讨论的所有更新操作符的更多信息）。然而，你在 PHP 中使用它们的方式以及与之相关的选项都有显著不同。我们将查看这些操作符的示例，以便你熟悉它们在\
  \ PHP 中的语法。\n\n> **注意：** 后续的更新操作符都不会包含 PHP 代码来检查所做的更改；相反，以下示例只应用更改。建议你在运行 PHP 代码的同时启动\
  \ MongoDB shell，这样你可以执行搜索并确认所需的更改已经应用。或者，你可以编写额外的 PHP 代码来执行这些检查。\n\n#### 使用 `$inc`\
  \ 增加特定键的值\n\n`$inc` 操作符允许你将特定键的值增加 n，假设该键存在。如果键不存在，则会创建它。以下示例将每个年龄小于 40 岁的人的年龄增加三岁：\n\
  \n```php\n// Connect to the database\n$c = new MongoClient();\n\n// Select the collection\
  \ 'people' from the database 'contacts'\n$collection = $c->contacts->people;\n\n\
  // Search for anyone that's younger than 40\n$criteria = array(\"Age\" => array('$lt'\
  \ => 40));\n\n// Use $inc to increase their age by 3 years\n$update = array('$inc'\
  \ => array('Age' => 3));\n\n// Options\n$options = array(\"upsert\" => true);\n\n\
  // Perform the update\n$collection->update($criteria,$update,$options);\n```\n\n\
  #### 使用 `$set` 更改键的值\n\n`$set` 操作符让你更改一个键的值，同时忽略其他任何字段。如前所述，对于在更早的例子中将 Victoria\
  \ 的名字更新为 `\"Vicky\"`，这本来是一个更好的选择。以下示例展示了如何使用 `$set` 操作符将联系人的名字更改为 `\"Vicky\"`：\n\
  \n```php\n// Connect to the database\n$c = new MongoClient();\n\n// Select the collection\
  \ 'people' from the database 'contacts'\n$collection = $c->contacts->people;\n\n\
  // Specify the search criteria\n$criteria = array(\"Last Name\" => \"Wood\");\n\n\
  // Specify the information to be changed\n$update = array('$set' => array(\"First\
  \ Name\" => \"Vicky\"));\n\n// Options\n$options = array(\"upsert\" => true);\n\n\
  // Perform the update\n$collection->update($criteria,$update,$options);\n```\n\n\
  你也可以使用 `$set` 为匹配你查询的每一个结果添加一个字段：\n\n```php\n// Connect to the database\n$c = new\
  \ MongoClient();\n\n// Select the collection 'people' from the database 'contacts'\n\
  $collection = $c->contacts->people;\n\n// Specify the search criteria using regular\
  \ expressions\n$criteria = array(\"E-Mail\" => new MongoRegex(\"/40%office.com/i\"\
  ));\n\n// Add \"Category => Work\" into every occurrence found\n$update = array('$set'\
  \ => array('Category' => 'Work'));\n\n// Options\n$options = array('upsert' => true,\
  \ 'multi' => true);\n\n// Perform the upsert via save()\n$collection->update($criteria,$update,$options);\n\
  ```\n\n#### 使用 `$unset` 删除字段\n\n`$unset` 操作符的工作方式类似于 `$set` 操作符。不同之处在于，`$unset`\
  \ 允许你从文档中删除给定的字段。例如，以下示例从 Victoria Wood 的联系信息中移除了 `Phone` 字段及其相关数据：\n\n```php\n\
  // Connect to the database\n$c = new MongoClient();\n\n// Select the collection\
  \ 'people' from the database 'contacts'\n$collection = $c->contacts->people;\n\n\
  // Specify the search criteria\n$criteria = array(\"Last Name\" => \"Wood\");\n\n\
  // Specify the information to be removed\n$update = array('$unset' => array(\"Phone\"\
  \ => 1));\n\n// Perform the update\n$collection->update($criteria,$update);\n```\n\
  \n#### 使用 `$rename` 重命名字段\n\n`$rename` 操作符可用于重命名字段。当你意外拼写错误或只是希望将其名称更改为更准确的名称时，这可能很有帮助。该操作符将在每个文档及其底层数组和子文档中搜索给定的字段名称。\n\
  \n> **警告：** 使用此操作符时要小心。如果文档已经包含具有新名称的字段，则该字段将被删除，之后旧字段名将被重命名为指定的新名称。\n\n让我们看一个例子，其中\
  \ `First Name` 和 `Last Name` 字段将分别重命名为 `Given Name` 和 `Family Name`，针对 Vicky Wood：\n\
  \n```php\n// Connect to the database\n$c = new MongoClient();\n\n// Select the collection\
  \ 'people' from the database 'contacts'\n$collection = $c->contacts->people;\n\n\
  // Specify the search criteria\n$criteria = array(\"Last Name\" => \"Wood\");\n\n\
  // Specify the information to be changed\n$update = array('$rename' => array(\"\
  First Name\" => \"Given Name\", \"Last Name\" => \"Family Name\"));\n\n// Perform\
  \ the update\n$collection->update($criteria,$update);\n```\n\n#### 使用 `$setOnInsert`\
  \ 在更新插入时更改键的值\n\nPHP 的 `$setOnInsert` 操作符可用于仅在更新操作使用 `upsert` 操作符执行插入操作时，才分配一个特定值。起初这可能听起来有点令人困惑，但你可以将此操作符视为一个条件语句，它仅在\
  \ `upsert` **插入**文档时设置给定值，而不是在**更新**文档时设置。让我们看一个例子来阐明其工作原理。首先，我们将执行一个 `upsert`，它匹配到一个现有文档，因此会忽略指定的\
  \ `$setOnInsert` 条件：\n\n```php\n// Connect to the database\n$c = new MongoClient();\n\
  \n// Select the collection 'people' from the database 'contacts'\n$collection =\
  \ $c->contacts->people;\n\n// Specify the search criteria\n$criteria = array(\"\
  Family Name\" => \"Wood\");\n\n// Specify the information to be set on upsert-inserts\
  \ only\n$update = array('$setOnInsert' => array(\"Country\" => \"Unknown\"));\n\n\
  // Specify the upsert options\n$options = array(\"upsert\" => true);\n\n// Perform\
  \ the update\n$collection->update($criteria,$update,$options);\n```\n\n接下来，让我们看一个例子，其中\
  \ `upsert` 执行了插入操作，因为文档尚不存在。在这里，你会发现指定的 `$setOnInsert` 条件将被成功应用：\n\n```php\n// Connect\
  \ to the database\n$c = new MongoClient();\n\n// Select the collection 'people'\
  \ from the database 'contacts'\n$collection = $c->contacts->people;\n\n// Specify\
  \ the search criteria\n$criteria = array(\"Family Name\" => \"Wallace\");\n\n//\
  \ Specify the information to be set on upsert-inserts only\n$update = array('$setOnInsert'\
  \ => array(\"Country\" => \"Unknown\"));\n\n// Specify the upsert options\n$options\
  \ = array(\"upsert\" => true);\n\n// Perform the update\n$collection->update($criteria,$update,$options);\n\
  ```\n\n这段代码将搜索任何 `Family Name` 字段（记住我们之前重命名了它）被设置为 `\"Wallace\"` 的文档。如果未找到，则会执行\
  \ `upsert`，结果是 `Country` 字段将被设置为 `\"Unknown\"`，创建出如下这个看起来空空如也的文档：\n\n```json\n{\n\
  \    \"_id\" : ObjectId(\"1\"),\n    \"Country\" : \"Unknown\",\n    \"Last Name\"\
  \ : \"Wallace\"\n}\n```\n\n\n#### 使用 MongoDB 更新操作符进行数组操作\n\n##### 赋值到指定字段：使用 `$push`\n\
  \nPHP 的 `$push` 操作符允许您将一个值追加到指定的字段。如果该字段是一个现有的数组，则数据将被添加；如果该字段不存在，则将被创建；如果该字段存在但不是一个数组，则会引发错误。以下示例展示了如何使用\
  \ `$push` 向现有数组中添加数据：\n\n```php\n// 连接到数据库\n$c = new MongoClient();\n\n// 从 'contacts'\
  \ 数据库中选择 'people' 集合\n$collection = $c->contacts->people;\n\n// 指定搜索条件\n$criteria\
  \ = array(\"Family Name\" => \"Wood\");\n\n// 指定要添加的信息\n$update = array('$push'\
  \ => array(\"E-Mail\" => \"vw40%mongo.db\"));\n\n// 执行更新\n$collection->update($criteria,$update);\n\
  ```\n\n##### 向键添加多个值：使用 `$push` 和 `$each`\n\n`$push` 操作符也允许您向一个键追加多个值。为此，需要添加 `$each`\
  \ 修饰符。这些值以数组形式呈现，如果它们在给定字段中尚不存在，则将被添加。由于使用的是 `$push` 操作符，通用规则同样适用：如果字段存在且是数组，则数据将被添加；如果字段不存在，则将被创建；如果字段存在但不是一个数组，则会引发错误。以下示例说明了如何使用\
  \ `$each` 修饰符：\n\n```php\n// 连接到数据库\n$c = new MongoClient();\n\n// 从 'contacts'\
  \ 数据库中选择 'people' 集合\n$collection = $c->contacts->people;\n\n// 指定搜索条件\n$criteria\
  \ = array(\"Family Name\" => \"Wood\");\n\n// 指定要添加的信息\n$update = array(\n    '$push'\
  \ => array(\n        \"E-Mail\" => array(\n            '$each' => array(\n     \
  \           \"vicwo40%mongo.db\",\n                \"vicwo40%example.com\"\n   \
  \         )\n        )\n    )\n);\n\n// 执行更新\n$collection->update($criteria,$update);\n\
  ```\n\n##### 向数组添加数据：使用 `$addToSet`\n\n`$addToSet` 操作符与 `$push` 操作符相似，但有一个重要区别：`$addToSet`\
  \ 确保只有当数据不在数组中时才将其添加。`$addToSet` 操作符接受一个数组作为参数：\n\n```php\n// 连接到数据库\n$c = new MongoClient();\n\
  \n// 从 'contacts' 数据库中选择 'people' 集合\n$collection = $c->contacts->people;\n\n//\
  \ 指定搜索条件\n$criteria = array(\"Family Name\" => \"Wood\");\n\n// 指定要添加的信息（成功，因为该条目尚不存在）\n\
  $update = array('$addToSet' => array(\"E-Mail\" => \"vic40%example.com\"));\n\n\
  // 执行更新\n$collection->update($criteria,$update);\n```\n\n同样，您可以通过将 `$addToSet` 操作符与\
  \ `$each` 操作符结合使用，来添加多个尚不存在的条目：\n\n```php\n// 连接到数据库\n$c = new MongoClient();\n\n\
  // 从 'contacts' 数据库中选择 'people' 集合\n$collection = $c->contacts->people;\n\n// 指定搜索条件\n\
  $criteria = array(\"Family Name\" => \"Wood\");\n\n// 指定要添加的信息（部分成功；一些示例已经存在）\n\
  $update = array(\n    '$addToSet' => array\n        (\n        \"E-Mail\" => array\n\
  \            (\n            '$each' => array\n                (\n              \
  \  \"vw40%mongo.db\",\n                \"vicky40%mongo.db\",\n                \"\
  vicky40%example.com\"\n                )\n            )\n        )\n);\n\n// 执行更新\n\
  $collection->update($criteria,$update);\n```\n\n##### 从数组中移除元素：使用 `$pop`\n\nPHP\
  \ 的 `$pop` 操作符允许您从数组中移除一个元素。请记住，您只能移除数组中的第一个或最后一个元素，而不能移除中间的元素。指定值为 `-1` 来移除第一个元素；类似地，指定值为\
  \ `1` 来移除最后一个元素：\n\n```php\n// 连接到数据库\n$c = new MongoClient();\n\n// 从 'contacts'\
  \ 数据库中选择 'people' 集合\n$collection = $c->contacts->people;\n\n// 指定搜索条件\n$criteria\
  \ = array(\"Family Name\" => \"Wood\");\n\n// 弹出列表中找到的第一个电子邮件地址\n$update = array('$pop'\
  \ => array(\"E-Mail\" => -1));\n\n// 执行更新\n$collection->update($criteria,$update);\n\
  ```\n\n> 注意\n> 指定值为 `-2` 或 `1000` 并不会改变要移除的元素。任何负数都会移除第一个元素，而任何正数都会移除最后一个元素。使用值\
  \ `0` 会从数组中移除最后一个元素。\n\n##### 移除值的每次出现：使用 `$pull`\n\n您可以使用 PHP 的 `$pull` 操作符从数组中移除一个给定值的每次出现。例如，如果您在使用\
  \ `$push` 或 `$pushAll` 时意外地向数组添加了重复项，这个操作符会很方便。以下示例移除了电子邮件地址的任何重复出现：\n\n```php\n\
  // 连接到数据库\n$c = new MongoClient();\n\n// 从 'contacts' 数据库中选择 'people' 集合\n$collection\
  \ = $c->contacts->people;\n\n// 指定搜索条件\n$criteria = array(\"Family Name\" => \"\
  Wood\");\n\n// 移除电子邮件地址 \"vicky40%example.com\" 的每次出现\n$update = array('$pull' =>\
  \ array(\"E-Mail\" => \"vicky40%example.com\"));\n\n// 执行更新\n$collection->update($criteria,$update);\n\
  ```\n\n##### 移除多个元素的每次出现\n\n类似地，您可以使用 `$pullAll` 操作符从文档中移除多个元素的每次出现，如下例所示：\n\n```php\n\
  // 连接到数据库\n$c = new MongoClient();\n\n// 从 'contacts' 数据库中选择 'people' 集合\n$collection\
  \ = $c->contacts->people;\n\n// 指定搜索条件\n$criteria = array(\"Family Name\" => \"\
  Wood\");\n\n// 移除以下电子邮件地址的每次出现\n$update = array(\n         '$pullAll' => array(\n\
  \                   \"E-Mail\" => array(\"vw40%mongo.db\",\"vw40%office.com\")\n\
  \         )\n);\n\n// 执行更新\n$collection->update($criteria,$update);\n```\n\n## MongoDB\
  \ PHP 驱动高级操作\n\n#### 使用 save() 进行更新插入数据\n\n与 `insert()` 函数类似，`save()` 函数允许你向集合中插入数据。唯一的区别是，你也可以使用\
  \ `save()` 来更新一个已包含数据的字段。正如你可能记得的，这被称为 **更新插入**。到目前为止，你执行 `save()` 函数的方式应该不足为奇。就像\
  \ MongoDB shell 中的 `save()` 函数一样，PHP 的 `save()` 接受两个参数：一个包含你希望保存信息的数组，以及保存时使用的任何选项。可以使用以下选项：\n\
  \n*   `fsync`：如果设置为 `true`，此布尔选项会导致数据在返回成功之前同步到磁盘。如果此选项设置为 `true`，则意味着 `w` 被设置为\
  \ `0`，即使它被设置为其他值。\n*   `w`：如果设置为 0，保存操作将不会被确认。在使用副本集时，`w` 也可以设置为 `n`，确保主服务器在成功复制到\
  \ `n` 个节点后确认保存操作。也可以设置为保留字符串 `'majority'` 以确保大多数副本节点确认保存，或者设置为特定标签，确保这些被打标签的节点确认保存。此选项默认为\
  \ 1，确认保存操作。\n*   `j`：如果设置为 `true`，此布尔选项将强制在指示保存成功之前将数据写入日志。默认为 `false`。\n*   `wtimeout`：用于指定服务器等待接收确认的时间（以毫秒为单位）。默认为\
  \ 10000。\n*   `timeout`：用于指定客户端需要等待数据库响应的时间（以毫秒为单位）。\n\nPHP 版 `save()` 的语法与 MongoDB\
  \ shell 中的语法类似，如以下示例所示：\n\n```php\n// Specify the document to be saved\n$contact\
  \ = array(\n    \"Given Name\" => \"Kenji\",\n    \"Family Name\" => \"Kitahara\"\
  ,\n    \"Address\" => array(\n        \"Street\" => \"149 Bartlett Avenue\",\n \
  \       \"Place\" => \"Southfield\",\n        \"Postal Code\" => \"MI 48075\",\n\
  \        \"Country\" => \"USA\"\n    ),\n    \"E-Mail\" => array(\n        \"kk40%example.com\"\
  ,\n        \"kk40%office.com\"\n    ),\n    \"Phone\" => \"248-510-1562\",\n   \
  \ \"Age\" => 34\n);\n\n// Connect to the database\n$c = new MongoClient();\n\n//\
  \ Select the collection 'people'\n$collection = $c->contacts->people;\n\n// Save\
  \ via the save() function\n$options = array(\"fsync\" => true); // Specify the save()\
  \ options\n$collection->save($contact,$options);\n\n// Realizing you forgot something,\
  \ let's upsert this contact:\n$contact['Category'] = 'Work';\n\n// Perform the upsert\n\
  $collection->save($contact);\n```\n\n##### 原子性地修改文档\n\n与 `save()` 和 `update()` 函数一样，`findAndModify()`\
  \ 函数可以从 PHP 驱动程序中调用。请记住，你可以使用 `findAndModify()` 函数来**原子性地**修改文档，并在更新成功执行后返回结果。你使用\
  \ `findAndModify()` 函数来更新**单个文档**——仅此而已。你可能记得，默认情况下，返回的文档不会显示所做的修改——要返回带有修改的文档，需要指定一个额外的参数：`new`\
  \ 参数。\n\n`findAndModify` 函数接受四个参数；`query`、`update`、`fields` 和 `options`。其中一些是可选的，具体取决于你的操作。例如，在指定\
  \ `update` 条件时，`fields` 和 `options` 是可选的。但是，当你希望使用 `remove` 选项时，`update` 和 `fields`\
  \ 参数需要被指定（例如，使用 `null`）。以下列表详细说明了可用参数：\n\n*   `query`：为查询指定一个过滤器。如果未指定此参数，则集合中的所有文档都将被视为候选文档，并且遇到的第一个文档将被更新或删除。\n\
  *   `update`：指定更新文档的信息。请注意，可以使用之前指定的任何修改器运算符来完成此操作。\n*   `fields`：指定你希望返回的字段，而不是整个文档。此参数的行为与\
  \ `find()` 函数中的 `fields` 参数完全相同。请注意，即使 `_id` 字段未包含在你返回的字段列表中，该字段也始终会被返回。\n*   `options`：指定要应用的选项。可以使用以下选项：\n\
  \    *   `sort`：按指定顺序对匹配的文档进行排序。\n    *   `remove`：如果设置为 `true`，将删除第一个匹配的文档。\n \
  \   *   `update`：如果设置为 `true`，将对选定的文档执行更新。\n    *   `new`：如果设置为 `true`，则返回更新后的文档，而不是选定的文档。请注意，默认情况下不设置此参数，这在某些情况下可能有点令人困惑。\n\
  \    *   `upsert`：如果设置为 `true`，则执行更新插入。\n\n现在让我们看一组示例，说明如何使用这些参数。第一个示例搜索姓氏为 `\"\
  Kitahara\"` 的联系人，并通过结合使用 `update()` 和 `$push` 运算符向他的联系人卡片添加一个电子邮件地址。在以下示例中未设置 `new`\
  \ 参数，因此结果输出仍显示旧信息：\n\n```php\n// Connect to the database\n$c = new MongoClient();\n\
  \n// Specify the database and collection in which to work\n$collection = $c->contacts->people;\n\
  \n// Specify the search criteria\n$criteria = array(\"Family Name\" => \"Kitahara\"\
  );\n\n// Specify the update criteria\n$update = array('$push' => array(\"E-Mail\"\
  \ => \"kitahara40%mongo.db\"));\n\n// Perform a findAndModify()\n$collection->findAndModify($criteria,$update);\n\
  ```\n\n返回的结果如下所示：\n\n```php\nArray (\n    [value] => Array (\n        [Given Name]\
  \ => Kenji\n        [Family Name] => Kitahara\n        [Address] => Array (\n  \
  \          [Street] => 149 Bartlett Avenue\n            [Place] => Southfield\n\
  \            [Postal Code] => MI 48075\n            [Country] => USA\n        )\n\
  \        [E-Mail] => Array (\n            [0] => kk40%example.com\n            [1]\
  \ => kk40%office.com\n        )\n        [Phone] => 248-510-1562\n        [Age]\
  \ => 34\n        [_id] => MongoId Object ( )\n        [Category] => Work\n    )\n\
  \    [ok] => 1\n)\n```\n\n以下示例展示了如何使用 `remove` 和 `sort` 参数：\n\n```php\n// Connect\
  \ to the database\n$c = new MongoClient();\n\n// Specify the database and collection\
  \ in which to work\n$collection = $c->contacts->people;\n\n// Specify the search\
  \ criteria\n$criteria = array(\"Category\" => \"Work\");\n\n// Specify the options\n\
  $options = array(\"sort\" => array(\"Age\" => -1), \"remove\" => true);\n\n// Perform\
  \ a findAndModify()\n$collection->findAndModify($criteria,null,null,$options);\n\
  ```\n\n#### 删除数据\n\n你可以使用 `remove()` 函数从 MongoDB shell 中删除文档，就像前面的例子一样。PHP 驱动也包含一个\
  \ `remove()` 函数，可以用来删除数据。这个函数的 PHP 版本接受两个参数：一个包含要删除的记录描述，另一个指定控制删除过程的附加选项。\n\n有七个可用选项：\n\
  \n*   `justOne`：如果设置为 `true`，则最多只删除一个匹配条件的记录。\n*   `fsync`：如果设置为 `true`，这个布尔选项会导致数据在返回成功之前同步到磁盘。如果此选项设置为\
  \ `true`，那么即使 `w` 设置为其他值，它也意味着 `w` 被设置为 `0`。\n*   `w`：如果设置为 `0`，保存操作将不会被确认。在使用副本集时，`w`\
  \ 也可以设置为 `n`，确保主服务器在成功复制到 `n` 个节点后确认保存操作。也可以设置为保留字符串 `'majority'` 以确保大多数副本节点会确认保存，或设置为特定标签，确保带有该标签的节点会确认保存。此选项默认为\
  \ `1`，确认保存操作。\n*   `j`：如果设置为 `true`，这个布尔选项会强制数据在指示保存成功之前写入日志。默认为 `false`。\n*   `wtimeout`：用于指定服务器等待接收确认的时间（毫秒）。默认为\
  \ `10000`。\n*   `timeout`：用于指定客户端需要等待数据库响应的时间（毫秒）。\n\n现在让我们看几个代码示例，说明如何删除文档：\n\n\
  ```php\n// Connect to the database\n$c = new MongoClient();\n// Select the collection\
  \ 'people' from the database 'contacts'\n$collection = $c->contacts->people;\n//\
  \ Specify the search criteria\n$criteria = array(\"Family Name\" => \"Wallace\"\
  );\n// Specify the options\n$options = array('justOne' => true, 'w' => 0);\n// Perform\
  \ the removal\n$collection->remove($criteria,$options);\n```\n\n类似地，下一个示例一次删除多个文档：\n\
  \n```php\n// Connect to the database\n$c = new Mongo();\n// Select the collection\
  \ 'people' from the database 'contacts'\n$collection = $c->contacts->people;\n//\
  \ Specify the search criteria using regular expressions\n$criteria = array(\"E-Mail\"\
  \ => new MongoRegex(\"/40%office.com/i\"));\n// Specify the options\n$options =\
  \ array(\"justOne\" => false);\n// Perform the removal\n$collection->remove($criteria,$options);\n\
  ```\n\n**警告**\n\n当你删除一个文档时，请记住对该文档的任何引用仍将保留在数据库中。确保你也手动删除或更新对已删除文档的引用；否则，当这些引用被评估时，它们将返回\
  \ `null`。\n\n类似地，你可以使用 `drop()` 函数删除整个集合。以下示例返回一个包含删除结果的数组：\n\n```php\n// Connect\
  \ to the database\n$c = new Mongo();\n// Select the collection to remove\n$collection\
  \ = $c->contacts->people;\n// Remove the collection and return the results\nprint_r($collection->drop());\n\
  ```\n\n返回的结果如下所示：\n\n```php\nArray (\n    [nIndexesWas] => 1\n    [msg] => indexes\
  \ dropped for collection\n    [ns] => contacts.people\n    [ok] => 1\n)\n```\n\n\
  最后但同样重要的是，你可以使用 PHP 删除整个数据库。这是通过使用 `MongoDB` 类中的 `drop()` 函数实现的，如下面的示例所示：\n\n```php\n\
  // Connect to the database\n$c = new Mongo();\n// Select the database to remove\n\
  $db = $c->contacts;\n// Remove the database and return the results\nprint_r($db->drop());\n\
  ```\n\n返回的结果显示被删除的数据库名称：\n\n```php\nArray (\n    [dropped] => contacts\n    [ok]\
  \ => 1\n)\n```\n\n#### DBRef\n\nDBRef 使你能够在存储在不同位置的两个文档之间创建链接；此功能让你实现类似于关系数据库中的行为。如果你想将人员的地址存储在\
  \ `addresses` 集合中，而不是将该信息包含在你的 `people` 集合中，这个功能可能特别方便。\n\n有两种方法可以做到这一点。首先，你可以使用一个简单的链接（称为手动引用）；在这种情况下，你将一个文档的\
  \ `_id` 包含到另一个文档中。其次，你可以使用 DBRef 自动创建这样的链接。\n\n首先，让我们看看如何实现手动引用。在以下示例中，你添加一个联系人，并在其地址信息下指定另一个文档的\
  \ `_id`：\n\n```php\n// Connect to the database\n$c = new MongoClient();\n$db = $c->contacts;\n\
  // Select the collections we want to store our contacts and addresses in\n$people\
  \ = $db->people;\n$addresses = $db->addresses;\n// Specify an address\n$address\
  \ = array(\n    \"Street\" => \"St. Annastraat 44\",\n    \"Place\" => \"Monster\"\
  ,\n    \"Postal Code\" => \"2681 SR\",\n    \"Country\" => \"Netherlands\"\n);\n\
  // Save the address\n$addresses->insert($address);\n// Add a contact living at the\
  \ address\n$contact = array(\n    \"First Name\" => \"Melvyn\",\n    \"Last Name\"\
  \ => \"Babel\",\n    \"Age\" => 35,\n    \"Address\" => $address['_id']\n);\n$people->insert($contact);\n\
  ```\n\n现在假设你想查找上述联系人的地址信息。为此，只需查询 `address` 字段中的 `Object ID`；你可以在 `addresses` 集合中找到此信息（假设你知道这个集合的名称）。\n\
  \n这有效，但引用另一个文档的首选方法依赖于 DBRef。这是因为 DBRef 依赖于数据库和所有驱动都理解的一种通用格式。我们稍后将看一个前面例子的 DBRef\
  \ 版本。在此之前，让我们先看看 `DBRef` 类的 `create()` 函数；你将使用这个类来创建所需的引用。\n\n`create()` 函数接受三个参数：\n\
  \n*   `collection`：指定信息所在的集合名称（不包含数据库名称）。\n*   `id`：指定要链接到的文档的 ID。\n*   `database`：指定文档所在的数据库名称。\n\
  \n以下示例使用 `create()` 函数创建对另一个文档中地址的引用：\n\n```php\n// Connect to the database\n$c\
  \ = new Mongo();\n$db = $c->contacts;\n// Select the collections we want to store\
  \ our contacts and addresses in\n$people = $db->people;\n$addresses = $db->addresses;\n\
  // Specify an address\n$address = array(\n    \"Street\" => \"WA Visser het Hooftlaan\
  \ 2621\",\n    \"Place\" => \"Driebergen\",\n    \"Postal Code\" => \"3972 SR\"\
  ,\n    \"Country\" => \"Netherlands\"\n);\n// Save the address\n$addresses->insert($address);\n\
  // Create a reference to the address\n$addressRef = MongoDBRef::create($addresses->getName(),\
  \ $address['_id']);\n// Add a contact living at the address\n$contact = array(\n\
  \    \"First Name\" => \"Ivo\",\n    \"Last Name\" => \"Lauw\",\n    \"Age\" =>\
  \ 24,\n    \"Address\" => $addressRef\n);\n$people->insert($contact);\n```\n\n**注意**\n\
  \n此示例中的 `getName()` 函数用于获取集合的名称。\n\n\n##### 检索信息\n\n到目前为止，你一直在使用`DBRef`来创建引用。现在，是时候了解如何检索被引用的信息，以便能够再次正确显示其内容了。你可以使用`MongoDBRef`的`get()`函数来完成此操作。\n\
  \n`MongoDBRef`的`get()`函数接受两个参数。第一个参数指定要使用的数据库，而第二个参数则提供要获取的引用：\n\n```php\n// 连接到数据库\n\
  $c = new Mongo();\n\n// 从数据库'contacts'中选择集合'people'\n$people = $c->contacts->people;\n\
  \n// 定义搜索参数\n$lastname = array(\"Last Name\" => \"Lauw\");\n\n// 查找我们的联系人，并存储在$person\
  \ 变量下\n$person = $people->findOne(array(\"Last Name\" => \"Lauw\"));\n\n// 解引用地址\n\
  $address = MongoDBRef::get($people->db, $person['Address']);\n\n// 打印匹配联系人的地址\n\
  print_r($address);\n```\n\n输出结果显示了被引用的文档：\n\n```php\nArray (\n    [_id] => MongoId\
  \ Object ( )\n    [Street] => WA Visser het Hooftlaan 2621\n    [Place] => Driebergen\n\
  \    [Postal Code] => 3972 SR\n    [Country] => Netherlands\n)\n```\n\n`DBRef`提供了一种很好的方式来存储你想要引用的数据，特别是因为它允许集合和数据库名称的灵活性。\n\
  \n#### GridFS 与 PHP 驱动程序\n\n前一章详细介绍了`GridFS`及其优势。例如，它解释了如何使用此技术来存储和检索数据，以及其他与`GridFS`相关的技术。在本节中，你将学习如何使用\
  \ PHP 驱动程序通过`GridFS`存储和检索文件。\n\nPHP 驱动程序包含其自己的用于处理`GridFS`的类；以下是三个最重要的类及其功能：\n\n\
  *   `MongoGridFS`：从数据库存储和检索文件。此类包含多个方法，包括`delete()`、`find()`、`storeUpload()`等大约十几个其他方法。\n\
  *   `MongoGridFSFile`：处理数据库中的特定文件。它包含诸如`__construct()`、`getFilename()`、`getSize()`和`write()`等函数。\n\
  *   `MongoGridFSCursor`：处理游标。它包含少量函数，例如`__construct()`、`current()`、`getNext()`和`key()`。\n\
  \n让我们看看如何使用 PHP 将文件上传到数据库。\n\n> 注意\n>\n> 如果没有上传数据的 HTML 表单，以下示例中的代码将无法工作。然而，此类代码超出了本章的范围，因此此处未展示。\n\
  \n##### 存储文件\n\n你使用`storeUpload()`函数通过`GridFS`将文件存储到数据库中。此函数接受两个参数：一个指示要上传文件的字段名，另一个可用于指定文件的元数据。使用后，该函数会报告已存储文件的`_id`。\n\
  \n以下简单的代码示例展示了如何使用`storeUpload()`函数：\n\n```php\n// 连接到数据库\n$c = new MongoClient();\n\
  \n// 选择数据库名称\n$db = $c->contacts;\n\n// 定义 GridFS 类以确保我们可以处理文件\n$gridFS = $db->getGridFS();\n\
  \n// 指定 HTML 字段的 name 属性\n$file = 'fileField';\n\n// 指定文件的元数据（可选）\n$metadata = array('uploadDate'\
  \ => date());\n\n// 将文件上传到数据库\n$id = $gridFS->storeUpload($file,$metadata);\n```\n\
  \n就是这样。如你所见，`$id`被用作将文件存储在数据库中的参数。你也可以使用此参数通过`DBRef`来引用数据。\n\n##### 为存储的文件添加更多元数据\n\
  \n有时你可能希望为存储的文件添加更多元数据。默认情况下，添加的唯一其他数据是`_id`字段，当你将图片存储到联系人卡片时，你可能会使用它来引用数据。不幸的是，当你希望开始通过这些标签搜索数据时，这可能更像是一种限制而非优势。\n\
  \n以下示例显示了如何为上传的数据存储元数据。此示例构建在上一个代码块的基础上，特别是`$id`参数。显然，你可以使用任何其他所需的搜索条件来自定义此过程：\n\
  \n```php\n// 指定要添加的元数据\n$metadata = array('$set' => array(\"Tag\" => \"Avatar\"\
  ));\n\n// 指定要应用元数据的搜索条件\n$criteria = array('_id' => $id);\n\n// 插入元数据\n$db->grid->update($criteria,\
  \ $metadata);\n```\n\n##### 检索文件\n\n当然，如果你无法在以后检索这些文件，那么将文件存储在数据库中的能力对你没有任何用处。检索文件和存储文件一样困难（意思是：一样简单！）。让我们看两个例子：第一个检索存储的文件名，第二个检索文件本身。\n\
  \n以下示例显示了如何检索存储的文件名，你可以使用`getFilename()`函数完成此操作：\n\n```php\n// 连接到数据库\n$c = new\
  \ MongoClient();\n$db = $c->contacts;\n\n// 初始化 GridFS\n$gridFS = $db->getGridFS();\n\
  \n// 查找 GridFS 存储中的所有文件，并存储在$cursor 参数下\n$cursor = $gridFS->find();\n\n// 返回所有文件的名称\n\
  foreach ($cursor as $object) {\n    echo \"Filename:\".$object->getFilename();\n\
  }\n```\n\n这很简单！当然，此示例假设你的数据库中已存储了一些数据。当你添加更多数据或希望搜索更具体的数据后，你可能还想向`find()`函数添加更多搜索参数。请注意，`find()`函数会搜索添加到每个上传文件的元数据（如本章前面详述）。\n\
  \n你可能想知道如何检索文件本身。毕竟，检索数据可能是你最终使用最多的操作。你可以通过使用`getBytes()`函数将其发送到浏览器来实现这一点。下一个示例使用`getBytes()`函数检索先前存储的图像。请注意，你可以通过查询数据库来获取`_id`参数（以下示例只是编造了一些参数）。此外，必须指定内容类型，因为从逻辑上讲，当你重建数据时浏览器无法识别它：\n\
  \n```php\n// 连接到数据库\n$c = new MongoClient();\n\n// 指定数据库名称\n$db = $c->contacts;\n\
  \n// 初始化 GridFS 文件集合\n$gridFS = $db->getGridFS();\n\n// 指定文件的搜索参数\n$id = new MongoId('4c555c70be90968001080000');\n\
  \n// 检索文件\n$file = $gridFS->findOne(array('_id' => $id));\n\n// 为文件指定标头并将数据写入其中\n\
  header('Content-Type: image/jpeg');\necho $file->getBytes();\nexit;\n```\n\n####\
  \ 删除数据\n\n你可以使用`delete()`函数确保删除任何先前存储的数据。此函数接受一个参数：文件本身的`_id`。以下示例说明了如何使用`delete()`函数删除与对象\
  \ ID `4c555c70be90968001080000`匹配的文件：\n\n```php\n// 连接到数据库\n$c = new MongoClient();\n\
  \n// 指定数据库名称\n$db = $c->contacts;\n\n// 初始化 GridFS\n$gridFS = $db->getGridFS();\n\
  \n// 通过 ID 指定文件\n$id = new MongoId('4c555c70be90968001080000');\n$file = $gridFS->findOne(array('_id'\
  \ => $id));\n\n// 使用 remove()函数删除文件\n$gridFS->delete($id);\n```\n\n\n\n#### 总结\n\
  \n在本章中，您深入研究了如何使用 MongoDB 的 PHP 驱动程序。例如，您了解了如何使用 PHP 驱动程序中最常用的函数，包括 `insert()`、`update()`\
  \ 和 `modify()` 函数。您还学习了如何使用 PHP 驱动程序中等同于 `find()` 函数的方法来搜索文档。最后，您学习了如何利用 `DBRef`\
  \ 的功能，以及如何使用 `GridFS` 存储和检索文件。\n\n一章的内容不可能涵盖使用 MongoDB PHP 驱动程序的所有知识；尽管如此，本章应已提供了必要的基础知识，以完成您想用此驱动程序实现的大部分操作。在此过程中，您还学习了足够的内容，以便在情况变得稍复杂时使用服务器端命令。\n\
  \n在下一章中，您将探索相同的概念，但使用的是 Python 驱动程序。\n\n### 7. Python 与 MongoDB\n\n摘要\n\nPython\
  \ 是最容易学习和掌握的编程语言之一。如果您相对编程新手，它尤其是一门值得开始学习的语言。如果您已经相当熟悉编程，那么您会更快地掌握它。\n\nPython 可用于快速开发应用程序，同时确保代码本身具有完美的可读性。考虑到这一点，本章将向您展示如何通过\
  \ Python 驱动程序（也称为 PyMongo 驱动程序；本章将交替使用这两个术语）编写简单而优雅、清晰且强大的代码来与 MongoDB 协作。\n\n首先，您将了解\
  \ `Connection()` 函数，它使您能够建立与数据库的连接。其次，您将学习如何编写文档或字典，以及如何插入它们。第三，您将学习如何使用 `find()`\
  \ 或 `find_one()` 命令通过 Python 驱动程序检索文档。这两个命令都可选地接受一组丰富的查询修饰符，以缩小搜索范围并使查询更易于实现。第四，您将了解用于执行更新的各种运算符。最后，您将了解如何使用\
  \ PyMongo 在文档甚至数据库级别删除数据。作为额外的好处，您还将学习如何使用 `DBRef` 模块来引用存储在其他地方的数据。\n\n让我们开始吧。\n\
  \n注意\n\n在本章中，您将看到许多实用的代码示例，用以说明所讨论的概念。代码本身将前置三个大于号（`>>>`）符号，以表示该命令是在 Python shell\
  \ 中编写的。查询代码将以粗体显示，结果输出将以纯文本呈现。\n\n#### 在 Python 中处理文档\n\n如前面章节所述，MongoDB 使用 `BSON`\
  \ 风格的文档，`PHP` 使用关联数组。类似地，Python 有其称为字典的结构。如果您已经使用过 MongoDB 控制台，我们相信您绝对会爱上 Python。毕竟，语法如此相似，以至于语言语法的学习曲线将微乎其微。\n\
  \n我们已经在前一章介绍了 MongoDB 文档的结构，因此这里不再重复该信息。相反，让我们看看 Python shell 中的文档是什么样子：\n\n```\n\
  item = {\n    \"Type\" : \"Laptop\",\n    \"ItemNumber\" : \"1234EXD\",\n    \"\
  Status\" : \"In use\",\n    \"Location\" : {\n        \"Department\" : \"Development\"\
  ,\n        \"Building\" : \"2B\",\n        \"Floor\" : 12,\n        \"Desk\" : 120101,\n\
  \        \"Owner\" : \"Anderson, Thomas\"\n    },\n    \"Tags\" : [\"Laptop\",\"\
  Development\",\"In Use\"]\n}\n```\n\n虽然您应该记住 Python 术语字典，但在大多数情况下，本章将使用其 MongoDB\
  \ 等效术语文档。毕竟，大多数时候，我们处理的是 MongoDB 文档。\n\n#### 使用 PyMongo 模块\n\nPython 驱动程序与模块协同工作。您可以像对待\
  \ `PHP` 驱动程序中的类一样对待这些模块。`PyMongo` 驱动程序中的每个模块负责一组操作。以下每项任务（以及更多任务）都有单独的模块：建立连接、处理数据库、利用集合、操作游标、使用\
  \ `DBRef` 模块、转换 `ObjectId` 以及运行服务器端 `JavaScript` 代码。\n\n本章将引导您了解使用 `PyMongo` 驱动程序所需的基本且有用的操作集。您将逐步学习如何使用简单易懂的代码片段来执行命令，这些代码可以直接复制并粘贴到您的\
  \ Python shell（或脚本）中。从那里，管理 MongoDB 数据库就只是举手之劳。\n\n#### 连接与断开连接\n\n建立与数据库的连接需要您首先导入\
  \ `PyMongo` 驱动程序的 `MongoClient` 模块，该模块使您能够建立连接。在 shell 中键入以下语句以加载 `MongoClient`\
  \ 模块：\n\n```\n>>> from pymongo import MongoClient\n```\n\n一旦您的 MongoDB 服务启动并运行（如果您希望连接，这是必需的），您就可以通过调用\
  \ `MongoClient()` 函数来建立与该服务的连接。\n\n如果没有给出其他参数，该函数假定您想要连接到 `localhost` 上的服务（`localhost`\
  \ 的默认端口号是 `27017`）。以下行建立连接：\n\n```\n>>> c = MongoClient()\n```\n\n您可以在 MongoDB 服务\
  \ shell 中看到连接进入。建立连接后，您可以使用 `c` 字典来引用该连接，就像在 shell 中使用 `db` 以及在 `PHP` 中使用 `$c` 一样。接下来，选择您想要处理的数据库，并将其存储在\
  \ `db` 字典下。您可以像在 MongoDB shell 中一样执行此操作——在以下示例中，您使用的是 `inventory` 数据库：\n\n```\n\
  >>> db = c.inventory\n>>> db\nDatabase(Connection('localhost', 27017), u'inventory')\n\
  ```\n\n此示例中的输出显示您已连接到 `localhost` 并且正在使用 `inventory` 数据库。\n\n现在数据库已选好，您可以用完全相同的方式选择您的\
  \ MongoDB 集合。因为您已经将数据库名称存储在 `db` 字典下，所以可以使用它来选择集合的名称；本例中集合名为 `items`：\n\n```\n>>>\
  \ collection = db.items\n```\n\n\n\n#### 插入数据\n\n接下来要做的，就是通过将文档存储在字典中来定义它。我们用前面的例子，并将其插入到\
  \ shell 中：\n\n```python\n>>> item = {\n...     \"Type\" : \"Laptop\",\n...     \"\
  ItemNumber\" : \"1234EXD\",\n...     \"Status\" : \"In use\",\n...     \"Location\"\
  \ : {\n...         \"Department\" : \"Development\",\n...         \"Building\" :\
  \ \"2B\",\n...         \"Floor\" : 12,\n...         \"Desk\" : 120101,\n...    \
  \     \"Owner\" : \"Anderson, Thomas\"\n...     },\n...     \"Tags\" : [\"Laptop\"\
  ,\"Development\",\"In Use\"]\n... }\n```\n\n一旦你定义了这个文档，就可以使用 MongoDB shell 中同样可用的\
  \ `insert()` 函数来插入它：\n\n```python\n>>> collection.insert(item)\nObjectId('4c57207b4abffe0e0c000000')\n\
  ```\n\n就是这样：你定义了文档，然后用 `insert()` 函数插入它。\n\n在插入文档时，还有一个有趣的技巧你可以利用：同时插入多个文档。你可以通过在单个字典中指定两个文档，然后插入那个字典来实现。结果会返回两个\
  \ `ObjectId` 值；请仔细注意下面示例中方括号的用法：\n\n```python\n>>> two = [{\n...     \"Type\" :\
  \ \"Laptop\",\n...     \"ItemNumber\" : \"2345FDX\",\n...     \"Status\" : \"In\
  \ use\",\n...     \"Location\" : {\n...         \"Department\" : \"Development\"\
  ,\n...         \"Building\" : \"2B\",\n...         \"Floor\" : 12,\n...        \
  \ \"Desk\" : 120102,\n...         \"Owner\" : \"Smith, Simon\"\n...     },\n...\
  \     \"Tags\" : [\"Laptop\",\"Development\",\"In Use\"]\n... },\n... {\n...   \
  \  \"Type\" : \"Laptop\",\n...     \"ItemNumber\" : \"3456TFS\",\n...     \"Status\"\
  \ : \"In use\",\n...     \"Location\" : {\n...         \"Department\" : \"Development\"\
  ,\n...         \"Building\" : \"2B\",\n...         \"Floor\" : 12,\n...        \
  \ \"Desk\" : 120103,\n...         \"Owner\" : \"Walker, Jan\"\n...     },\n... \
  \    \"Tags\" : [\"Laptop\",\"Development\",\"In Use\"]\n... }]\n>>> collection.insert(two)\n\
  [ObjectId('4c57234c4abffe0e0c000001'), ObjectId('4c57234c4abffe0e0c000002')]\n```\n\
  \n#### 查找你的数据\n\nPyMongo 提供了两个函数用于查找你的数据：`find_one()`，它在你的集合中查找一个匹配指定条件的单个文档；以及\
  \ `find()`，它可以根据提供的参数查找多个文档（如果你不指定任何参数，`find()` 会匹配集合中的所有文档）。让我们看一些例子。\n\n#####\
  \ 查找单个文档\n\n如前所述，你使用 `find_one()` 函数来查找单个文档。这个函数类似于 MongoDB shell 中的 `findOne()`\
  \ 函数，所以掌握它的工作原理对你来说应该没有太大挑战。默认情况下，如果在没有任何参数的情况下执行，这个函数将返回你集合中的第一个文档，如下例所示：\n\n```python\n\
  >>> collection.find_one()\n{\n    u'Status': u'In use',\n    u'Tags': [u'Laptop',\
  \ u'Development', u'In Use'],\n    u'ItemNumber': u'1234EXD',\n    u'Location':{\n\
  \        u'Department': u'Development',\n        u'Building': u'2B',\n        u'Floor':\
  \ 12,\n        u'Owner': u'Anderson, Thomas',\n        u'Desk': 120101\n       \
  \ },\n    u'_id': ObjectId('4c57207b4abffe0e0c000000'),\n    u'Type': u'Laptop'\n\
  }\n```\n\n你可以指定额外的参数来确保返回的第一个文档符合你的查询。所有用于 `find()` 函数的参数也可以用于 `find_one()`，尽管 `limit`\
  \ 参数会被忽略。查询参数的写法需要和你在 shell 中定义它们时一样；也就是说，你需要指定一个键及其值（或多个值）。例如，假设你想查找一个 `ItemNumber`\
  \ 值为 `3456TFS` 的文档，并且你不想返回该文档的 `_id`。下面的查询实现了这一点，并返回如下的输出：\n\n```python\n>>> collection.find_one({\"\
  ItemNumber\" : \"3456TFS\"} ,fields={'_id' : False})\n{\n    u'Status': u'In use',\n\
  \    u'Tags': [u'Laptop', u'Development', u'In Use'],\n    u'ItemNumber': u'3456TFS',\n\
  \    u'Location': {\n        u'Department': u'Development',\n        u'Building':\
  \ u'2B',\n        u'Floor': 12,\n        u'Owner': u'Walker, Jan',\n        u'Desk':\
  \ 120103\n    },\n    u'Type': u'Laptop'\n}\n```\n\n注意\n\nPython 是区分大小写的。因此，`true`\
  \ 和 `false` 与 `True` 和 `False` 不一样。\n\n如果搜索条件对于文档来说相对常见，你也可以指定额外的查询操作符。例如，想象查询 `{\"\
  Department\" : \"Development\"}`，这将返回多个结果。我们稍后会看这样一个例子；但首先，让我们确定如何返回多个文档，而不仅仅是一个。这可能与你想象的略有不同。\n\
  \n##### 查找多个文档\n\n你需要使用 `find()` 函数来返回多个文档。读到本书的这个阶段，你可能已经在 MongoDB 中多次使用过这个命令，所以你可能对它相当熟悉。在\
  \ Python 中概念是相同的：你在方括号之间指定查询参数以查找指定的信息。\n\n然而，将结果返回到屏幕上的工作方式略有不同。就像在 PHP 和 shell\
  \ 中操作一样，查询一组文档会向你返回一个游标实例。但是，与在 shell 中键入命令不同，你不能简单地输入 `db.items.find()` 来让所有结果呈现给你。相反，你需要使用游标来检索所有文档。下面的示例显示了如何显示\
  \ `items` 集合中的所有文档（请注意，你之前将 `collection` 定义为匹配集合的名称；为了清晰起见，结果被省略了）：\n\n```python\n\
  >>> for doc in collection.find():\n...     doc\n...\n```\n\n请特别注意 `doc` 这个词前面的缩进。如果不使用这个缩进，将会显示一条错误消息，指出预期的缩进块没有出现。Python\
  \ 的一大优势在于它使用这种缩进方法作为块分隔符，因为这种方法使代码保持良好的秩序。请放心，你会相对快速地习惯这种 Pythonic 的编码约定。如果你碰巧忘记了缩进，你会看到类似这样的错误消息：\n\
  \n```\nFile \"<stdin>\", line 2\n    doc\n      ^\nIndentationError: expected an\
  \ indented block\n```\n\n接下来，让我们看看如何使用 `find()` 函数指定查询操作符。使用的方法与本书前面看到的完全相同：\n\n\
  ```python\n>>> for doc in collection.find({\"Location.Owner\" : \"Walker, Jan\"\
  }):\n...     doc\n...\n{\n    u'Status': u'In use',\n    u'Tags': [u'Laptop', u'Development',\
  \ u'In Use'],\n    u'ItemNumber': u'3456TFS',\n    u'Location': {\n        u'Department':\
  \ u'Development',\n        u'Building': u'2B',\n        u'Floor': 12,\n        u'Owner':\
  \ u'Walker, Jan',\n        u'Desk': 120103\n    },\n    u'_id': ObjectId('4c57234c4abffe0e0c000002'),\n\
  \    u'Type': u'Laptop'\n}\n```\n\n##### 使用点表示法\n\n点表示法用于搜索嵌入式对象中匹配的元素。前面的代码片段展示了如何做到这一点的一个例子。使用这种技术时，你只需为嵌入式对象内的项目指定键名即可搜索它，如下例所示：\n\
  \n```python\n>>> for doc in collection.find({\"Location.Department\" : \"Development\"\
  }):\n...     doc\n...\n```\n\n这个例子返回任何设置了 `Development` 部门的文档。当在简单数组中搜索信息时（例如，应用的标签），你只需要填入任何匹配的标签：\n\
  \n```python\n>>> for doc in collection.find({\"Tags\" : \"Laptop\"}):\n...     doc\n\
  ...\n```\n\n\n\n##### 返回字段\n\n如果文档相对较大，并且你不想返回文档中存储的所有键值信息，可以在 `find()` 函数中包含一个额外的参数，使用\
  \ `True` 来指定只返回某组字段，或者使用 `False` 将其隐藏。通过提供 `fields` 参数，后接搜索条件和字段名列表即可实现。注意，除了 `_id`\
  \ 字段外，不能在一次查询中同时混合使用 `True` 和 `False`。\n\n以下示例仅返回当前所有者姓名、项目编号和对象 ID（除非你明确告诉 MongoDB\
  \ 不要返回，否则该字段总是会被返回）：\n\n```python\n>>> for doc in collection.find({'Status' : 'In\
  \ use'}, fields={'ItemNumber' : True, 'Location.Owner' : True}):\n...     doc\n\
  ...\n{\n        u'ItemNumber': u'1234EXD',\n        u'_id': ObjectId('4c57207b4abffe0e0c000000'),\n\
  \        u'Location': {\n                u'Owner': u'Anderson, Thomas'\n       \
  \ }\n}\n{\n        u'ItemNumber': u'2345FDX',\n        u'_id': ObjectId('4c57234c4abffe0e0c000001'),\n\
  \        u'Location': {\n                u'Owner': u'Smith, Simon'\n        }\n\
  }\n{\n        u'ItemNumber': u'3456TFS',\n        u'_id': ObjectId('4c57234c4abffe0e0c000002'),\n\
  \        u'Location': {\n                u'Owner': u'Walker, Jan'\n        }\n}\n\
  ```\n\n我想你会同意，这种指定条件的方式相当方便。\n\n##### 使用 sort()、limit() 和 skip() 简化查询\n\n`sort()`、`limit()`\
  \ 和 `skip()` 函数使实现查询变得更加容易。单独使用时，每个函数都有其用途，但将它们组合起来效果更佳、功能更强。你可以使用 `sort()` 函数按特定键对结果进行排序；使用\
  \ `limit()` 函数限制返回结果的总数；使用 `skip()` 函数在返回匹配查询的其余文档之前，先跳过前 n 个找到的条目。\n\n我们来看一组单独的示例，从\
  \ `sort()` 函数开始。为了节省空间，以下示例包含另一个参数以确保只返回少量字段：\n\n```python\n>>> for doc in collection.find\
  \ ({'Status' : 'In use'},\n...     fields={'ItemNumber' : True, 'Location.Owner'\
  \ : True}).sort('ItemNumber'):\n...     doc\n...\n{\n        u'ItemNumber': u'1234EXD',\n\
  \        u'_id': ObjectId('4c57207b4abffe0e0c000000'),\n        u'Location': {\n\
  \                u'Owner': u'Anderson, Thomas'\n        }\n}\n{\n        u'ItemNumber':\
  \ u'2345FDX',\n        u'_id': ObjectId('4c57234c4abffe0e0c000001'),\n        u'Location':\
  \ {\n                u'Owner': u'Smith, Simon'\n        }\n}\n{\n        u'ItemNumber':\
  \ u'3456TFS',\n        u'_id': ObjectId('4c57234c4abffe0e0c000002'),\n        u'Location':\
  \ {\n                u'Owner': u'Walker, Jan'\n        }\n}\n```\n\n接下来，看看 `limit()`\
  \ 函数的实际应用。在这个例子中，你告诉函数只返回它在集合中找到的前两个条目的 `ItemNumber`（注意此示例未指定任何搜索条件）：\n\n```python\n\
  >>> for doc in collection.find({}, {\"ItemNumber\" : \"true\"}).limit(2):\n... \
  \    doc\n...\n{u'ItemNumber': u'1234EXD', u'_id': ObjectId('4c57207b4abffe0e0c000000')}\n\
  {u'ItemNumber': u'2345FDX', u'_id': ObjectId('4c57234c4abffe0e0c000001')}\n```\n\
  \n你可以使用 `skip()` 函数在返回一组文档之前跳过几条记录，如下例所示：\n\n```python\n>>> for doc in collection.find({},\
  \ {\"ItemNumber\" : \"true\"}).skip(2):\n...     doc\n...\n{u'ItemNumber': u'3456TFS',\
  \ u'_id': ObjectId('4c57234c4abffe0e0c000002')}\n```\n\n你还可以将三个函数结合起来，只选择找到的特定数量的条目，同时指定要跳过的特定条目数量并进行排序：\n\
  \n```python\n>>> for doc in collection.find( {'Status' : 'In use'},\n...     fields={'ItemNumber'\
  \ : True, 'Location.Owner' : True}).limit(2).skip(1).sort('ItemNumber'):\n...  \
  \   doc\n...\n{\n        u'ItemNumber': u'2345FDX',\n        u'_id': ObjectId('4c57234c4abffe0e0c000001'),\n\
  \        u'Location': {\n                u'Owner': u'Smith, Simon'\n        }\n\
  }\n{\n        u'ItemNumber': u'3456TFS',\n        u'_id': ObjectId('4c57234c4abffe0e0c000002'),\n\
  \        u'Location': {\n                u'Owner': u'Walker, Jan'\n        }\n}\n\
  ```\n\n你刚才所做的——限制返回的结果并跳过一定数量的条目——通常被称为分页。你可以使用 `$slice` 操作符以稍微简单一些的方式实现这一点，这将在本章后面介绍。\n\
  \n#### 聚合查询\n\n如前所述，MongoDB 附带了一套强大的聚合工具（有关这些工具的更多信息，请参阅第 4 章）。你可以将所有这些工具与 Python\
  \ 驱动程序一起使用。这些工具使得使用 `count()` 函数对数据执行计数成为可能；使用 `distinct()` 函数获取无重复值的唯一值列表；最后但同样重要的是，使用\
  \ `map_reduce()` 函数对数据进行分组并批量处理结果，或者简单地执行计数。\n\n这组命令，无论是单独使用还是组合使用，都能使你有效地查询所需的信息——不多也不少。\n\
  \n除了这些基本的聚合命令外，PyMongo 驱动程序还包括聚合框架。这个强大的功能将允许你计算聚合值，而无需使用通常过于复杂的 map/reduce（或 MapReduce）框架。\n\
  \n###### 使用 count() 计数\n\n如果你只想统计匹配条件的条目总数，可以使用 `count()` 函数。该函数不会像 `find()` 函数那样返回所有信息；相反，它返回一个整数值，表示找到的项目总数。\n\
  \n我们来看一些简单的例子。我们可以从返回整个集合中的文档总数开始，不指定任何条件：\n\n```python\n>>> collection.count()\n\
  3\n```\n\n你也可以更精确地指定这些计数查询，如下例所示：\n\n```python\n>>> collection.find({\"Status\"\
  \ : \"In use\", \"Location.Owner\" : \"Walker, Jan\"}).count()\n1\n```\n\n当你只需要快速统计匹配条件的文档总数时，`count()`\
  \ 函数非常有用。\n\n###### 使用 distinct() 统计唯一项\n\n`count()` 函数是获取返回项目总数的好方法。然而，有时你可能会无意中向集合添加了重复项，仅仅是因为忘记删除或更改旧文档，而你希望获得一个不包含重复项的准确计数。这就是\
  \ `distinct()` 函数可以帮助你的地方。该函数确保只返回唯一项。让我们通过向集合中添加另一个项目（但使用了之前用过的 `ItemNumber`）来设置一个示例：\n\
  \n```python\n>>> dup = ( {\n...     \"ItemNumber\" : \"2345FDX\",\n...     \"Status\"\
  \ : \"Not used\",\n...     \"Type\" : \"Laptop\",\n...     \"Location\" : {\n...\
  \         \"Department\" : \"Storage\",\n...         \"Building\" : \"1A\"\n...\
  \     },\n...     \"Tags\" : [\"Not used\",\"Laptop\",\"Storage\"]\n... } )\n>>>\
  \ collection.insert(dup)\nObjectId('4c592eb84abffe0e0c000004')\n```\n\n当你在这个节点使用\
  \ `count()` 函数时，唯一项的数量将不正确：\n\n```python\n>>> collection.find({}).count()\n4\n```\n\
  \n相反，你可以使用 `distinct()` 函数来确保忽略任何重复项：\n\n```python\n>>> collection.distinct(\"ItemNumber\"\
  )\n[u'1234EXD', u'2345FDX', u'3456TFS']\n```\n\n\n###### 使用聚合框架对数据进行分组\n\n聚合框架是一个强大的工具，用于计算聚合值，无需使用\
  \ MapReduce。尽管 MapReduce 功能非常强大——并且 PyMongo 驱动也支持——但聚合框架在大多数情况下同样能完成工作，且性能更佳。为了演示这一点，我们将使用\
  \ `aggregate()` 函数中最强大的管道操作符之一——`$group`，来按标签对先前添加的文档进行分组，并使用 `$sum` 聚合表达式进行计数。来看一个例子：\n\
  \n```\n>>> collection.aggregate([\n... {'$unwind' : '$Tags'},\n... {'$group' : {'_id'\
  \ : '$Tags', 'Totals' : {'$sum' : 1}}}\n... ])\n```\n\n首先，`aggregate()` 函数使用 `$unwind`\
  \ 管道操作符，从文档的 `'$Tags'` 数组（注意其名称中必需的 `$` 符号）创建一个标签文档流。接着，调用 `$group` 管道操作符，为每个唯一的标签创建单独的一行，以其值作为\
  \ `'_id'`，并使用 `$group` 的 `$sum` 表达式计算 `'Totals'` 值来得出总计数。输出结果如下：\n\n```\n{\n  u'ok':\
  \ 1.0,\n  u'result': [\n    {u'_id': u'Laptop', u'Totals': 4},\n    {u'_id': u'In\
  \ Use', u'Totals': 3},\n    {u'_id': u'Development', u'Totals': 3},\n    {u'_id':\
  \ u'Storage', u'Totals': 1},\n    {u'_id': u'Not used', u'Totals': 1}\n  ]\n}\n\
  ```\n\n输出结果正好返回了所请求的信息。但是，如果我们希望按 `'Totals'` 对输出进行排序呢？这可以通过简单添加另一个管道操作符 `$sort`\
  \ 来实现。不过在此之前，我们需要导入 SON 模块：\n\n```\n>>> from bson.son import SON\n```\n\n现在，我们可以根据\
  \ `'Totals'` 值，按降序 (`-1`) 对结果进行排序，如下所示：\n\n```\n>>> collection.aggregate([\n...\
  \ {'$unwind' : '$Tags'},\n... {'$group' : {'_id' : '$Tags', 'Totals' : {'$sum' :\
  \ 1}}},\n... {'$sort' : SON([('Totals', -1)])}\n... ])\n```\n\n这将返回以下结果，整齐地按降序呈现：\n\
  \n```\n{\n  u'ok': 1.0,\n  u'result': [\n    {u'_id': u'Laptop', u'Totals': 4},\n\
  \    {u'_id': u'In Use', u'Totals': 3},\n    {u'_id': u'Development', u'Totals':\
  \ 3},\n    {u'_id': u'Storage', u'Totals': 1},\n    {u'_id': u'Not used', u'Totals':\
  \ 1}\n  ]\n}\n```\n\n除了 `$sum` 管道表达式，`$group` 管道操作符还支持其他多种表达式，部分列举如下：\n\n*   `$push`：创建并返回一个包含其组中所有值的数组。\n\
  *   `$addToSet`：创建并返回一个包含其组中所有唯一值的数组。\n*   `$first`：仅返回其组中找到的第一个值。\n*   `$last`：仅返回其组中找到的最后一个值。\n\
  *   `$max`：返回其组中找到的最大值。\n*   `$min`：返回其组中找到的最小值。\n*   `$avg`：返回其组中找到的平均值。\n\n在此示例中，您了解了\
  \ `$group`、`$unwind` 和 `$sort` 管道操作符，但还有更多强大的管道操作符存在，例如 `$geoNear` 操作符。聚合框架及其操作符在第\
  \ 4、6 和 8 章中有更详细的讨论。\n\n##### 使用 hint() 指定索引\n\n您可以使用 `hint()` 函数来指定查询数据时应使用哪个索引。使用此函数有助于提升查询性能。在\
  \ Python 中，`hint()` 函数也在游标上执行。但请记住，您在 Python 中指定的提示名称必须与传递给 `create_index()` 函数的名称相同。\n\
  \n在下一个示例中，您将首先创建一个索引，然后搜索指定该索引的数据。然而，在能够按升序排序之前，您需要使用 `import()` 函数导入 `ASCENDING`\
  \ 方法。最后，您需要执行 `create_index()` 函数：\n\n```\n>>> from pymongo import ASCENDING\n>>>\
  \ collection.create_index([(\"ItemNumber\", ASCENDING)])\nu'ItemNumber_1'\n>>> for\
  \ doc in collection.find({\"Location.Owner\" : \"Walker, Jan\"}) .hint([(\"ItemNumber\"\
  , ASCENDING)]):\n... doc\n...\n{\n    u'Status': u'In use',\n    u'Tags': [u'Laptop',\
  \ u'Development', u'In Use'],\n    u'ItemNumber': u'3456TFS',\n    u'Location':\
  \ {\n        u'Department': u'Development',\n        u'Building': u'2B',\n     \
  \   u'Floor': 12,\n        u'Owner': u'Walker, Jan',\n        u'Desk': 120103\n\
  \    },\n    u'_id': ObjectId('4c57234c4abffe0e0c000002'),\n    u'Type': u'Laptop'\n\
  }\n```\n\n当您的集合大小持续增长时，使用索引可以显著提高性能速度（有关性能调整的更多详细信息，请参见 第 10 章）。\n\n##### 使用条件操作符优化查询\n\
  \n您可以使用条件操作符来优化查询。MongoDB 通过 PyMongo 提供了半打以上的条件操作符；这些与您在前几章中看到的条件操作符相同。以下部分将带您了解\
  \ Python 中可用的条件操作符，以及如何使用它们来优化 Python 中的 MongoDB 查询。\n\n\n#### 使用 `$lt`、`$gt`、`$lte`\
  \ 和 `$gte` 操作符\n\n首先来看`$lt`、`$gt`、`$lte`和`$gte`条件操作符。你可以使用`$lt`操作符来搜索小于`n`的任何数值信息。该操作符只接受一个参数：指定界限的数字`n`。下面的示例查找工位号低于\
  \ 120102 的任何条目。注意，比较值本身不包括在结果中：\n\n```python\n>>> for doc in collection.find({\"\
  Location.Desk\" : {\"$lt\" : 120102} }):\n... doc\n...\n{\n    u'Status': u'In use',\n\
  \    u'Tags': [u'Laptop', u'Development', u'In Use'],\n    u'ItemNumber': u'1234EXD',\n\
  \    u'Location': {\n        u'Department': u'Development',\n        u'Building':\
  \ u'2B',\n        u'Floor': 12,\n        u'Owner': u'Anderson, Thomas',\n      \
  \  u'Desk': 120101\n    },\n    u'_id': ObjectId('4c57207b4abffe0e0c000000'),\n\
  \    u'Type': u'Laptop'\n}\n```\n\n类似地，你可以使用`$gt`操作符来查找值大于提供的比较值的任何项目。同样，注意比较值本身不包括在结果中：\n\
  \n```python\n>>> for doc in collection.find({\"Location.Desk\" : {\"$gt\" : 120102}\
  \ }):\n... doc\n...\n{\n    u'Status': u'In use',\n    u'Tags': [u'Laptop', u'Development',\
  \ u'In Use'],\n    u'ItemNumber': u'3456TFS',\n    u'Location': {\n        u'Department':\
  \ u'Development',\n        u'Building': u'2B',\n        u'Floor': 12,\n        u'Owner':\
  \ u'Walker, Jan',\n        u'Desk': 120103\n    },\n    u'_id': ObjectId('4c57234c4abffe0e0c000002'),\n\
  \    u'Type': u'Laptop'\n}\n```\n\n如果你想在结果中包含比较值，则可以使用`$lte`或`$gte`操作符来查找小于等于`n`或大于等于`n`的任何值。以下示例说明了如何使用这些操作符：\n\
  \n```python\n>>> for doc in collection.find({\"Location.Desk\" : {\"$lte\" : 120102}\
  \ }):\n... doc\n...\n{\n    u'Status': u'In use',\n    u'Tags': [u'Laptop', u'Development',\
  \ u'In Use'],\n    u'ItemNumber': u'1234EXD',\n    u'Location': {\n        u'Department':\
  \ u'Development',\n        u'Building': u'2B',\n        u'Floor': 12,\n        u'Owner':\
  \ u'Anderson, Thomas',\n        u'Desk': 120101\n    },\n    u'_id': ObjectId('4c57207b4abffe0e0c000000'),\n\
  \    u'Type': u'Laptop'\n}\n{\n    u'Status': u'In use',\n    u'Tags': [u'Laptop',\
  \ u'Development', u'In Use'],\n    u'ItemNumber': u'2345FDX',\n    u'Location':\
  \ {\n        u'Department': u'Development',\n        u'Building': u'2B',\n     \
  \   u'Floor': 12,\n        u'Owner': u'Smith, Simon',\n        u'Desk': 120102\n\
  \    },\n    u'_id': ObjectId('4c57234c4abffe0e0c000001'),\n    u'Type': u'Laptop'\n\
  }\n```\n\n```python\n>>> for doc in collection.find({\"Location.Desk\" : {\"$gte\"\
  \ : 120102} }):\n... doc\n...\n{\n    u'Status': u'In use',\n    u'Tags': [u'Laptop',\
  \ u'Development', u'In Use'],\n    u'ItemNumber': u'2345FDX',\n    u'Location':\
  \ {\n        u'Department': u'Development',\n        u'Building': u'2B',\n     \
  \   u'Floor': 12,\n        u'Owner': u'Smith, Simon',\n        u'Desk': 120102\n\
  \    },\n    u'_id': ObjectId('4c57234c4abffe0e0c000001'),\n    u'Type': u'Laptop'\n\
  }\n{\n    u'Status': u'In use',\n    u'Tags': [u'Laptop', u'Development', u'In Use'],\n\
  \    u'ItemNumber': u'3456TFS',\n    u'Location': {\n        u'Department': u'Development',\n\
  \        u'Building': u'2B',\n        u'Floor': 12,\n        u'Owner': u'Walker,\
  \ Jan',\n        u'Desk': 120103\n    },\n    u'_id': ObjectId('4c57234c4abffe0e0c000002'),\n\
  \    u'Type': u'Laptop'\n}\n```\n\n#### 使用 `$ne` 搜索不匹配的值\n\n你可以使用`$ne`（不等于）操作符来搜索集合中不匹配指定条件的任何文档。此操作符需要一个参数，即文档不应该具有的键和值信息，才能返回匹配结果：\n\
  \n```python\n>>> collection.find({\"Status\" : {\"$ne\" : \"In use\"}}).count()\n\
  1\n```\n\n#### 使用 `$in` 指定匹配数组\n\n`$in`操作符允许你指定一个可能的匹配值数组。\n\n例如，假设你只寻找两种开发计算机：`not\
  \ used`或带有`Development`标签的。同时假设你希望将结果限制为两项，只返回`ItemNumber`字段：\n\n```python\n>>>\
  \ for doc in collection.find({\"Tags\" : {\"$in\" : [\"Not used\",\"Development\"\
  ]}} , fields={\"ItemNumber\":\"true\"}).limit(2):\n... doc\n...\n{u'ItemNumber':\
  \ u'1234EXD', u'_id': ObjectId('4c57207b4abffe0e0c000000')}\n{u'ItemNumber': u'2345FDX',\
  \ u'_id': ObjectId('4c57234c4abffe0e0c000001')}\n```\n\n#### 使用 `$nin` 针对匹配数组进行排除\n\
  \n你使用`$nin`操作符的方式与使用`$in`操作符完全相同；不同之处在于，此操作符会排除匹配给定数组中任何值的文档。例如，以下查询查找`Development`部门中当前未使用的任何项目：\n\
  \n```python\n>>> for doc in collection.find({\"Tags\" : {\"$nin\" : [\"Development\"\
  ]}}, fields={\"ItemNumber\": True}):\n... doc\n...\n{u'ItemNumber': u'2345FDX',\
  \ u'_id': ObjectId('4c592eb84abffe0e0c000004')}\n```\n\n#### 查找匹配数组所有值的文档\n\n`$in`操作符可用于查找匹配数组中任何值的任何文档，而`$all`操作符则让你查找匹配数组中所有值的任何文档。实现这一点的语法看起来完全相同：\n\
  \n```python\n>>> for doc in collection.find({\"Tags\" : {\"$all\" : [\"Storage\"\
  ,\"Not used\"]}}, fields={\"ItemNumber\":\"true\"}):\n... doc\n...\n{u'ItemNumber':\
  \ u'2345FDX', u'_id': ObjectId('4c592eb84abffe0e0c000004')}\n```\n\n#### 使用 `$or`\
  \ 指定多个匹配表达式\n\n你可以使用`$or`操作符来指定文档可以具有的多个值，其中至少一个必须为真，才能算作匹配。这大致类似于`$in`操作符；不同之处在于`$or`操作符允许你指定键以及值。你还可以将`$or`操作符与另一个键/值对组合使用。让我们看几个例子。\n\
  \n此示例返回位置设置为`Storage`或所有者设置为`Anderson, Thomas`的所有文档：\n\n```python\n>>> for doc in\
  \ collection.find({\"$or\" : [ { \"Location.Department\" : \"Storage\" } ,\n...\
  \ { \"Location.Owner\" : \"Anderson, Thomas\"} ] } ):\n... doc\n...\n```\n\n你还可以将前面的代码与另一个键/值对组合，如下例所示：\n\
  \n```python\n>>> for doc in collection.find({ \"Location.Building\" : \"2B\", \"\
  $or\" : [ { \"Location.Department\" : \"Storage\" } ,\n... { \"Location.Owner\"\
  \ : \"Anderson, Thomas\"} ] } ):\n... doc\n...\n```\n\n`$or`操作符基本上允许你同时进行两次搜索并组合输出结果，即使各个搜索彼此之间毫无共同点。此外，`$or`子句是并行执行的，并且每个子句可能使用不同的索引。\n\
  \n\n\n#### 使用 `$slice` 从数组中检索项目\n\n你可以使用 `$slice` 操作符从文档中的给定数组中检索单一定数量的项目。此操作符提供的功能类似于\
  \ `skip()` 和 `limit()` 函数；区别在于，那两个函数作用于整个文档，而 `$slice` 操作符作用于单个文档中的一个数组。\n\n在看示例之前，让我们先添加一个新文档，以便更好地理解此操作符。假设你的公司极其痴迷于追踪其椅子库存，跟踪椅子可能去的任何地方。自然地，每把椅子都有其曾属于哪些办公桌的历史记录。`$slice`\
  \ 操作符示例非常适合追踪此类库存。\n\n首先添加以下文档：\n\n```python\n>>> chair = ({\n...     \"Status\"\
  \ : \"Not used\",\n...     \"Tags\" : [\"Chair\",\"Not used\",\"Storage\"],\n...\
  \     \"ItemNumber\" : \"6789SID\",\n...     \"Location\" : {\n...         \"Department\"\
  \ : \"Storage\",\n...         \"Building\" : \"2B\"\n...     },\n...     \"PreviousLocation\"\
  \ :\n...         [ \"120100\",\"120101\",\"120102\",\"120103\",\"120104\",\"120105\"\
  ,\n...           \"120106\",\"120107\",\"120108\",\"120109\",\"120110\" ]\n... })\n\
  >>> collection.insert(chair)\nObjectId('4c5973554abffe0e0c000005')\n```\n\n现在，假设你想查看前一个示例返回的椅子的所有可用信息，但有一个限制：你不想看到所有的先前位置信息，而只想看它曾属于的前三个办公桌：\n\
  \n```python\n>>> collection.find_one({'ItemNumber' : '6789SID'}, {'PreviousLocation'\
  \ : {'$slice' : 3} })\n{\n    u'Status': u'Not used',\n    u'PreviousLocation':\
  \ [u'120100', u'120101', u'120102'],\n    u'Tags': [u'Chair', u'Not used', u'Storage'],\n\
  \    u'ItemNumber': u'6789SID',\n    u'Location': {\n        u'Department': u'Storage',\n\
  \        u'Building': u'2B'\n    },\n    u'_id': ObjectId('4c5973554abffe0e0c000005')\n\
  }\n```\n\n类似地，你可以通过将整数值设为负数来查看其最近的三个位置：\n\n```python\n>>> collection.find_one({'ItemNumber'\
  \ : '6789SID'}, {'PreviousLocation' : {'$slice' : -3} })\n{\n    u'Status': u'Not\
  \ used',\n    u'PreviousLocation': [u'120108', u'120109', u'120110'],\n    u'Tags':\
  \ [u'Chair', u'Not used', u'Storage'],\n    u'ItemNumber': u'6789SID',\n    u'Location':\
  \ {\n        u'Department': u'Storage',\n        u'Building': u'2B'\n    },\n  \
  \  u'_id': ObjectId('4c5973554abffe0e0c000005')\n}\n```\n\n或者，你可以跳过椅子的前五个位置，并将返回的结果数量限制为三个（这里请特别注意括号）：\n\
  \n```python\n>>> collection.find_one({'ItemNumber' : '6789SID'}, {'PreviousLocation'\
  \ : {'$slice' : [5, 3] } })\n{\n    u'Status': u'Not used',\n    u'PreviousLocation':\
  \ [u'120105', u'120106', u'120107'],\n    u'Tags': [u'Chair', u'Not used', u'Storage'],\n\
  \    u'ItemNumber': u'6789SID',\n    u'Location': {\n        u'Department': u'Storage',\n\
  \        u'Building': u'2B'\n    },\n    u'_id': ObjectId('4c5973554abffe0e0c000005')\n\
  }\n```\n\n你可能已经明白了。这个例子可能看起来有点不寻常，但库存控制系统常常涉足非正统的领域；而 `$slice` 操作符本身就擅长帮助你处理不寻常或复杂的情况。例如，`$slice`\
  \ 操作符可能被证明是实现网站评论区分页系统的特别有效的工具。\n\n##### 使用正则表达式进行搜索\n\n进行搜索的一个有用工具是正则表达式。Python\
  \ 的默认正则表达式模块名为 `re`。使用 `re` 模块执行搜索要求你首先加载该模块，如下例所示：\n\n```python\n>>> import re\n\
  ```\n\n加载模块后，你可以在搜索条件的 `value` 字段中指定正则表达式查询。以下示例展示了如何搜索 `ItemNumber` 值包含 `4` 的任何文档（为简单起见，此示例仅返回\
  \ `ItemNumber` 中的值）：\n\n```python\n>>> for doc in collection.find({'ItemNumber'\
  \ : re.compile('4')}, {'ItemNumber' : True}):\n...     doc\n...\n{u'ItemNumber':\
  \ u'1234EXD', u'_id': ObjectId('4c57207b4abffe0e0c000000')}\n{u'ItemNumber': u'2345FDX',\
  \ u'_id': ObjectId('4c57234c4abffe0e0c000001')}\n{u'ItemNumber': u'2345FDX', u'_id':\
  \ ObjectId('4c592eb84abffe0e0c000004')}\n{u'ItemNumber': u'3456TFS', u'_id': ObjectId('4c57234c4abffe0e0c000002')}\n\
  ```\n\n你可以进一步定义正则表达式。在此阶段，你的查询是区分大小写的，它将匹配 `ItemNumber` 值中任何位置包含 `4` 的任何文档。但是，假设你想查找\
  \ `ItemNumber` 值以 `FS` 结尾、前面是未知值且 `FS` 后面不能包含其他数据的文档：\n\n```python\n>>> for doc\
  \ in collection.find({'ItemNumber' : re.compile('.FS$')},fields={'ItemNumber' :\
  \ True}):\n...     doc\n...\n{u'ItemNumber': u'3456TFS', u'_id': ObjectId('4c57234c4abffe0e0c000002')}\n\
  ```\n\n你也可以使用 `find()` 以不区分大小写的方式搜索信息，但首先必须添加另一个函数，如下例所示：\n\n```python\n>>> for\
  \ doc in collection.find({'Location.Owner' : re.compile('^anderson. ', re.IGNORECASE)},\n\
  ...     fields={'ItemNumber' : True, 'Location.Owner' : True}):\n...     doc\n...\n\
  {\n     u'ItemNumber': u'1234EXD',\n     u'_id': ObjectId('4c57207b4abffe0e0c000000'),\n\
  \     u'Location': {\n          u'Owner': u'Anderson, Thomas'\n     }\n}\n```\n\n\
  正则表达式可以是一个极其强大的工具，只要你正确地使用它们。有关 `re` 模块的工作原理及其包含函数的更多详细信息，请参阅该模块的官方文档 [`http://docs.python.org/library/re.html`](http://docs.python.org/library/re.html)。\n\
  \n#### 修改数据\n\n到目前为止，你已经学习了如何在 Python 中使用条件操作符和正则表达式来查询数据库中的信息。在下一节中，我们将研究如何使用 Python\
  \ 修改集合中现有的数据。我们可以用几种不同的方式使用 Python 来完成此任务。接下来的章节将基于先前使用的查询操作符来查找应匹配你修改的文档。在少数情况下，你可能需要跳回到本章前面的部分以复习使用查询操作符的特定方面——但这是学习过程的正常部分，它将巩固迄今为止所教授的课程。\n\
  \n\n\n##### 更新你的数据\n\n你使用 Python 的 `update()` 函数的方式，与在 MongoDB shell 或 PHP 驱动中使用同名函数的方式差别不大。在这种情况下，你需要提供两个强制参数来更新数据：`arg`\
  \ 和 `doc`。`arg` 参数指定了用于匹配文档的键/值信息，`doc` 参数则包含更新后的信息。你还可以提供几个可选参数来指定你的选项。以下列表涵盖了\
  \ Python 中用于更新信息的选项列表，包括它们的作用：\n\n*   `upsert` `（可选）`：如果设置为 `True`，则执行一次更新插入（upsert）操作。\n\
  *   `manipulate` （可选）：如果设置为 `True`，表示在执行更新前，将使用所有 `SONManipulator` 实例对文档进行处理。更多信息请参考\
  \ `son_manipulator` 文档 ( [`http://api.mongodb.org/python/current/api/pymongo/son_manipulator.html`](http://api.mongodb.org/python/current/api/pymongo/son_manipulator.html)\
  \ )。\n*   `check_keys` （可选）：如果设置为 `True`，`update()` 将在替换 `arg` 时检查文档中的任何键是否以受限字符\
  \ ‘$’ 或 ‘.’ 开头。\n*   `multi` （可选）：如果设置为 `True`，将更新所有匹配的文档，而不仅仅是找到的第一个文档（默认行为）。建议你总是将此项设置为\
  \ `True` 或 `False`，而不是依赖默认行为（该行为将来可能会改变）。\n*   `w` （可选）：如果设置为 `0`，更新操作将不会被确认。在使用复制集时，`w`\
  \ 也可以设置为 `n`，以确保主服务器在成功复制到 `n` 个节点后确认更新操作。也可以设置为保留字符串 `majority`，以确保大多数复制节点将确认更新；或设置为特定标签，以确保带有该标签的节点将确认更新。此选项默认为\
  \ `1`，表示确认更新操作。\n*   `wtimeout` （可选）：用于指定服务器等待接收确认的时长（以毫秒为单位）。默认为 `10000`。\n*  \
  \ `j` （可选）：如果设置为 `True`，此布尔选项将强制数据在表明更新成功之前先写入日志。默认为 `False`。\n*   `fsync` （可选）：如果设置为\
  \ `True`，此布尔选项会导致数据在返回成功之前先同步到磁盘。如果此选项设置为 `True`，则意味着 `w` 被设置为 `0`，即使它被设置了其他值。\n\
  \n如果你在更新文档时没有指定任何修改器操作符，那么默认情况下，文档中的所有信息都将被你在 `doc` 参数中插入的数据替换。最好避免依赖默认行为；相反，你应该使用前面提到的操作符来明确指定你想要的更新（你稍后会学习如何做到这一点）。\n\
  \n通过查看一个不使用任何条件操作符的例子，你可以明白为什么最好将条件操作符与 `update()` 命令一起使用：\n\n```python\n## 定义更新后的数据\n\
  >>> update = ( {\n    \"Type\" : \"Chair\",\n    \"Status\" : \"In use\",\n    \"\
  Tags\" : [\"Chair\",\"In use\",\"Marketing\"],\n    \"ItemNumber\" : \"6789SID\"\
  ,\n    \"Location\" : {\n        \"Department\" : \"Marketing\",\n        \"Building\"\
  \ : \"2B\",\n        \"DeskNumber\" : 131131,\n        \"Owner\" : \"Martin, Lisa\"\
  \n    }\n} )\n\n## 现在，执行更新\n>>> collection.update({\"ItemNumber\" : \"6789SID\"\
  }, update)\n\n## 检查更新的结果\n>>> collection.find_one({\"Type\" : \"Chair\"})\n{\n \
  \   u'Status': u'In use',\n    u'Tags': [u'Chair', u'In use', u'Marketing'],\n \
  \   u'ItemNumber': u'6789SID',\n    u'Location': {\n        u'Department': u'Marketing',\n\
  \        u'Building': u'2B',\n        u'DeskNumber': 131131,\n        u'Owner':\
  \ u'Martin, Lisa'\n    },\n    u'_id': ObjectId('4c5973554abffe0e0c000005'),\n \
  \   u'Type': u'Chair'\n}\n```\n\n这个例子一个很大的缺点是它有些冗长，并且只更新了少数几个字段。接下来，我们将看看修改器操作符可以用来实现什么。\n\
  \n#### 修改器操作符\n\n第 4 章详细介绍了 MongoDB shell 包含了一组大量的修改器操作符，你可以使用它们更轻松地操作数据，而无需为了更改单个字段的值而重写整个文档（就像你在前面的例子中必须做的那样）。\n\
  \n这些修改器操作符让你可以完成各种操作，从更改文档中的一个现有值，到插入整个数组，再到从数组中指定的多个项目中移除所有条目。作为一个整体，这些操作符使修改数据变得容易。现在让我们看看这些操作符的作用以及如何使用它们。\n\
  \n###### 使用 $inc 增加整数值\n\n你可以使用 `$inc` 操作符将文档中的整数值增加给定的数字 `n`。以下示例展示了如何将 `Location.Desknumber`\
  \ 的整数值增加 `20`：\n\n```python\n>>> collection.update({\"ItemNumber\" : \"6789SID\"\
  }, {\"$inc\" : {\"Location.DeskNumber\" : 20}})\n```\n\n接下来，检查更新是否按预期工作：\n\n```python\n\
  >>> collection.find_one({\"Type\" : \"Chair\"}, fields={\"Location\" : \"True\"\
  })\n{\n     u'_id': ObjectId('4c5973554abffe0e0c000005'),\n     u'Location': {\n\
  \         u'Department': u'Marketing',\n         u'Building': u'2B',\n         u'Owner':\
  \ u'Martin, Lisa',\n         u'DeskNumber': 131151\n     }\n}\n```\n\n请注意，`$inc`\
  \ 操作符仅适用于整数值（即数值），不适用于任何字符串值，甚至不适用于作为字符串添加的数值（例如 `\"123\"` vs. `123`）。\n\n######\
  \ 使用 $set 更改现有值\n\n你可以使用 `$set` 操作符来更改任何匹配文档中的现有值。这是一个你会经常使用的操作符。下一个示例将任何当前匹配键/值\
  \ `\"Location.Department / Development\"` 的项目中的 `\"Building\"` 值进行更改。\n\n首先使用 `$set`\
  \ 执行更新，确保所有文档都被更新：\n\n```python\n>>> collection.update({\"Location.Department\"\
  \ : \"Development\"},\n... {\"$set\" : {\"Location.Building\" : \"3B\"} },\n...\
  \ multi = True )\n```\n\n接下来，使用 `find_one()` 命令确认一切顺利：\n\n```python\n>>> collection.find_one({\"\
  Location.Department\" : \"Development\"}, fields={\"Location.Building\" : True})\n\
  {\n     u'_id': ObjectId('4c57207b4abffe0e0c000000'),\n     u'Location': {u'Building':\
  \ u'3B'}\n}\n```\n\n###### 使用 $unset 移除键/值字段\n\n同样，你可以使用 `$unset` 操作符从文档中移除一个键/值字段，如下例所示：\n\
  \n```python\n>>> collection.update({\"Status\" : \"Not used\", \"ItemNumber\" :\
  \ \"2345FDX\"},\n... {\"$unset\" : {\"Location.Building\" : 1 } } )\n```\n\n接下来，使用\
  \ `find_one()` 命令确认一切顺利：\n\n```python\n>>> collection.find_one({\"Status\" : \"\
  Not used\", \"ItemNumber\" : \"2345FDX\"}, fields={\"Location\" : True})\n{\n  \
  \   u'_id': ObjectId('4c592eb84abffe0e0c000004'),\n     u'Location': {u'Department':\
  \ u'Storage'}\n}\n```\n\n###### 使用 $push 向数组添加值\n\n`$push` 操作符允许你向一个数组添加一个值，前提是该数组存在。如果该数组不存在，则将使用指定的值创建它。\n\
  \n警告\n\n如果你使用 `$push` 来更新一个不是数组的现有字段，将会出现错误信息。\n\n现在，你准备好向一个已存在的数组添加一个值，并确认是否一切顺利。首先，执行更新：\n\
  \n```python\n>>> collection.update({\"Location.Owner\" : \"Anderson, Thomas\"},\n\
  ... {\"$push\" : {\"Tags\" : \"Anderson\"} }, multi = True )\n```\n\n现在，执行 `find_one()`\
  \ 来确认更新是否顺利：\n\n```python\n>>> collection.find_one({\"Location.Owner\" : \"Anderson,\
  \ Thomas\"}, fields={\"Tags\" : \"True\"})\n{\n     u'_id': ObjectId('4c57207b4abffe0e0c000000'),\n\
  \     u'Tags': [u'Laptop', u'Development', u'In Use', u'Anderson']\n}\n```\n\n\n\
  \n#### 使用 `$push` 和 `$each` 向数组添加多个值\n\n`$push` 操作符也可用于一次性向现有数组添加多个值。这可以通过添加 `$each`\
  \ 修改器来实现。这里适用相同的规则：数组必须已存在，否则会收到错误。以下示例结合使用 `$each` 修改器与 `$` 正则表达式来执行搜索；这使您能够将更改应用于所有匹配的查询：\n\
  \n```\n>>> collection.update({ \"Location.Owner\" : re.compile(\"^Walker,\") },\n\
  ... { '$push' : { 'Tags' : { '$each' : ['Walker','Warranty'] } } } )\n```\n\n接下来，执行\
  \ `find_one()` 以确认一切正常：\n\n```\n>>> collection.find_one({\"Location.Owner\" : re.compile(\"\
  ^Walker,\")}, fields={\"Tags\" : True})\n{\n     u'_id': ObjectId('4c57234c4abffe0e0c000002'),\n\
  \     u'Tags': [u'Laptop', u'Development', u'In Use', u'Walker', u'Warranty']\n\
  }\n```\n\n#### 使用 `$addToSet` 向现有数组添加值\n\n`$addToSet` 操作符也允许您向现有数组添加值。区别在于，此方法在尝试更新前会检查数组是否已存在（`$push`\
  \ 操作符不检查此条件）。\n\n此操作符仅接受一个额外的值；但同样值得一提的是，您可以将 `$addToSet` 与 `$each` 操作符结合使用。让我们看两个例子。首先，使用\
  \ `$addToSet` 操作符对任何匹配 `\"Type : Chair\"` 的对象执行更新，然后使用 `find_one()` 函数确认一切是否顺利：\n\
  \n```\n>>> collection.update({\"Type\" : \"Chair\"}, {\"$addToSet\" : {\"Tags\"\
  \ : \"Warranty\"} }, multi = True)\n>>> collection.find_one({\"Type\" : \"Chair\"\
  }, {\"Tags\" : \"True\"})\n{\n     u'_id': ObjectId('4c5973554abffe0e0c000005'),\n\
  \     u'Tags': [u'Chair', u'In use', u'Marketing', u'Warranty']\n}\n```\n\n您也可以使用\
  \ `$each` 语句来添加多个标签。请注意，您使用正则表达式执行此搜索。此外，列表中的一个标签之前已添加；幸运的是，它不会再次被添加，因为这正是 `$addToSet`\
  \ 专门防止的：\n\n```\n// 使用 $each 操作符添加多个标签，包括一个已添加的标签\n>>> collection.update({\"Type\"\
  \ : \"Chair\", \"Location.Owner\" : re.compile(\"^Martin,\")},\n... {\"$addToSet\"\
  \ : { \"Tags\" : {\"$each\" : [\"Martin\",\"Warranty\",\"Chair\",\"In use\"] } }\
  \ } )\n```\n\n现在是时候检查一切是否顺利了；具体来说，您想验证重复的 `Warranty` 标签没有再次被添加：\n\n```\n>>> collection.find_one({\"\
  Type\" : \"Chair\", \"Location.Owner\" : re.compile(\"^Martin,\")}, fields={\"Tags\"\
  \ : True})\n{\n     u'_id': ObjectId('4c5973554abffe0e0c000005'),\n     u'Tags':\
  \ [u'Chair', u'In use', u'Marketing', u'Warranty', u'Martin']\n}\n```\n\n#### 使用\
  \ `$pop` 从数组中移除元素\n\n到目前为止，您已经了解了如何使用 `update()` 函数向现有文档添加值。现在让我们反过来看看如何删除数据。我们将从\
  \ `$pop` 操作符开始。\n\n此操作符允许您删除数组中的第一个或最后一个值，但不能删除中间的值。以下示例从找到的第一个匹配 `\"Type\" : \"\
  Chair\"` 标准的文档中移除 `Tags` 数组的第一个值；然后使用 `find_one()` 命令确认更新是否成功：\n\n```\n>>> collection.update({\"\
  Type\" : \"Chair\"}, {\"$pop\" : {\"Tags\" : -1}})\n>>> collection.find_one({\"\
  Type\" : \"Chair\"}, fields={\"Tags\" : True})\n{\n     u'_id': ObjectId('4c5973554abffe0e0c000005'),\n\
  \     u'Tags': [u'In use', u'Marketing', u'Warranty', u'Martin']\n}\n```\n\n给 `Tags`\
  \ 数组赋予正值则会移除数组中的最后一个元素，如下例所示：\n\n```\n>>> collection.update({\"Type\" : \"Chair\"\
  }, {\"$pop\" : {\"Tags\" : 1}})\n```\n\n接下来，再次执行 `find_one()` 函数以确认一切是否顺利：\n\n```\n\
  >>> collection.find_one({\"Type\" : \"Chair\"}, fields={\"Tags\" : True})\n{\n \
  \    u'_id': ObjectId('4c5973554abffe0e0c000005'),\n     u'Tags': [u'In use', u'Marketing',\
  \ u'Warranty']\n}\n```\n\n#### 使用 `$pull` 移除特定值\n\n`$pull` 操作符允许您从数组中移除某个特定值的每次出现，无论该值出现了多少次；只要值相同，它就会被移除。\n\
  \n让我们看一个例子。首先使用 `$push` 操作符向 `Tags` 数组添加值为 `Double` 的相同标签：\n\n```\n>>> collection.update({\"\
  Type\" : \"Chair\"}, {\"$push\" : {\"Tags\" : \"Double\"} }, multi = False )\n>>>\
  \ collection.update({\"Type\" : \"Chair\"}, {\"$push\" : {\"Tags\" : \"Double\"\
  } }, multi = False )\n```\n\n接下来，通过执行 `find_one()` 命令确认该标签被添加了两次。一旦确认该标签存在两次，就使用\
  \ `$pull` 操作符移除该标签的两个实例：\n\n```\n>>> collection.find_one({\"Type\" : \"Chair\"},\
  \ fields={\"Tags\" : True})\n{\n     u'_id': ObjectId('4c5973554abffe0e0c000005'),\n\
  \     u'Tags': [u'In use', u'Marketing', u'Warranty', u'Double', u'Double']\n}\n\
  >>> collection.update({\"Type\" : \"Chair\"}, {\"$pull\" : {\"Tags\" : \"Double\"\
  } }, multi = False)\n```\n\n为了确认一切是否顺利，再次执行 `find_one()` 命令，这次确保结果中不再列出 `Double`\
  \ 标签：\n\n```\n>>> collection.find_one({\"Type\" : \"Chair\"}, fields={\"Tags\" :\
  \ True})\n{\n     u'_id': ObjectId('4c5973554abffe0e0c000005'),\n     u'Tags': [u'In\
  \ use', u'Marketing', u'Warranty']\n}\n```\n\n您可以使用 `$pullAll` 操作符执行相同的操作；与 `$pull`\
  \ 的区别在于，`$pullAll` 允许您移除多个标签。同样，让我们看一个例子。首先，您需要再次向 `Tags` 数组添加多个项目，并确认它们已被添加：\n\n\
  ```\n>>> collection.update({\"Type\" : \"Chair\"}, {\"$addToSet\" : { \"Tags\" :\
  \ {\"$each\" : [\"Bacon\",\"Spam\"] } } } )\n>>> collection.find_one({\"Type\" :\
  \ \"Chair\"}, fields={\"Tags\" : True})\n{\n     u'_id': ObjectId('4c5973554abffe0e0c000005'),\n\
  \     u'Tags': [u'In use', u'Marketing', u'Warranty', u'Bacon', u'Spam']\n}\n```\n\
  \n现在您可以使用 `$pullAll` 操作符移除多个标签。以下示例展示了如何使用此操作符；该示例还立即执行了 `find_one()` 命令，以确认 `Bacon`\
  \ 和 `Spam` 标签已被移除：\n\n```\n>>> collection.update({\"Type\" : \"Chair\"}, {\"$pullAll\"\
  \ : {\"Tags\" : [\"Bacon\",\"Spam\"] } }, multi = False)\n>>> collection.find_one({\"\
  Type\" : \"Chair\"}, fields={\"Tags\" : \"True\"})\n{\n     u'_id': ObjectId('4c5973554abffe0e0c000005'),\n\
  \     u'Tags': [u'In use', u'Marketing', u'Warranty']\n}\n```\n\n\n\n##### 使用 `save()`\
  \ 快速保存文档\n\n你可以使用 `save()` 函数通过 upsert 方法快速添加文档。为此，你必须同时定义 `_id` 字段的值。如果你要保存的文档已存在，它将被更新；如果尚不存在，则将被创建。\n\
  \n让我们看一个保存名为 `Desktop` 的文档的例子。首先在 shell 中输入文档并指定一个标识符，然后就可以用 `save()` 函数来保存它。执行\
  \ `save()` 函数会在保存成功后返回文档的 `ObjectId`：\n\n```python\n>>> Desktop = ({\n...     \"\
  Status\" : \"In use\",\n...     \"Tags\" : [\"Desktop\",\"In use\",\"Marketing\"\
  ,\"Warranty\"],\n...     \"ItemNumber\" : \"4532FOO\",\n...     \"Location\" : {\n\
  ...         \"Department\" : \"Marketing\",\n...         \"Building\" : \"2B\",\n\
  ...         \"Desknumber\" : 131131,\n...         \"Owner\" : \"Martin, Lisa\",\n\
  ...     }\n... })\n>>> collection.save(Desktop)\nObjectId('4c5ddbe24abffe0f34000001')\n\
  ```\n\n现在假设你意识到在文档中忘记指定一个键值对。你可以通过定义文档名称，后跟方括号中的键，然后包含所需内容，轻松地将此信息添加到文档中。完成此操作后，只需再次保存整个文档即可执行\
  \ upsert；这样做会再次返回文档的 `ObjectId`：\n\n```python\n>>> Desktop[ \"Type\" ] = \"Desktop\"\
  \n>>> collection.save(Desktop)\nObjectId('4c5ddbe24abffe0f34000001')\n```\n\n如你所见，返回的\
  \ `ObjectId` 值并未改变。\n\n##### 原子性地修改文档\n\n你可以使用 `find_and_modify()` 函数原子性地修改文档并返回结果。`find_and_modify()`\
  \ 函数可用于更新且仅更新单个文档。你还需要注意，默认情况下返回的文档不会包含所做的修改；要获取此信息，你需要指定一个额外的参数 `new: True`。\n\n\
  `find_and_modify()` 函数可与多个参数一起使用，并且你必须包含 `update` 参数或 `remove` 参数之一。以下列表涵盖了所有可用参数，解释了它们是什么以及它们的作用：\n\
  \n*   `query`：为查询指定过滤条件。如果未指定，则集合中的所有文档都将被视为可能的候选文档，然后它将更新或删除遇到的第一个文档。\n*   `update`：指定用于更新文档的信息。请注意，之前指定的任何修改操作符都可以用于此。\n\
  *   `upsert`：如果设置为 `True`，则执行 upsert 操作。\n*   `sort`：按指定顺序对匹配的文档进行排序。\n*   `full_response`：如果设置为\
  \ `True`，则返回整个响应对象。\n*   `remove`：如果设置为 `True`，则删除第一个匹配的文档。\n*   `new`：如果设置为 `True`，则返回更新后的文档，而非选中的原始文档。不过，这默认未设置，有时可能会有点令人困惑。\n\
  *   `fields`：指定你希望看到返回的字段，而非整个文档。这与 `find()` 函数的工作方式完全相同。请注意，除非明确禁用，否则 `_id` 字段将始终返回。\n\
  \n##### 参数实战应用\n\n你知道了参数的作用；现在是时候在一个实际示例中结合 `find_and_modify()` 函数来使用它们了。首先使用 `find_and_modify()`\
  \ 搜索任何具有 `\"Type\" : \"Desktop\"` 键值对的文档——然后通过设置一个额外的键值对 `\"Status\" : \"In repair\"\
  ` 来更新每个匹配查询的文档。最后，你希望确保 MongoDB 返回的是更新后的文档，而不是匹配查询的旧文档：\n\n```python\n>>> collection.find_and_modify(query={\"\
  Type\" : \"Desktop\"},\n... update={'$set' : {'Status' : 'In repair'} }, new=True\
  \ )\n{\n    u'ok': 1.0,\n    u'value': {\n        u'Status': u'In repair',\n   \
  \     u'Tags': [u'Desktop', u'In use', u'Marketing', u'Warranty'],\n        u'ItemNumber':\
  \ u'4532FOO',\n        u'Location': {\n            u'Department': u'Marketing',\n\
  \            u'Building': u'2B',\n            u'Owner': u'Martin, Lisa',\n     \
  \       u'Desknumber': 131131\n        },\n        u'_id': ObjectId('4c5dda114abffe0f34000000'),\n\
  \        u'Type': u'Desktop'\n    }\n}\n```\n\n让我们看另一个例子。这次，你将使用 `find_and_modify()`\
  \ 删除一个文档；在这种情况下，输出将显示哪个文档被删除了：\n\n```python\n>>> collection.find_and_modify(query={'Type'\
  \ : 'Desktop'},\n... sort={'ItemNumber' : -1}, remove=True)\n{\n    u'ok': 1.0,\n\
  \    u'value': {\n        u'Status': u'In use',\n        u'Tags': [u'Desktop', u'In\
  \ use', u'Marketing', u'Warranty'],\n        u'ItemNumber': u'4532FOO',\n      \
  \  u'Location': {\n            u'Department': u'Marketing',\n            u'Building':\
  \ u'2B',\n            u'Owner': u'Martin, Lisa',\n            u'Desknumber': 131131\n\
  \        },\n        u'_id': ObjectId('4c5ddbe24abffe0f34000001'),\n        u'Type':\
  \ u'Desktop'\n    }\n}\n```\n\n#### 删除数据\n\n在大多数情况下，你会使用 Python 驱动程序来添加或修改数据。然而，理解如何删除数据也很重要。Python\
  \ 驱动程序提供了几种删除数据的方法。首先，你可以使用 `remove()` 函数从集合中删除单个文档。其次，你可以使用 `drop()` 或 `drop_collection()`\
  \ 函数删除整个集合。最后，你可以使用 `drop_database()` 函数删除整个数据库。（看起来你不太可能经常使用这个函数！）\n\n尽管如此，我们仍将仔细研究每一个函数，看看它们所有的例子。\n\
  \n让我们从 `remove()` 函数开始看起。这个函数允许你指定一个参数，该参数将用于查找并删除当前集合中任何匹配的文档。在这个例子中，你使用 `remove()`\
  \ 函数删除每个具有 `\"Status\" : \"In use\"` 键值对的文档；之后，你使用 `find_one()` 函数来确认结果：\n\n```python\n\
  >>> collection.remove({\"Status\" : \"In use\"})\n>>> collection.find_one({\"Status\"\
  \ : \"In use\"})\n>>>\n```\n\n使用此函数时，你需要小心指定什么样的条件。通常，你应该先执行一次 `find()`，这样你就能确切看到哪些文档将被删除。或者，你也可以使用\
  \ `ObjectId` 来删除一个条目。\n\n如果你厌倦了整个集合，你可以使用 `drop()` 或 `drop_collection()` 函数来删除它。这两个函数的工作方式相同（实际上其中一个只是另一个的别名）；具体来说，两者都只期望一个参数，即集合的名称：\n\
  \n```python\n>>> db.items.drop()\n```\n\n最后（由于其潜在的破坏性，这一点绝非不重要），`drop_database()`\
  \ 函数使你能够删除整个数据库。你通过 `Connection` 模块调用此函数，如下例所示：\n\n```python\n>>> c.drop_database(\"\
  inventory\")\n```\n\n\n\n#### 在两个文档之间创建链接\n\n数据库引用（DBRefs）在 PyMongo 中通过`DBRef()`函数实现，作为`DBRef`模块的一部分，可用于创建位于不同位置的两个文档之间的链接。这是一种字段存储约定，可用于应用程序逻辑。例如，你可以为所有员工创建一个集合，为所有物品创建另一个集合——然后使用`DBRef()`函数在员工和物品位置之间创建引用，而不是为每个物品手动输入。\n\
  \n> **注意**\n>\n> MongoDB 无法确保 DBRefs 是有效的。因此，在删除可能由 DBRefs 链接的文档时应谨慎。\n\n正如你从前面章节中可能回忆起的，你可以通过两种方式引用数据。第一，你可以添加一个简单引用（手动引用），使用一个文档的`_id`字段来存储指向它的引用。第二，你可以使用`DBRef`模块，它比手动引用提供了更多选项。\n\
  \n让我们首先创建一个手动引用。从保存一个文档开始。例如，假设你想将一个人的信息保存到特定集合中。以下示例定义了一个`jan`字典，并将其保存到`people`集合中以返回一个`ObjectId`：\n\
  \n```python\n>>> jan = {\n... \"First Name\" : \"Jan\",\n... \"Last Name\" : \"\
  Walker\",\n... \"Display Name\" : \"Walker, Jan\",\n... \"Department\" : \"Development\"\
  ,\n... \"Building\" : \"2B\",\n... \"Floor\" : 12,\n... \"Desk\" : 120103,\n...\
  \ \"E-Mail\" : \"jw@example.com/\"\n... }\n>>> people = db.people\n>>> people.insert(jan)\n\
  ObjectId('4c5e5f104abffe0f34000002')\n```\n\n添加一个物品并获取其 ID 后，你可以使用此信息将该物品链接到另一个集合中的另一个文档：\n\
  \n```python\n>>> laptop = {\n... \"Type\" : \"Laptop\",\n... \"Status\" : \"In use\"\
  ,\n... \"ItemNumber\" : \"12345ABC\",\n... \"Tags\" : [\"Warranty\",\"In use\",\"\
  Laptop\"],\n... \"Owner\" : jan[ \"_id\" ]\n... }\n>>> items = db.items\n>>> items.insert(laptop)\n\
  ObjectId('4c5e6f6b4abffe0f34000003')\n```\n\n现在假设你想找出所有者的信息。在这种情况下，你只需查询`Owner`字段中给出的`ObjectId`；显然，这仅在你知道数据存储在哪个集合中时才可能。\n\
  \n但假设你不知道这些信息存储在哪里。正是为了处理这种精确的场景，才创建了`DBRef()`函数。即使你不知道哪个集合保存了原始数据，也可以使用此函数，因此在搜索信息时不必太担心集合名称。\n\
  \n`DBRef()`函数接受三个参数；它可以接受第四个参数，用于指定额外的关键字参数。以下是三个主要参数及其功能：\n\n*   `collection`（必填）：指定原始数据所在的集合（例如，`people`）。\n\
  *   `id`（必填）：指定应引用的文档的`_id`值。\n*   `database`（可选）：指定要引用的数据库的名称。\n\n必须先加载`DBRef`模块，然后才能使用`DBRef`函数，因此让我们在继续之前加载该模块：\n\
  \n```python\n>>> from bson.dbref import DBRef\n```\n\n此时，你已准备好查看`DBRef()`函数的实际示例。在以下示例中，你将一个人插入`people`集合，并将一个物品添加到`items`集合，使用`DBRef`引用所有者：\n\
  \n```python\n>>> mike = {\n... \"First Name\" : \"Mike\",\n... \"Last Name\" : \"\
  Wazowski\",\n... \"Display Name\" : \"Wazowski, Mike\",\n... \"Department\" : \"\
  Entertainment\",\n... \"Building\" : \"2B\",\n... \"Floor\" : 10,\n... \"Desk\"\
  \ : 120789,\n... \"E-Mail\" : \"mw@monsters.inc\"\n... }\n>>> people.save(mike)\n\
  ObjectId('4c5e73714abffe0f34000004')\n```\n\n此时，还没有发生什么有趣的事情。是的，你添加了一个文档，但没有添加对它的引用。不过，你确实拥有该文档的`ObjectId`，所以现在你可以将下一个文档添加到集合中，然后使用`DBRef()`将`owner`字段指向先前插入文档的值。特别注意`DBRef()`函数的语法；尤其要注意，第一个参数是先前指定文档所在的集合名称，而第二个参数仅仅是`mike`字典中`_id`键的引用：\n\
  \n```python\n>>> laptop = {\n... \"Type\" : \"Laptop\",\n... \"Status\" : \"In use\"\
  ,\n... \"ItemNumber\" : \"2345DEF\",\n... \"Tags\" : [\"Warranty\",\"In use\",\"\
  Laptop\"],\n... \"Owner\" : DBRef('people', mike[ \"_id\" ])\n... }\n>>> items.save(laptop)\n\
  ObjectId('4c5e740a4abffe0f34000005')\n```\n\n你可能已经注意到，这段代码与用于创建手动引用的代码没有太大不同。但是，我们建议你使用\
  \ DBRefs，以防你需要引用特定信息，而不是嵌入它。采用这种方法也意味着你在查询引用信息时无需查找集合名称。\n\n##### 检索信息\n\n你知道如何使用`DBRef()`引用信息；现在假设你想检索先前引用的信息。你可以使用\
  \ Python 驱动的`dereference()`函数来完成此操作。你只需将先前指定的包含引用信息的字段定义为参数，然后按回车键。\n\n为了演示，让我们从头到尾完成从一个文档到另一个文档引用和检索信息的过程。让我们首先找到包含引用数据的文档，然后检索该文档以供显示。第一步是创建一个查询，以找到一个包含引用信息的随机文档：\n\
  \n```python\n>>> items.find_one({\"ItemNumber\" : \"2345DEF\"})\n{\n    u'Status':\
  \ u'In use',\n    u'Tags': [u'Warranty', u'In use', u'Laptop'],\n    u'ItemNumber':\
  \ u'2345DEF',\n    u'Owner': DBRef(u'people', ObjectId('4c5e73714abffe0f34000004')),\n\
  \    u'_id': ObjectId('4c5e740a4abffe0f34000005'),\n    u'Type': u'Laptop'\n}\n\
  ```\n\n接下来，你想将此物品存储在一个`person`字典下：\n\n```python\n>>> person = items.find_one({\"\
  ItemNumber\" : \"2345DEF\"})\n```\n\n此时，你可以使用`dereference()`函数对`person[\"Owner\"\
  ]`字段进行解引用。因为`Owner`字段链接到你想要检索的数据，所以这是可能的：\n\n```python\n>>> db.dereference(person[\"\
  Owner\"])\n{\n    u'Building': u'2B',\n    u'Floor': 10,\n    u'Last Name': u'Wazowski',\n\
  \    u'Desk': 120789,\n    u'E-Mail': u'mw@monsters.inc',\n    u'First Name': u'Mike',\n\
  \    u'Display Name': u'Wazowski, Mike',\n    u'Department': u'Entertainment',\n\
  \    u'_id': ObjectId('4c5e73714abffe0f34000004')\n}\n```\n\n这并不难！从这个示例中得出的要点是，DBRefs\
  \ 技术提供了一种存储你想引用的数据的好方法。此外，它在如何指定集合和数据库名称方面提供了一些灵活性。如果你想保持数据库整洁，特别是在数据确实不应该嵌入的情况下，你会发现这个功能经常使用。\n\
  \n\n\n#### 摘要\n\n在本章中，我们探讨了 MongoDB 的 Python 驱动程序（`PyMongo`）的基础知识，了解了如何执行最常用的操作。在此过程中，我们介绍了如何搜索、存储、更新和删除数据。\n\
  \n我们还了解了如何使用两种方法引用另一个集合中包含的文档：手动引用和 `DBRefs`。在审视这些方法时，我们发现它们的语法非常相似，但 `DBRefs` 方法在功能上提供了更高的健壮性，因此在大多数情况下更可取。\n\
  \n下一章将深入探讨 MongoDB 更高级的查询方法。\n\n### 8. 高级查询\n\n摘要\n\n到目前为止，本章已经涵盖了大部分基本查询机制，即通过给定条件查找一个或一系列文档。存在多种机制可以找到给定文档并将其返回到你的应用程序以便处理。但有时这些常规查询机制力有未逮，而你希望在集合中的大部分或所有文档上执行复杂操作。许多开发人员在遇到此类查询或操作需求时，要么遍历集合中的所有文档，要么编写一系列顺序执行的查询来进行必要的计算。虽然这是一种有效的方法，但它编写和维护起来可能很繁琐，而且效率低下。正是基于这些原因，MongoDB\
  \ 提供了一些高级查询机制，你可以利用它们从数据中获取最大价值。本章将探讨的 MongoDB 高级功能包括：全文搜索、聚合框架以及 `MapReduce` 框架。\n\
  \n全文搜索是 MongoDB 最常被要求添加的功能之一。它代表了一种在 MongoDB 中创建专门文本索引的能力，然后可以对这些索引执行文本搜索，以定位包含匹配文本元素的文档。MongoDB\
  \ 全文搜索功能超越了简单的字符串匹配，它基于你为文档选择的语言，采用了一种完整的词干提取方法，是对你文档执行语言查询的强大工具。这个最近引入的功能在 MongoDB\
  \ 2.4 版本中被标记为“实验性”，因为开发团队仍在努力改进它，这意味着你必须手动激活它才能在你的 MongoDB 环境中使用。\n\n本章将涵盖的第二个功能是\
  \ MongoDB 聚合框架。在第 4 章和第 6 章中介绍过，该功能提供了大量查询特性，允许你遍历选定的文档或全部文档，收集或操作信息。这些查询函数然后被组织成一个操作管道，按顺序在你的集合上执行，以便从你的查询中收集信息。\n\
  \n我们将涵盖的第三个也是最后一个功能称为 `MapReduce`，这对于使用过 `Hadoop` 的人来说会很熟悉。`MapReduce` 是一个强大的机制，它利用\
  \ MongoDB 内置的 JavaScript 引擎来实时执行抽象代码。它是一个极其强大的工具，使用两个 JavaScript 函数，一个用于映射你的数据，另一个用于从映射的数据中转换和提取信息。\n\
  \n贯穿本章，最重要的事情或许是记住这些确实是高级功能，如果使用不当，可能会给你的 MongoDB 节点带来严重的性能问题，因此，只要可能，在将它们部署到重要系统之前，你应在测试环境中测试这些功能中的任何一项。\n\
  \n#### 文本搜索\n\nMongoDB 的文本搜索首先通过创建全文索引并指定你希望索引以方便文本搜索的字段来工作。这个文本索引将遍历你集合中的每个文档，并对每个文本字符串进行标记化和词干提取。这个标记化和词干提取的过程涉及将文本分解为标记，这些标记在概念上接近于单词。然后\
  \ MongoDB 对每个标记进行词干提取，以找到该标记的根词。例如，假设分解一个字符串得到了标记 `fishing`。然后该标记被词干提取回根词 `fish`，因此\
  \ MongoDB 为该文档创建一个 `fish` 的索引条目。同样的标记化和词干提取过程也应用于用户输入以执行给定文本搜索的搜索参数。然后这些参数与每个文档进行比较，并计算相关性得分。文档随后根据其得分返回给用户。\n\
  \n你可能想知道像 `the` 或 `it` 这样的单词将如何被词干提取，以及如果文档不是英文的会怎样。答案是，这些和类似的单词将不会被词干提取，并且 MongoDB\
  \ 文本搜索支持多种语言。\n\nMongoDB 文本搜索引擎是 MongoDB, Inc. 团队为文本数据检索而编写的一个专有引擎。MongoDB 文本搜索还利用了\
  \ `Snowball` 字符串处理语言，该语言为词干提取和停用词（那些不被词干提取的单词，因为它们不代表任何有价值的索引或搜索概念）提供了支持。\n\n从中可以得出的是，MongoDB\
  \ 的文本搜索极其复杂，并且被设计得尽可能灵活和准确。\n\n##### 文本搜索的成本与限制\n\n正如你根据所学的文本搜索功能原理可以想象的那样，使用 MongoDB\
  \ 文本搜索存在一些成本。首先，它会将未来文档的文档存储分配更改为 `usePowerOf2Sizes` 选项，该选项指示 MongoDB 分配存储以便更高效地重用空闲空间。其次，文本索引很大，并且根据你存储的文档数量和每个索引字段内的标记数量，其增长可能非常迅速。第三个限制是，在现有文档上构建文本索引非常耗时，并且向具有文本索引的字段添加新条目也成本更高。第四，像\
  \ MongoDB 中的所有东西一样，文本索引在 `RAM` 中时工作得更好。最后，由于文本索引的复杂性和大小，目前每个集合限制只能有一个文本索引。\n\n\n\
  \n##### 启用文本搜索\n\n如前所述，文本搜索作为一项实验性或测试版功能在 MongoDB 2.4 中被引入。因此，您需要在集群中将使用此功能的每个 MongoDB\
  \ 实例（以及如果您使用分片，则包括 MongoS）上显式启用文本搜索功能。有三种方法可以启用文本搜索；第一种是在用于启动或停止 MongoDB 进程的命令中添加以下选项：\n\
  \n`--setParameter textSearchEnabled=true`\n\n第二种方法是在 MongoDB 实例的配置文件中添加以下选项：\n\n\
  `setParameter = textSearchEnabled=true`\n\n第三种也是最后一种在 MongoDB 实例上使文本搜索工作的方法是，通过\
  \ Mongo shell 运行以下命令：\n\n```\ndb.adminCommand({ setParameter: 1, textSearchEnabled\
  \ : true })\n```\n\n设置完成后，您现在就可以在此节点上使用 MongoDB 全文搜索功能了。\n\n**注意**\n该功能处于测试版并不意味着它不可用。MongoDB\
  \ 公司（MongoDB, Inc.）团队投入了大量努力来确保此功能的正确性。通过使用该功能并在 MongoDB 公司的 JIRA (`jira.mongodb.org`)\
  \ 上报告您遇到的任何问题，您可以帮助他们为此功能的正式发布做好准备。\n\n至此，您应该已在您的 MongoDB 实例上启用了文本搜索功能，并准备好利用它！让我们看看如何创建文本搜索索引并执行文本搜索。\n\
  \n##### 使用文本搜索\n\n尽管我们描述了所有复杂性，但 MongoDB 文本搜索使用起来却出奇地简单；您创建文本索引的方式与创建任何其他索引的方式相同。例如，要在我们理论上的博客集合的\
  \ `“content”` 元素上创建文本索引，我会运行以下命令：\n\n```\ndb.blog.ensureIndex( { content : \"text\"\
  \ } );\n```\n\n就是这样。MongoDB 会处理其余的事情，在您的数据库中插入一个文本索引，所有未来包含 `content` 字段的文档都将被处理，并将条目添加到文本索引中以供搜索。但仅仅创建一个索引，可用的数据确实还不够。我们需要一组合适的文本来操作和查询。\n\
  \n###### 加载文本数据\n\n最初，我们计划使用来自 Twitter 的实时数据流，但这些文档处理起来太笨重。因此，我们改为创建了一小批八个模拟 Twitter\
  \ 信息流的文档，来试用一下文本搜索功能。\n\n继续，使用 `mongoimport` 将 `twitter.tgz` 中的 MongoDB 数据导入到您的数据库：\n\
  \n```\n$ mongoimport test.json -d test -c texttest\nconnected to: 127.0.0.1\nSat\
  \ Jul 6 17:52:19 imported 8 objects\n```\n\n现在我们已经恢复了数据，如果尚未启用，请继续启用文本索引：\n\n```\n\
  db.adminCommand({ setParameter: 1, textSearchEnabled : true });\n{ \"was\" : false,\
  \ \"ok\" : 1 }\n```\n\n现在我们已经启用了文本索引，我们应该在 Twitter 数据上创建一个文本索引。\n\n###### 创建文本索引\n\
  \n对于 Twitter 数据，我们关注的部分是 `text` 字段，即推文的正文文本。要设置文本索引，我们运行以下命令：\n\n```\nuse test;\n\
  db.texttest.ensureIndex( { body : \"text\" } );\n```\n\n如果您看到错误消息 `“text search\
  \ not enabled”`，则需要确保文本索引正在运行，请使用刚才展示的命令。现在，如果您查看日志，您将看到以下内容，显示文本索引正在构建：\n\n```\n\
  Sat Jul 6 17:54:16.078 [conn41] build index test.texttest { _fts: \"text\", _ftsx:\
  \ 1 }\nSat Jul 6 17:54:16.089 [conn41] build index done. scanned 8 total records.\
  \ 0.01 secs\n```\n\n我们也可以检查集合的索引：\n\n```\ndb.texttest.getIndexes()\n[\n    {\n \
  \       \"v\" : 1,\n        \"key\" : {\n            \"_id\" : 1\n        },\n \
  \       \"ns\" : \"test.texttest\",\n        \"name\" : \"_id_\"\n    },\n    {\n\
  \        \"v\" : 1,\n        \"key\" : {\n            \"_fts\" : \"text\",\n   \
  \         \"_ftsx\" : 1\n        },\n        \"ns\" : \"test.texttest\",\n     \
  \   \"name\" : \"body_text\",\n        \"weights\" : {\n            \"body\" : 1\n\
  \        },\n        \"default_language\" : \"english\",\n        \"language_override\"\
  \ : \"language\",\n        \"textIndexVersion\" : 1\n    }\n]\n```\n\n好的，我们已经启用了文本搜索，创建了索引，并确认了它的存在；现在让我们运行文本搜索命令。\n\
  \n###### 运行文本搜索命令\n\n在我们使用的 MongoDB 版本中，没有用于 `text` 命令的 shell 辅助程序，因此我们使用 `runCommand`\
  \ 语法执行它，如下所示：\n\n```\n> db.texttest.runCommand( \"text\", { search :\"fish\" } )\n\
  ```\n\n此命令将返回与查询字符串 `“fish”` 匹配的任何文档。在本例中，它返回了两个文档。输出显示了大量的调试信息，以及一个 `“results”`\
  \ 数组；该数组包含多个文档。这些文档包括匹配文档的分数和返回的匹配文档（作为 `obj`）。您可以看到，我们匹配文档的文本部分都包含单词 `fish` 或 `fishing`，这两个词都符合我们的查询！同样值得注意的是，MongoDB\
  \ 文本索引不区分大小写，这是执行文本查询时的一个重要考虑因素。\n\n**注意**\n请记住，文本搜索中的所有条目都会被分词和提取词干。这意味着像 `fishy`\
  \ 或 `fishing` 这样的词将被还原为 `fish`。\n\n此外，您还可以看到分数，分别是 0.75 或 0.666，表示该结果与您查询的相关性——值越高，匹配度越好。您还可以看到查询的统计信息，包括返回的对象数量（2）和所花费的时间（112\
  \ 微秒）。\n\n```\n{\n    \"queryDebugString\" : \"fish||||||\",\n    \"language\" :\
  \ \"english\",\n    \"results\" : [\n        {\n            \"score\" : 0.75,\n\
  \            \"obj\" : {\n                \"_id\" : ObjectId(\"51d7ccb36bc6f959debe5514\"\
  ),\n                \"number\" : 1,\n                \"body\" : \"i like fish\"\
  ,\n                \"about\" : \"food\"\n            }\n        },\n        {\n\
  \            \"score\" : 0.6666666666666666,\n            \"obj\" : {\n        \
  \        \"_id\" : ObjectId(\"51d7ccb36bc6f959debe5516\"),\n                \"number\"\
  \ : 3,\n                \"body\" : \"i like to go fishing\",\n                \"\
  about\" : \"recreation\"\n            }\n        }\n    ],\n    \"stats\" : {\n\
  \        \"nscanned\" : 2,\n        \"nscannedObjects\" : 0,\n        \"n\" : 2,\n\
  \        \"nfound\" : 2,\n        \"timeMicros\" : 112\n    },\n    \"ok\" : 1\n\
  }\n```\n\n现在让我们检查一些其他文本搜索功能，我们可以使用它们来增强我们的文本查询。\n\n\n\n#### 过滤文本查询\n\n我们首先可以做的是过滤文本查询。为了细化我们的“鱼”查询，假设我们只想要将鱼作为食物的文档，而不匹配“捕鱼”活动的任何内容。要添加这个额外的参数，我们使用\
  \ `filter` 选项并提供一个包含普通查询的文档。因此，为了找到作为食物的鱼，我们运行以下命令：\n\n```\n> db.texttest.runCommand(\
  \ \"text\", { search : \"fish\", filter : { about : \"food\" } })\n{\n      \"queryDebugString\"\
  \ : \"fish||||||\",\n      \"language\" : \"english\",\n      \"results\" : [\n\
  \           {\n                \"score\" : 0.75,\n                \"obj\" : {\n\
  \                     \"_id\" : ObjectId(\"51d7ccb36bc6f959debe5514\"),\n      \
  \               \"number\" : 1,\n                     \"body\" : \"i like fish\"\
  ,\n                     \"about\" : \"food\"\n                }\n           }\n\
  \      ],\n      \"stats\" : {\n           \"nscanned\" : 2,\n           \"nscannedObjects\"\
  \ : 2,\n           \"n\" : 1,\n           \"nfound\" : 1,\n           \"timeMicros\"\
  \ : 101\n      },\n      \"ok\" : 1\n}\n```\n\n这很完美；正如我们期望的那样，只返回了一个条目，而没有得到不相关的“捕鱼”文档。请注意，`nscanned`\
  \ 和 `nscannedObjects` 的值都是 2，这表示该查询从索引中扫描了两个文档 (`nscanned`)，然后必须检索这两个文档以检查它们的内容\
  \ (`nscannedObjects`)，最终返回了一个匹配的文档 (`n`)。现在让我们看另一个例子。\n\n#### 更复杂的文本搜索\n\n#####\
  \ 排除术语\n\n首先运行以下查询，它将返回两个文档。为简洁起见，结果已缩减为仅文本字段。\n\n```\ndb.texttest.runCommand( \"\
  text\", { search : \"cook\" })\n```\n\n```\n\"body\" : \"i want to cook dinner\"\
  ,\n\"body\" : \"i am to cooking lunch\",\n```\n\n如你所见，我们有两个文档，都是关于做饭的。假设我们想从搜索中排除午餐，只返回晚餐。我们可以通过添加\
  \ `-lunch` 来从搜索中排除文本 `lunch`。\n\n```\n> db.texttest.runCommand( \"text\", { search\
  \ : \"cook -lunch\" })\n{\n\"queryDebugString\" : \"cook||lunch||||\",\n\"language\"\
  \ : \"english\",\n\"results\" : [\n{\n\"score\" : 0.6666666666666666,\n\"obj\" :\
  \ {\n\"_id\" : ObjectId(\"51d7ccb36bc6f959debe5518\"),\n\"number\" : 5,\n\"body\"\
  \ : \"i want to cook dinner\",\n\"about\" : \"activities\"\n}\n}\n],\n\"stats\"\
  \ : {\n\"nscanned\" : 2,\n\"nscannedObjects\" : 0,\n\"n\" : 1,\n\"nfound\" : 1,\n\
  \"timeMicros\" : 150\n},\n\"ok\" : 1\n}\n```\n\n首先注意 `queryDebugString` 包含了 `cook`\
  \ 和 `lunch`，这些是我们使用的搜索词。另请注意，扫描了两个条目，但只返回了一个。搜索的工作方式是先找到所有匹配项，然后消除不匹配项。\n\n####\
  \ 字符串字面量搜索\n\n最后一个人们可能觉得有价值的搜索功能是字符串字面量搜索，可用于匹配特定的单词或短语，而不进行词干提取。就目前而言，我们个人搜索的所有元素都被标记化，然后提取词干，并对每个词进行评估。看下面的查询：\n\
  \n```\n> db.texttest.runCommand( \"text\", { search : \"mongodb text search\" })\n\
  {\n\"queryDebugString\" : \"mongodb|search|text||||||\",\n\"language\" : \"english\"\
  ,\n\"results\" : [\n{\n\"score\" : 3.875,\n\"obj\" : {\n\"_id\" : ObjectId(\"51d7ccb36bc6f959debe551a\"\
  ),\n\"number\" : 7,\n\"body\" : \"i like mongodb text search\",\n\"about\" : \"\
  food\"\n}\n},\n{\n\"score\" : 3.8000000000000003,\n\"obj\" : {\n\"_id\" : ObjectId(\"\
  51d7ccb36bc6f959debe551b\"),\n\"number\" : 8,\n\"body\" : \"mongodb has a new text\
  \ search feature\",\n\"about\" : \"food\"\n}\n}\n],\n\"stats\" : {\n\"nscanned\"\
  \ : 6,\n\"nscannedObjects\" : 0,\n\"n\" : 2,\n\"nfound\" : 2,\n\"timeMicros\" :\
  \ 537\n},\n\"ok\" : 1\n}\n```\n\n你可以在 `queryDebugString` 中看到每个元素都被评估和查询了。你还可以看到这个查询评估并找到了两个文档。现在注意当我们在相同的查询中使用转义引号使其成为字符串字面量时的差异：\n\
  \n```\n> db.texttest.runCommand( \"text\", { search : \"\\\"mongodb text search\\\
  \"\" })\n{\n\"queryDebugString\" : \"mongodb|search|text||||mongodb text search||\"\
  ,\n\"language\" : \"english\",\n\"results\" : [\n{\n\"score\" : 3.875,\n\"obj\"\
  \ : {\n\"_id\" : ObjectId(\"51d7ccb36bc6f959debe551a\"),\n\"number\" : 7,\n\"body\"\
  \ : \"i like mongodb text search\",\n\"about\" : \"food\"\n}\n}\n],\n\"stats\" :\
  \ {\n\"nscanned\" : 6,\n\"nscannedObjects\" : 0,\n\"n\" : 1,\n\"nfound\" : 1,\n\"\
  timeMicros\" : 134\n},\n\"ok\" : 1\n}\n```\n\n你可以看到只返回了一个文档，即实际包含该文本的文档。你还可以在 `queryDebugString`\
  \ 中看到最后一个元素是字符串本身，而不仅仅是三个被标记化和提取词干的元素。\n\n#### 附加选项\n\n除了我们目前讨论的之外，还有三个其他选项可以添加到\
  \ `text` 函数中。\n\n##### `limit` 选项\n\n第一个是 `limit`，它限制返回的文档数量。可以按如下方式使用：\n\n```\n\
  > db.texttest.runCommand( \"text\", { search :\"fish\", limit : 1 } )\n```\n\n#####\
  \ `project` 选项\n\n第二个选项是 `project`，它允许你设置将作为查询结果显示的字段。此选项接受一个描述你希望显示哪些字段的文档，0 表示关闭，1\
  \ 表示开启。默认情况下，指定此选项时，除了开启的 `_id` 外，所有元素都是关闭的。\n\n```\n> db.texttest.runCommand( \"\
  text\", { search :\"fish\", project : { _id : 0, body : 1 } } )\n```\n\n##### `language`\
  \ 选项\n\n第三个也是最后一个选项是 `language`，它允许你指定文本搜索将使用的语言。如果未指定语言，则使用索引的默认语言。语言必须全部小写指定。可以按如下方式调用：\n\
  \n```\n> db.texttest.runCommand( \"text\", { search :\"fish\", lagnuage : \"french\"\
  \ } )\n```\n\n##### 支持的语言\n\n目前文本搜索支持以下语言。\n\n* 丹麦语\n* 荷兰语\n* 英语\n* 芬兰语\n* 法语\n\
  * 德语\n* 匈牙利语\n* 意大利语\n* 挪威语\n* 葡萄牙语\n* 罗马尼亚语\n* 俄语\n* 西班牙语\n* 瑞典语\n* 土耳其语\n\n有关\
  \ MongoDB 文本搜索当前支持的更多详细信息，请参阅页面 [`​docs.​mongodb.​org/​manual/​reference/​command/​text/​`](http://docs.mongodb.org/manual/reference/command/text/)。\n\
  \n\n\n##### 其他语言的文本索引\n\n我们之前创建了一个简单的文本索引，以便开始使用文本功能。但你可以使用许多附加技术，让你的文本索引更好地适应你的工作负载。你可能还记得，单词的词干提取逻辑会根据\
  \ MongoDB 所使用的语言而变化。默认情况下，所有索引都是按英语创建的，但这并不适合许多人，因为他们的数据可能不是英语，因此语言规则也不同。你可以在每次查询中指定语言，但如果你知道要使用哪种语言，这样做并不方便。你可以通过在创建索引时添加该选项来指定默认语言：\n\
  \n```javascript\ndb.texttest.ensureIndex( { content : \"text\" }, { default_language\
  \ : \"french\" } );\n```\n\n这将创建一个以法语为默认语言的文本索引。请记住，每个集合只能有一个文本索引，因此在创建新索引之前，你需要删除任何其他现有索引。\n\
  \n但是，如果一个集合中包含多种语言怎么办？文本索引功能提供了一个解决方案，但它要求你为所有文档标记正确的语言。你可能认为 MongoDB 最好能自动确定给定文档的语言，但没有编程方法可以实现精确的语言匹配。相反，MongoDB\
  \ 允许你使用指定自身语言的文档。例如，看下面四个文档：\n\n```javascript\n{ _id : 1, content : \"cheese\",\
  \ lingvo : \"english\" }\n{ _id : 2, content : \"fromage\", lingvo: \"french\" }\n\
  { _id : 3, content : \"queso\", lingvo: \"spanish\" }\n{ _id : 4, content : \"ost\"\
  , lingvo: \"swedish\" }\n```\n\n它们包含四种语言（在 `lingvo` 字段中），如果我们保留任何一个默认值，那么我们需要指定将在其中搜索的语言。因为我们指定了给定内容所属的语言，所以我们可以使用这个字段作为语言覆盖，给定的语言将被使用而不是默认语言。我们可以按如下方式创建索引：\n\
  \n```javascript\ndb.texttest.ensureIndex( { content : \"text\" }, { language_override\
  \ : \"lingvo\" } );\n```\n\n因此，这些文档的默认语言将是所提供的语言，而任何缺少 `lingvo` 字段的文档将使用默认索引，在本例中是英语。\n\
  \n##### 文本索引的复合索引\n\n虽然一个集合上只能有一个文本索引，但这个文本索引可以覆盖文档中的多个字段，甚至是所有字段。你可以像为普通索引那样指定额外的字段。假设我们想同时索引\
  \ `content` 和任何 `comments`；我们可以按如下方式操作。现在我们可以在两个字段上进行文本搜索。\n\n```javascript\ndb.texttest.ensureIndex(\
  \ { content : \"text\", comments : \"text\" });\n```\n\n你甚至可能想在文档中的所有字段上创建文本索引。MongoDB\
  \ 有一个通配符说明符，可用于引用所有文档的所有文本元素；其表示法是 `\"$**\"`。如果你希望将此形式用于你的文本索引，你需要在文档中添加 `name`\
  \ 的索引选项。这样，就不会使用自动生成的名称，并且避免因为字段名过长而导致索引出现问题。索引的最大长度是 121 个字符，这包括集合名称、数据库名称和要索引的字段名称。\n\
  \n> **注意**\n> 强烈建议你为任何包含文本字段的复合索引指定一个名称，以避免因名称长度而导致的问题。\n\n这给了我们以下语法，用于在 `texttest`\
  \ 集合的所有文档的所有字符串元素上创建一个名为 `alltextindex` 的文本索引：\n\n```javascript\ndb.texttest.ensureIndex(\
  \ { \"$**\": \"text\" }, { name: \"alltextindex\" } )\n```\n\n使用复合文本索引可以做的下一件事是，为该索引上的不同文本字段指定权重。你可以通过为每个要索引的字段添加权重值（默认值为\
  \ 1 以上）来实现。然后，这些值将以 N:1 的比例增加给定索引结果的重要性。看下面的示例索引：\n\n```javascript\ndb.texttest.ensureIndex(\
  \ { content : \"text\", comments : \"text\"}, { weights : { content: 10, comments:\
  \ 5, } } );\n```\n\n这个索引意味着文档的 `content` 部分将比 `comments` 值获得 10:5 的优先级。任何其他字段将具有默认权重\
  \ 1，与 `comments` 的权重 5 和 `content` 的权重 10 相比。你也可以结合权重和通配符文本搜索参数来为特定字段加权。\n\n> **注意**\n\
  > 请注意，如果你有太多的文本索引，你会得到一个“too many text indexes”的错误。如果发生这种情况，你应该删除一个现有的文本索引，以便能够创建新的。\n\
  \n除了与其他文本字段创建复合索引外，你还可以与其他非文本字段创建复合索引。你可以像添加任何其他索引一样构建这些索引，如本例所示：\n\n```javascript\n\
  db.texttest.ensureIndex( { content : \"text\", username : 1 });\n```\n\n此命令在文档的\
  \ `content` 部分上创建一个文本索引，在 `username` 部分上创建一个普通索引。这在使用 `filter` 参数时特别有用，因为过滤器实际上是对所使用的所有子文档进行的查询。这些子文档也需要从索引中读取，或者通过读取文档本身来获取。让我们看看之前的例子：\n\
  \n```javascript\ndb.texttest.runCommand( \"text\", { search : \"fish\", filter :\
  \ { about : \"food\" } })\n```\n\n鉴于此查询上的过滤器，我们需要索引文档的 `about` 部分；否则，理论上匹配的每个文档都需要被完全读取然后进行验证，这是一个成本高昂的过程。然而，如果我们按如下方式建立索引，就可以通过拥有一个像这样的索引来避免这些读取，该索引包含\
  \ `about` 元素：\n\n```javascript\ndb.texttest.ensureIndex( { about : 1, content :\
  \ \"text\" });\n```\n\n现在让我们再次运行 `text` 命令：\n\n```javascript\n> db.texttest.runCommand(\
  \ \"text\", { search : \"fish\", filter : { about : \"food\" } })\n{\n    \"queryDebugString\"\
  \ : \"fish||||||\",\n    \"language\" : \"english\",\n    \"results\" : [\n    \
  \    {\n            \"score\" : 0.75,\n            \"obj\" : {\n               \
  \ \"_id\" : ObjectId(\"51d7ccb36bc6f959debe5514\"),\n                \"number\"\
  \ : 1,\n                \"body\" : \"i like fish\",\n                \"about\" :\
  \ \"food\"\n            }\n        }\n    ],\n    \"stats\" : {\n        \"nscanned\"\
  \ : 1,\n        \"nscannedObjects\" : 0,\n        \"n\" : 1,\n        \"nfound\"\
  \ : 1,\n        \"timeMicros\" : 95\n    },\n    \"ok\" : 1\n}\n```\n\n你可以看到没有扫描对象，这应该能提高查询的整体效率。有了这些选项，你应该能够为你的文本搜索注入真正的灵活性和强大的功能。\n\
  \n你现在应该看到了 MongoDB 最新搜索功能的巨大威力，并且你应该拥有从文本搜索中获取真正力量的知识。\n\n\n\n#### 聚合框架\n\nMongoDB\
  \ 中的聚合框架代表了对集合中所有数据执行一系列操作的能力。这是通过创建一个聚合操作管道来实现的，该管道将首先对数据按顺序执行操作，然后每个后续操作都基于前一个操作的结果。熟悉\
  \ Linux 或 Unix shell 的读者会认出，这类似于形成一个 shell 操作管道。\n\n在聚合框架中，有大量运算符，它们可以作为聚合的一部分来规整你的数据。这里我们将介绍一些高级管道运算符，并通过一些示例来说明如何使用它们。这意味着我们将涵盖以下运算符：\n\
  \n*   `$group`\n*   `$limit`\n*   `$match`\n*   `$sort`\n*   `$unwind`\n*   `$project`\n\
  *   `$skip`\n\n关于全套运算符的更多详细信息，请查阅聚合文档，可在 [`http://docs.mongodb.org/manual/aggregation/`](http://docs.mongodb.org/manual/aggregation/)\
  \ 获取。我们创建了一个示例集合，你可以用它来测试一些聚合命令。使用以下命令解压缩存档：\n\n```bash\n$ tar -xvf test.tgz\n```\n\
  \n```\nx test/\nx test/aggregation.bson\nx test/aggregation.metadata.json\nx test/mapreduce.bson\n\
  x test/mapreduce.metadata.json\n```\n\n接下来要做的是运行 `mongorestore` 命令来恢复测试数据库：\n\n\
  ```bash\n$ mongorestore test\n```\n\n```\nconnected to: 127.0.0.1\nSun Jul 21 19:26:21.342\
  \ test/aggregation.bson\nSun Jul 21 19:26:21.342 going into namespace [test.aggregation]\n\
  1000 objects found\nSun Jul 21 19:26:21.350 Creating index: { key: { _id: 1 }, ns:\
  \ \"test.aggregation\", name: \"_id_\" }\nSun Jul 21 19:26:21.688 test/mapreduce.bson\n\
  Sun Jul 21 19:26:21.689 going into namespace [test.mapreduce]\n1000 objects found\n\
  Sun Jul 21 19:26:21.695 Creating index: { key: { _id: 1 }, ns: \"test.mapreduce\"\
  , name: \"_id_\" }\n```\n\n现在我们有了可供操作的数据集合，我们需要了解如何运行聚合命令以及如何构建聚合管道。要运行聚合查询，我们使用\
  \ `aggregate` 命令，并为其提供一个包含管道的文档。为了测试，我们将使用各种管道文档运行以下聚合命令：\n\n```javascript\n> db.aggregation.aggregate({pipeline\
  \ document})\n```\n\n那么，事不宜迟，让我们开始逐步讲解我们的聚合示例。\n\n##### $group\n\n`$group` 命令的功能如其名称所示；它将文档分组在一起，以便你可以创建结果的聚合。让我们从创建一个简单的\
  \ group 命令开始，该命令将列出“aggregation”集合中所有不同的颜色。首先，我们创建一个 `_id` 文档，它将列出我们想要分组的集合中的所有元素。因此，我们以\
  \ `$group` 命令开始管道文档，并添加我们的 `_id` 文档：\n\n```javascript\n{ $group : { _id : \"$color\"\
  \ } }\n```\n\n现在你可以看到我们有 `_id` 值为 `\"$color\"`。注意名称 `color` 前面有一个 `$` 符号；这表明该元素是引用我们文档中的一个字段。这给出了我们基本文档结构，所以让我们执行聚合：\n\
  \n```javascript\n> db.aggregation.aggregate( { $group : { _id : \"$color\" } } )\n\
  ```\n\n```json\n{\n     \"result\" : [\n          {\n               \"_id\" : \"\
  red\"\n          },\n          {\n               \"_id\" : \"maroon\"\n        \
  \  },\n...\n          {\n               \"_id\" : \"grey\"\n          },\n     \
  \     {\n               \"_id\" : \"blue\"\n          }\n     ],\n     \"ok\" :\
  \ 1\n}\n```\n\n###### $sum\n\n从 `$group` 运算符的结果中，你可以看到我们的结果堆栈中有许多不同的颜色。结果是一个元素数组，其中包含多个文档，每个文档的\
  \ `_id` 值是文档 `\"color\"` 字段中的一种颜色。这并没有告诉我们太多信息，所以让我们扩展 `$group` 命令的功能。我们可以使用 `$sum`\
  \ 运算符向组中添加一个计数，该运算符可以为找到的每个值实例递增一个值。为此，我们通过为新字段提供名称及其应具有的值，向 `$group` 命令添加一个额外的值。在这个例子中，我们想要一个名为\
  \ `\"count\"` 的字段，因为它代表每种颜色出现的次数；它的值是 `{$sum : 1}`，这意味着我们希望为每个文档创建一个总和，并且每次增加 1。这给出了下面的文档：\n\
  \n```javascript\n{ $group : { _id : \"$color\", count : { $sum : 1 } }\n```\n\n\
  让我们用这个新文档运行我们的聚合：\n\n```javascript\n> db.aggregation.aggregate({ $group : { _id\
  \ : \"$color\", count : { $sum : 1 } } }\n```\n\n```json\n {\n     \"result\" :\
  \ [\n          {\n               \"_id\" : \"red\",\n               \"count\" :\
  \ 90\n          },\n          {\n               \"_id\" : \"maroon\",\n        \
  \       \"count\" : 91\n          },\n...\n     {\n               \"_id\" : \"grey\"\
  ,\n               \"count\" : 91\n          },\n          {\n               \"_id\"\
  \ : \"blue\",\n               \"count\" : 91\n          }\n     ],\n     \"ok\"\
  \ : 1\n}\n```\n\n现在你可以看到每种颜色出现的频率了。我们可以通过向 `_id` 文档添加额外元素来进一步扩展分组的内容。假设我们想要查找 `\"\
  color\"` 和 `\"transport\"` 的组合组。为此，我们可以将 `_id` 更改为一个包含子文档项的文档，如下所示：\n\n```javascript\n\
  { $group : { _id : { color: \"$color\", transport: \"$transport\"} , count : { $sum\
  \ : 1 } } }\n```\n\n如果我们运行这个，我们会得到一个大约 50 个元素长的结果，太长了无法在这里显示。有一个解决方案，那就是 `$limit`\
  \ 运算符。\n\n##### $limit\n\n`$limit` 运算符是我们接下来要使用的管道运算符。顾名思义，`$limit` 用于限制返回的结果数量。在我们的例子中，我们希望使现有管道的结果更易于管理，因此让我们将结果限制为\
  \ 5 个。要添加此限制，我们需要将单个文档转换为管道文档数组。\n\n```javascript\n[\n        { $group : { _id :\
  \ { color: \"$color\", transport: \"$transport\"} , count : { $sum : 1 } } },\n\
  \        { $limit : 5 }\n]\n```\n\n这将给出以下结果：\n\n```javascript\n> db.aggregation.aggregate(\
  \ [ { $group : { _id : { color: \"$color\", transport: \"$transport\"} , count :\
  \ { $sum : 1 } } }, { $limit : 5 } ] )\n```\n\n```json\n{\n     \"result\" : [\n\
  \          {\n               \"_id\" : {\n                    \"color\" : \"maroon\"\
  ,\n                    \"transport\" : \"motorbike\"\n               },\n      \
  \         \"count\" : 18\n          },\n          {\n               \"_id\" : {\n\
  \                    \"color\" : \"orange\",\n                    \"transport\"\
  \ : \"autombile\"\n               },\n               \"count\" : 18\n          },\n\
  \          {\n               \"_id\" : {\n                    \"color\" : \"green\"\
  ,\n                    \"transport\" : \"train\"\n               },\n          \
  \     \"count\" : 18\n          },\n          {\n               \"_id\" : {\n  \
  \                  \"color\" : \"purple\",\n                    \"transport\" :\
  \ \"train\"\n               },\n               \"count\" : 18\n          },\n  \
  \        {\n               \"_id\" : {\n                    \"color\" : \"grey\"\
  ,\n                    \"transport\" : \"plane\"\n               },\n          \
  \     \"count\" : 18\n          }\n     ],\n     \"ok\" : 1\n}\n```\n\n你现在可以看到添加到\
  \ `_id` 中的来自 transport 元素的额外字段，并且我们将结果限制为仅五个。你现在应该看到如何从多个运算符构建管道，以从我们的集合中提取聚合的数据信息。\n\
  \n\n## $match\n\n我们将要回顾的下一个操作符是`$match`，它在聚合管道中用于有效地返回与普通 MongoDB 查询相同的结果。`$match`操作符最好在管道开始时使用，以限制最初进入管道的文档数量；通过减少处理的文档数，我们可以显著降低性能开销。例如，假设我们只想对`num`字段值大于\
  \ 500 的文档执行管道操作。我们可以使用查询`{ num : { $gt : 500 } }`来返回所有满足此条件的文档。如果将此查询作为`$match`添加到现有的聚合中，我们将得到以下内容：\n\
  \n```\n[\n    { $match : { num : { $gt : 500 } } },\n    { $group : { _id : { color:\
  \ \"$color\", transport: \"$transport\"} , count : { $sum : 1 } } },\n    { $limit\
  \ : 5 }\n]\n```\n\n这将返回以下结果：\n\n```\n{\n    \"result\" : [\n        {\n        \
  \    \"_id\" : {\n                \"color\" : \"white\",\n                \"transport\"\
  \ : \"boat\"\n            },\n            \"count\" : 9\n        },\n        {\n\
  \            \"_id\" : {\n                \"color\" : \"black\",\n             \
  \   \"transport\" : \"motorbike\"\n            },\n            \"count\" : 9\n \
  \       },\n        {\n            \"_id\" : {\n                \"color\" : \"maroon\"\
  ,\n                \"transport\" : \"train\"\n            },\n            \"count\"\
  \ : 9\n        },\n        {\n            \"_id\" : {\n                \"color\"\
  \ : \"blue\",\n                \"transport\" : \"autombile\"\n            },\n \
  \           \"count\" : 9\n        },\n        {\n            \"_id\" : {\n    \
  \            \"color\" : \"green\",\n                \"transport\" : \"autombile\"\
  \n            },\n            \"count\" : 9\n        }\n    ],\n    \"ok\" : 1\n\
  }\n```\n\n你会注意到，返回的结果与之前的示例几乎完全不同。这是因为文档的创建顺序现在发生了变化。因此，当我们运行此查询时，我们限制了输出，移除了先前作为输出的原始文档。你还会发现我们的计数值是之前结果的一半。这是因为我们将要聚合的数据集减少到了之前大小的大约一半。如果我们希望返回的结果具有一致性，就需要调用另一个管道操作符`$sort`。\n\
  \n## $sort\n\n正如你刚刚看到的，`$limit`命令可能会改变结果中返回哪些文档，因为它反映了聚合执行时文档的原始输出顺序。通过引入`$sort`命令可以解决这个问题。我们只需要在应用限制之前对特定字段进行排序，以返回相同的有限结果集。`$sort`的语法与普通查询相同；你指定希望排序的字段，正值表示升序，负值表示降序。为了展示其工作原理，让我们运行带和不带`$match`、且`$limit`为\
  \ 1 的查询。你会看到，在`$limit`之前应用`$sort`，我们可以以相同的顺序返回文档。\n\n这给出了第一个查询：\n\n```\n[\n    {\
  \ $group : { _id : { color: \"$color\", transport: \"$transport\"} , count : { $sum\
  \ : 1 } } },\n    { $sort : { _id :1 } },\n    { $limit : 5 }\n]\n```\n\n此查询的结果是：\n\
  \n```\n{\n    \"result\" : [\n        {\n            \"_id\" : {\n             \
  \   \"color\" : \"black\",\n                \"transport\" : \"autombile\"\n    \
  \        },\n            \"count\" : 18\n        }\n    ],\n    \"ok\" : 1\n}\n\
  ```\n\n第二个查询如下所示：\n\n```\n[\n    { $match : { num : { $gt : 500 } } },\n    { $group\
  \ : { _id : { color: \"$color\", transport: \"$transport\"} , count : { $sum : 1\
  \ } } },\n    { $sort : { _id :1 } },\n    { $limit : 1 }\n]\n```\n\n此查询的结果是：\n\n\
  ```\n{\n    \"result\" : [\n        {\n            \"_id\" : {\n               \
  \ \"color\" : \"black\",\n                \"transport\" : \"autombile\"\n      \
  \      },\n            \"count\" : 9\n        }\n    ],\n    \"ok\" : 1\n}\n```\n\
  \n你会注意到，两个查询现在都包含相同的文档，它们仅在计数上有所不同。这意味着我们的排序在限制之前应用，并允许我们获得一致的结果。这些操作符应该让你了解通过构建操作符管道来操作数据直到获得所需结果的强大能力。\n\
  \n## $unwind\n\n我们将要查看的下一个操作符是`$unwind`。它接收一个数组，并将每个元素拆分为一个新文档（在内存中，不会添加到你的集合中），每个数组元素对应一个文档。就像制作\
  \ shell 管道一样，理解`$unwind`操作符输出的最好方法就是单独运行它并评估输出。让我们查看`$unwind`的结果：\n\n```\ndb.aggregation.aggregate({\
  \ $unwind : \"$vegetables\" });\n```\n\n```\n{\n    \"result\" : [\n        {\n\
  \            \"_id\" : ObjectId(\"51de841747f3a410e3000001\"),\n            \"num\"\
  \ : 1,\n            \"color\" : \"blue\",\n            \"transport\" : \"train\"\
  ,\n            \"fruits\" : [\n                \"orange\",\n                \"banana\"\
  ,\n                \"kiwi\"\n            ],\n            \"vegetables\" : \"corn\"\
  \n        },\n        {\n            \"_id\" : ObjectId(\"51de841747f3a410e3000001\"\
  ),\n            \"num\" : 1,\n            \"color\" : \"blue\",\n            \"\
  transport\" : \"train\",\n            \"fruits\" : [\n                \"orange\"\
  ,\n                \"banana\",\n                \"kiwi\"\n            ],\n     \
  \       \"vegetables\" : \"brocoli\"\n        },\n        {\n            \"_id\"\
  \ : ObjectId(\"51de841747f3a410e3000001\"),\n            \"num\" : 1,\n        \
  \    \"color\" : \"blue\",\n            \"transport\" : \"train\",\n           \
  \ \"fruits\" : [\n                \"orange\",\n                \"banana\",\n   \
  \             \"kiwi\"\n            ],\n            \"vegetables\" : \"potato\"\n\
  \        },\n        ...\n    ],\n    \"ok\" : 1\n}\n```\n\n我们现在结果数组中有 3000 个文档，每个文档都有自己的蔬菜字段和原始源文档的其余部分！你可以看到使用`$unwind`我们能做到的事情的威力，以及当处理一个包含巨大文档的非常大的集合时，你可能会让自己陷入麻烦。永远记住，如果你先运行`$match`，就可以在执行其他更耗资源的聚合操作之前，减少你想要处理的对象数量。\n\
  \n\n##### $project\n\n`$project`操作符用于限制或重命名文档返回的字段，类似于`find`命令中可以设置的字段限制参数。这是减少聚合返回多余字段的完美方式。假设我们只想查看每个文档中的水果和蔬菜部分；我们可以提供一个文档来指定想要显示（或不显示）的元素，就像在`find`命令中添加参数一样。例如：\n\
  \n```\n[\n  { $unwind : \"$vegetables\" },\n  { $project : { _id: 0, fruits:1, vegetables:1\
  \ } }\n]\n```\n\n这个投影返回以下结果：\n\n```\n{\n     \"result\" : [\n          {\n     \
  \          \"fruits\" : [\n                    \"orange\",\n                   \
  \ \"banana\",\n                    \"kiwi\"\n               ],\n               \"\
  vegetables\" : \"corn\"\n          },\n          {\n               \"fruits\" :\
  \ [\n                    \"orange\",\n                    \"banana\",\n        \
  \            \"kiwi\"\n               ],\n               \"vegetables\" : \"brocoli\"\
  \n          },\n          {\n               \"fruits\" : [\n                   \
  \ \"orange\",\n                    \"banana\",\n                    \"kiwi\"\n \
  \              ],\n               \"vegetables\" : \"potato\"\n          },\n...\n\
  \     ],\n     \"ok\" : 1\n}\n```\n\n这比之前更好，因为现在我们的文档没有那么大了。但更佳的做法是减少返回的文档数量。下一个操作符将帮助实现这一点。\n\
  \n##### `$skip`\n\n`$skip`是一个与`$limit`操作符互补的管道操作符。它不是将结果限制为前 X 个文档，而是跳过前 X 个文档并返回所有其余文档。我们可以用它来减少返回的文档数量。如果我们在之前的查询中添加一个值为\
  \ 2995 的`$skip`，将只返回五个结果。查询如下：\n\n```\n[\n  { $unwind : \"$vegetables\" },\n  {\
  \ $project : { _id: 0, fruits:1, vegetables:1 } },\n  { $skip : 2995 }\n]\n```\n\
  \n结果如下：\n\n```\n{\n     \"result\" : [\n          {\n               \"fruits\" :\
  \ [\n                    \"kiwi\",\n                    \"pear\",\n            \
  \        \"lemon\"\n               ],\n               \"vegetables\" : \"pumpkin\"\
  \n          },\n          {\n               \"fruits\" : [\n                   \
  \ \"kiwi\",\n                    \"pear\",\n                    \"lemon\"\n    \
  \           ],\n               \"vegetables\" : \"mushroom\"\n          },\n   \
  \       {\n               \"fruits\" : [\n                    \"pear\",\n      \
  \              \"lemon\",\n                    \"cherry\"\n               ],\n \
  \              \"vegetables\" : \"pumpkin\"\n          },\n          {\n       \
  \        \"fruits\" : [\n                    \"pear\",\n                    \"lemon\"\
  ,\n                    \"cherry\"\n               ],\n               \"vegetables\"\
  \ : \"mushroom\"\n          },\n          {\n               \"fruits\" : [\n   \
  \                 \"pear\",\n                    \"lemon\",\n                  \
  \  \"cherry\"\n               ],\n               \"vegetables\" : \"capsicum\"\n\
  \          }\n     ],\n     \"ok\" : 1\n}\n```\n\n这就是如何使用`$skip`操作符来减少返回的条目数。你也可以使用互补的`$limit`操作符以同样方式限制结果数量，甚至可以将它们结合起来从集合中选取指定数量的结果。假设我们想要\
  \ 3000 条数据集中的第 1500 到 1510 条结果。我们可以提供`$skip`值 1500 和`$limit`值 10，这样就只会返回我们想要的 10\
  \ 条结果。\n\n我们刚刚回顾了 MongoDB 聚合框架中可用的一小部分顶级管道操作符。还有大量的较小操作符可以在顶级管道操作符中作为管道表达式使用。其中包括一些地理函数、数学函数（如平均值、第一个和最后一个），以及一些日期/时间和其它操作。所有这些都可以组合使用来执行我们介绍过的聚合操作。请记住，管道中的每个操作都将对前一个操作的结果执行，你可以输出并逐步查看它们以创建所需的结果。\n\
  \n## MapReduce\n\nMapReduce 是 MongoDB 中最复杂的查询机制之一。它通过接受两个 JavaScript 函数`map`和`reduce`来工作。这两个函数完全由用户定义，这为你提供了难以置信的灵活性！几个简短的例子将展示你可以用\
  \ MapReduce 实现的一些功能。\n\n##### MapReduce 如何工作\n\n在我们深入示例之前，先了解一下 Map/Reduce 是什么以及它是如何工作的。在\
  \ MongoDB 的 MapReduce 实现中，我们向给定集合发出一个专门的查询，所有匹配的文档随后被输入到我们的`map`函数中。这个`map`函数旨在生成键/值对。任何具有多个值的键集随后被输入到`reduce`函数中，该函数返回输入数据的聚合结果。此后，还有一个可选的步骤，可以通过`finalize`函数对数据进行整理以便美观地呈现。\n\
  \n##### 设置测试文档\n\n首先，我们需要设置一些用于测试的文档。我们创建了一个`mapreduce`集合，它属于你之前还原的`test`数据库。如果你还没有还原它，请使用以下命令提取存档：\n\
  \n```\n$ tar -xvf test.tgz\nx test/\nx test/aggregation.bson\nx test/aggregation.metadata.json\n\
  x test/mapreduce.bson\nx test/mapreduce.metadata.json\n```\n\n然后运行`mongorestore`命令来还原`test`数据库：\n\
  \n```\n$ mongorestore test\nconnected to: 127.0.0.1\nSun Jul 21 19:26:21.342 test/aggregation.bson\n\
  Sun Jul 21 19:26:21.342 going into namespace [test.aggregation]\n1000 objects found\n\
  Sun Jul 21 19:26:21.350 Creating index: { key: { _id: 1 }, ns: \"test.aggregation\"\
  , name: \"_id_\" }\nSun Jul 21 19:26:21.688 test/mapreduce.bson\nSun Jul 21 19:26:21.689\
  \ going into namespace [test.mapreduce]\n1000 objects found\nSun Jul 21 19:26:21.695\
  \ Creating index: { key: { _id: 1 }, ns: \"test.mapreduce\", name: \"_id_\" }\n\
  ```\n\n这将为你提供一个用于 MapReduce 操作的文档集合。首先，让我们来看世界上最简单的 map 函数。\n\n\n\n##### 使用 Map\
  \ 函数\n\n此函数将从 `mapreduce` 集合中的每个文档“发出”颜色和 `num` 值。这两个字段将以键/值对的形式输出，第一个参数（颜色）作为键，第二个参数（数值）作为值。一开始这信息量可能有点大，所以先看看执行此发出操作的简单\
  \ `map` 函数：\n\n```\nvar map = function() {\n    emit(this.color, this.num);\n};\n\
  ```\n\n为了运行 Map/Reduce，我们还需要一个 `reduce` 函数。但在进行复杂操作之前，我们先看看提供一个空的 `reduce` 函数会得到什么结果，以便了解其运作方式。\n\
  \n```\nvar reduce = function(color, numbers) { };\n```\n\n将这两个命令都输入到你的 shell 中，这样你就差不多拥有了运行\
  \ MapReduce 所需的一切。\n\n最后，你需要为 MapReduce 提供一个输出字符串。这个字符串定义了此 MapReduce 命令的输出应该放到哪里。最常见的两个选项是：\n\
  \n*   输出到一个集合\n*   输出到控制台（内联）\n\n出于当前目的，让我们输出到屏幕，以便准确查看发生了什么。为此，我们传递一个包含 `out` 选项的文档，其值为\
  \ `{ inline : 1 }`，如下所示：\n\n```\n{ out : { inline : 1 } }\n```\n\n这样我们就得到了以下命令：\n\
  \n```\ndb.mapreduce.mapReduce(map,reduce,{ out: { inline : 1 } });\n```\n\n结果看起来像这样：\n\
  \n```\n{\n    \"results\" : [\n        { \"_id\" : \"black\", \"value\" : null },\n\
  \        { \"_id\" : \"blue\", \"value\" : null },\n        { \"_id\" : \"brown\"\
  , \"value\" : null },\n        { \"_id\" : \"green\", \"value\" : null },\n    \
  \    { \"_id\" : \"grey\", \"value\" : null },\n        { \"_id\" : \"maroon\",\
  \ \"value\" : null },\n        { \"_id\" : \"orange\", \"value\" : null },\n   \
  \     { \"_id\" : \"purple\", \"value\" : null },\n        { \"_id\" : \"red\",\
  \ \"value\" : null },\n        { \"_id\" : \"white\", \"value\" : null },\n    \
  \    { \"_id\" : \"yellow\", \"value\" : null }\n    ],\n    \"timeMillis\" : 95,\n\
  \    \"counts\" : {\n        \"input\" : 1000,\n        \"emit\" : 1000,\n     \
  \   \"reduce\" : 55,\n        \"output\" : 11\n    },\n    \"ok\" : 1,\n}\n```\n\
  \n这表明每个“键”颜色值被单独列出，并且是每个文档的唯一 `_id` 值。因为我们没有为每个文档的值部分指定任何内容，所以它被设置为 `null`。我们可以通过添加输出部分来修改它，以获得我们期望的\
  \ MapReduce 结果。在这个案例中，我们想要一个每个函数接收值的摘要。为此，我们可以使用函数来修改我们想要返回的内容，以替代 `null` 的对象。在这里，让我们返回每种颜色所有值的总和。为此，我们可以创建一个函数，该函数将返回传递到\
  \ `reduce` 函数中每种颜色的数字数组的总和。幸运的是，我们可以使用一个名为 `Array.sum` 的便捷函数来对数组的所有值求和。这给我们带来了下面的\
  \ `reduce` 函数：\n\n```\nvar reduce = function(color, numbers) {\n    return Array.sum(numbers);\n\
  };\n```\n\n完美。除了内联输出，我们还可以让 MapReduce 写入一个集合；为此，我们只需将那个 `{ inline : 1 }` 替换为我们希望输出到的集合的名称。所以，让我们输出到一个名为\
  \ `mrresult` 的集合。这给我们带来了以下命令：\n\n```\ndb.mapreduce.mapReduce(map,reduce,{ out: \"\
  mrresult\" });\n```\n\n当我们使用新的 `reduce` 函数执行它时，它会给出以下结果：\n\n```\n{\n    \"result\"\
  \ : \"mrresult\",\n    \"timeMillis\" : 111,\n    \"counts\" : {\n        \"input\"\
  \ : 1000,\n        \"emit\" : 1000,\n        \"reduce\" : 55,\n        \"output\"\
  \ : 11\n    },\n    \"ok\" : 1,\n}\n```\n\n如果你想现在查看文档结果，你需要从 `mrresult` 集合中查询它们，如下所示：\n\
  \n```\n> db.mrresult.findOne();\n{ \"_id\" : \"black\", \"value\" : 45318 }\n```\n\
  \n既然我们有了一个基本运行的系统，我们可以进入更高级的阶段了！\n\n##### 高级 MapReduce\n\n假设我们想要的不是所有值的总和，而是平均值！这变得困难得多，因为我们需要添加另一个变量——我们拥有的对象数量！但是，我们如何从\
  \ `map` 函数传出两个变量呢？毕竟，`emit` 只接受两个参数。我们可以进行某种“取巧”；我们返回一个 JSON 文档，它可以包含任意多的字段！所以，让我们扩展我们原始的\
  \ map 函数，以返回一个包含颜色值和一个计数器值的文档。首先，我们将文档定义为一个新变量，填写 JSON 文档，然后发出该文档。\n\n```\nvar map\
  \ = function() {\n    var value = {\n        num : this.num,\n        count : 1\n\
  \    };\n    emit(this.color, value);\n};\n```\n\n注意我们将计数器值设置为 1，以便每个文档只计数一次！现在来处理\
  \ `reduce` 函数。它需要处理我们之前创建的那些值文档组成的数组。最后要注意的一点是，我们需要在 `reduce` 函数的 `return` 函数中返回与在\
  \ `map` 函数中创建并发送到 `emit` 的值相同的值。\n\n注意：你也可以通过包含所有数字的数组的长度来实现我们这里所做的一切。但这种方式能让你看到更多\
  \ MapReduce 的可能性。\n\n为了处理这个数组，我们创建了一个简单的 `for` 循环，循环长度为数组长度，我们遍历每个成员，并将每个文档的 `num`\
  \ 和 `count` 添加到我们的新返回变量 `reduceValue` 中。现在我们只需返回这个值，就得到了结果。\n\n```\nvar reduce =\
  \ function(color, val ) {\n    reduceValue = { num : 0, count : 0};\n    for (var\
  \ i = 0; i < val.length; i++) {\n        reduceValue.num += val[i].num;\n      \
  \  reduceValue.count += val[i].count;\n    }\n    return reduceValue;\n};\n```\n\
  \n此时，你可能想知道这如何帮我们得到平均值。我们有了计数和总数，但没有实际的平均值！如果你再次运行 MapReduce，你可以自己查看结果。请注意，每次你输出到一个集合时，MapReduce\
  \ 都会在写入之前删除该集合！对我们来说这是件好事，因为我们只想要本次运行的结果，但它将来可能会给你带来麻烦。如果你想合并两次的结果，可以创建一个像 `{ out\
  \ : { merge : \"mrresult\" } }` 这样的输出文档。\n\n```\ndb.mapreduce.mapReduce(map,reduce,{\
  \ out: \"mrresult\" });\n```\n\n现在让我们快速检查一下结果：\n\n```\n> db.mrresult.findOne();\n\
  {\n    \"_id\" : \"black\",\n    \"value\" : {\n        \"num\" : 18381,\n     \
  \   \"count\" : 27028,\n    }\n}\n```\n\n不，这里没有平均值。这意味着我们还有更多工作要做，但既然我们必须返回一个与 `emit`\
  \ 输入相匹配的文档，我们如何计算平均值呢？我们需要第三个函数！MapReduce 提供了一个，叫做 `finalize` 函数。这允许你在返回 MapReduce\
  \ 结果之前进行任何最终的清理工作。让我们编写一个函数，它将接收 `reduce` 的结果并为我们计算平均值：\n\n```\nvar finalize = function\
  \ (key, value) {\n    value.avg = value.num/value.count;\n    return value;\n};\n\
  ```\n\n是的，就是这么简单。所以，现在我们的 `map`、`reduce` 和 `finalize` 函数都准备好了，我们只需将它们添加到我们的调用中。`finalize`\
  \ 选项在最后一个文档中设置；与 `out` 一起，这给我们带来了以下命令：\n\n```\ndb.mapreduce.mapReduce(map,reduce,{\
  \ out: \"mrresult\", finalize : finalize });\n```\n\n从这里，让我们查询一个示例文档：\n\n```\n>\
  \ db.mrresult.findOne();\n{\n    \"_id\" : \"black\",\n    \"value\" : {\n     \
  \   \"num\" : 45318,\n        \"count\" : 91,\n        \"avg\" : 498\n    }\n}\n\
  ```\n\n现在好多了！我们有了总数、计数和平均值！\n\n\n\n##### 调试 MapReduce\n\n调试 Map/Reduce 是一项相当耗时的任务，但有一些小技巧可以让你更轻松。首先我们来看调试一个\
  \ `map`。你可以通过重载 `emit` 函数来调试 `map`，如下所示：\n\n```\nvar emit = function(key, value)\
  \ {\n    print(\"emit results - key: \" + key + \" value: \" + tojson(value));\n\
  }\n```\n\n这个 `emit` 函数将返回与 `map` 函数相同的键值结果。你可以使用 `map.apply()` 和来自你集合的一个示例文档进行测试，如下所示：\n\
  \n```\n> map.apply(db.mapreduce.findOne());\nemit results - key: blue value: { \"\
  num\" : 1, \"count\" : 1 }\n```\n\n既然你知道了 `map` 的预期输出，就可以开始调试你的 `reduce` 了。你首先需要确认你的\
  \ `map` 和 `reduce` 返回的格式相同——这一点至关重要。接下来，你可以创建一个简短的数组，其中包含一些值，就像传递给你的 `reduce` 函数的值一样，如下所示：\n\
  \n```\na = [{ \"num\" : 1, \"count\" : 1 },{ \"num\" : 2, \"count\" : 1 },{ \"num\"\
  \ : 3, \"count\" : 1 }]\n```\n\n现在你可以像下面这样调用 `reduce`。这将让你看到你的 `emit` 所返回的值：\n\n\
  ```\n> reduce(\"blue\",a);\n{ \"num\" : 6, \"count\" : 3 }\n```\n\n如果所有其他方法都失败了，你对函数内部的情况感到困惑，别忘了你可以使用\
  \ `printjson()` 函数将任何 JSON 值打印到 `mongodb` 的日志文件中以便查看。这在调试软件时始终是一个有价值的工具。\n\n####\
  \ 总结\n\n至此，你应该已经了解了使用 MongoDB 中三个最强大、最灵活的查询系统所能提供的强大功能和灵活性。通过阅读本章，你应该了解了如何使用文本索引来执行多种语言的高效文本搜索。你应该有能力使用\
  \ MongoDB 聚合框架创建高度复杂和灵活的聚合操作。最后，你现在应该有能力使用强大的基于 JavaScript 的 MapReduce，它允许你对数据编写强大的分组和转换操作。\n\
  \n## 第 3 部分：大数据高级 MongoDB 应用\n\n### 9. 数据库管理\n\n#### 摘要\n\n在本章中，我们将引导你完成可以在 MongoDB\
  \ 服务器上执行的一些基本管理操作。我们还将展示如何自动化其中一些活动，例如备份你的服务器。\n\n由于 MongoDB 是一个非关系型数据库系统，数据库管理员通常需要执行的许多更传统的功能在这里并不需要。例如，你不需要在服务器上创建新的数据库、集合或字段，因为\
  \ MongoDB 会在你访问它们时动态创建这些元素。因此，在绝大多数情况下，你不需要管理数据库和模式。\n\n然而，这种无需预先定义一切的自由，也可能导致无意中创建元素，例如文档中多余的集合和字段。管理员和开发人员偶尔需要清理数据库中未使用的数据元素，特别是在项目开发阶段，当变化很快时。他们可能必须尝试许多方法，最终才能确定解决方案并清理数据库。MongoDB\
  \ 的易用性鼓励了这种探索式的开发模式；然而，这也可能导致你的数据存储变得杂乱，因为创建数据结构所需的精力几乎降到了零。\n\n造成这种杂乱的一个因素，也是 MongoDB\
  \ 与 SQL 数据库之间一个更显著的差异，是 MongoDB 中所有对象和元素的名称在所有平台上都是区分大小写的。因此，`foo` 和 `Foo` 这两个集合名称指的是两个完全不同的集合。因此，你需要小心数据库和集合的命名，以避免意外创建仅因名称大小写而不同的多个数据库。（然而，从\
  \ MongoDB 2.4 开始，有一个例外：你不能再创建仅因大小写而不同的数据库，因为这样做会产生错误。）\n\n这些不同版本的数据库会填满你的磁盘，并且它们可能通过允许开发人员和最终用户连接到不完整或非预期的数据集，从而造成大量混淆。\n\
  \n在本章中，你将学习如何执行以下所有任务：\n\n*   备份和恢复你的 MongoDB 系统。\n*   使用提供的 `MongoDB` shell（通过\
  \ `mongo` 命令调用）来执行常见任务。\n*   通过认证控制对服务器的访问。\n*   监控你的数据库实例。\n\n然而，在深入探讨这些任务之前，我们将首先了解用于执行其中许多任务的工具。\n\
  \n#### 使用管理工具\n\n管理员需要适合执行保持服务器平稳运行的日常任务的工具。MongoDB 软件包中提供了一些非常优秀的工具，同时也有不断发展的第三方工具集合。以下部分介绍了一些最重要的可用工具，以及如何使用它们。\n\
  \n##### `mongo`, MongoDB 控制台\n\n作为管理员，你将使用的主要工具是 `mongo`，即 MongoDB 控制台工具。`mongo`\
  \ 是一个基于 JavaScript 的命令行控制台实用程序。它类似于主流关系数据库附带的许多查询工具。然而，`mongo` 有一个独特的技巧：它可以运行用 JavaScript\
  \ 编写的、直接与 MongoDB 数据库交互的程序。\n\n这个控制台允许你用 JavaScript 脚本化所有与 MongoDB 的交互，然后将这些脚本存储在\
  \ `.js` 文件中，以便在需要时运行。事实上，`mongo` 控制台中的许多内置命令本身就是用 JavaScript 编写的。\n\n你可以将任何需要在命令\
  \ shell 中键入的命令放入扩展名为 `.js` 的文件中，并通过在启动 shell 时在命令行中添加文件名，或使用 shell 内的 `load()` 函数来运行它们。Shell\
  \ 将执行文件的内容然后退出。这对于运行重复的命令列表非常有用。\n\n在本章中，我们将使用 `mongo` 控制台来演示你可以在 MongoDB 服务器上执行的许多管理任务，并且因为它随\
  \ MongoDB 服务器一起分发，我们可以保证它会存在。\n\n##### 使用第三方管理工具\n\n有几个适用于 MongoDB 的第三方管理（admin）工具。MongoDB\
  \ 公司在 MongoDB 网站上维护了一个页面，列出了当前可用的第三方工具。你可以在 [`http://docs.mongodb.org/ecosystem/tools/administration-interfaces/`](http://docs.mongodb.org/ecosystem/tools/administration-interfaces/)\
  \ 找到这个列表。\n\n这些工具中有许多是基于 Web 的，原则上类似于 MySQL 的 phpMyAdmin，但有些也是功能齐全的桌面用户界面（UI）。\n\
  \n#### 备份 MongoDB 服务器\n\n一个新的 MongoDB 管理员应该学习的第一项技能是如何备份和恢复 MongoDB 服务器。掌握这方面的知识将使你在探索一些更高级的管理功能时感觉更放心，因为你知道你宝贵的数据被安全地存储在某个地方。\n\
  \n\n\n#### 备份入门指南\n\n让我们从执行一次简单的备份并恢复它开始。在此过程中，你将验证备份是否完整，并查看一些实际示例来说明备份和恢复功能的工作原理。一旦你扎实掌握了这些功能的使用方法，就能继续探索\
  \ MongoDB 更高级的管理功能。\n\n在这个简单的备份示例中，我们将做如下假设：\n\n*   你的 MongoDB 服务器运行在你当前登录的同一台机器上。\n\
  *   你有足够的磁盘空间来存放转储文件，这些文件的大小最多可能与你的数据库相同。\n*   你的备份将创建在你的主目录中。这意味着你无需处理任何与权限相关的问题。\n\
  \nMongoDB 的备份工具叫做 `mongodump`；该工具是标准发行版的一部分。以下示例执行一个简单的备份，将运行中的 MongoDB 服务器备份到指定的磁盘目录：\n\
  \n```\n$> cd ∼\n$> mkdir testmongobackup\n$> cd testmongobackup\n$> mongodump\n\
  ```\n\n当 `mongodump` 运行时，你应该看到类似下面的输出：\n\n```\n$ mongodump\nconnected to: 127.0.0.1\n\
  Tue May 21 20:52:58.639 all dbs\nTue May 21 20:52:58.640 DATABASE: blog to dump/blog\n\
  Tue May 21 20:52:58.640 blog.system.indexes to dump/blog/system.indexes.bson\nTue\
  \ May 21 20:52:58.641 4 objects\nTue May 21 20:52:58.641 blog.system.profile to\
  \ dump/blog/system.profile.bson\nTue May 21 20:52:58.645 3688 objects\nTue May 21\
  \ 20:52:58.645 Metadata for blog.system.profile to dump/blog/system.profile.metadata.json\n\
  Tue May 21 20:52:58.645 blog.authors to dump/blog/authors.bson\nTue May 21 20:52:58.646\
  \ 1 objects\nTue May 21 20:52:58.646 Metadata for blog.authors to dump/blog/authors.metadata.json\n\
  Tue May 21 20:52:58.646 blog.posts to dump/blog/posts.bson\nTue May 21 20:52:58.686\
  \ 29997 objects\nTue May 21 20:52:58.709 Metadata for blog.posts to dump/blog/posts.metadata.json\n\
  Tue May 21 20:52:58.710 blog.tagcloud to dump/blog/tagcloud.bson\nTue May 21 20:52:58.710\
  \ 1 objects\nTue May 21 20:52:58.710 Metadata for blog.tagcloud to dump/blog/tagcloud.metadata.json\n\
  ```\n\n如果你的输出看起来与这个不太相似，你应该仔细检查你的环境是否符合前面所述的假设。\n\n如果你确实看到了正确的输出，那么你的数据库已经被备份到 `testmongobackup/dump`\
  \ 目录。下面的代码片段将你的数据库恢复到执行备份时的状态：\n\n```\n$> cd ∼/testmongobackup\n$> mongorestore\
  \ --drop\nconnected to: 127.0.0.1\nTue May 21 20:53:46.337 dump/blog/authors.bson\n\
  Tue May 21 20:53:46.337 going into namespace [blog.authors]\nTue May 21 20:53:46.337\
  \ dropping\n1 objects found\nTue May 21 20:53:46.338 Creating index: { key: { _id:\
  \ 1 }, ns: \"blog.authors\", name: \"_id_\" }\nTue May 21 20:53:46.339 dump/blog/posts.bson\n\
  Tue May 21 20:53:46.339 going into namespace [blog.posts]\nTue May 21 20:53:46.339\
  \ dropping\n29997 objects found\nTue May 21 20:53:47.284 Creating index: { key:\
  \ { _id: 1 }, ns: \"blog.posts\", name: \"_id_\" }\nTue May 21 20:53:47.375 Creating\
  \ index: { key: { Tags: 1 }, ns: \"blog.posts\", name: \"Tags_1\" }\nTue May 21\
  \ 20:53:47.804 dump/blog/system.profile.bson\nTue May 21 20:53:47.804 skipping\n\
  Tue May 21 20:53:47.804 dump/blog/tagcloud.bson\nTue May 21 20:53:47.804 going into\
  \ namespace [blog.tagcloud]\nTue May 21 20:53:47.804 dropping\n1 objects found\n\
  Tue May 21 20:53:47.821 Creating index: { key: { _id: 1 }, ns: \"blog.tagcloud\"\
  , name: \"_id_\" }\n```\n\n`--drop` 选项告诉 `mongorestore` 工具在恢复每个集合之前先丢弃数据库中的同名集合。因此，备份的数据会替换掉数据库中当前的数据。如果你选择不使用\
  \ `--drop` 选项，恢复的数据将被附加到每个集合的末尾，这会导致重复的项目。\n\n让我们更仔细地检查这个例子中发生的情况。\n\n默认情况下，`mongodump`\
  \ 工具使用默认端口连接到本地数据库，提取与每个数据库和集合相关的所有数据，并将它们存储在预定义的文件夹结构中。\n\n`mongodump` 创建的默认文件夹结构如下：\n\
  `./dump/[databasename]/[collectionname].bson`\n\n示例中使用的数据库系统由一个名为 `blog` 的单一数据库组成。`blog`\
  \ 数据库包含三个集合：`authors`、`posts` 和 `tagcloud`。\n\n`mongodump` 将从数据库服务器检索到的数据保存在 `.bson`\
  \ 文件中，这些文件只是 MongoDB 内部用于存储文档的 BSON 格式的副本。在上面的示例中，你还可以看到每个集合的索引正在被恢复。MongoDB 服务器维护索引，并记录每个集合的索引定义，这些定义存储在\
  \ `metadata.json` 文件中。正是这些元数据文件允许你在从备份恢复时重建索引。\n\n一旦你转储了数据库，就可以将该文件夹归档并存储在任何在线或离线介质上，例如\
  \ CD、U 盘、磁带或 S3 存储。\n\n**注意**\n\n`mongodump` 工具在将备份文件写入 `output` 目录之前，不会清空该目录的内容。如果该目录中已有内容，除非这些内容与\
  \ `mongodump` 被指示备份的文件名（`collectionname.bson`）匹配，否则它们不会被移除。如果你想将多个集合的转储添加到同一个转储目录，这很好；但是，如果你每次备份数据时都使用同一个转储目录而不清理它，则可能会导致问题。例如，假设你有一个定期备份的数据库，某天你决定从该数据库中删除一个集合。除非你清空执行备份的目录，或者手动删除与已删除集合关联的文件，否则下次恢复数据时，已删除的集合会重新出现。除非你想覆盖备份中的数据，否则在使用\
  \ `mongodump` 之前，请确保清空目标目录。\n\n##### 备份单个数据库\n\n当同一台服务器上运行多个应用程序时，你通常会希望单独备份每个数据库，而不是像前面的示例那样一次性备份所有数据库。\n\
  \n使用 `mongodump`，你可以通过在命令行添加 `-d` `database_name` 选项来实现。这会导致 `mongodump` 创建 `./dump`\
  \ 文件夹；但是，此文件夹将只包含单个数据库的备份文件。\n\n##### 备份单个集合\n\n想象你有一个博客网站，其中 `authors` 集合的内容变化不大。相反，博客网站快速变化的内容包含在\
  \ `posts` 和 `tagcloud` 集合中。你可能每天只备份一次整个数据库，但希望每小时备份一次这两个集合。幸运的是，你可以使用 `mongodump`\
  \ 轻松实现这一点，通过 `-c` 选项来指定你希望备份的集合。\n\n`mongodump` 工具不会清除其目标目录。这意味着，对于你想要备份的每个集合，你可以连续调用\
  \ `mongodump` 来将给定的集合添加到你的备份中，如下例所示：\n\n```\n$mkdir ∼/backuptemp\n$cd ∼/backuptemp\n\
  $mongodump -d blog -c posts\n$mongodump -d blog -c tagcloud\n...\n    将转储文件夹 ∼/backuptemp\
  \ 归档为 tar 文件\n...\n$ cd ∼\n$ rm -rf backuptemp\n```\n\n\n\n#### 深入探讨备份\n\n至此，您已了解如何执行备份及随后恢复数据的基本操作。现在，您已准备好探索一些强大的选项，这些选项允许您定制\
  \ MongoDB 的备份与恢复功能，以满足您的特定需求。\n\n`mongodump` 实用工具包含如图 9-1 所示的选项，该图是在 MongoDB 2.5.3\
  \ 中运行 `help` 命令时捕获的。\n\n![A978-1-4302-5822-3_9_Fig1_HTML.jpg](img/A978-1-4302-5822-3_9_Fig1_HTML.jpg)\n\
  \n图 9-1。\n\n显示 `mongodump` 实用工具选项的帮助界面\n\n此处列出的大多数选项都一目了然，以下除外：\n\n*   `--dbpath`\
  \ `参数`：如果您有大量数据需要备份且硬盘速度较快，并且不关心备份索引，那么直接将 MongoDB 服务器使用的数据库文件复制到备份介质可能是更好的选择。此选项允许您直接从服务器的数据文件进行备份，但仅当服务器离线或处于写锁定状态时才能使用（有关更多信息，请参阅本章后面的“备份大型数据库”部分）。\n\
  *   `--directoryperdb`：您将此命令行选项与 `--dbpath` 选项结合使用，以指定正在备份的 MongoDB 服务器配置为将其每个数据库的数据文件放置在单独的目录中。默认情况下，MongoDB\
  \ 将其所有数据文件放在单个目录中。仅当您已将服务器配置为在此模式下运行时，才应使用此选项。\n*   `-o [ --out ]` `参数`：您使用此选项指定希望将数据库转储备份放置到的目录。默认情况下，`mongodump`\
  \ 实用工具会在当前目录下创建一个名为 `/dump` 的文件夹，并将转储内容写入其中。您可以使用 `-o/--out` 选项选择替代路径来放置输出转储。\n\
  *   `--authenticationDatabase` `参数`：指定存储用户凭据的数据库。若没有此选项，`Mongodump` 默认使用 `–db` 指定的数据库。\n\
  *   `--authenticationMechanism` `参数`：默认为 MongoDB 的挑战/响应（用户名/密码）机制。此命令用于切换到 MongoDB\
  \ 企业版的 Kerberos 认证。\n\n#### 恢复单个数据库或集合\n\n您刚刚了解了 `mongodump` 实用工具如何备份单个数据库或集合；`mongorestore`\
  \ 实用工具同样具有灵活性。如果 `mongorestore` 恢复时所用的转储目录中包含所需集合或数据库的备份文件，您就可以使用 `mongorestore`\
  \ 来恢复该项目；您无需恢复备份中存在的所有项目。如果需要，您可以单独恢复它们。\n\n让我们首先查看 `mongorestore` 中可用的选项，如图 9-2\
  \ 所示。\n\n![A978-1-4302-5822-3_9_Fig2_HTML.jpg](img/A978-1-4302-5822-3_9_Fig2_HTML.jpg)\n\
  \n图 9-2。\n\n显示 `mongorestore` 选项的帮助界面\n\n您可能从之前关于 `mongodump` 的讨论中认出了这些选项中的大部分；但是，以下两个选项值得一提：\n\
  \n*   `--drop`：此选项指示 `mongorestore` 在恢复集合之前先删除现有的集合。这有助于确保没有重复数据。如果未使用此选项，恢复的数据将被追加（插入）到目标集合中。\n\
  *   `--noobjcheck`：此选项指示 `mongorestore` 在将对象插入 `目标` 集合之前跳过验证对象这一步骤。\n\n##### 恢复单个数据库\n\
  \n您可以使用 `mongorestore` 实用工具的 `-d` 选项来恢复单个数据库。与之前一样，如果数据库已存在于您的 MongoDB 服务器中，请不要忘记使用\
  \ `--drop` 选项：\n\n```\n$cd ∼/testmongobackup\n$ mongorestore -d blog --drop\n```\n\
  \n##### 恢复单个集合\n\n您使用类似的语法将单个集合恢复到数据库；不同之处在于，您还需要使用 `-c` 选项指定集合名称，如下例所示：\n\n```\n\
  $cd ∼/testmongobackup\n$ mongorestore -d blog -c posts --drop\n```\n\n#### 自动化备份\n\
  \n对于小型安装或开发环境，简单地运行 `mongodump` 实用工具并保存结果是一种非常合适的执行临时备份的方法。例如，在 Mac OS X 工作站上的常见做法是让\
  \ Time Machine（Mac 备份实用工具）存储备份。\n\n对于任何类型的生产环境设置，您都需要自动备份服务器；定期备份可以帮助您预防或从遇到的任何问题中恢复。这不仅适用于您的安装（例如，如果您有损坏的数据库），也适用于您的用户无意中损坏或破坏数据的情况。\n\
  \n让我们看一些可用于自动化备份的简单脚本。\n\n\n##### 使用本地数据存储\n\n如果你的系统连接了大型备份驱动器，或者可以通过 NFS 或 SMB\
  \ 挂载外部文件系统，那么一个简单的备份脚本（在指定目录中创建归档文件）就足够了。以下备份脚本易于设置；只需编辑脚本顶部的变量以匹配你本地系统的设置即可：\n\n\
  ```bash\n#!/bin/bash\n\n##########################################\n## 编辑这些以定义源和目标\n\
  MONGO_DBS=\"\"\nBACKUP_TMP=~/tmp\nBACKUP_DEST=~/backups\nMONGODUMP_BIN=/usr/bin/mongodump\n\
  TAR_BIN=/usr/bin/tar\n##########################################\n\nBACKUPFILE_DATE=`date\
  \ +%Y%m%d-%H%M`\n\n## _do_store_archive <数据库> <转储目录> <目标目录> <目标文件>\nfunction _do_store_archive\
  \ {\n    mkdir -p $3\n    cd $2\n    tar -cvzf $3/$4 dump\n}\n\n## _do_backup <数据库名称>\n\
  function _do_backup {\n    UNIQ_DIR=\"$BACKUP_TMP/$1`date \"+%s\"`\"\n    mkdir\
  \ -p $UNIQ_DIR/dump\n    echo \"dumping Mongo Database $1\"\n    if [ \"all\" =\
  \ \"$1\" ]; then\n        $MONGODUMP_BIN -o $UNIQ_DIR/dump\n    else\n        $MONGODUMP_BIN\
  \ -d $1 -o $UNIQ_DIR/dump\n    fi\n    KEY=\"database-$BACKUPFILE_DATE.tgz\"\n \
  \   echo \"Archiving Mongo database to $BACKUP_DEST/$1/$KEY\"\n    DEST_DIR=$BACKUP_DEST/$1\n\
  \    _do_store_archive $1 $UNIQ_DIR $DEST_DIR $KEY\n    rm -rf $UNIQ_DIR\n}\n\n\
  ## 检查是否指定了单个数据库，否则备份整个服务器到 \"all\"\nif [ \"\" = \"$MONGO_DBS\" ]; then\n    MONGO_DB=\"\
  all\"\n    _do_backup $MONGO_DB\nelse\n    for MONGO_DB in $MONGO_DBS; do\n    \
  \    _do_backup $MONGO_DB\n    done\nfi\n```\n\n表 9-1 列出了你需要更改以使这个简单的备份脚本适用于你的系统的变量。\n\
  \n表 9-1. 本地数据存储备份脚本中使用的变量\n\n| 变量 | 描述 |\n| --- | --- |\n| `MONGO_DBS` | 将此变量留空\
  \ (`\"\"`) 以备份本地服务器上的所有数据库。或者，你可以在其中放入一个数据库列表来备份选定的数据库 (`\"db1 db2 db3\"`)。 |\n\
  | `BACKUP_TMP` | 将此变量设置为一个适合保存备份转储文件的临时目录。归档文件创建后，此目录中使用的临时数据将被删除。请务必选择一个与你使用脚本方式相关的合适目录。例如，如果你使用脚本在本地账户中创建备份，请使用\
  \ `~/tmp`；如果你将其作为在系统账户下运行的系统 cron 任务，请使用 `/tmp`。在 Amazon EC2 实例上，你可能应该使用 `/mnt/tmp`，这样文件夹就不会创建在系统根分区上（该分区通常很小）。\
  \ |\n| `BACKUP_DEST` | 此变量保存备份的目标文件夹，单个文件夹将在此文件夹下创建。同样，请将此目录放在与你使用备份脚本方式相关的路径下。\
  \ |\n| `MONGODUMP_BIN` | 由于你的备份脚本可能在未设置完整路径的账户下运行，明智的做法是使用此变量指定此二进制文件的完整路径。你可以在终端窗口中键入\
  \ `which mongodump` 来确定系统上的适当路径。 |\n| `TAR_BIN` | 你使用此变量设置 tar 二进制文件的完整路径；在终端窗口中使用\
  \ `which tar` 来确定此路径。 |\n\n你现在可以使用此脚本来备份你的数据库；这样做将在指定的 `BACKUP_DEST` 目录中创建一组归档备份。创建的文件遵循以下命名格式：\n\
  \n`数据库名称` `/` `database-YYYYMMDD-HHMM` `.tgz`\n\n例如，以下代码段显示了本章测试数据库的备份名称：\n\n```\n\
  Backups:$ tree\n.\n|-- blog\n|   |-- database-20100611-1144.tgz\n|   `-- database-20100611-1145.tgz\n\
  `-- all\n    |-- database-20100611-1210.tgz\n    |-- database-20100611-1221.tgz\n\
  \    |-- database-20100611-1222.tgz\n    |-- database-20100611-1224.tgz\n    `--\
  \ database-20100611-1233.tgz\n```\n\n当然，你还需要安装脚本。如果你想每天运行此脚本，只需将其放入 `/etc/cron.daily`\
  \ 并重启 `cron` 服务以使其生效。这种方法适用于大多数 Linux 发行版，例如 Ubuntu、Fedora、CentOS 和 RedHat。如果你希望备份频率较低，只需将脚本移动到\
  \ `/etc/cron.weekly` 或 `/etc/cron.monthly`。对于更频繁的备份，你可以使用 `/etc/cron.hourly`。\n\n\
  ##### 使用远程（基于云的）数据存储\n\n上一节描述的脚本有一个用于创建和存储归档文件的独立函数。这使得修改脚本以使用外部数据存储来存储备份归档文件相对容易。表\
  \ 9-2 提供了几个例子，但还有许多其他可能的机制。\n\n表 9-2. 远程（基于云的）备份存储选项\n\n| 方法 | 描述 |\n| --- | ---\
  \ |\n| rsync/ftp/tftp 或 scp 到另一台服务器 | 你可以使用 rsync 将归档文件移动到备份存储机器。 |\n| s3 存储 | 如果你在\
  \ EC2 上运行系统，S3 存储是一个放置备份的好地方，因为存储成本低且 Amazon 会创建冗余副本。 |\n\n我们将研究存储备份的 S3 方法；然而，相同的原理适用于任何其他机制。\n\
  \n此示例使用 [`http://s3tools.org`](http://s3tools.org/) 提供的 `s3cmd` 工具（用 python 编写）。在\
  \ Ubuntu 上，你可以使用 `sudo apt-get install s3cmd` 命令安装此脚本；在 Mac OSX 上，此脚本可从 `MacPorts`\
  \ 集合中获得。在 Fedora、CentOS 和 RedHat 上，你可以从 [`http://s3tools.org`](http://s3tools.org/)\
  \ 获取 `yum` 包，然后使用 `yum` 安装。\n\n安装包后，运行 `s3cmd –configure` 来设置你的 Amazon S3 凭证。请注意，你只需要提供两个密钥：`AWS_ACCESS_KEY`\
  \ 和 `AWS_SECRET_ACCESS_KEY`。`s3cmd` 工具将创建一个包含你需要的信息的配置文件：`~/.s3cfg`。\n\n以下是你需要为备份脚本所做的更改，以便其与\
  \ S3 协同工作：\n\n```bash\n## _do_store_archive <数据库> <转储目录> <目标目录> <目标文件>\nBACKUP_S3_CONFIG=~/.s3cfg\n\
  BACKUP_S3_BUCKET=somecompany.somebucket\nS3CMD_BIN=/usr/bin/s3cmd\n\nfunction _do_store_archive\
  \ {\n    UNIQ_FILE=\"aws`date \"+%s\"`\"\n    cd $2\n    tar -cvzf $BACKUP_TMP/$UNIQ_FILE\
  \ dump\n    $S3CMD_BIN --config $BACKUP_S3_CONFIG put $BACKUP_TMP/$UNIQ_FILE \\\n\
  \        s3://$BACKUP_S3_BUCKET/$1/$4\n    rm -f $BACKUP_TMP/$UNIQ_FILE\n}\n```\n\
  \n表 9-3 列出了你需要配置以使这个改编后的脚本工作的一些变量。\n\n表 9-3. 配置改编后备份脚本的变量\n\n| 变量 | 描述 |\n| ---\
  \ | --- |\n| `BACKUP_S3_CONFIG` | `s3cmd` 配置文件的路径，该文件在你运行 `s3cmd –configure` 以保存\
  \ S3 账户详细信息时创建。 |\n| `BACKUP_S3_BUCKET` | 你希望脚本存储备份的存储桶（Bucket）的名称。 |\n| `S3CMD_BIN`\
  \ | `s3cmd` 可执行程序的路径，同样使用 `which s3cmd` 在你的系统上查找它。 |\n\n#### 备份大型数据库\n\n在处理大型数据库系统时，创建有效的备份解决方案可能会成为一个问题。通常，制作数据库副本所需的时间相当长；甚至可能需要几个小时才能完成。在这段时间内，你必须保持数据库处于一致状态，因此备份不会包含在不同时间点复制的文件。数据库备份系统的圣杯是时间点快照，它可以非常快速地完成。快照完成得越快，数据库服务器必须被冻结的时间窗口就越小。\n\
  \n\n##### 使用隐藏辅助服务器进行备份\n\n执行大规模备份的一种技术是从一个可冻结的隐藏辅助服务器进行备份。备份完成后，再重启此辅助服务器以跟上应用程序的进度。\n\
  \nMongoDB 可以非常简便地设置隐藏辅助服务器，并利用其复制机制追踪主服务器的变更。配置过程也相对简单（有关如何设置隐藏辅助服务器的更多详情，请参阅第 11\
  \ 章）。\n\n##### 使用日志文件系统创建快照\n\n许多现代卷管理器具备在任意时间点创建驱动器状态快照的能力。使用文件系统快照是创建 MongoDB\
  \ 实例备份最快、最高效的方法之一。虽然搭建此类系统超出了本书的范围，但我们可以指导您如何使 MongoDB 服务器进入数据在磁盘上保持一致性的状态。我们还将展示如何阻止写入操作，使后续更改不会写入磁盘，而是缓冲在内存中。\n\
  \n快照允许您读取创建快照时驱动器的精确状态。系统的卷或文件系统管理器会确保在快照创建后发生更改的磁盘数据块不会写回驱动器的同一位置；这能保存磁盘上的所有数据以供读取。通常，使用快照的流程如下：\n\
  \n1.  创建快照。\n2.  根据您的卷管理器，从快照复制数据或将快照恢复到另一个卷。\n3.  释放快照；此操作将不再需要的所有保留磁盘块释放回驱动器的空闲空间链。\n\
  4.  在服务器仍在运行时，从已复制的数据进行备份。\n\n刚才描述的方法的一大优点是：在创建快照期间，对数据的读取操作可以不受阻碍地持续进行。\n\n一些具备此功能的卷管理器包括：\n\
  \n*   Linux 与 `LVM` 卷管理系统\n*   Sun `ZFS`\n*   Amazon `EBS` 卷\n*   使用卷影副本的 Windows\
  \ Server\n\n即使数据量非常大，大多数此类卷管理器也能在极短的时间内——通常只需几秒——执行快照。此时，卷管理器实际上并未复制数据；相反，它们有效地在驱动器上插入了一个“书签”，以便您可以读取在快照时间点存在的驱动器状态。\n\
  \n一旦备份系统读取了来自快照的驱动器，后续更改过的旧数据块就可以被释放回驱动器的空闲空间链（或文件系统用于标记空闲空间的任何机制）。\n\n为了使这成为一种有效的备份方法，我们必须确保\
  \ MongoDB 的日志文件存在于同一设备上，或者让 MongoDB 将所有待处理的磁盘写入刷新到磁盘，以便我们获取快照。强制 MongoDB 执行此刷新的功能称为\
  \ `fsync`；阻止进一步写入的功能称为 `lock`。MongoDB 能够同时执行这两个操作，这样在 `fsync` 之后，直到 `lock` 被释放之前，不会有进一步的写入操作执行到磁盘。通过将日志放在同一设备上或执行\
  \ `fsync` 和 `lock`，我们使磁盘上的数据库映像保持一致，并确保其在快照完成前保持一致。\n\n您可以使用以下命令使 MongoDB 进入 `fsync`\
  \ 和 `lock` 状态：\n\n```\n$mongo\n>use admin\n>db.fsyncLock()\n{\n    \"info\" : \"\
  now locked against writes\",\n    \"ok\" : 1\n}\n```\n\n您可以使用以下命令检查 `lock` 的当前状态：\n\
  \n```\n$mongo\n>use admin\n>db.currentOp()\n{\n    \"inprog\" : [],\n    \"fsyncLock\"\
  \ : 1\n}\n```\n\n`\"fsyncLock\": 1` 状态表示 MongoDB 负责将更改写入磁盘的 `fsync` 进程当前被阻止执行写入。\n\
  \n此时，您可以发出所需命令，让您的卷管理器创建 MongoDB 数据文件存储文件夹的快照。快照完成后，您可以使用以下命令释放 `lock`：\n\n```\n\
  $mongo\n>db.fsyncUnlock();\n{ \"ok\" : 1, \"info\" : \"unlock requested\" }\n```\n\
  \n请注意，`lock` 释放前可能会有短暂延迟；不过，您可以使用 `db.currentOp()` 函数检查结果。\n\n当 `lock` 最终被清除时，`db.currentOp()`\
  \ 将返回以下内容：\n\n```\n$mongo\n>use admin\n>db.currentOp()\n{ \"inprog\" : [] }\n```\n\
  \n`{ \"inprog\" : [] }` 这一行意味着 `lock` 已被释放，MongoDB 可以再次开始写入磁盘。\n\n现在您已经插入了快照“书签”，您可以使用卷管理器相关的实用程序将快照内容复制到合适的位置以存储备份。备份完成后，别忘了释放快照。\n\
  \n您可以访问以下链接获取关于快照的更多信息：\n\n*   [`http://docs.mongodb.org/manual/tutorial/backup-databases-with-filesystem-snapshots/`](http://docs.mongodb.org/manual/tutorial/backup-databases-with-filesystem-snapshots/)\n\
  *   [`http://tldp.org/HOWTO/LVM-HOWTO/snapshots_backup.html`](http://tldp.org/HOWTO/LVM-HOWTO/snapshots_backup.html)\n\
  *   [`http://docs.huihoo.com/opensolaris/solaris-zfs-administration-guide/html/ch06.html`](http://docs.huihoo.com/opensolaris/solaris-zfs-administration-guide/html/ch06.html)\n\
  *   [`http://support.rightscale.com/09-Clouds/AWS/02-Amazon_EC2/EBS/Create_an_EBS_Snapshot`](http://support.rightscale.com/09-Clouds/AWS/02-Amazon_EC2/EBS/Create_an_EBS_Snapshot)\n\
  \n##### 适用于卷管理器的磁盘布局\n\n一些卷管理器可以对分区上的子目录进行快照，但大多数不能。因此，建议将计划用于存储 MongoDB 数据的卷挂载到文件系统的合适位置（例如，`/mnt/mongodb`），并使用服务器配置选项将数据目录、配置文件以及任何其他与\
  \ MongoDB 相关的文件（例如，日志文件）仅放置在该挂载点上。\n\n这意味着当您对该卷进行快照时，您捕获了服务器的完整状态，包括其配置。甚至可能将服务器发行版的二进制文件直接放置在该卷上也是一个好主意，这样您的备份就包含了一组完全协调的组件。\n\
  \n\n\n#### 将数据导入 MongoDB\n\n有时，你需要将大量批量数据加载到 MongoDB 中，用作参考数据。这类数据可能包括邮政编码表、IP 地理位置表、零件目录等。\n\
  \nMongoDB 包含一个批量“加载器”`mongoimport`，用于将数据直接导入服务器上的特定集合；这与`mongorerestore`不同，后者旨在从备份中恢复\
  \ MongoDB 二进制数据。\n\n`mongoimport`工具可以从以下三种文件格式中的任何一种加载数据：\n\n*   CSV：在此文件格式中，每一行代表一个文档，字段之间用逗号分隔。\n\
  *   TSV：此文件格式与 CSV 类似；但是，它使用制表符作为分隔符。这种格式很流行，因为它不需要转义除换行符之外的任何文本字符。\n*   JSON：此格式每行包含一个代表文档的\
  \ JSON 块。与其他格式不同，JSON 可以支持具有可变模式的文档。\n\n该工具的使用相当直观。对于输入，它接受这三种格式之一的文件、一个字符串或一个包含一组列标题名称的文件（这些名称构成\
  \ MongoDB 文档中的元素名称），以及几个用于控制数据解释方式的选项。图 9-3 展示了如何使用`mongoimport`工具。\n\n![图 9-3](img/A978-1-4302-5822-3_9_Fig3_HTML.jpg)\n\
  显示其选项的 mongoimport 帮助信息\n\n以下选项值得进一步解释：\n\n*   `--headerline`：使用文件的第一行作为字段名称列表。请注意，这只适用于\
  \ CSV 和 TSV 格式。\n*   `--ignoreblanks`：不导入空字段。如果某个字段为空，则不会为该行在文档中创建相应的元素；如果未调用此选项，则会创建一个具有列名的空元素。\n\
  *   `--drop`：删除一个集合，然后仅使用本次导入的数据重新创建它；否则，数据将被追加到集合中。\n\n使用`mongoimport`导入数据时，还必须使用`-d`和`-c`选项指定数据库名称和集合名称，如下例所示：\n\
  \n`$mongoimport -d blog -c tagcloud --type csv --headerline < csvimportfile.csv`\n\
  \n#### 从 MongoDB 导出数据\n\n`mongoexport`工具与`mongoimport`类似，但顾名思义，`mongoexport`是从现有的\
  \ MongoDB 集合创建导出文件。这是从 MongoDB 实例中以其他数据库或电子表格应用程序可读格式提取数据的最佳方法之一。图 9-4 展示了如何使用`mongoexport`工具。\n\
  \n![图 9-4](img/A978-1-4302-5822-3_9_Fig4_HTML.jpg)\n显示其选项的 mongoexport 帮助信息\n\n\
  `mongoexport`工具中值得注意的选项包括：\n\n*   `-q`：指定用于定位要输出记录的查询。此查询可以是任何 JSON 查询字符串（但不能是 JavaScript\
  \ 查询字符串，因为后者通常无法按预期工作），就像你可能与`db.collection.find()`函数一起使用来选择记录子集的查询一样。如果未指定此选项或将其设置为`{}`，则`mongoexport`工具将输出所有记录。\n\
  *   `-f`：列出要导出的数据库元素名称。\n\n以下示例说明了如何使用`mongoexport`工具的选项：\n\n`$mongoexport -d blog\
  \ -c posts -q {} -f _id,Title,Message,Author --csv >blogposts.csv`\n\n```\nconnected\
  \ to: 127.0.0.1\nexported 1 records\n```\n\n#### 通过限制对 MongoDB 服务器的访问来保护数据\n\n在某些情况下，你的应用程序可能处理敏感数据，例如社交网络中的用户记录或电子商务应用程序中的支付详情。在许多情况下，法规要求你必须确保对数据库系统中敏感数据的访问受到限制。\n\
  \nMongoDB 支持一个简单的基于角色的认证系统，允许你控制谁可以访问每个数据库，以及他们被授予的访问级别。\n\n大多数更改数据配置或对 MongoDB\
  \ 服务器上的数据结构进行重大修改的命令，仅限在每个新 MongoDB 安装期间自动创建的特殊`admin`数据库内运行。\n\n在发布这些命令之前，你必须使用`use\
  \ admin`命令切换到`admin`数据库。接下来的章节会注明任何仅限管理员的命令，因此你总能知道何时需要位于`admin`数据库中才能使用它。本章假设你可以选择数据库并在必要时进行身份验证。\n\
  \n默认情况下，MongoDB 不使用任何认证方法。任何能够访问网络连接的人都可以连接并向服务器发出命令。但是，你可以向任何数据库添加用户，并且可以配置 MongoDB\
  \ 要求进行连接和控制台认证才能访问相关数据库。这是限制对管理功能访问的推荐机制。\n\n#### 通过认证保护你的服务器\n\nMongoDB 支持一个简单的认证模型，允许管理员基于每个用户限制对数据库的访问。\n\
  \nMongoDB 支持在每个数据库上设置单独的访问控制记录；这些记录存储在一个特殊的`system.users`集合中。要使普通用户能够访问两个数据库（例如`db1`和`db2`），它们的凭据和权限必须添加到这两个数据库。\n\
  \n如果你为同一用户在不同数据库上创建单独的登录名和访问权限，这些记录之间不会进行同步。换句话说，在一个数据库上更改用户密码不会更改任何其他数据库上的密码。不过，MongoDB\
  \ 团队在 2.4 版本中引入了一种新机制来允许委托凭据。通过这种方式使用这些凭据，你可以创建一个带有密码的主用户。然后在其他数据库上创建用户，并指定该用户已存在于主数据库上，其凭据应被用于认证。\n\
  \n此规则还有一个最终（且关键）的例外：任何添加到特殊`admin`数据库的用户将在所有数据库上拥有相同的访问权限；你无需单独为这些用户分配权限。\n\n**注意**\n\
  \n如果在添加管理员用户之前启用了认证，你将只能通过 localhost 访问你的数据库，这意味着连接必须来自托管 MongoDB 实例的机器。这是一项安全功能，旨在允许管理员在启用认证后创建用户。\n\
  \n##### 添加管理员用户\n\n添加`admin`用户很简单，只需切换到`admin`数据库并使用`addUser()`函数：\n\n```\n$mongo\n\
  > use admin\n> db.addUser({user : \"admin\", pwd: \"pass\", roles: [ \"readWrite\"\
  , \"dbAdmin\" ] })\n{\n     \"user\" : \"admin\",\n     \"pwd\" : \"e4e538f5dcb52537cad02bbf8491693c\"\
  ,\n     \"roles\" : [\n          \"readWrite\",\n          \"dbAdmin\"\n     ],\n\
  \     \"_id\" : ObjectId(\"5239915b1ce3dc1efebb3c84\")\n}\n```\n\n此时你只需要添加一个`admin`用户；一旦定义了该用户，你就可以使用它来向`admin`数据库添加其他`admin`用户，或向任何其他数据库添加普通用户。\n\
  \n\n\n## MongoDB 认证与用户管理\n\n#### 启用认证\n\n现在需要修改服务器的配置来启用认证。通过停止服务器并在启动参数中添加 `--auth`\
  \ 来完成。\n\n如果通过 `yum` 或 Aptitude 等打包安装程序安装了 MongoDB，通常可以通过编辑 `/etc/mongodb.conf`\
  \ 来设置 `auth=true`。接下来，可以使用以下命令重启服务器并启用认证：\n\n```bash\n$ sudo service mongodb restart\n\
  ```\n\n除了 `auth`，你还可以使用密钥文件（keyfile）。这是一个包含某种预共享密钥的文件，用于确认 MongoDB 节点之间的通信。要创建密钥文件，只需创建一个包含待用短语或字符串的简单文件。然后，像设置\
  \ `auth` 一样添加 `keyfile=/path/to/keyfile` 选项。你甚至可以移除旧的 `auth=true` 选项，因为运行 `keyfile`\
  \ 就意味着启用了 `auth`。\n\n#### 在 mongo 控制台中认证\n\n在 `admin` 数据库中运行受限命令之前，需要先以 `admin`\
  \ 用户身份进行认证，如下例所示：\n\n```bash\n$ mongo\n```\n\n```javascript\n> use admin\nswitched\
  \ to db admin\n> show collections\nSun May 26 17:22:26.132 JavaScript execution\
  \ failed: error: {\n      \"$err\" : \"not authorized for query on admin.system.namespaces\"\
  ,\n      \"code\" : 16550\n} at src/mongo/shell/query.js:L131 }\n> db.auth(\"admin\"\
  , \"pass\");\n1\n```\n\n此时，`mongo` 控制台将打印 `1`（认证成功）或 `0`（认证失败）：\n\n```javascript\n\
  1\n> show collections\nsystem.indexes\nsystem.users\n```\n\n如果认证成功，你将能够根据用户权限执行任何可用的操作。\n\
  \n如果认证失败，则需要检查用户名/密码是否正确，以及 `admin` 用户是否已正确添加到 `admin` 数据库。重置服务器使其无认证，然后使用以下命令列出\
  \ `admin` 数据库中 `system.users` 集合的内容：\n\n```bash\n$ mongo\n```\n\n```javascript\n\
  > use admin\n> db.system.users.find()\n{ \"_id\" : ObjectId(\"5239915b1ce3dc1efebb3c84\"\
  ), \"user\" : \"admin\", \"pwd\" : \"e4e538f5dcb52537cad02bbf8491693c\", \"roles\"\
  \ : [ \"readWrite\", \"dbAdmin\" ] }\n```\n\n**注意**\n\n如果使用 `admin` 凭据访问 `admin`\
  \ 以外的数据库，则必须首先针对 `admin` 数据库进行认证。否则，将无法访问系统中的任何其他数据库。\n\n`mongo` 控制台显示 `user` 集合的内容，使你能够查看\
  \ `userid` 是什么，而密码则显示为所提供原始密码的 MD5 哈希值：\n\n```bash\n$ mongo\n```\n\n```javascript\n\
  > use blog\nswitched to db blog\n> show collections\nWed Sep 18 21:42:51.855 JavaScript\
  \ execution failed: error: {\n      \"$err\" : \"not authorized for query on blog.system.namespaces\"\
  ,\n      \"code\" : 13\n} at src/mongo/shell/query.js:L128\n> db.auth(\"admin\"\
  ,\"pass\")\nError: 18 { code: 18, ok: 0.0, errmsg: \"auth fails\" }\n0\n> use admin\n\
  switched to db admin\n> db.auth(\"admin\",\"pass\")\n1\n> use blog\nswitched to\
  \ db blog\n> show collections\nsystem.indexes\nsystem.users\nauthors\nposts\ntagcloud\n\
  ```\n\n## MongoDB 用户角色\n\n目前，MongoDB 支持以下用户在其权限框架内可以拥有的角色：\n\n*   `read` — 允许用户从给定数据库读取。\n\
  *   `readWrite` — 授予用户对给定数据库的读写权限。\n*   `dbAdmin` — 允许用户在给定数据库内执行管理功能，例如创建或删除索引、查看统计信息或访问\
  \ `system.profile` 集合。\n*   `userAdmin` — 允许用户写入 `system.users` 集合。拥有此权限，你可以为此数据库创建、删除和管理用户。\n\
  *   `clusterAdmin` — 仅在 `admin` 数据库内可用。授予对所有分片和副本集相关功能的完全管理访问权限。\n*   `readAnyDatabase`\
  \ — 仅在 `admin` 数据库内可用。授予对所有数据库的读取权限。\n*   `readWriteAnyDatabase` — 仅在 `admin` 数据库内可用。授予对所有数据库的\
  \ `readWrite` 权限。\n*   `userAdminAnyDatabase` — 仅在 `admin` 数据库内可用。授予对所有数据库的 `userAdmin`\
  \ 权限。\n*   `dbAdminAnyDatabase` — 仅在 `admin` 数据库内可用。授予对所有数据库的 [`dbAdmin`](http://docs.mongodb.org/manual/reference/user-privileges/#dbAdmin%23dbAdmin)\
  \ 权限。\n\n#### 委托凭证\n\n如前所述，从 MongoDB 2.4 版本开始，可以拥有一个主用户，然后创建使用主用户凭据进行认证的后续用户，这一功能称为创建委托凭证。假设我们在\
  \ `foo` 数据库上创建用户 `test`，如下所示：\n\n```javascript\n> use foo\n> db.addUser(user : \"\
  test\", pwd: \"password\", roles: [\"readWrite\" ])\n```\n\n现在，假设我们想在 `bar` 数据库上创建相同的\
  \ `test` 用户。我们可以运行以下命令（当然，作为在该数据库上具有 `userAdmin` 权限的用户）来创建 `test` 用户，该用户将使用 `foo`\
  \ 数据库的定义作为其密码：\n\n```javascript\n> use bar\n> db.system.users.insert{ user: \"test\"\
  , roles: [\"read\"], userSource: \"foo\"}\n```\n\n请注意，此用户只被授予了只读权限 `\"read\"`。这是因为\
  \ `test` 用户在 `bar` 上的访问权限仍然基于此 `bar` 用户的凭证。我们只是从 `foo` 数据库获取我们需要的其余详细信息（即密码）。通过使用委托凭证，你可以创建一个单一位置来更新所有用户的用户名和密码。\n\
  \n#### 更改用户凭证\n\n更改用户的访问权限或密码很容易。通过再次执行 `addUser()` 函数来完成，这会导致 MongoDB 更新现有的用户记录。从技术上讲，可以使用任何常规的数据操作命令来更改用户记录；但是，只有\
  \ `addUser()` 函数可以创建密码字段。\n\n无论如何，你可以通过列出其内容来了解 `addUser()` 的工作原理：\n\n```bash\n\
  $ mongo\n```\n\n```javascript\n> use admin\n> db.addUser\nfunction () {\n    if\
  \ (arguments.length == 0) {\n        throw Error(\"No arguments provided to addUser\"\
  );\n    }\n    if (typeof arguments[0] == \"object\") {\n        this._addUser.apply(this,\
  \ arguments);\n    } else {\n        this._addUserV22.apply(this, arguments);\n\
  \    }\n}\n```\n\n`addUser()` 只是一个用 JavaScript 定义的函数。了解密码的构造方式很有用，如果你想要创建一个允许你向数据库添加用户的\
  \ Web 表单，或者想要从另一个凭据源批量导入用户到系统中。\n\n大多数 `mongo` 控制台函数都可以用这种方式列出，使你能够检查它们工作的细节。\n\n\
  #### 添加只读用户\n\n`addUser()` 函数包含一个附加参数，允许你创建仅具有只读权限的用户。如果以新创建用户身份认证的进程尝试执行任何会导致数据库内容更改的操作，MongoDB\
  \ 客户端将抛出异常。以下示例授予用户访问数据库以进行状态监控或报告的权限：\n\n```bash\n$ mongo\n```\n\n```javascript\n\
  > use admin\nswitched to db admin\n> db.addUser(user : \"admin\", pwd: \"pass\"\
  , roles: [ \"read\" ])\n1\n> use blog\nswitched to db blog\n> db.addUser(\"shadycharacter\"\
  ,\"shadypassword\", true)\n```\n\n#### 删除用户\n\n要从数据库中删除用户，只需使用集合的常规 `remove()` 函数。以下示例删除了刚刚添加的用户；请注意，你必须先针对\
  \ `admin` 数据库进行认证，然后才能删除用户：\n\n```bash\n$ mongo\n```\n\n```javascript\n> use admin\n\
  switched to db admin\n> db.auth(\"admin\",\"pass\")\n1\n> use blog\nswitched to\
  \ db blog\n> db.removeUser(\"shadycharacter\")\n```\n\n\n## 在 PHP 应用程序中使用身份验证连接\n\
  \n在第 4 章中，您了解了如何使用 PHP 创建到 MongoDB 服务器的连接。一旦在服务器上启用了身份验证，PHP 应用程序在能够对服务器执行命令之前也必须提供凭证。以下简单示例展示了如何打开到数据库的身份验证连接：\n\
  \n```php\n<?php\n// 建立数据库连接\n$connection = new Mongo();\n$db = $connection->selectDB(\"\
  admin\");\n$result = $db->authenticate(\"admin\", \"pass\");\nif(!$result['ok']){\n\
  \    // 在此处进行错误处理\n    die(\"身份验证错误: {$result['errmsg']}\");\n}\n// 您的代码在此处\n//\
  \ 关闭数据库连接\n$connection->close();\n?>\n```\n\n## 管理服务器\n\n作为管理员，您必须确保 MongoDB 服务器平稳可靠地运行。\n\
  \n您将需要定期调整服务器以实现最大性能，或重新配置它们以更好地匹配您所运行的环境。为此，您需要熟悉一系列能够管理和控制服务器的过程。\n\n#### 启动服务器\n\
  \n大多数现代 Linux 发行版现在都包含一组用于管理服务的`/etc/init.d`脚本。如果您使用 MongoDB 网站上的某个发行版包安装了 MongoDB\
  \ 服务器（有关这些包的更多信息，请参见第 2 章），那么用于管理服务器的`init.d`脚本应该已经安装好了。\n\n您可以在 Ubuntu、Fedora、CentOS\
  \ 和 RedHat 上使用`service`命令来启动、停止和重启服务器，如下列示例所示：\n\n```bash\n$sudo service mongodb\
  \ start\nmongodb start/running, process 3474\n$sudo service mongodb stop\nmongodb\
  \ stop/waiting\n$sudo service mongodb restart\nmongodb start/running, process 3474\n\
  ```\n\n如果您没有可用的初始化脚本，可以通过打开终端窗口并键入以下命令手动启动 MongoDB 服务器：\n\n```bash\n$ mongod\nFri\
  \ May 24 15:06:20.475 [initandlisten] MongoDB starting : pid=97163 port=27017 dbpath=/var/lib/mongodb\
  \ 64-bit host=Pixl.local\nFri May 24 15:06:20.475 [initandlisten] db version v2.5.1-pre\n\
  Fri May 24 15:06:20.475 [initandlisten] git version: 704dc4fdf5248077c53271f249260478d6c56cd3\n\
  Fri May 24 15:06:20.475 [initandlisten] build info: Darwin bs-osx-106-x86-64-1.local\
  \ 10.8.0 Darwin Kernel Version 10.8.0: Tue Jun 7 16:33:36 PDT 2011; root:xnu-1504.15.3∼1/RELEASE_I386\
  \ i386 BOOST_LIB_VERSION=1_49\nFri May 24 15:06:20.475 [initandlisten] allocator:\
  \ system\nFri May 24 15:06:20.475 [initandlisten] options: {}\nFri May 24 15:06:20.479\
  \ [initandlisten] journal dir=/data/db/journal\nFri May 24 15:06:20.479 [initandlisten]\
  \ recover : no journal files present, no recovery needed\nFri May 24 15:06:20.547\
  \ [websvr] admin web console waiting for connections on port 28017\n```\n\n服务器将显示所有正在进行的连接，以及其他可用于监控服务器工作状态的信息。\n\
  \n要在手动模式下终止服务器，只需键入`^C`；这将使服务器干净地关闭。\n\n如果您没有提供配置文件，那么 MongoDB 将以默认数据库路径`/data/db`启动，并使用默认端口\
  \ 27017（mongodb）和 28017（管理界面）绑定到所有网络 IP，如下例所示：\n\n```bash\n$ mkdir -p /data/db\n\
  $ mongod\nmongod --help for help and startup options\n...\nSun Jun 13 13:38:00 waiting\
  \ for connections on port 27017\nSun Jun 13 13:38:00 web admin interface listening\
  \ on port 28017\n^C\nSun Jun 13 13:40:26 got kill or ctrl c signal 2 (Interrupt),\
  \ will terminate after current cmd ends\n...\nSun Jun 13 13:40:26 dbexit: really\
  \ exiting now\n```\n\n#### 重新配置服务器\n\nMongoDB 提供了三种主要方法来配置服务器。首先，您可以将命令行选项与`mongod`服务器守护程序结合使用。其次，您可以通过加载配置文件来实现。第三，您可以使用`setParameter`命令更改这些设置中的大多数。例如，我们可以使用以下命令将`logLevel`更改回默认值\
  \ 0：\n\n```javascript\n> db.adminCommand( {setParameter:1, logLevel:0 } )\n```\n\
  \n大多数预打包的 MongoDB 安装程序使用后一种方法，使用一个在 Unix/Linux 系统上通常存储在`/etc/mongodb.conf`的文件。\n\
  \n您可以通过编辑此文件并重启服务器来更改服务器的配置。此文件的内容如下所示：\n\n```conf\n## mongodb.conf\ndbpath=/var/lib/mongodb\n\
  logpath=/var/log/mongodb/mongodb.log\nlogappend=true\nauth = false\n#启用 rest 接口\n\
  rest =true\n```\n\n您可以通过删除选项前的`#`代码并根据需要设置其值来启用选项，因为任何以#开头的行都被视为“注释”，因此会被忽略。\n\n\
  在配置文件中放置以下任何选项值等同于在启动 MongoDB 时在命令行上指定\n\n```bash\n--<选项名> <选项值>\n```\n\n*   `dbpath`：指示\
  \ MongoDB 将存储您的数据的位置；您应确保它位于足够支持您数据库大小的快速存储卷上。\n*   `logpath`：指示 MongoDB 将存储其日志的文件。标准放置位置是`/var/logs/mongodb/mongodb.log`；您需要使用`logrotate`来轮转此日志文件，防止其填满服务器的驱动器。\n\
  *   `logappend`：将此选项设置为`false`会导致每次启动 MongoDB 时都清除日志文件。将此选项设置为`true`会导致所有日志条目都附加到任何现有日志文件的末尾。\n\
  *   `auth`：在 MongoDB 服务器上启用或禁用身份验证模式；有关身份验证的更多信息，请参阅本章前面的讨论。\n*   `rest`：启用或禁用到\
  \ MongoDB 的`rest`接口。如果您想使用基于 Web 的状态显示中的链接来显示其他信息，则必须启用此接口，但这不建议用于生产服务器，因为所有此类信息都应可通过\
  \ Mongo shell 获得。\n\n#### 获取服务器的版本\n\n您可以使用`db.version()`函数来获取服务器的构建和版本信息。此信息对于确定是否需要升级或向支持论坛报告问题时很有用。以下代码段展示了如何使用此命令：\n\
  \n```bash\n$mongo\n> use admin\nswitched to db admin\n> db.version()\nversion: 2.5.1-pre-\n\
  ```\n\n\n## 获取服务器状态\n\nMongoDB 提供了一种简单的方法来确定服务器的状态。\n\n> 注意\n> 请记住，如果您使用了 `auth`，您的用户需要具备运行这些命令的权限。\n\
  \n以下示例展示了返回的信息，其中包括诸如服务器运行时间、最大连接数等：\n\n```bash\n$mongo\n```\n\n```\n> db.serverStatus()\n\
  {\n\"host\" : \"Pixl.local\",\n\"version\" : \"2.5.1-pre-\",\n\"process\" : \"mongod\"\
  ,\n\"pid\" : 3737,\n\"uptime\" : 44,\n\"uptimeMillis\" : NumberLong(43035),\n\"\
  uptimeEstimate\" : 39,\n\"localTime\" : ISODate(\"2013-05-25T12:38:34.015Z\"),\n\
  \"asserts\" : {\n\"regular\" : 0,\n\"warning\" : 0,\n\"msg\" : 0,\n\"user\" : 1,\n\
  \"rollovers\" : 0\n},\n\"connections\" : {\n\"current\" : 1,\n\"available\" : 2047,\n\
  \"totalCreated\" : NumberLong(1)\n},\n\"cursors\" : {\n\"totalOpen\" : 0,\n\"clientCursors_size\"\
  \ : 0,\n\"timedOut\" : 0\n},\n\"globalLock\" : {\n\"totalTime\" : NumberLong(43035000),\n\
  \"lockTime\" : NumberLong(48184),\n\"currentQueue\" : {\n\"total\" : 0,\n\"readers\"\
  \ : 0,\n\"writers\" : 0\n},\n},\n\"locks\" : {\n\"admin\" : {\n\"timeLockedMicros\"\
  \ : {\n\"r\" : NumberLong(54),\n\"w\" : NumberLong(0)\n},\n\"timeAcquiringMicros\"\
  \ : {\n\"r\" : NumberLong(2190),\n\"w\" : NumberLong(0)\n}\n},\n\"local\" : {\n\"\
  timeLockedMicros\" : {\n\"r\" : NumberLong(45),\n\"w\" : NumberLong(6)\n},\n\"timeAcquiringMicros\"\
  \ : {\n\"r\" : NumberLong(7),\n\"w\" : NumberLong(1)\n}\n},\n...\n},\n\"network\"\
  \ : {\n\"bytesIn\" : 437,\n\"bytesOut\" : 6850,\n\"numRequests\" : 7\n},\n\"opcounters\"\
  \ : {\n\"insert\" : 1,\n\"query\" : 6,\n\"update\" : 0,\n\"delete\" : 0,\n\"getmore\"\
  \ : 0,\n\"command\" : 7\n},\n...\n\"mem\" : {\n\"bits\" : 64,\n\"resident\" : 37,\n\
  \"virtual\" : 3109,\n\"supported\" : true,\n\"mapped\" : 320,\n\"mappedWithJournal\"\
  \ : 640\n},\n\"ttl\" : {\n\"deletedDocuments\" : NumberLong(0),\n\"passes\" : NumberLong(0)\n\
  }\n},\n\"ok\" : 1\n}\n```\n\n如您所见，`serverStatus` 输出了大量细节，而上面展示的还是截断后的！您可以在返回信息的\
  \ `opcounters` 和 `asserts` 这两个最重要的部分找到关键信息。\n\n`opcounters` 部分显示了针对数据库服务器执行的每种类型操作的数量。您应该对您的特定应用来说，这些计数器的正常比例是什么样的有个清晰的概念。如果这些计数器开始偏离正常比例，那可能就是您的应用程序出现问题的早期警告。\n\
  \n例如，所示示例中插入与读取的比例极高。这对于一个日志记录应用来说可能是正常的；然而，对于一个博客应用，它可能表明有垃圾机器人正在攻击您的“评论”部分，或者某个会导致写入数据库的\
  \ URL 模式正被搜索引擎爬虫反复爬取。在这种时候，就应该考虑在评论表单上添加验证码，或者在您的 `robots.txt` 文件中屏蔽该特定 URL 模式。\n\
  \n`asserts` 部分显示了已抛出的服务器端和客户端异常或警告的数量。如果此类异常或警告开始迅速增加，那么就该好好检查一下服务器的日志文件，看看是否有问题正在酝酿。高数量的断言也可能表明数据库中的数据有问题，您应该检查您的\
  \ MongoDB 实例的日志文件，以确认这些断言的性质，以及它们是代表正常的“用户断言”（如重复键违规），还是更紧迫的问题。\n\n#### 关闭服务器\n\n\
  如果您是从软件包安装的 MongoDB 服务器，您可以使用操作系统的服务管理脚本来关闭服务器。例如，Ubuntu、Fedora、CentOS 和 RedHat\
  \ 允许您通过以下命令来关闭服务器：\n\n```bash\n$sudo service mongod stop\n```\n\n您也可以从 `mongo` 控制台关闭服务器：\n\
  \n```bash\n$mongo\n```\n\n```\n>use admin\n>db.shutdownServer()\n```\n\n您可以使用 Posix\
  \ 进程管理命令来终止服务器，或者使用 `SIG_TERM(-15)` 或 `SIG_INT(-2)` 信号来关闭服务器。\n\n**仅当**服务器对前两种方法无响应时，您才可以使用以下命令：\n\
  \n```bash\n$sudo killall -15 mongod\n```\n\n> 警告\n> 您**切勿**使用 `SIG_KILL(-9)` 信号来终止服务器，因为这可能导致数据库损坏，而且您很可能需要修复服务器。\n\
  \n可能您的服务器特别活跃，写操作很多，并且您已将服务器重新配置为具有较大的同步延迟。如果是这种情况，那么服务器可能不会立即响应终止请求，因为它正在将内存中的所有更改写入磁盘。此时，**稍安勿躁**会很有帮助。\n\
  \n#### 使用 MongoDB 日志文件\n\n默认情况下，MongoDB 将其所有日志输出写入 `stdout`；但是，您可以使用前面描述的 `logpath`\
  \ 选项将日志输出重定向到文件。\n\n您可以利用日志文件的内容来发现诸如来自单个机器的过多连接等问题，以及其他可能表明您的应用程序逻辑或数据存在问题的错误消息。\n\
  \n#### 验证和修复数据\n\n如果您的服务器意外重启或 MongoDB 服务器因任何原因崩溃，您的数据可能会处于损坏或不完整的状态。\n\n以下是一些表明您的数据已受损的迹象：\n\
  \n*   您的数据库服务器拒绝启动，并指出数据文件已损坏。\n*   您开始在服务器日志文件中看到断言，或在使用 `db.serverStatus()` 命令时看到高断言计数。\n\
  *   您从查询中得到奇怪或意外的结果。\n*   集合上的记录计数与您的预期不符。\n\n这些迹象中的任何一个都可能表明您的应用程序存在问题，或者更令人担忧的是，表明您的数据损坏或不一致。\n\
  \n幸运的是，MongoDB 附带了可帮助您修复或恢复数据库服务器的工具。尽管如此，您仍可能会丢失部分数据，因此请记住黄金法则：确保您拥有良好的数据备份或复制从库。\n\
  \n\n\n##### 修复服务器\n\n在启动服务器修复流程之前，您必须意识到运行 `repair` 命令是一项开销巨大的操作，可能耗费大量时间。此外，由于所有数据都会被克隆到新文件并完全重新创建，此操作最多可能需要相当于您\
  \ MongoDB 数据文件所占空间两倍的额外磁盘空间，这实质上等同于重建所有数据文件。这也是使用*复制集*的最佳理由之一：如果您需要将一台机器下线进行修复，不必完全停止复制集为客户端提供服务。\n\
  \n要启动修复过程，只需使用手动服务器启动流程（如本章前面所述）。不过，这次您需要在命令末尾加上 `--repair` 选项，如下例所示：\n\n```\n$\
