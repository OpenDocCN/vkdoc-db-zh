  \n我们都谨以此书献给同一个人，一个我们中只有一人真正见过，但却对我们所有人的生活产生了重大影响的人。15 年前，Dave Uden 冒着一定风险支持了我们中的一员，并帮助我们发挥了自己的潜力。那份支持改变了一切，并深刻影响了那个人看待世界的方式。在随后的岁月里，那个人也向他人慷慨地给予了同样的支持，其中两人现在被他视为最亲密的朋友之一。我们所有人都觉得，如果没有最初的支持，我们的生活将会截然不同。因此，我们向\
  \ Dave Uden 致以最诚挚的感谢。我们欠您的恩情，无法用言语表达。\n\n**关于作者**\n\n\n\n![A978-1-4302-5822-3_BookFrontmatter_Fig1_HTML.jpg](img/A978-1-4302-5822-3_BookFrontmatter_Fig1_HTML.jpg)\
  \ 大卫·豪斯（David Hows）以优异成绩毕业于澳大利亚新南威尔士州的伍伦贡大学。他最初涉足计算机领域，是想在不花费巨资的情况下，从家庭电脑中挖掘出更多性能。这引领他走上了\
  \ IT 职业道路，期间他曾担任系统管理员、性能工程师、软件开发人员、解决方案架构师和数据库工程师。大卫多年来一直努力想踢好足球，但收效甚微，他的咖啡杯上写着“牢骚鬼”。\n\
  \n![A978-1-4302-5822-3_BookFrontmatter_Fig2_HTML.jpg](img/A978-1-4302-5822-3_BookFrontmatter_Fig2_HTML.jpg)\
  \ 彼得·门布雷（Peter Membrey）是一位特许 IT 专家，拥有近 15 年利用 Linux 和开源解决方案解决实际问题的经验。他从 17 岁起就是红帽认证工程师（RHCE），并有幸为红帽公司工作，并撰写了几本关于开源解决方案的书籍。他持有利物浦大学信息技术（信息安全）硕士学位，目前是香港理工大学的博士研究生，研究兴趣包括云计算、大数据、科学和安全。他与可爱的妻子莎拉（Sarah）和儿子凯登（Kaydyn）一同居住在香港。他的粤语仍在退步，不过他的世界语倒是进步不小。\n\
  \n![A978-1-4302-5822-3_BookFrontmatter_Fig3_HTML.jpg](img/A978-1-4302-5822-3_BookFrontmatter_Fig3_HTML.jpg)\
  \ 埃尔科·普拉格（Eelco Plugge）是一位年轻的 IET/BSC 专业人士，对 IT 安全领域表现出浓厚兴趣。他在 21 岁稚龄时就开始担任加密专家，目前涉足移动设备管理行业，同时偶尔写书。埃尔科最近完成了利物浦大学的计算机安全硕士学位，持有多个专业认证，并对\
  \ Linux、网络安全和加密技术充满热情。埃尔科与他的小家庭居住在荷兰。热爱寿司，讨厌把事情搞复杂。\n\n蒂姆·霍金斯（Tim Hawkins）在 1993\
  \ 年创建了世界上最早的在线分类门户网站之一 loot.com，之后转而负责雅虎欧洲许多非媒体类业务（如搜索、本地搜索、邮件、即时通讯及其社交网络产品）的工程管理工作。他目前为一家大型美国电子商务零售商管理一个庞大的离岸团队，负责开发和部署下一代电子商务应用程序。热爱帽子，讨厌复杂性。\n\
  \n## 关于技术审阅者\n\n![A978-1-4302-5822-3_BookFrontmatter_Fig4_HTML.jpg](img/A978-1-4302-5822-3_BookFrontmatter_Fig4_HTML.jpg)\
  \ 亚历山大·博兰（Alexandre Beaulne）来自加拿大北部广袤地区，他在蒙特利尔的麦吉尔大学攻读了系统神经科学学士学位，随后在蒙特利尔高等商学院（HEC\
  \ Montreal）获得了金融工程硕士学位。然而，他的学业最终以参加纽约市的**黑客学校（Hacker School）** 告终。他反复声称自己“理解”了 `Haskell`\
  \ 的 **monads（单子）** ，但这一说法从未得到证实。\n\n![A978-1-4302-5822-3_BookFrontmatter_Fig5_HTML.jpg](img/A978-1-4302-5822-3_BookFrontmatter_Fig5_HTML.jpg)\
  \ 斯蒂芬·斯滕尼克（Stephen Steneker，又名 Stennie）是一位经验丰富的全栈软件开发人员、顾问和讲师。斯蒂芬在澳大利亚科技初创公司有悠久的工作历史，包括在雅虎澳大利亚和新西兰公司（Yahoo!\
  \ Australia & NZ）、HomeScreen Entertainment 和 Grox 公司担任创始技术职位。他持有不列颠哥伦比亚大学的计算机科学学士学位。\n\
  \n在他目前担任 `MongoDB` 公司技术服务工程师的职位上，斯蒂芬为 `MongoDB` 提供支持、咨询和培训服务。他经常在用户组和会议上发表演讲，并且是悉尼\
  \ `MongoDB` 用户组（ [`www.meetup.com/SydneyMUG/`](http://www.meetup.com/SydneyMUG/)\
  \ ）的创始人和组织者。\n\n你可以在 Twitter、StackOverflow 或 Github 上通过 `@stennie` 找到他。\n\n## 引言\n\
  \n我接触数据库领域相对较晚，始于 2006 年的 `MySQL` 。这遵循了任何一个计算机科学本科生的逻辑发展路径，让我得以在基于基础表结构的完整 `LAMP`\
  \ 技术栈上进行开发。当时，我对 `SQL` 表管理背后的复杂性几乎未加思索。然而，随着时间的推移，我看到了存储越来越多异构数据的需求，以及一个简单的模式如何随着生活对系统的冲击而增长和演变。\n\
  \n我第一次接触 `MongoDB` 是在 2011 年，当时彼得·门布雷建议我，与其用一张包含 30 个键和 30 个值的零上下文表格，不如直接使用一个 `MongoDB`\
  \ 实例来存储数据。像所有面对新技术的开发者一样，我嗤之以鼻，并按照原计划行事。直到我写代码使用那个糟糕的庞然大物进行到一半时，彼得坚持让我试试 `MongoDB`\
  \ ，自此之后我便再未回头。像所有从 `SQL` 世界来的新手一样，我对这个系统能够简单地接受我投入的任何数据，然后根据我提出的任何条件将其返回的能力感到惊叹。我至今仍为之着迷。\n\
  \n大卫·豪斯\n\n\n\n## 我们的方法\n\n而现在，在本书中，彼得、伊尔科·普拉格、蒂姆·霍金斯和我，目标是向大家呈现我们学习该产品时的相同体验：教您如何自己动手使用\
  \ MongoDB，同时保持内容的简单明了。每一章都提供了一个独立的示例数据库，因此您可以以模块化或线性的方式阅读本书；这完全由您选择。这意味着您可以跳过任何不喜欢的章节，而不会破坏您的示例数据库。\n\
  \n在整本书中，您会发现示例命令及其输出。两者均以等宽“代码”字体显示，其中命令还以粗体显示，以区别于输出结果。在大多数章节中，您还会遇到提示、警告和注释，其中包含有用且有时至关重要的信息。\n\
  \n## 致谢\n\n**大卫·豪斯**\n\n感谢 MongoDB 团队的所有成员，无论是过去还是现在的。没有他们，我们不会站在这里，人们对数据存储方式的看法也将截然不同。我要特别感谢我在悉尼\
  \ MongoDB 团队的同事们，没有他们，就不会有今天的我。\n\n**大卫·豪斯**\n\n写书始终是一项团队工作。即使只有一位作者，背后也有许多人在幕后努力，将一切整合在一起。考虑到这一点，我要感谢\
  \ MongoDB 社区的每个人以及 Apress 的所有人，感谢他们的辛勤工作、耐心和支持。特别感谢戴夫和伊尔科，他们真正推动了第二版的完成。\n\n我还要感谢查克·史密斯，一位朋友（也是维基百科世界语版本的创始人），是他让我迷上了世界语，并保持了我高涨的动力。这恰逢我从事第二版的工作，我确信学习世界语的兴奋感蔓延到了这次重写中。也必须感谢柴门霍夫博士，世界语的创造者。一位远超时代的人，我希望能继续推进这个梦想。\n\
  \n最后，感谢我的妻子莎拉一如既往的耐心和支持。\n\n**彼得·门布雷**\n\n致 9gag 社区，没有他们，这本书几个月前就该写完了。\n\n**伊尔科·普拉格**\n\
  \n我要感谢 mongodb-user 和 mongodb-dev 邮件列表的成员们，感谢他们忍受我无休止的问题。\n\n**蒂姆·霍金斯**\n\n## 目录\n\
